body:
  text: 卷一賦稟夫人之生也秉兩大以成形藉陰陽而賦命是故頭圓象天足方象地五行運於內一曜明於外乃至精神魂魄知覺靈明何者非陰陽之造就與氣化相盛衰然天地之氣化有古今斯賦稟由之分厚薄上古元氣渾龐太和洋溢八風正而寒暑調六氣勻而雨暘若人情敦茂物類昌明當是之時有情無情悉歸於厚非物之厚由氣厚也及開闢既久人物繁植發泄過傷攘竊天元雕殘太樸世風漸下人性澆漓故水旱有不時之擾流災有比戶之侵生物不蕃民用目促值此之際有知無知咸歸於薄非物之薄由氣薄也然則今之受氣於父母者其不能不薄也可知矣況有膏藜異養貴賤殊形醫術稱仁顧可視為不經之務夫膏粱者形樂氣散心蕩神浮口厭甘肥身安華屋頤養過厚身質嬌柔而且珠翠盈前嬈妍列侍縱熊羆之葉夢難桂柏以參天復有癡由貪起利令智昏者有雪案螢窗刳心噴血者有粟陳貫朽握算持籌不覺形衰氣痿者有志高命蹇妄念鑽營以致心倦神疲者凡此耗本傷元胚胎之植安保其深根固蒂也乃若藜藿之家形勞志一願足心安守蓋廩瓶倉對荊釵裙布乃其神志無傷反得胎嬰自固以此較彼得失判然矣若夫怒傷元氣勞役形骸迅雷烈風嚴寒酷暑日月薄蝕病體初安醉飽傷神落紅未淨胎孕之由斯愈薄實又成於人所不覺者故今之稟受十有九虛究其所因多半率由於是業斯道者當知氣化厚薄人事澆醇因以察其胎元之受於父母者之盛衰堅脆庶幾近焉若但以上古成方而治今時薄弱膠柱鼓瑟究歸無當泥而不通未可以言達於理也護胎易曰天地氤縕萬物化醇男女媾精萬物化生蓋天地生生之道終古為然矣顱囟經曰成胎之後一月為胞胎精氣凝也二月為胎形始成胚也三月陽神為三魂四月陰靈為七魄五月應五行分五臟也六月應六律定六腑也七月精開竅通光明也八月元神具降真靈也九月宮室羅布以御外侮十月受氣足萬象成也此胎元長養造化自然非人力也第妊母臟氣護胎仍若四時之有序足厥陰肝足少陽膽屬木旺春養胎在一月二月手心主包絡手少陽三焦屬火旺夏養胎在三月四月足太陰脾足陽明胃屬土旺長夏養胎在五月六月手太陰肺手陽明大腸屬金旺秋養胎在七月八月足少陰腎屬水旺冬養胎在九月至十月兒氣已足待時而生惟手少陰心君主之官神明之臟雖不主月而無月不在其胎元長養臟氣護持可謂至矣而人事恣縱敗壞能保其衝任有恆乎蓄德錄曰世人無不急於生子要知生子之道精氣交媾溶液成胎故少欲之人恆多子且易育氣固而精凝也多欲之人常艱子且易夭氣泄而精薄也譬之釀酒然鬥米下鬥水則醲釅且耐久其質全也鬥米倍下水則淡三倍四倍則酒非酒水非水矣其真元少也今人夜夜淫縱精氣妄泄邪火上升真陽愈憊安能成胎即僥倖生子又安能必其有成所以年少生子者或多羸弱欲勤而精薄也老年生子者反見強盛欲少而精全也且凡嗜於飲者酒亂其性精半非真無非濕熱勤於欲者孕後不節盜泄母陰耗其胎氣所謂恣縱敗壞者殆以是歟然父天母地古人嘗言之矣父主陽施猶天雨露母主陰受若地資生胎成之後陽精之凝尤仗陰氣護養故胎嬰在腹與母同呼吸共安危而母之飢飽勞逸喜怒憂驚食飲寒溫起居慎肆莫不相為休慼古人胎教今實難言但願妊娠之母能節飲食適寒暑戒嗔恚寡嗜欲則善矣此尤切於胞胎之急務幸毋視為泛常而忽之指紋析義幼科指紋總無正論且遊移不定莫可稽考有謂不必用者有用而至於怪誕不經誣民惑世者是皆未明紋中之理所以有用不用之殊議請以一得之愚聊發其要蓋此指紋與寸關尺同一脈也按內經十二經絡始於手太陰即肺脈也其支者從腕後出次指之端而交於手陽明支者即旁支也從手腕後出食指之端而交通榮衛於手陽明大腸之經即此指紋是也明如景岳猶謂此紋為手陽明浮絡不知手太陰經起於中府而終於大拇指之少商手陽明經起於食指之商陽兩不相值若無此旁支交通榮衛不幾令太陰陽明表裡斷絕乎況此脈可診人所不知其遲數代促與太淵一毫無異但脈體差小由旁支也指紋之法起於宋人錢仲陽以食指分為三關寅曰風關卯曰氣關辰曰命關其訣謂風輕氣重命危雖未必言其悉驗而其義可取蓋位則自下而上邪則自淺而深證則自輕而重人皆可信只恨復出詭異之說謬撰驚風門類致後賢多岐亡羊反成疑案予意仲陽宋之明人以孝見稱豈肯為此誤世大抵後之俗子假託其名而為之者惟有識者知其語言鄙俚論證荒唐便能棄之不用如張景岳夏禹鑄輩皆謂可不必用蓋非不用實惡其妄誕不經而無可用耳近世醫家不知真偽不辨是非習而行之乃致惑世誣民禍害嬰幼夫醫事動關生命乃聽無稽之言流傳貽殃是豈其可予雖不敏粗知經脈每見幼科指紋之說不勝發豎欲為規正恨非其人知而不言此心未慊今幸餘閒請言其要蓋此指紋即太淵脈之旁支也則紋之變易亦即太淵之變易不必另立異說眩人心目但當以浮沉分表裡紅紫辨寒熱淡滯定虛實則用之不盡矣倘舍此不圖妄執偽說以為是臨證不察病源謬指為人驚畜驚誑惑愚昧予恐盲人翳馬終墜重淵莫之能出也周虛中曰指紋晰義之精自仲陽以來七百餘年無人道及今讀至此如夢初覺如醉初醒足以快人神智真千古特識也蓋世人乍聞此言未能深信姑就其舛謬之傳撮其大要以正之其略曰指上辨青紋認是四足驚虎口脈青色是豬犬馬驚黑色因水撲赤色火人驚紫色多成瀉黃即是雷驚又曰青驚白是疳黃即困脾端青色大小曲人驚並四足云云凡此等之言斷非錢氏所出實齊東野語正人君子所不屑掛於齒頰者然不明指其非人或以予言不實今駁其最無理者以博一笑其曰指上辨青紋認是四足驚虎口脈青色是豬犬馬驚黑色因水撲赤色火人驚紫色多成瀉黃即是雷驚是指紋之青黃赤黑一皆驚之所致然則小兒之賦稟厚薄胎元寒熱以及內傷外感雜證麻痘數百之證悉當以驚風稱之以驚風治之矣不然除去青黃赤黑之紋又將何者辨其非驚風乎謬誤之傳莫此為最既云黃即困脾端矣是謂指紋黃色脾土受傷不足之證又曰黃即是雷驚似謂聞雷致驚有餘之候假令小兒指紋見黃不知此時應斷為脾困乎抑應斷為雷驚乎治之者不知應治脾乎應治其雷乎或將合一為治乎抑亦分晰其方乎且脾困為虛雷驚為實治虛遺實治實礙虛兼治不能分治不可予亦莫知何所適從乎至謂青色大小曲人驚並四足夫人與四足靈蠢天淵清濁冰炭氣化純雜不侔斷無並列之理今既曰人驚並四足矣則是臨證時凡指紋青者謂之人驚可也即謂之四足驚亦可也是人與四足竟可以通稱而四足與人不幾同類耶即以紋曲之大小別之原其意必謂大麴為人驚小曲為畜驚又安知人驚不為小曲畜驚不為大麴乎何所據而確知其人驚之曲必應大畜驚之曲必應小設使大麴之中仍有小曲小曲之旁兼見大麴得無曰此人驚中之畜驚畜驚中之人驚耶無稽之談不堪寓目再究其治療更無是處若謂人驚畜驚總為一驚不必論證不須異治則今之分大分小指人指畜者得無譫妄乎若謂人驚畜驚各為一驚未可同論正不知人驚為何病畜驚為何證宜以何物治人驚何物治四足驚既有以上之驚名應立以上之證治何以並無一法而徒設此無稽虛言以誑俗在庸妄固不足責而立言諸公不之規正反為編次於書遺誤後世吾恐有目者未必不為之眥裂也再曰青驚白是疳青驚即已前諸說不必瑣贅至於白是疳誠為妄誕夫疳證即方脈之虛勞在幼稚謂之疳積本脾腎兩傷之候久之五臟俱損中氣敗極則面目肌膚俱見晃白形如枯骨之象故曰白是疳此以形色言也今以指紋當之謬之甚矣蓋氣血兩傷精神久虧之證其紋必淡凡虛證皆然不特疳證已也然只可言其色淡不可謂之色白蓋指上從無白紋予臨證四十餘載未嘗一遇後人勿謂古人之言一定不易必俟其指紋白色始可稱之為疳若然則疳證之兒無幸矣故知按圖索驥終非解人神而明之始稱匠手指紋辨證詳列於下指紋切要小兒自彌月而至於三歲猶未可以診切非無脈可診蓋診之難而虛實不易定也小兒每怯生人初見不無啼叫呼吸先亂神志倉忙而遲數大小已失本來之象矣診之何益不若以指紋之可見者與面色病候相印證此亦醫中望切兩兼之意也令人抱兒對立於向光之處以左手握兒食指以我右手拇指推兒三關察其形色細心體認亦惟辨其表裡寒熱虛實足之矣世人好異不從實地用功以此為淺近之談不屑留意不知臨證能辨此六者便為至高之手蓋表裡清則知病之在經在腑而汗下無誤寒熱明則知用寒遠熱用熱遠寒或寒因寒用熱因熱用因事制宜用無不當虛實辨則知大虛有盛候大實有羸狀不為假證眩惑凡真虛真實易知假虛假實難辨真假既明則無虛虛實實之患於此切要關頭不知體會但以不經之言欺世誑俗謂何者為人驚何者為畜驚不特欺人而且自欺不特無益治療而且誤人生命是誰之咎哉三關部位歌部位未可以定輕重安危由古有三關之說姑存之耳初起風關證未央氣關紋現急須防乍臨命位誠危急射甲通關病勢彰紋見風關為病邪初入之象證尚輕微體亦未困治之甚易紋現氣關邪氣正盛病已沉重治之宜速倘三關通度紋出命關則邪氣瀰漫充塞經絡為至重之候設透關射甲則邪氣無所容高而不能降為亢龍有悔之象治之者切宜留心慎毋輕視浮沉分表裡歌指紋何故乍然浮邪在皮膚未足愁腠理不通名表證急行疏解汗之投此紋與太淵脈相通凡有外邪太淵脈浮此紋亦浮蓋邪在皮毛腠理之間故指紋亦顯露於外謂之表證速宜疏散啟其皮毛開其腠理使邪隨微汗而解一匕成功何嫌而不投哉忽爾關紋漸漸沉已知入里病方深莫將風藥輕相試須向陽明裡證尋指紋見沉知邪入里但有淺深之別若往來寒熱指紋半沉尚在陽明胃經治宜解肌若外證壯熱不已指紋極沉已入陽明胃腑速宜攻下庸妄見其身熱猶以風藥治之蓋病在內治其外非其治也不特病邪不服適足以燥其陰血愈增其困耳紅紫辨寒熱歌身安定見紅黃色紅豔多從寒里得淡紅隱隱本虛寒莫待深紅化為熱神氣泰寧榮衛靜謐定見太平景象蓋黃為中和之氣紅為文明之色紅黃隱隱景物熙熙焉有不安之理寒邪初入皮毛經絡乍滯所以紋見紅鮮由血滯也無論內寒外寒初病久病一見此紋總皆寒證凡人中氣怯弱榮衛不充紋色必淡淡而兼紅虛寒之應至謂深紅化熱其理安在紅本寒因豈能化熱由其寒閉皮毛腠理不通蓋人身內臟之氣時與皮毛之氣相通貫無一息之暫停今寒閉汗孔內出之氣無所泄鬱於皮毛之間漸積漸厚而化為熱矣此內出之氣為熱非外受之寒能變熱也關紋見紫熱之徵青色為風古所稱傷食紫青痰氣逆三關青黑禍難勝榮行脈中衛行脈外熱壅經絡阻其陰榮之道所以紋紫紫為熱熾千古定評也少陽甲木其色本青肝膽受邪紋見青色此傷風候也但可以風熱稱之不可稱驚風以誤世夫青者木之色內經有在天為風在地為木之言所以風木同氣肝受風邪紋必見青此理最明最顯而幼科偏不言青為風偏言青為驚據幼科所論驚出於心然青非心之色何以青為驚乎此等牽強之說最為謬誤予有驚風闢妄詳列二卷紫而兼青食傷之候蓋食飲有形之物阻抑中焦壅遏脾氣不能宣布故風木乘其困而侮之所以痰氣上逆也疏通壅滯令其流利可也倘抑鬱既久脾氣愈不運榮衛愈見澀則風痰實熱固結中焦所以青而兼黑此抑鬱之至也急宜攻下庶有生機誤認驚風百無一救淡滯定虛實歌指紋淡淡亦堪驚總為先天賦稟輕脾胃本虛中氣弱切防攻伐損胎嬰小兒稟受陽虛肌膚晃白唇舌淡色者指紋四時皆淡雖有病亦止淡紅淡青淡紫而已蓋淡紅虛寒淡青虛風淡紫虛熱此等之兒根本不堅中氣怯弱無論新病久病總歸於虛一毫攻伐不敢輕用倘誤投克削覆水難收悔之遲矣關紋澀滯甚因由邪遏陰榮衛氣留食鬱中焦風熱熾不行推蕩更何求病邪阻郁榮衛運行遲滯升降羈留所以指紋推之轉澀全無活潑流利之象由食飲風熱相搏是為實證急宜推蕩去其菀莝其愈亦易若三關純黑推之不動死證也不治紋形主病歌腹痛紋入掌中心彎內風寒次第侵紋向外彎痰食熱水形脾肺兩傷陰掌心包絡所主紋入掌中邪侵內臟由中氣寒也故為腹痛紋若彎弓內外有別其紋之兩頭彎向中指為內為順證為外感風寒治之猶易其紋彎向大指為外為逆證為內傷飲食治之稍難形如水字脾肺不足食塞太陰中氣怯弱脾不運化故也或問指紋惟止一線安能如水字之形曰不觀太淵之脈亦止一線何以陽維陰維陽蹺陰蹺皆左右彈石豈非小字之形乎脈有左右安知紋無左右但能觸類旁通無往非理豈特指紋為然哉凡看指紋以我之大拇指側面推兒食指三關切不可覆指而推蓋螺紋有火剋制肺金紋必變色又只可從命關推上風關切不可從風關推出命關此紋愈推愈出其紋在先原未透關今誤推而出之大損肺氣慎之戒之以上表裡寒熱虛實鑿鑿有據但能於臨證時認得此六字分明胸中自有主宰雖不中不遠矣若但以驚證塞責何難應對第晨盅自問未免懷慚凡我同人互為砥礪幸矣小兒脈法小兒三五歲可以診視第手腕短促三部莫分惟以一指候之誠非易易內經診視小兒以大小緩急四脈為準予不避僭越體其意竟易為浮沉遲數而以有力無力定其虛實似比大小緩急更為明悉後賢其體認之內經脈要黃帝曰乳子而病熱脈懸小者何如夫乳子病熱脈見懸小者陽證見陰脈本為大忌但小而緩者邪之微其愈易小而急者邪之甚為可慮故以為問岐伯曰手足溫則生寒則死夫小兒以稚陽之體而加病熱脈不當小若脈體雖小手足溫者以四肢為諸陽之本陽猶在也若四肢寒冷者則邪勝其正元陽去矣故曰死也帝曰乳子中風熱喘鳴肩息者脈何如岐伯曰喘鳴肩息者脈實大也緩則生急則死此言小兒之外感也風熱中於陽分而喘鳴肩息者脈當實大但大而緩則胃氣存邪漸退故生實而急則真臟見病日進故死也此內經之旨聖人立言簡切而總括無餘世人不悟視為泛常能於此等處著眼則診視之要思過半矣予之臨證診視每論吉凶而多中者亦不外此第意之所至口莫能宣竊詳經所謂大小緩急者亦發而不露之意蓋大即浮洪類也小即沉細類也急即數也緩即遲也何若竟易以浮沉遲數之為得乎再以節庵之有力無力辨其表裡虛實誠診視小兒天然不易之妙訣夫節庵亦一常人而能以有力無力辨其陰陽表裡寒熱虛實雖至顯淺至平易卻至確當孰謂古今人不相及耶四脈主病浮脈主表病在外沉脈主裡病在內遲脈主臟病為寒數脈主腑病為熱五至四至為遲為寒為不足浮遲外寒沉遲內寒有力實寒無力虛寒七至八至為數為熱為太過浮數表熱沉數里熱有力實熱無力虛熱主證浮而有力風熱無力陰虛沉而有力痰食無力氣滯遲而有力為痛無力虛寒數而有力實熱無力瘡瘍總括脈要歌太淵一指定安危六至中和五至虧七八熱多三四冷浮沉遲數貴詳推有力為陽為實熱虛寒無力里何疑若能留意於中取何致亡羊泣途岐浮而有力實兼風風熱皆陽表之實也無力陰虛汗雨蒙陰榮妄泄表之虛也有力而沉痰食害痰凝食滯結於裡也沉沉無力氣凝胸氣滯於中不運化也遲而有力多為痛浮遲外痛沉遲內痛無力虛寒氣血窮氣弱血衰至虛之候數脈熱多終有力數而有力實熱何疑瘡痍無力熱虛攻陰血受傷虛熱所致脈證宜忌歌脈浮身熱汗之松陽邪居表應從汗解沉細身涼莫強攻無論表裡不堪攻伐咳嗽正嫌浮帶數浮緩為宜浮數大忌細沉腫脹定知凶脾胃虛寒愈不運化沉遲下痢方為吉氣血俱傷最嫌洪數洪大偏宜痘疹逢陰陽充足毒不能留腹痛不堪浮有力三陰受病浮則反常浮洪吐衄總無功陽火太盛陰血愈傷陶節庵曰診脈之要無論浮沉遲數但於有力無力中分有力者為陽為實為熱無力者為陰為虛為寒至哉斯言也後賢無忽保產論生產一道天地自然之理不待勉強而無難者也然今之世往往以難產聞者得無以人事之失而損其天耶保產之術可不詳乎世風不古胎教久廢為母者既不能保於平時而徒臨產措置猶覺其遲謹將難產之由詳列於左庶知預為調攝也難產七因一因安逸蓋婦人懷胎血以養之氣以護之宜常時微勞令氣血周流胞胎活動如久坐久臥以致氣不運行血不流順胎亦沉滯不活動故令難產常見田野勞苦之婦忽然途中腹痛立便生產可知二因奉養蓋胎之肥瘦氣通於母母之所嗜胎之所養如恣食厚味不知減節故致胎肥而難產常見藜藿之家容易生產可知三因淫欲古者婦人懷孕即居側室與夫異寢以淫欲最所當禁蓋胎在胞中全賴氣血育養靜則神藏若情欲一動火擾於中血氣沸騰三月已前犯之則易動胎小產三月已後犯之一則胞衣太厚而難產一則胎元漏泄子多肥白而不壽且不觀諸物乎人與物均稟血氣以生然人之生子不能胎胎順個個存而牛馬犬豕胎胎俱易個個無損何也蓋牛馬犬豕一受胎後則牝牡絕不相交而人受孕不能禁絕矧有縱而無度者乎四因憂疑今人求子之心雖切保胎之計甚疏或問卜禱神或聞適有產變者常懷憂懼心懸意怯因之產亦艱難五因軟怯如少婦初產神氣怯弱子戶未舒更腰曲不伸輾轉傾側兒不得出又中年婦人生育既多氣虛血少產亦艱難六因倉皇有等愚蠢穩婆不審正產弄產但見腹痛遽令努力產婦無主只得聽從以致橫生倒生子母不保七因虛乏孕婦當產時兒未欲生用力太早及兒欲出母力已乏令兒停住因而產戶乾澀產亦艱難惟大補氣血助之可也產要產婦臨盆必須聽其自然勿宜催逼安其神志勿使驚慌直待瓜熟蒂圓自當落矣所以凡用穩婆必擇老成忠厚者預先囑之及至臨盆務令從容鎮靜不得用法催逼嘗見有穩婆忙冗性急者恐顧此失彼強勉試湯分之掐之逼之使下多致頭身未順而手足先出或橫或倒為害不小故未有緊陣不可令其動切記緊嘗見奸詭之婦故為哼訝之聲或輕事報重以顯己能以圖酬謝因致產婦驚疑害尤非細極當慎也一孕婦將產不可占卜問神如巫覡之徒哄嚇謀利妄言吉凶產婦聞之倍生疑懼因令氣血結滯多致難產所宜戒也懷孕六七個月或八九個月偶略曲身胎忽亂動三二日間或痛或止或有水下惟腰不甚痛胎未離經名曰弄產又有臨產一月前忽然腰痛卻又不產此是轉胞名曰試月胎水有無俱不妨但宜直身坐臥行立自然無事又有伸手高處取物忽然子鳴腹中但令鞠躬片時即安臨產陣痛有二三日有五七日者原非正產驚動太早子未出胞非難產也但聽其坐臥任意不得扶坐努力而令其憂疑氣餒惟勸其飲食以藥餌滋補之臨產有七候臍腹急痛腰間重墜眼中出火糞門迸急產戶腫滿手中指筋脈跳動胞水或血俱下方是子出胞時始可用力如數證未備即一二日切不可使其努掙又有胞水以下兒頭已至產門三四日仍不下者因母氣先餒此時惟人參為專攻力不能者大劑八珍湯補其元氣調其飲食時至自生臨產時飲食減少最為可慮即宜以獨參湯常服不可使其精力衰乏若交骨不開由氣衰不能運達宜十全大補助之自開加味歸芎湯亦可臨產時驚動太早血先下而胎元乾涸僵死腹中不必驚惶惟令產母上床穩臥切勿用力努掙徒傷神氣第宜勉進飲食勿令氣乏予治極多十可全十惟以脫花煎加芒硝三五錢水煎熱服其胎化水而下矣古方以平胃散加芒硝下死胎下胞衣功雖最捷而暗中有損予見數人用此者胞胎雖下而產婦過一二年皆夭無一免者大都平胃散克伐胃氣而芒硝鹹寒傷血所以臟腑暗中受損今易用脫花煎藥味甘溫而歸芎生血活血肉桂暖血更加附子一二錢雖芒硝之寒不能為害矣此等之事非臨證久者莫知其弊也予嘗治一少婦年二十四原系初產總由慌忙急促產不如法乃至久不能下延予至而胎已死矣問產婦腹內動否曰不動小腹陰冷知其胎死無疑欲用前藥慮其初產門戶未舒因與主家商酌肯聽予言則萬無一失今死胎僵硬以藥下之恐交骨未開必損其母莫若以十全大補倍參桂一以扶產母精力二可以暖其下元使胎自爛始能保全無恙主家以予言為是依此行之以十全大補倍參桂服一劑後腹中溫暖不痛不急予曰得之矣所慮者腹痛作墜今不痛不墜可以耐之更幸產婦年力本強脾胃素健每食乾飯三盂肥雞半隻予見更喜以其中氣不衰自堪承任仍每日如是調理至五日而死胎自下糜爛臭穢不堪產母精神如舊毫無傷損可見死胎不忙不亂尚能保全況生胎乎第人不肯安靜必欲強為奈之何哉產時子有出戶之勢轉身差緩母力一逼或手或足或橫或倒又有生路未順兒頭偏拄左右腿畔名曰偏產又有兒頭偏拄穀道名曰棖後此等數證穩婆精巧者則不須服藥若穩婆無用者急扶產母上床正身仰臥厚被覆之令老成穩婆徐徐往上推之內服補中益氣湯升提之須臾提上重新轉身兒頭已對產門急扶即下產時門戶俱正兒已露頂而不下此轉身時臍帶絆其肩也扶母正身仰臥輕輕推兒向上以手指輕按兒肩去其臍帶然後用力送下胎衣來遲氣虛弱也急服脫花煎若血流入衣中脹悶疼痛脫花煎加芒硝下之或有能事穩婆以手循臍帶而上以中指頂其衣輕覆衣中之血從容候之亦下此良法也產時用力太早水衣先破被風所吹產戶腫脹乾澀狹小者以紫蘇煎湯熏洗以香油和蜜潤之從容俟之無不下者產時腸先出用淨盆盛溫水少入香油養潤待兒與胞衣下時母略仰臥自己吸氣上升穩婆以香油塗手徐徐送入或濃煎黃耆湯浸之內服補中益氣湯即上又有兒並胞衣下後膀胱墜出產戶者用前法送入仍服補中益氣湯若穩婆不謹膀胱扯破者八珍湯加豬脬為引服之可復產畢產門不閉血氣大虛十全大補湯若因胎大而擦傷產門者蘄艾益母草煎湯洗之產時胞胎既下氣血俱去忽爾眼黑頭眩神昏口禁昏不知人古人多雲惡露乘虛上攻故致血暈不知此證有二一曰血暈一曰氣脫若以氣脫作血暈而用辛香逐血化痰之劑則立刻斃矣不可不慎氣脫證產時血既大下則血去氣亦去故昏暈不省微虛者少刻即蘇大虛者竭脫即死但察其面目如眼閉口開手撒手冷六脈微細之甚或浮而散亂此即氣脫證也速用人參多則五七錢少則三二錢加入炒米煨薑紅棗煎湯徐徐灌之但得下咽即可救活若少遲延則無及矣無力備參者以大劑當歸補血湯加炒米煨薑紅棗煎湯灌下亦能救附氣脫案州左遂陽云軒高君夫人梁氏膏粱之稟其質最怯產育亦多戊午分娩未見過艱產下精神猶健云翁不以為意與予閒話中庭殊因一時下血過多忽報倒僕於地急視之則口張手撒面唇俱黑呼吸已寂然矣幸人參有便煎之不及即以一枝碎嚼納產婦口中以滾湯灌之方得下咽一吐傾囊而出蓋胃氣已不納受矣又嚼又灌連嚼五枝雖吐而未盡出良久噯氣一聲而呼吸漸回乃大進參朮而愈自後分娩不復為難客歲復妊偶患微痔予曰孕中患痔難於用藥姑緩圖之云翁深以為是而夫人必欲速愈予知其不可不敢承任勸其更醫連易數手分毫無效復延外科妄用毒劣胎雖未墮而瘡愈墜而不收以致晝夜呼號窘迫萬狀精神形質困憊已極及至臨月見其面唇㿠白聲息至微六脈空浮而無根當夜用參三錢服十全大補一劑次早胞水以下煎參七錢以雞湯沖服登時即產一男產婦精神勝舊不意三朝偶沾外感頭疼身痛惡寒發熱投以熟料五積散而愈未數日忽因惱怒陡然上氣喘急咳嗽連聲胸前脹痛喉內痰鳴水米不入略啜茶湯則上下阻截氣不相續數人扶坐莫能伏枕不時昏絕舉室惶惶因診其脈則細數無倫將近十至予知為無根脫氣上衝乃以八味地黃湯冀納其氣二劑毫不為動予曰此等之證非大補真元莫能挽也乃以六味回陽飲參附桂薑歸地各三錢加鹿茸五錢一劑下咽而氣平能臥四劑全安曩之大臟乾枯業已滋潤而痔瘡痛苦亦不復言矣此等脈證在常俗之輩必疑臨產服參過多非用寬胸下氣不可清降一投下咽即斃仍歸罪於從前之參必群起而攻之矣不知臨產之日非猛進參朮則已脫於當產之際何能至今今之氣喘實由參力已過虛證復現子午不交竭絕立至非大力之方安可挽回此證得生實由云翁學識超邁胸中有主惟予言是聽所以效捷桴鼓稍循俗見者萬無生理矣凡閉脫二證不特產後宜辨即中風中痰氣厥暑風及卒然倒僕昏暈不省咸宜辨之如牙關緊閉兩手握拳謂之閉證有餘之候即疏風化痰亦可用之如口張手撒眼閉遺尿鼾聲謂之脫證蓋口張心絕手撒脾絕眼閉肝絕遺尿腎絕鼾聲肺絕皆元氣竭絕之候惟大進參附或可十中救一予見產後脫證不敢服參而斃者不知其幾嘗聞入曰某產後無病忽爾眼暗一暈而絕者又某產後忽一呵欠即張口氣絕者即此脫證是也復有妄人不知脫證為何事不識人參為何物而從中阻撓不令服參而斃者亦不知凡幾死者有知能無抱九京之慟乎血暈證本由氣虛一時昏暈然血壅痰盛者亦或有之如果形氣脈氣俱有餘胸腹脹痛氣粗外證兩手握拳牙關緊閉此血逆證也黑神散無脹無痛者屬氣虛大劑芎歸湯加肉桂卒然暈倒藥有未及者燒紅秤錘用瓦盆盛至床前以醋沃之令醋氣入鼻收神即醒產後百脈空虛洗拭太早令中風口噤手足搐搦角弓反張或因怒氣發熱迷悶用荊芥穗酒炒至黑大當歸各三錢用水半杯酒半杯童便半杯煎至一杯灌之牙關緊以簪抉開灌之仍捻其鼻以手摩其喉使得下喉即活矣此即產後病痙而幼科稱為驚風者是也孕時觸損臟氣胞系斷裂忽然胎墜名曰小產虧敗子宮較大產為尤甚然治此亦不同大產惟以滋補為上計馮楚瞻曰小產不可輕視將養宜十倍於正產大產如果熟自脫小產如生探之破其皮殼斷其根蒂也忽略成病者不少因而致死者恆多然此證始因斂血以成胎繼因精血以長養終因精血不足而屢墮故瘀血甚少倘有腹痛成塊有形多屬血虛氣逆惟大用溫補則新者生而瘀者去若行消導破滯則逆氣愈攻而愈升多致不救更有血虛腹痛復有陰虧不能納氣以致瘕疝為患者當以八味地黃丸加牛膝五味早晚服之自愈張景岳曰凡小產有遠近其在二三月者謂之近五月六月謂之遠新受而產者其勢輕懷久而產者其勢重此皆人之所知也至若尤有近者則隨孕隨產矣凡今艱嗣之家犯此者十居五六其為故也總由縱欲而然第自來人所不知亦所不信茲謹以筆代燈為迷者指程倘濟後人實深願也請詳言之蓋胎元始肇一月如露珠二月如桃花三月四月而後血脈形體俱五月六月而後筋骨毛髮生方其初受不過一滴之玄津耳此其橐龠正無依根荄尚無地築之則固決之則流故凡受胎之後極宜節欲以防泛溢而少年縱情罔知忌憚雖胎固欲輕者保全亦多其有兼人之勇者或持強而不敗或既敗而復戰當此時也主方欲靜客不肯休狂徒敲門撞戶顧彼水性熱腸有不啟扉而從隨流而逝者乎斯時也落花與粉蝶齊飛水棗共交梨並逸合汙同流已莫知其昨日孕而今日產矣朔日孕而望日產矣隨孕隨產本無形跡在明產者胎已成形小產必覺暗產者胎仍似水直溜何知故凡今之衏衏家多無大產以小產之多也娶娼妓者多少子息以其子宮滑而慣於小產也又嘗見艱嗣之人而求方者問其陽事則曰能戰問其功夫則曰盡通問其意況則怨嘆曰人皆有子我獨無亦豈知人之明產而爾之暗產耶此外如受胎三月五月而每有墮者雖衰薄之婦常有之然必由縱欲不節至傷母氣而墮者為尤多也故凡恃強過勇者多無子以強弱之自相殘也縱肆不節者多不育以盜損胎元之氣也豈悉由婦人之罪哉此景岳見道之言古人每曰寡欲多男此即其註腳也世人每恨不孕孰知既受而暗損之屢受而屢損之終身無子不亦宜乎第有婦人由於衰弱或陰陽偏勝墮胎至於數次而醫者竟無一策以保固之亦可哀矣予有至神至聖保孕之方屢經效驗但信而行之斷不相誤集成三合保胎丸此為素慣墮胎者設也蓋胎孕之屢墮雖由於衝任虧脾腎弱若德性幽閒內臟無火者決不墮也能清心節欲起居有恆者決不墮也凡屢墮者皆偏陂之性暴怒之人以致於肝氣有餘肝血不足血虛生熱火爍子宮又或恣縱不節其胎必漏而墮矣而世之安胎者無非執泥古法以香砂芎艾為保孕良圖不知熱藥安胎猶抱薪救火不惟無濟而反速之予甚不慊因以古之內補丸杜仲丸白朮散三方合湊名三合保胎丸以條芩清肝火而涼血白朮扶中氣以健脾當歸養血寧心熟地滋陰補腎續斷填損傷而堅胞系杜仲益腰膝而暖子宮至怯者加以人參力不能者不用亦可藥雖平易功勝神丹誠所謂鉞斧相投捷如影響凡屢墮者服之無不保全實亦婦科保孕安胎之聖藥也再有叮嚀凡屢墮者受娠一月即制此丸服之蓋墮胎必在三月五月七月之間此三月內切忌房勞惱怒犯之必墮七月已過萬無一失三合保胎丸方大懷地一十二兩用砂仁三兩老薑三兩同地黃入砂鍋內先以清水煮兩晝夜俟地黃將爛始入好酒煮之總以地黃糜爛為度將酒煮乾取起揀去砂仁姜滓不用將地黃搗膏聽用大當歸去頭尾取身切片一十二兩以好酒洗過曬乾聽用漂白朮取淨乾片一十二兩以黃土研碎拌炒極黃取起篩去土孕婦肥白者氣虛加二兩實條芩枯飄者不用取小實者切片六兩酒炒三次孕婦黑瘦者加一兩性躁者二兩棉杜仲切片一十二兩鹽水拌抄以絲斷為度川續斷切片一十二兩酒炒上將後五味和為一處火焙乾燥磨為細末篩過以前地黃膏和勻少加煉蜜入石臼內搗千餘忤為丸綠豆大每早鹽湯送三錢晚臨臥酒送三錢每日如此不可間斷孕婦素怯者須兩料方可自一月服起過七個月方保無虞此方至神至聖幸勿輕視凡臨產時亟齋有六字真言一曰睡二曰忍痛三曰慢臨盆予復有三字寶曰未離經較六字真言更為親切蓋六字真言出於常人之口產婦未能深信三字寶為醫者之言不容不信誠保產金丹回生上藥予以此法救人莫可勝紀凡臨產家診視無論脈之滑澀痛之緊緩但曰未離經仍囑產婦曰脈未離經尚非正產且脈氣舒徐定然安吉惟宜加食穩臥俟其時至可也此何意蓋產育全賴母氣為主產婦聞其脈未離經知時未到不敢望其速下惟安心耐之而已產婦一安舉室皆安庶無倉皇擾攘之患天下原無難產之事凡難產而致死者總由時候未至倉皇逼迫害之也始則家長驚張不能鎮定繼則產婦嬌怯不肯忍痛或弄產或轉胞稍有腹痛隨即聲揚無知穩婆便稱是產而試水坐草一任胡為豈知七候未臨胎氣未足子在胞中安然不動欲令其產焉可得乎因其久而不下產婦則驚懼憂疑飲食不納漸至氣怯神昏常有未產而斃者矣予臨是證但曰未離經惟以大劑甘溫之藥與之如八珍十全之類助其產母之元氣若為正產則腹痛陣緊一陣痛急自下倘非正產則腹痛漸減漸緩胎元得暖而安矣予之所經穩婆謂頭已平門予診得脈未離經用固胎暖藥而安之有遲至一月半月十日而產者已經十數人矣豈有頭已平門而能倒懸一月半月之理即此可知穩婆之不足信不觀亟齋言曰凡邪淫之婦私胎並無難產總因胎起於私怕人知覺只得極力忍痛痛到極熟之時則脫然而出此豈有穩婆分掐妙藥催生乎凡產育能耐心忍痛聽其自然則萬舉萬全若謂藥能催生予則未敢許也至催生之法謂產時胞漿以下一二時辰不生方可用之蓋漿乃養兒之物漿幹不產必胎元無力愈遲則愈干力必愈乏不得不以大補氣血之藥助其母力又惟人參為至聖其次則脫花煎芎歸湯皆可然亦須子已出胞交骨既開門戶已正方為有益若止憑產婦腹痛之言穩婆頭至之說妄用催生方藥不惟無濟反速其斃慎之戒之附方十全大補湯揀人參炒白朮白茯苓懷熟地當歸身正川芎杭白芍炙黃耆上肉桂炙甘草生薑紅棗為引八珍湯揀人參炒白朮白茯苓大當歸正川芎白芍藥懷熟地生薑大棗為引加味芎歸湯治新產交骨不開全當歸正川芎油發灰敗龜板炙水煎熱服周虛中曰陽主開而陰主闔自然之理也今交骨不開陰極矣必加肉桂以宣布陽和庶為有濟若龜板發灰之純陰僅可為通任脈之響導耳脫花煎凡生產臨盆此方最佳並治產難經日不下並死胎胞衣不下俱妙全當歸一錢正川芎三錢上青桂二錢淮牛膝二錢淨車前一錢五分水煎加酒對服若胎死不下及胞衣不來並加芒硝五錢氣虛困劇者加人參二三錢更加附子二錢無不下者此方比平胃散加芒硝功勝百倍其藥味甘溫不傷元氣故也補中益氣湯揀人參炒白朮炙黃耆黑升麻北柴胡全當歸廣陳皮炙甘草生薑大棗引當歸補血湯治產時去血過多心內怔忡頭暈眼黑昏沉不醒炙黃耆一兩當歸身五錢加炒米一兩生薑五片大棗五枚水煎服黑神散治產後血暈胸腹脹痛氣粗牙關緊閉兩手握拳血逆之證上青桂全當歸杭白芍黑炮姜懷熟地大黑豆炒五錢水煎酒對服生化湯此方去舊生新凡產後無論有病無病能服數劑使惡露盡去新血速生誠產後之要藥也世俗每以紅糖下瘀反致損胃戒之大歸身五錢正川芎二錢五分光桃仁二十一粒黑炮姜一錢炙甘草一錢每日一劑水煎熱服四五劑為度清魂散治產後瘀血攻心數日神昏不醒瘀化為膿流出臭穢而不知者神效白當歸三錢正川芎二錢鮮澤蘭三錢荊芥穗一錢益母草二錢揀人參一錢炙甘草五分生薑大棗水煎服加味芎歸湯催生及產後最為穩當功亦巨當歸身三兩大川芎五錢上青桂二錢催生俱用此三味水煎對酒服立下預防血暈以本方加酒炒荊芥二錢先將此藥煎好俟胞衣以下隨即服之斷無血暈之患效經千百斷不誤人八味地黃湯產後氣浮喘促不甚虛者以此納氣歸元至虛者不能懷熟地五錢正懷山四錢淨棗皮三錢白茯苓三錢宣澤瀉一錢粉丹皮一錢川附片二錢上青桂二錢水煎極濃空心服六味回陽飲凡真元已敗氣血既亡陰陽將脫非此莫能挽回誠迴天贊化第一之功此景岳新方知者尚少大熟地五錢大當歸三錢黑炮姜二錢熟附子二錢青化桂二錢上揀參三五錢加鹿茸數錢功更捷生薑大棗為引水煎溫服此方不剛不猛能回散失之元陽能斂亂離之陰血濟急扶傾無出其右者催生簡便方人能鎮定耐痛待時必無難產之患或因倉皇急迫不幸遇此而催生之法不可不知又或窮鄉僻壤醫藥不便誠為困苦故附單方於此以備急需一治橫生逆產胞衣不下並落死胎用蓖麻子四十九粒去殼研爛於產婦頭頂心剃去少發以蓖麻膏塗之須臾覺腹中提上即宜除下卻急於足心塗之自然順生生下即速去藥遲則恐防腸出如胞衣不下貼足心即下一鄉村僻壤無藥之處不幸遇此即覓花椒葉香圓葉柚子葉茱萸葉生薑生蔥紫蘇濃前湯一盆俟可下手即令產婦以小凳坐盆上澆湯淋洗其臍腹陰戶久久淋洗氣溫血行登時即產以上諸葉少一二味亦不妨一治死胎不下及胞衣來遲用黑豆一升炒香熟入醋一大碗煎至六七分去豆取湯分三次服之以熱手順摩小腹其胞胎俱下又方用冬蜜一大杯以百沸湯調服之立下如胞衣來遲再服一碗即下一治產難及橫生逆產或血海乾枯以致胎死不下惶惶無措死在須臾急用皮硝五錢熟附子一錢五分好酒半杯童便半杯同煎三沸溫服立下百發百中一方治產婦元氣弱極胞衣來遲者用真青化桂三錢當歸川芎各錢半酒煎熱服立下一下死胎用麥芽半斤搗碎水二大碗煎至一碗服之即下一方天花粉酒炒四錢上肉桂淮牛膝淡豆豉各三錢用水二碗煎至一碗熱服即下熟料五積散此方專治婦人產後外感內傷瘀血不行痰凝氣滯頭疼身痛惡寒發熱心腹疼痛寒熱往來似瘧非瘧小腹脹滿傷風咳嗽嘔吐痰水不思飲食胸緊氣急手足搐搦狀類中風四肢痠疼渾身麻痹凡產後一切無名怪證並皆治之夫產後百節俱開氣血兩敗外則腠理不密易感風寒內則臟腑空虛易傷飲食稍有不慎諸證叢生古書有產後以大補氣血為主雜病以末治之之戒後世莫不遵之惟事滋補不知風寒未去食飲未消滋補一投反成大害昧者猶以為藥力未到愈補愈深死而後己天下之通弊莫此為甚予昔於潭州遇師指授此方按法治之往輒裕如不敢自秘逢人口授並曾刊板印送於茲四十餘載活人莫可勝紀但慮世人不悟以為淺近之方安能神應若是故古人謂千金易得一訣難求予今訣破庶狐疑頓釋方名五積者謂此方能去寒積血積氣積痰積食積也今產後之病怯正犯此五積以五積之證投五積之方豈非藥病相值乎猶慮藥味辛散而以醋水拌炒名熟料五積散俾藥性和緩表而不發消而不攻方內所用肉桂解表逐寒白芍和榮諧衛蒼朮厚朴走陽明而散滿陳皮半夏疏逆氣以除痰芎歸薑芷入血分而祛寒濕枳殼桔梗寬胸膈而利咽喉茯苓去飲寧心甘草和中補土大虛大怯者加人參微虛者可不用共為溫中散寒之妙劑用於產後無往非宜五積散本方原有人參因世人不敢輕用故方中未載香白芷一錢不炒上青桂一錢不炒川厚朴一錢正川芎一錢芽桔梗一錢陳枳殼白雲苓炒蒼朮杭白芍法半夏黑炮姜炙甘草廣陳皮以上各一錢全當歸二錢虛加人參一錢上藥味皆宜秤過除白芷肉桂在外不炒余藥合為一劑用好醋小半杯淨水一杯與醋和勻將藥潤濕入鍋內炒至黃色為度取起攤地上去火毒候冷入白芷肉桂在內生薑三片紅棗三枚淨水二碗煎至一碗熱服此方至平穩見效之後依而服之不拘劑數以愈為度惟產後大汗泄瀉或虛脫之證忌之蓋此方但能去病不能補虛虛證有方在前並宜參考產後簡便方產時母腸先出然後見生產後其腸不收甚為危迫用醋半杯新汲水半杯調勻噀產婦面每噀一縮三噀收盡真良法也又方以蓖麻子四十九粒去殼研爛塗產婦頭頂心腸即收入急去藥以溫水洗淨倘其腸乾燥難收用磨刀水溫潤其腸再以雄磁石煎湯服之其腸自收產婦及平居偶因用力太過努傷致子腸不收用艾丸綠豆大灸頭頂心百會穴三五壯即收又方以鹽湯洗淨後用五靈脂燒煙於桶內令患者坐桶上熏之自上又方用清油五斤煉熟以盆盛之候溫涼令產婦坐油盆內約一頓飯久仍以皂角為細末微以一釐吹入鼻中令作嚏立止產後玉門腫痛用蛇床子三兩煎湯頻洗即愈又以蔥白和乳香搗成膏貼腫上效產後乳汁不通用天花粉炒黃為細末每用二錢以紅飯豆煎濃湯調服每日服二次其乳流溢產婦氣血太虛無乳者用全當歸三錢正川芎二錢穿山甲炙王不留行各一錢五分川木通五分豬蹄一隻煮藥以豬蹄爛為度去藥服湯並蹄立通產後陽氣虛寒玉門不閉用石硫黃海螵硝北五味各等分共為末摻患處日三易產後玉門不閉陰戶突出石硫黃三錢菟絲子吳茱萸各二錢蛇床子一錢五分水一大碗煎至半碗頻洗自收產後擦破膀胱不能小便而淋瀝黃絲絹一尺剪碎牡丹皮鮮白芨各一錢將丹皮白芨研為末同黃絹用水一碗煮至絹爛空心服之服時不可作聲作聲則不效初誕救護小兒初生或不能發聲謂之夢生多不知救深為可憫切勿斷臍帶速用明火將胞衣炙暖使暖氣入兒腹更以熱湯蕩洗臍帶卻取貓一隻以布袋裹其頭足使伶俐婦人拿住貓頭向兒耳邊以口齧貓耳貓必大叫一聲兒即醒而開聲方可剪斷臍帶又有因難產或冒風寒收之稍遲兒氣欲絕不能啼者亦以前法溫暖之令暖氣入腹氣回即蘇更令父母之真氣呵而接之凡斷臍帶世俗皆以刀剪斷之最為不妥但以大紙捻蘸香油燃火於臍帶上燒之令斷蓋所以補接其陽氣不但為回生起死之良法且日後無傷寒泄瀉之患初生腎縮乃受寒氣所致用硫黃吳茱萸各三錢研極細末搗取蔥汁調藥塗臍腹另以蛇床子燒煙熏之即伸悶臍生者兒糞門有一膜悶住兒氣故不能出聲拍之則膜破而叫矣又有用輕巧婦人以銀簪輕輕挑破為甚便或不能挑急以暖衣緊包勿令散放以熱水浸其胞衣寒天則以火炙之久則熱氣入腹而氣內鼓其膜自破聲自出又有生下無穀道者乃肺熱閉於肛門急以金銀或玉簪看其端的刺穿之或以火針刺穿但不可深以油紙捻套住免其再合兒初生下遍身如魚脬或如水晶破則流水以密陀僧研細末慘之初生遍身無皮俱紅肉急以早米粉干撲之候其皮生全則止初生大小便不通腹脹危急者急令婦人口含熱水吮兒之前後心並臍下手足心共七處每一處吮吸七口以肉色紅赤為止須臾即通又方以蔥汁人乳各半調勻抹兒口中須臾即通初生不尿以蔥一根切碎人乳半杯同煎去蔥取乳分作四次服即尿不吮乳者服此即吮乳調燮小兒初生飲食未開胃氣未動廓然清虛之府宜乘此時加意調燮於兒未啼之時令精巧婦女輕指探兒口挖去汙血隨以甘草湯用軟帛裹指蘸湯拭去口中涎沫然後看兒面色若身面俱紅唇舌紫赤知其必有胎毒每日用鹽茶但不可太鹹以帛蘸洗其口去其黏涎日須五六次此法至神至異世所不知蓋兒之胎毒藏於脾胃口中多有黏涎其馬牙鵝口重舌木舌皆從此起每日洗拭則毒隨涎去病從何來而且至簡至易何忽視而不為倘胎毒重直須洗過周歲方得此有毒者之調燮也倘兒面唇淡紅此為胎寒不可用茶惟以淡薑湯洗拭每日一二次足矣蓋姜能開胃而且和中最切於時用者至於古方之用黃連大黃硃砂輕粉開口之法此時斷不可用今時稟受十有九虛苦寒克削最不相宜況嬰兒初誕如蟄蟲出戶草木萌芽卒遇暴雪嚴霜未有不為其僵折者以苦寒而入有涎之口亦若是也每見三朝七日必有肚疼嘔乳泄瀉夜啼之證是皆苦寒傷胃之害其孰能知之或曰子言苦寒不可用於初涎之口何以後之沆瀣丹及瀉青丸有三黃大黃得無矛盾乎曰彼胎毒已現外證可憑有病病當何大黃之足畏今初涎開口未辨毒之有無即使有毒尚然未發深藏潛伏聲臭俱泯程鳳雛有言正如閭問無事時未可執平人而誅之曰爾將為寇也以苦寒而開口是誅平人也毒發而畏苦寒是有寇不誅烏乎可也臍風論證臍為百風總竅五臟寒門道家謂之下丹田為人身之命蒂兒在胎時口鼻未通呼吸惟臍間真息隨母之呼吸為呼吸及其下地囫底一聲氣通口鼻而胎元之一息不復為用矣遂寄於臍內一寸三分中虛一穴左青右白上赤下黑中央黃色八脈九竅經緯聯絡為真息往來之路坎離交會之鄉凡修煉仙胎皆從此處立基所以謂之命蒂故小兒初生惟臍之干係最重斷臍之時不可不慎或剪臍帶太短或束不緊致外風侵入臍中或浴兒時牽動臍帶水入生瘡客風乘虛而入內傷於腎腎傳肝肝傳心心傳脾脾傳肺蘊蓄其毒發為臍風其證面赤啼叫者心病手足微搐者肝病唇青口撮痰涎壅塞者脾病牙關緊急者腎病啼哭不止者肺病五臟之證略見一二者猶可治悉見者不治小兒初生惟臍風為惡候其證有三曰臍風曰噤口曰鎖肚雖皆臍證而寒熱自別治者宜詳一曰臍風由斷臍後為水濕風寒所乘入於臍而流於心脾令肚腹脹滿吮乳口松多啼不乳此初起之時速用火攻散之若至氣息喘急啼聲不出或肚上青筋吊疝作痛此胎毒夾風邪入臟外用火功內服指迷七氣湯方見二卷胎毒門二若肚臍青腫撮口不開牙關緊閉口吐白沫爪甲青黑者皆不治一曰噤口其證眼閉口噤啼聲漸小舌上聚肉如粟米狀吮乳不得口吐白沫大小便不通遇此先看其上齶有點子即以指甲輕輕刮破以木香白蔻仁各五分煎湯化下沆瀣丹利動臟腑氣順自愈一曰鎖肚由胎中熱毒壅盛結於肛門大便不通急令婦女溫水漱口吮兒之前後心並臍下及手足心共七處凡四五次外以輕粉五分研末蜂蜜少許溫水調服以通為度如更不通以蔥白三四寸長用油抹潤輕透穀道納入二寸許以通為快若至七日不通者死古人之論臍風皆謂由於水濕風冷所致予則以為古論猶未盡也蓋臍風有內外二因有可治不可治之別外因者風濕所傷內因者稟父母之真陽不足也予嘗見一士其妻產育十數胎皆男盡殤於七日內之臍風無一存者若謂外邪所傷何以獨傷此家之兒又豈無一兒能避之者此內因之顯而易見也凡男子之命門真陽不足者右尺脈必細澀無神生子必有臍風此予察之詳見之確非耳聞者比也其外因者病發於二三四五日之間病生於六腑故可治內因者必發於六七日之間病生於五臟故不可治曩者夏禹鑄有預防臍風之訣謂三朝一七看兒兩眼角黃必有臍風不知稟受厚者生下即滿面紅黃乃為吉色誤認臍風其害不小此法不確惟令乳母每日摸兒兩乳乳內有一小核是其候也然乳內有核發臍風者固多而復有不發臍風者此法十有七八亦有二三分不確但看小兒不時噴嚏更多啼哭吮乳口松是真候也急宜治之第臍風之治無一成法可遵雖有疏風攻下之法莫能濟急獨予異授燈火無論臍風痙搐以及凶危險證用藥不能挽回者此火可以生之久經效驗未肯輕傳因見幼科不知火穴往往錯誤用之反致引動風邪蔽固火毒致兒身熱不退火毒內攻每多不救故不忍隱秘盡行吐露以公諸世世之幼科治病輒曰剪風曰截風夫剪者邀遏之謂也截者堵塞之謂也以火功用於中宮任脈所行之地豈非堵遏其邪而犯關門逐盜之戒乎不知風邪之在人身善行數變無形無聲欲除其害無如疏散條達而去之不使久羈於榮衛經絡則善矣如仲景之治傷寒而立汗吐下三法邪之在表者汗而散之邪之在上者吐而越之邪之深入者下而奪之總欲其邪盡而後已未聞有邀截之為也今幼科不但不為逐邪而反閉關絕險阻其去路使邪氣進不可退不能猖狂躑躅欲其不倒勿相攻斬關逆犯者不可得也此皆為治者釀成之禍於邪何尤凡邪之傷人未有不從三陽而入驅除之法亦必使其從三陽而出故此火穴亦惟三陽有之蓋欲引其出表斷不使之入里也敬為圖說詳後並請政大方用火口訣夫嬰兒全身燈火誠幼科第一捷法實有起死回生之功火共六十四燋陰符易數能疏風散表行氣利痰解鬱開胸醒昏定搐一切凶危之候火到病除用火之時倘值寒冬必於房中燃燒明火使兒不致受寒燈草大小適中以麻油染用令老練婦人抱兒解衣去帽從左耳角孫起總依後之歌訣用之凡用火不可姑息勿謂火數太多憫其難受蓋小兒受病由其經絡凝滯臟氣不舒以火散之正欲使其大叫大哭方得臟氣流通渾身得汗榮衛宣暢立時見功此火暗合周天不可減少少則不效若救臍風非此不可火穴歌圖並列於後集成神火圖集成神火歌仙傳神火天然理始自角孫瘈脈起聽宮曲鬢本神旁次及天容仍右取囟會承漿左肩井曲池合谷諸邪屏氣關已過至神門右亦如之昏可醒左乳根中七燋始右亦如之何待齒臍下陰交續命關平平三點凶危止脊中身柱至長強肺俞陽陵承山當崑崙解谿邱墟穴湧泉右亦效之良俞音恕指明火穴仙傳神火天然理始自角孫瘛脈起凡用神火無論男嬰女嬰皆從左邊用起角孫在耳尖上瘛脈在耳後根聽宮曲鬢本神旁次及天容仍右取聽宮在耳門前曲鬢在鬢腳旁本神在額角天容在耳輪根下左邊已完右亦如此囟會承漿左肩井曲池合谷諸邪屏囟會即囟門承漿在下唇宛宛中肩井在肩上宛宛中從左起故曰左肩井曲池在肘灣上廉屈縱處合谷在虎口近叉骨處氣關已過至神門右亦如之昏可醒氣關在食指第二節神門在掌後下廉銳骨之端左完右亦如之左乳根中七燋始右亦如之何待齒自左乳根下起從上至下七燋止右乳根亦如此臍下陰交續命關平平三點凶危止陰交在肚臍下半寸用火三燋脊中身柱至長強肺俞陽陵承山當身柱在項骨三節下從上至下九燋至長強穴止肺俞在兩飯匙骨縫中陽陵泉在膝外邊下三寸承山在腳肚盡處崑崙解谿邱墟穴湧泉右亦效之良崑崙在外踝骨後解谿在繫鞋帶處邱墟在外踝骨前湧泉在腳底中心左腳燋完右亦如之宜用火者一平素產子有臍風則胎胎不爽於產下第二日勿待其發先以此火散之百不失一一胎嬰生下多啼不乳噴嚏呵欠吮乳口松是即臍風作矣急以此火散之一凡兒病面青面黑扭項搖頭仰身擦面或眼青怒視或左右斜視或上下竄視或兩目連扎或頭項牽強蜷舌露筋噓風撮口啼哭咬人或手如數物或兩手牽引或兩足跳掣忽擾忽亂失張失志但覺神情與常有異者由從前表裡不清將欲作痙此火至妙一傷寒已痙角弓反張眼目斜視左右搐搦並中惡客忤癇證與食填太陰及一切風閉火閉痰閉氣閉乍然卒死者此火最神一食傷脾胃肚大青筋於端午日午時用全身燈火復於青筋開叉處以火載之一叉一點其病自消一風寒痰氣閉塞之證此火實有神功凡用燈火既完候兒啼哭已停即以金粟丹半丸薑湯化服服後以衣裹之蒙其頭面令之安臥片時以復其神志其病如失切忌火者一小兒四時傷風感冒身熱自汗大小便調唇舌如常口不作渴此表病輕證也疏解之則愈愚人妄用是謂輕病重治反為不詳一小兒邪已入里身熱面赤口渴大小便秘唇焦舌紫眼紅或手足心熱夜熱焦煩舌上黃胎揚手擲足掀衣揭覆此里證內熱也清利之自愈不可用火強用不特不能使熱邪從里以達表適足以助熱而耗陰致身熱不退在夏秋燥令尤為大忌一小兒大病久病身體怯弱面目青黃唇舌白瑩搖頭斜視昏睡露眼形骸消瘦聲息輕微自汗盜汗或一切嘔吐瀉利痘麻瘡癰久瘧久嗽失血之後精神疲倦乳食減少指紋沉細六脈無神此皆虛極之證切忌火攻慮其升故也一切久熱消渴疳證形骸黑瘦毛髮焦枯由陰虧血弱虛熱所為誤用燈火愈增其病慎之一燈火為兒科切要今醫家不特不明火穴而並不辨寒熱虛實不當用而用之反為大害惟依以前辨法則用之無不當矣夏禹鑄曰臍風初發吮乳必口松兩眼角挨眉心處忽有黃色宜急治之治之最易黃色到鼻治之仍易到人中承漿治之稍難口不撮微有吹噓猶可治也至唇口收束鎖緊舌頭強直不必治矣一見眉心鼻準有黃色即用燈火於囟門一燋人中承漿兩手大拇指端少商各一燋臍輪繞臍六燋臍帶未落於帶口一燋既落於落處一燋共一十三燋風便止而黃即退矣予按古今燈火惟上全身火有經有府有理有法無有出其右者第火穴多恐倉卒之際在嫺熟者不難倘素未經練者一時不能用故附夏氏臍風火圖於此庶忙迫之時可以濟急此火亦曾經驗第不及全身燈火耳回生艾火以前全身燈火皆為實邪升散之用並一切怪證莫可名狀者無不奏功倘涉久病體虛忽然精神潰亂人事昏沉前火則為不宜須用回生艾火挽之蓋此火能回散失之元陽收歸氣海固其根蒂免致離散其法以生薑切為紙厚薄片大如指甲貼尾閭穴脊骨盡處命門穴在腰脊間前正對臍以艾絨揉緊如綠豆大安薑片上用火灸之每穴以三炷為度灸完另以薑片貼臍下陰交穴如前灸之此火不特小兒可用凡男婦一切中風中痰氣厥陰證虛寒竭脫凶危之候咸宜用之有起死回生之功幸毋輕視凡小兒中惡客忤以及痰閉火閉風閉乍然卒死即以全身燈火醒之倘一時未有其人即以大拇指掐其人中穴病輕者一掐即啼哭而醒倘不應掐合谷又不應掐中衝若再不應其病至重則以艾丸如蘿蔔子大於中衝穴灸之火到即活蓋中衝一穴為厥陰心包絡之脈所出其經與少陰心臟相通此火一燃則心中惕然而覺倘此火全然不知則百中不能救一矣入方辰砂殭蠶散治撮口臍風鎖肚鏡辰砂水飛五錢直殭蠶炒一錢天竺黃五分蚌珍珠三分真麝香一分為末每用少許蜜調抹兒口中龍膽湯治身熱臍風撮口龍膽草鉤藤鉤北柴胡片黃芩炒京赤芍炙甘草芽桔梗白茯苓各五分川大黃紙包煨一分大棗一枚水煎溫服治撮口用牛黃一分研末竹瀝調滴入口中又方取蠍虎即壁虎也一個裝瓶內用硃砂細末亦入瓶內封其口月餘令食硃砂取出其身赤色陰乾為末每一二分酒調下又方治撮口用穿山甲用尾上甲三片羊油炙極黃色蠍梢七個共為細末入乳汁調塗乳上令兒吮之用厚衣包裹須臾汗出即愈保生湯治臍風鎖肚口噤北防風七分陳枳殼五分小橘紅四分白茯神三分荊芥穗三分遠志肉四分制南星五分芽桔梗三分炙甘草二分燈芯引二豆散治臍腫突紅飯豆淡豆豉天南星鮮自蘞各一錢共為末用芭蕉自然汁少加香油調藥敷臍四旁得小便自下即愈龍骨散治臍瘡石龍管煅一錢真輕粉五分川黃連一錢枯白礬煅一錢共為末乾摻一方用大紅羊絨燒灰為末敷之效臍證簡便方小兒初生犯撮口臍風荷包風鵝口風等項並齒根邊生白點名馬牙啼哭不吮乳即看口內堅硬之處或牙根邊白點將針挑破出血濃煎薄荷湯磨京墨調勻以指攪過再以產母亂髮蘸墨滿口搽之仍用新青布蘸溫水展口即愈小兒臍風撮口用完全生蔥二根搗爛取汁又以直殭蠶三個炒去絲研極細末以蔥汁調勻塗母乳頭上令兒吮之或灌兒口內亦可小兒臍風撮口以艾葉燒灰填臍上以帛縛之若臍帶已落用蒜切薄片貼臍上以艾火灸之候口中有艾氣立愈小兒噤風初生口噤不乳蟬蛻十四枚全蠍去尾毒洗去鹽泥十四枚炒乾為細末入輕粉三分每用一匙乳汁調灌小兒撮口但看舌上有瘡如粟米者是也以蜈蚣炙焦研末敷瘡上撮口噤風面黃色氣喘聲不出由胞氣挾熱流毒心脾故令舌強唇青撮口發噤用直殭蠶二枚去嘴略炒為末蜜調納兒口中小兒十日內口噤不乳取大蜘蛛一枚去足炙焦研細末入豬乳一小杯和勻分作三次徐徐灌之神效無比小兒臍瘡出血及膿用海螵蛸胭脂共為末以油潤瘡乃搽藥初生護持嬰兒初生肌膚未實宜用舊絮護其背亦不可太暖更宜數見風日則血氣剛強肌肉緻密若藏於重幃密室或厚衣過暖則筋骨軟脆不任風寒多易致病衣衫當隨寒熱加減但令背暖為佳亦勿令其汗出恐致表虛風邪易入乳哺亦不宜過飽所謂忍三分飢吃七分飽頻揉肚少洗澡皆至言也又須令乳母預慎六淫七情蓋兒初生藉乳為命善為乳母者夏不欲熱熱則致兒吐逆冬不欲寒寒則致兒咳嗽怒乳則上氣顛狂醉乳則身熱腹痛新房而乳則瘦瘠交脛不能行新浴而乳則發吐傷神冷熱不調停積胸膈結為痰飲遂成壯熱壯熱不已乃成風癇兒啼未停劇以乳哺氣逆不消因成乳癖有孕而乳致兒黃瘦肚大腳小名曰魃音忌病總之乳母能慎寒暑恚怒厚味炙煿庶乳汁清和兒不致病否則陰陽偏勝氣血沸騰乳汁敗壞必生諸病若屢服藥餌則臟腑陰損多變敗證均不可不知初誕之時有於頭額之前髮際之間灸之又有以燈火遍身燒之彼以為能截風路不知適足以大開風門蓋火功由兒有病不得已而用之無故而用伐及無辜諸病自茲始矣戒之戒之凡浴時須調和湯水試看冷熱若不得所令兒怖畏況冬久浴則傷寒夏久浴則傷熱其浴兒當護兒背恐風寒從背而入凡洗兒衣不可露於星月之下易惹邪祟如偶失收當用醋炭熏過方可衣之有鳥名天地女又名隱飛鳥最喜陰雨夜過飛鳴徘徊其鳥純雌無雄善落羽毛於兒衣中令兒作病不可不謹凡當春夏月間宜令其地臥使不逆生長之氣如遇秋冬宜就溫和使不逆收藏之令凡在春天勿與護頂裹足以致陽氣不舒因多發熱即至年長下體勿令過暖蓋十六歲前血氣方盛如日方升惟真陰未足下體主陰得清涼則陰易長過溫暖則陰易消故曲禮云童子不衣裘裳夫人以脾胃為主故乳哺須節節則調養脾胃過則損傷脾胃夏天忌熱乳冬月忌寒乳皆宜捏去之而後與之凡食後不可與乳乳後不可與食小兒脾胃怯弱乳食並進難於消化初得成積久則成癖成疳皆乳母不慎之過凡寒則加衣熱則減衣過寒則氣滯而血凝澀過熱則汗泄而腠理疏以致風寒易入疾病乃生更忌解脫當風易於感冒然風和日暖又當抱出遊戲如陰地草木不見風日未有能堅起者又不可日置地間令肚著地以致脾宮受寒腹痛泄瀉慎之慎之勿輕服藥初誕之兒未可輕藥蓋無情草木氣味不純原非嬌嫩者所宜且問切無因惟憑望色粗疏之輩寒熱二字且不能辨而欲其識證無差未易得也凡有微疾不用倉忙但令乳母嚴戒油膩葷酒能得乳汁清和一二日間不藥自愈所謂不藥為中醫至哉言也每見愚人兒稍不快即忙覓醫練達者或不致誤疏略者惟以通套驚風藥治之此無事之中生出有事伐及無辜病反致重父母見其無效是必更醫卒無善手相與任意揣度曰風曰痰曰驚曰熱前藥未行後藥繼至甚至日易數醫各為臆說湯丸疊進刻不容緩嗟乎藥性不同見識各異嬌嫩腸胃豈堪此無情惡味擾攘於中不必病能傷人而藥即可以死之矣予每見不聽勸戒雜藥妄投者百無一救哀哉馮楚瞻曰凡為幼科猶宜參看方脈諸書蓋幼稚名曰啞科疾病痛苦勿能告人全賴治者細心詳察況幼科諸書理淺言略難明病源惟以小兒不節飲食為執見最重消磨更以純陽之子為定論恣投寒苦孰知易停滯者脾氣必虛若圖見小效於目前則便遺大害於日後況芽兒易虛易實言虛者正氣易於虛也言實者邪氣易於實也然邪湊之實必乘正氣之虛若不顧正氣之虛惟逐邪氣之實其有不敗者幾希如寒傷榮也但溫養榮陰風傷衛也惟辛調衛氣但使榮衛和平而宣行則客邪不攻而自散使正氣自行逐賊則邪退而正氣安然如浮雲一過天日昭明也若專投與氣血無情之猛劑客邪雖散正氣亦傷乘虛之邪將接踵而至矣豈知正氣不至空虛邪必不能湊而為實至於云純陽者以無陰而謂乃稚陽耳其陽幾何陰氣未全而覆敗其陽將何以望其生長耶況天地之氣化日薄男女之情性日漓幼稚之稟受日弱有稟父之氣不足者多犯氣虛中滿有稟母之陰血不足者多犯陰虛發熱患痘則多犯腎虛內潰之證此皆先天不足所致近來比比皆然若徒效上古克削寒涼如肥兒丸蘆薈丸之類則千中千死莫能挽也至云小兒陽火有餘不知火之有餘實由水之不足壯水以制陽光先賢至論服寒涼百不一生古哲格言以不生之藥投欲生之兒心何忍哉凡小兒脾胃自能消穀今偶有停滯則脾胃受傷只健其脾胃而谷自化矣故方有助脾消化推蕩穀氣者有稟命門火衰生火補土者有一消一補者有以補為消者誠恐寬一分即耗一分元氣也夫人有生惟此一氣易虧難復何可輕耗況幼稚之稟尤為易虧惟必根究先天之薄弱而從方脈諸書求源探本以為治斯能補救當代赤子元氣於後天便亦培植後代赤子元氣於先天而壽世於無疆矣若徒宗上古幼科淺略方論則猶灌溉樹木者不顧根本而惟灑潤枝葉欲望其生長未之有也而況復加劃削者乎藥餌之誤張景岳小兒氣血未充一生盛衰之基全在幼時此飲食之宜調而藥餌尤當慎也今舉世幼科既不知此大本又無的確明見而惟苟全目前故凡遇一病則無論虛實寒熱但用海底兜法而悉以散風消食清痰降火行滯利水之劑總不出二十餘味一套混用謬稱穩當何其誕也夫有是病而用是藥則病受之無是病而用是藥則元氣受之小兒元氣幾何能無陰受其損而變生不測此當今幼科之大病而醫之不可輕任者正以此也又見有愛子者因其清瘦每以為慮而詢之庸流則不云痰火必云食積動以肥兒丸保和丸之類使之常服不知肥兒丸以苦寒之品最敗元陽保和丸以消導之物極損胃氣謂其肥兒也適足以瘦兒謂其保和也適足以違和耳即如抱龍丸之類亦不可輕易屢用予嘗見一富翁之子每多痰氣或時驚叫凡遇疾作輒用此丸一投而愈彼時以為神丹如此者不啻十餘次及其長也則一無所知凝然一癡物而已豈非暗損元神所致耶凡此克伐之劑最當慎用故必有真正火證疳熱乃宜肥兒丸及寒涼等劑真正食積脹滿乃宜保和丸及消導等劑真正痰火喘急乃宜抱龍丸及化痰等劑即用此者亦不過中病則止非可過也倘不知此而徒以肥兒保和等名乃欲藉為保障不知小兒之元氣無多病已傷之而醫復伐之其有不萎敗者鮮矣看病訣小兒初生欲知其有病無病以手捻其頭摸其頤頷不作聲者為無病以手指探其口雖發聲而從容咂指者有病亦輕若能發聲不咂指者面色青紅帶紫或牙關緊急不納乳汁此落地受寒之甚風邪入足太陽及足陽明而然也須急治之庶可平復初生之兒肥胖色嫩日覺好看者此其根本不堅甚非佳兆且最易感冒風寒邪入腑者近在第二三日見之其證吐乳夜啼腹鳴此皆胎風之類然證猶淺而易治宜用全身燈火十不失一若邪之入臟遠在六七日見之此即臍風噤風撮口風之候若口噤舌大痰壅者皆不治蓋病傳入臟繫心脾肺三經也此風氣甚盛無所發泄便形見於喉口牙關聲音也凡生下時身破裂者死陰囊白者死陰不起者死無糞門者死股間無生肉者死開口如鴨聲者死粉白花色者死皮肉不光者死泣不出聲者死舌如豬肝色者死面無彩色者夭臍帶短大紫色者夭生下渾身銀白色者夭生下有齒者大凶主傷父母不然必傷自身生下未裹即撒尿者殺父母蕩家產在世終身勞苦壽夭辨頭者諸陽之會髓之海也凡兒頭角豐隆髓海足也背者五臟六腑俞穴皆附於背脊背平滿臟腑實也腹者水穀之海腹皮寬厚水穀盈也目為肝竅耳為腎竅鼻為肺竅口為脾竅七竅無闕形象全矣故知肉實者脾足筋強者肝足骨堅者腎足不妄言笑者心足不多啼哭者肺足哭聲連續者肺實不久眠睡者脾實兼之腳健而壯項長而肥囊小而黑根本固也肌肉溫潤營衛和也而更腮妍如桃發黑似漆表氣實也小便清長大便滋潤裡氣實也以上皆為壽相其兒無病易養諸陽皆起於頭顱破項軟者陽衰於上諸陰皆起於足腨小腳蜷者陰衰於下鼻孔乾燥肺枯唇縮流津脾冷發稀者血衰項軟者柱折青紫之筋散見於面者多病風熱兼之形枯色夭者表虛瀉利無時者裡虛瘡疥啼哭及多笑語者皆陽火妄動之候以上皆為夭相其見多病者難養凡聲音清亮者壽有迴音者壽哭聲澀者病散而無聲者夭面部形色賦辨色分注附察兒形色先分部位欲辨形之強弱堅脆色之夭澤枯榮必先分上下左右之部定五行四象之位然後按部察色以定證之安危左頰青龍屬肝右頰白虎屬肺經曰左右者陰陽之道路也蓋五行之位木旺在卯金旺在酉天地之氣陽從左升陰從右降故以左頰配肝右頰配肺非謂左頰即是肝右頰即是肺無過以生殺之理配木金龍虎之位以候其臟氣之強弱耳天庭高而離陽心火地角低而坎陰腎水周易以東震西兌南離北坎定子午卯酉之四正蓋後天之用有形者無不由之故以心配離南之午火子天庭腎配坎北之子水於地角亦陽上陰下之義第據其理而言之非謂額上即心唇下即腎竊笑幼科未識淵源刻舟求劍未可向癡人說夢也鼻在面中脾應唇際內經以鼻為面王以其位居正中內通呼吸先死賴之所以謂之中也脾為中土經曰中央黃色入通於脾開竅於口又曰脾胃者倉稟之本其華在唇四白故曰脾應唇際亦中州受納之地也或問既五臟之經脈未行於面何以又從面部而察五臟之證能無幻耶曰望色察證內經之傳第軒岐峻大聖天人之學後世莫能效法所以據五行四象列以部位使望色者有所憑依耳又曰布列雖按五行恐內臟之氣不應奈之何哉曰五臟之脈實未行於面而藏象論曰十二經脈三百六十五絡其氣血皆上於面而走空竅蓋人上下九竅而七竅在面目二耳二鼻二口一故目為肝竅耳為腎竅鼻為肺竅口為脾竅舌為心竅有此諸竅而後三百六十五絡之氣皆通於面故曰氣血走空竅由是按部察色以決其吉凶亦猶方脈之兩手六部分左心小腸肝膽腎右肺大腸脾胃命夫兩手惟一肺脈耳他臟何涉亦前哲按八卦方位以手太陰一經巧分六部以候十二經臟氣之盛衰然則脈之隱微莫睹者尚可候其成敗而色之一望顯然者獨不可推其吉凶乎醫理至微後之賢者幸毋忽略紅色見而熱痰壅盛青色露而肝風怔悸此概言通面之色通面為足陽明胃經所主胃經鬱熱面必淡紅熱搏津液定化為痰而壅滯風邪沖並面必見青心神不安則為怔忡驚悸如煤之黑為痛中惡逆傳似橘之黃食傷脾虛吐利面見黧黑至凶之候幸而暴病乍見實為中惡之徵偶因惡毒之氣從鼻而入肺先受之阻遏正氣隧道不通所以腹痛邪盛不能自出反致子乘母位而逆傳如肺傳脾脾傳心者是也橘黃言其深黃也脾司運化乳食不停何黃之有由其運化失職所以食填太陰脾氣凝滯故深黃上面必致有吐瀉之虞白乃疳癆紫為熱熾白屬肺氣虛子傷累母所以脾必困而為疳紫為風熱熾經絡受邪定化為壯熱而不已青遮日角難醫黑掩太陽不治此下逐部分言之諸書皆誤為口角不知面部無口角之位不但無此位證亦全不符蓋小兒中氣強者唇不變色中氣虛寒者十有九青此為常候非難醫之證今正之日角左額也猶日之東昇而為青色遮蔽為木蔽陽光病則必有疑難之慮太陽左右兩額也太陽為眾陽之宗屬火旺夏氣色宜紅今黑色掩映將有水來剋火之象定見傷殘故曰不治年壽赤光多生膿血山根青黑每多災異年壽鼻梁也為氣之門戶赤光侵位肺必受傷氣不流行則血必凝滯將有膿血之災山根足陽明胃脈所起大凡小兒脾胃無傷則山根之脈不現倘乳食過度胃氣抑鬱則青黑之紋橫截于山根之位必有延綿啾唧故曰災異朱雀貫於雙瞳火入水鄉青龍達於四白肝乘肺位朱雀赤脈也雙瞳腎水也赤脈貫瞳火乘水位治宜瀉心補腎青龍肝木也四白肺金也白珠見青肝風侵肺治宜保肺平肝瀉痢而戴陽須防咳嗽而拖藍可忌瀉屬脾病痢屬腎病脾腎兩臟既傷先後二天並弱面宜憔悴今反面見紅赤知為虛陽上泛故曰須防咳嗽肺病也青者肝色也由其肺氣已虛肝無所畏木乘金位恐其生火以剋金故曰可忌疼痛方殷面青而唇口撮肝風欲發面赤而目竄視疼痛腹痛也寒氣侵脾內臟無火一派陰冷阻抑陽和故面青而唇撮也竄視目直視也幼科指為肝病其實太陽經本證蓋太陽之脈系目上綱血虛受寒則上綱緊急故目直視今指為肝氣必用風藥耗其津液反成不救能知養血其病自瘳火光焰焰外感風寒金氣浮浮中藏積滯通面火光風寒傷胃陽明拂鬱表未解也黃色滿面食傷脾也運化無功久成積也乍黃乍白疳積連綿又赤又青風邪瘲瘈黃為脾虛白為肺弱脾肺俱傷無氣以運乳食難消輕則為積久則為疳赤為火色青為風色風火相乘榮血枯燥筋脈牽強甚則搐搦而為痙矣氣乏囟門成坑血衰頭毛作穗小兒稟受精髓不足者平日腦髓未充賴氣以充之今大病之後中氣下陷安保其囟不成坑耶發乃血之餘血榮則發黑今頭毛如草之穎知其榮血枯焦也肝氣眼生眵淚脾冷流涎滯頤眼屬肝肝氣實則眵乾硬肝氣虛則眵膠黏寒傷肝則淚冷熱傷肝則淚熱脾主涎脾氣虛冷不能收攝故津液妄泄而滯於頤間誤為脾熱禍不旋踵面目虛浮定腹脹而上喘眉目頻蹙必腹痛而多啼脾肺兩虛中宮寒肅以致氣不歸源反逆血之上則上氣喘急面目虛浮因知其內必腹脹小兒知識未開於七情六慾毫不相關何頻蹙之有亦因臟寒腹痛所以不時啼叫面頻蹙不樂也左右兩頰似青黛知為客忤風氣兩池如黃土無乃傷脾左右兩頰俱青客忤之證由小兒神氣怯弱陽和未充外邪客氣得以乘之從鼻而入忤其正氣則口吐青黃白沫面色變異不常腹痛喘急者是也風池氣池眉上眼下也風池屬肝氣池屬胃如黃土之色由木勝土復所以真臟色見風門黑主疝青為風方廣光滑吉昏暗危風門耳前也少陽經所主黑則為寒為疝青則為燥為風方廣眉稜也亦少陽所主光亮則吉昏暗則危手如數物兮肝風將發面若塗朱兮心火燃眉邪熱傷神手如數物謂十指屈伸不定如數物之狀速宜疏解熱邪斷無肝風之發淡紅為陽明胃經表熱深紅為少陰心經裡熱面若塗朱知為心熱心不可瀉惟瀉小腸丙火一清丁火自息坐臥愛暖風寒之入伸縮就冷煩躁何疑凡小兒偎入母懷藏頭密隱欲人懷抱者必惡風寒也由風寒初入未能化熱所以坐臥愛暖邪已入里則掀衣揭覆揚手露面偃胸仰臥口渴躁煩由其內外皆熱所以欲就清涼肚大腳小脾欲困而成疳目瞪口張勢似危而必斃脾不運化而肚大肌肉消削而腳小蓋脾主肌肉由其乳食失節所以脾困而成疳膀胱絕而目瞪脾氣絕而口張其勢已危必無可生之理噫五體以頭為尊一面惟神可恃況聲之輕重不同啼之乾溼頓異呵欠連綿知病之欲作忽然驚叫識火之將煒此察證之規繩幸拳拳而不諄頭為元首故以為尊面分五位惟神是賴神存則生神亡則死蓋指眼光而言也況聲有輕重啼有乾溼安得無辨凡聲微者知其氣不足聲壯者知其氣有餘哭而無淚者實哭而多淚者虛呵欠連綿為陰陽交引升降不前知其病之將至忽然大叫則知火熱擾神必有壯熱之證倘能依此辨證亦猶工之有規矩樂之有六律是則是效是究是圖自不致有望洋之嘆矣一審顏色苗竅知表裡之寒熱虛實夏禹鑄曰望聞問切固醫家之不可少一者也在大方脈則然而小兒科惟以望為主問繼之聞則次而切則無矣經云切而知之之謂巧夫小兒以脈未全切之無可切而巧亦無所用其巧問而知之之謂工小兒於未言時問之無可問即於能言者問之多不以實對是問不必問而工亦無所有其工聞而知之之謂聖小兒初病時聲音或不失其常至病久而氣喪氣喪而聲失聞之無可聞而聖又何所見其聖況書曰哭聲不響赴陰君而亦有不赴陰君者何無非疑其聲而不得肺之絕與不絕故也吾故曰以望為主曰五臟之屬體隱而理微望從何處曰體固隱矣而發見於苗竅顏色之間者用無不周理固微矣而昭著於四大五官之外者無一不顯中庸所謂費而隱微之顯著不可引之相發明哉故小兒病於內必形於外外者內之著也望形審竅自知其病按病用藥見效之速未有不如響之應聲者內有臟曰心曰脾曰肺曰腎曰肝五臟不可望惟望五臟之苗與竅舌乃心之苗紅紫心熱也腫黑心火極也淡白虛也鼻準與牙床乃脾之竅鼻紅燥脾熱也慘黃脾敗也牙床紅腫熱也腋爛胃火也唇乃脾之竅紅紫熱也淡白虛也黑者脾將絕也口右扯肝風也左扯脾之痰也鼻孔肺之竅乾燥熱也流清涕寒也耳與齒乃腎之竅耳鳴氣不和也耳流膿腎熱也齒如黃豆腎氣絕也目乃肝之竅努視而睛轉者風也直視而睛不轉者肝氣將絕也以目分言之又屬五臟之竅黑珠屬肝純見黃色凶證也白珠屬肺色青肝風侮肺也淡黃色脾有積滯也老黃色乃肺受濕熱證也瞳人屬腎無光彩又兼發黃腎氣虛也大角屬大腸破爛肺有風也小角屬小腸破爛心有熱也上胞屬脾腫則脾傷也下胞屬胃青色胃有風也睡而露睛者脾胃虛極也面有五位五臟各有所屬額屬心離火也左腮屬肝震木也右腮屬肺兌金也口下屬腎坎水也鼻準屬脾坤土也五臟里也六腑表也小腸心之表小便短黃澀痛心熱也清長而利心虛也胃乃脾之表唇紅而吐胃熱也唇慘白而吐胃虛也唇色平常而吐作傷胃論大腸肺之表閉結肺有火也肺無熱而便秘血枯也不可攻下脫肛肺虛也膽乃肝之表口苦膽火也聞聲作驚肝虛也膀胱腎之表筋腫筋痛腎之寒氣入膀胱也面有五色一曰紅紅病在心面紅者熱一曰青青病在肝面青者痛一曰黃黃病在脾面黃者脾傷一曰白白病在肺面白者中寒一曰黑黑病在腎面黑而無潤色腎氣敗也望其色若異於平日而苗竅之色與面色不相符則臟腑虛實無有不驗者也簡切辯證小兒熱證有七面腮紅大便秘小便黃渴不止上氣急足心熱眼紅赤此皆實熱證忌用溫補小兒寒證有七面㿠白糞青白肝虛脹眼珠青吐瀉無熱足脛冷睡露睛此皆虛寒忌用寒涼五臟所屬之證肝者足厥陰木也實則目赤大叫呵欠頓悶虛則呵欠咬牙有風則目連劄有熱則目直視成疳則白膜遮睛主怒則性急大叫哭甚則卵腫熱則大小便難手尋衣領手亂捻物甚則撮空摸床此喪魂病也兒病時目睛視物不轉或目合不開或目開不合或哭而無淚或不哭而淚出皆肝絕也心者手少陰火也實則叫哭發熱飲水虛則困臥悸動不安心血足則面色紅潤易養心血虧則面色昏黯難養熱甚則津液干而病渴神亂而臥不安喜伏臥舌破成瘡又為重舌木舌舌出不收之病凡病丹瘤斑疹龍纏虎骨蟲疥熛瘡皆心之證也如心病久汗出發潤或舌出不收暴喑不語或神昏潰亂或斑疹變黑此皆心絕也脾者足太陰土也為水穀之海實則困睡身熱飲水虛則吐瀉生風傷濕則為腫為脹為黃為吐瀉故脾病則腹痛脾疳則肚大青筋脾熱則口臭唇瘡飲食不為肌膚吐舌弄舌口乾飲水寒則口角流涎謂之滯頤氣不和則口頻撮虛則肉削而瘦不喜飲食傷食則成積積久則成疳成癖如脾久病大肉消削肚大青筋或遍身虛腫或吐瀉不止飲食不入或多食而瘦或蟲出於口或唇蹇而縮皆脾絕也肺者手太陰金也實則悶亂喘促虛則哽氣長出經曰寒傷肺由兒之衣薄受寒也經曰熱傷肺由兒之衣厚鬱熱也寒熱傷肺則氣逆而為喘為咳肺受風則噴嚏而流清涕受寒則鼻塞呼吸不利受熱則鼻乾或為衄血成疳則鼻下赤爛喘不止則面腫咳不止則胸骨高謂之龜胸燥則渴不止好飲水謂之膈消如肺久病咳嗽連綿喘息不休或肩息或龜胸或咳血不止或鼻孔黑燥或鼻孔開張而喘或瀉痢不休大孔如筒或面目虛浮上喘氣逆皆肺絕也腎者足少陰水也虛則目畏明目中白睛多其顱即解色㿠白骨髓不滿兒必畏寒多為五軟之證尻骨不成則坐遲髁骨不成則行遲真陽不足則齒遲血脈不榮則發稀心氣不足則語遲熱則耳中出膿生疳如腎病久身憊竄目如見鬼狀或骨痿弱臥不能起或二便遺失此腎敗也變蒸辨幼科謂嬰兒生下三十二日為一變六十四日為一蒸變者變生五臟蒸者蒸養六腑長氣血而生精神益智慧也積五百七十六日而畢凡遇變蒸必有身熱或有驚惕而口面唇舌俱不變色身熱或重輕而精神與常無異口中氣出溫和三四日間自愈或有熱不退乳母宜服小柴胡則安此猶為幼科中傑出者之言也乃考其變蒸方中有用褊銀丸之巴豆水銀黑鉛京墨麝香之類而峻下之者夫既曰長氣血生精神益智慧惟宜助其升生可也顧且用毒劣滅其化元不幾於非徒無益而又害之耶據其說以周天三百六十五度應人身三百六十五骨節內除手足四十五餘骨外止三百二十數以生下一日主十段十日百段三十二日則三百二十段為一變而以天一生水地二生火為次序則一變腎二變膀胱三變心四變小腸五變肝六變膽七變肺八變大腸九變脾十變胃雖無實據而理有可取即令以此為準變見確然不易之法乃又有以木火相生為言者則似為一肝二膽三心四小腸五脾六胃七肺八大腸九腎十膀胱矣復有以木金相剋為言者則又為一肝二膽三肺四大腸五心六小腸七脾八胃九腎十膀胱矣夫小兒臟腑骨度生來已定毫不可以移易者則變蒸應有定理今則各逞己見各為臆說然則臟腑竟可以倒置骨度亦可以更張是非真偽從何究詰謂天一生水者為是則木火相生木金相剋者非也謂木火相生木金相剋者為是則天一生水者非矣徒滋葛藤迄無定論將使來學何所適從所幸變蒸非病可任其顛倒錯亂假如變蒸為病率宜依經用藥者豈不以脾病而治腎膀胱病而治胃乎總之此等固執之言不可為訓蓋天地陰陽之理數可限而不可限如五運六氣為一定不易之規而有應至不至不應至而至往來勝復主客加臨有應不應之殊天地尚且如斯而況嬰兒之生風土不侔賦稟各異時令有差膏藜非一而以此等定局以限其某時應變某時應蒸予臨證四十餘載從未見一兒依期作熱而變者有自生至長未嘗一熱者有生下十朝半月而常多作熱者豈變蒸之謂乎凡小兒作熱總無一定不必拘泥後賢毋執以為實而以正病作變蒸遷延時日誤事不小但依證治療自可生全張景岳曰小兒變蒸之說古所無也至西晉王叔和始一言之自隋唐巢氏以來則日相傳演其說益繁然以予觀之則似有未必然者何也蓋兒胎月足離懷氣質雖未成實而臟腑已皆完備及既生之後凡長養之機則如月如苗一息不容有間百骸齊到自當時異而日不同豈復有此先彼後如一變腎二變膀胱及每變必三十二日之理乎又如小兒之病與不病余所見者治者蓋亦不少凡屬違和則不因外感必以內傷初未聞有無因而病者豈真變蒸之謂耶又見保護得宜而自生至長毫無疾病者不少抑又何也雖有暗變之說終亦不能信然余恐臨證者有執迷之誤故道其愚昧若此明達者以為然否
