body:
  text: 卷六萬氏痘麻成實證治歌凡二十一首共二十六方起發之時漸作膿毒隨膿化語無凶或成空殼兼清水毒氣留連慮晚攻凡痘瘡自起發之後血化為水水化為膿至此膿已成毒已化矣飲食如常不亦吉乎若當起發殼中出清水此氣至而血不隨也治之當益其榮宜四物化毒湯或內含清水平塌不起此血至而氣不隨也當益其衛宜保元化毒湯或窠囊浮腫中含清水如水泡之狀此氣血俱虛不能製毒反為毒逼漸變癢塌治之當托其毒固其榮衛使無癢塌以十全化毒湯主之亦有飲食如常六臟充實若見空殼清水之證雖能收斂未免發為癰毒不可不早治之膿成毒化笑顏開猶慮形生變證來莫謂清安無個事風雲不測霎時災痘瘡至成膿疱此收功之時手足常要和暖過熱過寒者變也人事常要安靜煩躁悶亂者變也六腑常要充實忽吐利者變也聲音常要響亮忽喑啞者變也飲食要漸進忽不食反作渴者變也色要蒼蠟形要飽滿忽灰白平塌者變也瘡要安和忽癢痛者變也或觸風寒或犯禁忌或傷食或誤服湯丸醫者當詳察其所因而治之四肢溫暖始相宜寒熱乘常勢漸離補瀉無偏能謹慎折肱端的信良醫凡痘瘡手足常要和暖不宜太熱太寒寒熱太甚則水火偏勝而殘矣假如病人六腑閉結狂妄煩躁口乾作渴其脈洪數沉緊者實也手足熱本病也若手足冷陽極似陰謂之陽厥下之勿疑宜承氣化毒湯若曾經吐瀉其脈沉細微弱者虛也手足冷本病也若手足熱乃陰極似陽謂之陰躁宜補之回陽化毒湯溫之養漿安靜吉堪誇戰惕鳴牙禍必加痛癢躁煩雙足冷縱教仙手枉喧譁凡痘瘡已成漿或寒戰或咬牙單見一證者可治蓋寒戰因瘡出太甚表虛而振振搖動者有之宜養衛化毒湯若咬牙者必肝火甚其牙相戛而鳴也宜清神化毒湯涼解之若寒戰咬牙並作者此陽脫神喪不可治矣若因瘡痛由膿血繃急而脹痛者宜導神化毒湯若吐利而手足冷者宜回陽化毒湯方見前更兼寒戰咬牙悶亂煩躁癢塌者不治有膿有血毒歸瘡端的其人正氣強莫遇中虛生吐瀉功虧一簣費治詳凡痘瘡成漿之時不宜吐瀉如吐而無物惡證也因衝任之火上衝於胃直犯清道而逆出之為不治若吐而有物者用養胃化毒湯和之凡泄瀉視其所出之物何如若色黃而臭小便黃赤熱也宜香連化毒湯若瀉出之物清冷不臭小便清長舌上無苔寒也宜理中化毒湯如瀉久不止不論冷熱皆宜止之通用理中化毒湯吞豆蔻丸方見前若吐瀉不止手足厥冷此脾胃之氣將絕急宜附子化毒湯其有無時溏泄手足和暖飲食如常雖治之不止亦可言無事也身外諸瘡膿血成咽喉自此貴寧清反加嗆水聲音啞咽爛喉穿鬼伴行凡痘瘡初出失於調解以致毒火熏蒸喉舌生瘡又失於解毒其瘡稠密然外瘡未熟至於養水之時則先熟者又先靨矣所以咽喉宜漸和平聲音清亮飲食不難此吉兆也若當此時飲水則嗆食谷則噦甚者失聲此內瘡糜爛舌上成坑咽門腐爛肺管壅塞以致呼吸皆廢飲食卒絕而死矣亦有先本無瘡因誤食辛熱之物或誤投辛熱之藥其後旋生是證者可急用甘桔化毒湯服藥後病退者吉不退者凶或咽門無瘡而暴喑者此少陰之血不榮於舌也宜養心化毒湯若有聲而不清此火毒乘於肺也宜瀉白化毒湯中病即止不中勿治陷起平尖腳潤紅窠囊飽滿蠟漿充自然氣色咸如式略見差池便不同凡痘養漿之時若平日中陷者盡起頂平者盡尖根腳紅活窠囊飽滿其色蒼蠟氣如蒸豆自然安吉蓋灰白雖為膿之正色亦由氣之不足宜大補化毒湯若因泄瀉而灰白者宜固本化毒湯若其氣腥臭此有濕熱宜解其標用解肌化毒湯外以益元散薄敷瘡上勿令至於潰爛可也正值成漿忽癢搔用心調護莫辭勞不分乾溼皆凶候能食神清福自高凡痘至成漿切防搔癢抓破以泄其氣俗云抓破出血者吉不出血者凶殊不知起發之時其瘡未熟而內是血抓破宜出血若養漿之時其瘡已熟而內是膿抓破有血無血何足以定吉凶大抵不宜作癢如作癢而人清爽自知其誤抓破或言其癢欲人拊之者吉若癢而悶亂煩躁語之不聽禁之不止搖頭扭項手足舞亂者凶也如其人清爽搔癢不住者當視其形體虛實未曾吐瀉者宜四聖化毒湯如元氣素弱而有吐瀉宜參歸化毒湯又要看其抓破處復灌成瘡則吉破而不灌皮肉焦黑者不可治也正面將膿早破傷依然腫灌覆成瘡莫嗟敗面留殘喘腫若消時愈斷腸凡視痘瘡以正面為主蓋五臟精華皆聚於面如他處痘瘡破損正面完全可言無事若正面成片破損別處雖完全亦何益哉若破處復得腫灌成瘡膿血淋漓卻又無事面雖敗穿鼻破唇但留殘喘耳豈不愈於死耶若破處不灌不腫或腫而又消煩躁悶亂此毒氣倒陷決不可治矣眉心鼻準耳輪邊唇口諸瘡貴活鮮但有焦枯兼黑靨慢求醫卜命難全凡痘欲成膿之時眉心鼻準耳輪兩頰若先有焦枯黑靨此名倒陷醫之不能禱之無效凶矣哉正待行漿漿濯濯惟愁干塌成空殼倒陷由來證本乖勞君著意毋偏駁凡痘自出現而起發自起發而至養漿之時便要成漿如當養漿而反不成漿依舊平塌與未起發相似或起發內有空虛乾枯無水者名倒伏謂之倒者膿根在裡也謂之伏者毒伏而不出也謂之陷者毒出而復入也此等之時人事清爽飲食如常別而治之小便大便秘結壯熱煩渴宜下之以承氣化斑湯方見前若吐瀉頻數六脈虛弱宜溫之以回陽化毒湯方見前若人事昏悶寒戰咬牙足冷腹脹喘促者死額上渾如沸水澆溶溶破爛氣殘凋漸延兩頰多虧損泄盡元陽魂魄飄凡痘起發養漿額上似沸湯所澆之象皮溶易破不成顆粒大片損爛此因失下之過毒火熏蒸漸延兩頰破損水出而干似靨非靨則陽脫陰留徒增煩悶呻吟而死矣瘡頭有孔出膿腥結聚成堆雉屎形此個未聞人救得徒教醫禱恐無靈凡痘最要皮囊堅厚包裹完全若蒼頭有孔膿水淋漓漏出堆聚乾結其色灰白如天泡瘡及癩瘡之形或清水非膿無事自破水出乾黑未有能治者矣雖然痘密著床久瘡好皮堅無敗朽如逢擦破更焦枯任彼天人應費手凡痘稠密最難為肘膊腰臀之間其外久著床蓆輾轉捱磨若非堅厚鮮有不破者但破須要腫灌若焦乾黧黑如火燒湯潑之狀必死又見其人手足破爛成片而不灌者亦死略見漿膿起發時休教人物往來馳邪風穢氣相侵觸變亂無常悔卻遲凡痘瘡起發之後漸漸養漿即當謹飾房戶禁止人物內者休出外者休入謹防穢厭觸犯其瘡輕者作痛作癢變而為重重者癢塌抓破煩悶而死矣故房戶內外常須燒蒼朮大黃以避不正之氣但二味氣味惡劣不可使痘兒聞之更不可焚燒諸香蓋香能助火透入關節所以禁之其諸穢厭房事最毒酒次之五辛又次之死屍之氣烈於糞穢狐貍之氣甚於犬羊烈風暴雨亦能為害飲食之偏寒偏熱者勿恣於口天氣太熱則薄其衣裳常令涼爽太寒則溫其蓋覆常令溫暖皆調理切要之法不可不知凡用僧道灑水滌穢與醫家用藥必用老誠之人既能清心寡慾而且經驗復多自能司人之命凡被房事生產月經所厭以大棗燒煙解之被酒所厭以葛根茵陳燒煙解之五辛所厭燒生薑煙解之被死屍疫癘厭以蒼朮大黃燒煙解之狐貍犬羊所厭燒楓樹球煙解之凡遇風雨須燒楓樹球以避濕氣膿血淋漓心臟虛舍空神亂若邪居睡中妄語難蘇省養血安神病自除凡痘稠密成漿之時或昏昏而睡呼之不醒口中喃喃妄語如被邪祟之狀時人不知多生驚怪殊不知此由膿血出多心臟空虛神無所依而然當養血安神病當自退宜寧神化毒湯與安神丸相間服之瘡成腹痛果何因便秘腸中火爍津又恐誤傷生冷食消詳補瀉貴情真痘出之初腹痛乃為毒氣瘡成無膿而腹痛未可以為毒也當審其人便解飲食何如耳倘若未得大便此燥屎在裡而痛宜大黃化毒湯微利之不可拘於首尾不可下之說坐以待變也若因誤傷生冷或飲冷而痛宜溫中化毒湯暖之效瘡毒無邪證適中忽然腹脹氣龐鴻此因食飲多生變消導天然不用攻凡痘順正表裡無邪膿血已成可無苦矣忽然腹脹氣喘色變而煩悶者必傷食得之也何以知之以其瘡正故也宜消導之用助脾化毒湯膿成盡說毒將升誰料其間未足憑飽滿堅牢誠可愛塌平淫濕最堪憎世俗之見但知痘瘡已過一七發起作膿便言無事不知膿成之時尚未可憑信若郛郭堅厚膿漿飽滿言其無事信矣若平塌不飽滿濕淫不堅厚莫言無事至於十二三日之後尚有變異延綿日久而有死者矣險逆諸瘡且勿云聊將順證語諸君緣何業已成漿日尚有凶危不可垠凡痘分三等有順有險有逆順者不須治險者治之吉逆者無可治今除險逆不必論然順者亦有成漿之日反變為險逆者此何故也蓋有失調理觸犯禁忌誤服湯丸恃其輕少而不調護故令輕者變重此人事之害也又有隻出一二粒而殞命者癘氣使然也豈人能逆料者哉入方四物化毒湯治痘已起發氣至而血不至殼中出清水全當歸正川芎懷生地白芍藥大麥冬牛蒡子淮木通生甘草等分上薄桂減半燈芯為引水煎熱服保元化毒湯治痘血至而氣不至內涵水色平塌不起官揀參炙黃耆全當歸正川芎荊芥穗上薄桂牛蒡子北防風赤芍藥炙甘草粳米一撮為引不煎服十全化毒湯治血氣俱虛窠囊浮腫中涵清水如水泡官揀參漂白朮白雲苓炙甘草正川芎當歸身白芍藥懷熟地炙黃耆上薄桂牛蒡子粉乾葛生薑大棗為引水煎溫服承氣化毒湯治痘陽極似陰手足厥冷小枳實紫厚朴川大黃酒炒尖檳榔生甘草生薑三片為引水煎滾熱服回陽化毒湯治痘陰極發躁手足大熱官揀參青化桂漂白朮白雲苓川附片炙甘草大棗為引水煎溫服養衛化毒湯治痘出太甚表虛而振戰官揀參炙黃耆柳桂枝當歸身炙甘草生薑三片大棗三枚引水煎服清神化毒湯治肝火太甚而咬牙綠升麻懷生地杭麥冬淮木通北防風炙甘草燈芯十莖為引水煎服導神化毒湯治痘瘡太甚膿血繃急而痛以致咬牙淮木通杭麥冬黑梔仁炙甘草炒棗仁鏡辰砂研燈芯十莖為引水煎熱服養胃化毒湯治成漿時嘔吐而有物胃虛也漂白朮廣陳皮白雲苓西砂仁姜炒連生薑一片為引水煎服香連化毒湯治泄瀉色黃而臭熱也南木香炒黃連結豬苓漂白朮炙甘草燈芯十根為引水煎服理中化毒湯治泄瀉所出之物清冷不臭寒也官揀參炙甘草漂白朮白雲苓黑炮姜大棗三枚為引水煎服附子化毒湯治吐瀉不止手足厥冷脾胃將絕也熟川附官揀參漂白朮炙黃耆炮薑炭炙甘草炒米一撮大棗一枚引水煎溫令服甘桔化毒湯治誤食辛熱之物或誤服熱藥以致咽喉破爛大粉草芽桔梗鮮射干淨連翹牛蒡子水煎入竹瀝和服養心化毒湯治咽中無瘡而暴瘖大當歸懷生地大麥冬綠升麻天花粉川黃柏漂蒼朮荊芥穗生薑一片為引水煎服益元散白滑石一兩研細水飛粉甘草五錢共為細末蜜水調敷瘡焦痛胭脂浸汁調敷四聖化毒湯治成漿之時忽然瘙癢無吐瀉者淮木通當歸尾赤芍藥北防風柳楊桂淨水煎服參歸化毒湯治元氣素弱又兼吐瀉而作癢官揀參大當歸炙黃耆赤芍藥桂枝梢漂白朮炙甘草水煎服以上二證俱用熏洗法熏洗二方俱見前寧神化毒湯治成漿後膿血去多心虛神無所主口中囈語官揀參當歸身懷生地大麥冬淮木通石菖蒲赤芍藥黑梔仁燈芯引水煎服安神丸治證如前炒川連一錢當歸身一錢五分白茯神一錢炙甘草五分遠志肉一錢石菖蒲一錢炒棗仁五分共為末豬心血搗勻為丸如芡實大辰砂為衣每二三丸燈芯湯下大黃化毒湯治漿成大便秘結而腹痛內有燥糞綠升麻當歸身懷生地火麻仁光桃仁鮮紅花陳枳殼錦大黃尖檳榔生薑為引水煎空心熱服溫中化毒湯治誤傷生冷冷水而腹痛官揀參公丁香南木香漂白朮青桂心炙甘草炒白芍西砂仁小枳實廣陳皮炮薑炭大棗生薑引水煎服助脾化毒湯治飲食過傷抑遏脾氣所以腹脹而喘廣陳皮法半夏川厚朴陳枳殼家蘇子蘿蔔子尖檳榔生薑為引水煎服收靨證治歌共十五首又一十六方收靨難拘日數文但憑稀密實虛分緩收循序多堅穩太急須防餘毒熏痘瘡收靨不可以日數拘也大抵痘稀元氣實者易出易靨痘密元氣虛者難出難靨只要循序緩收倘收太急乃毒熬煎血氣枯焦非正收也必發癰毒怪證甚則喪軀微則殘形矣人中上下別陰陽收靨先於此處良若是足顱先靨黑多凶少吉早提防人中者督任二脈交會之衢痘疹先從此處出壯收靨為陰陽和暢若於額顱手足心先靨乃邪氣攻心莫救收靨從來貴整齊臭腥煩爛便蹺蹊其間順逆宜詳審慎勿逡巡當局迷痘瘡收靨貴於整齊干如螺靨者上也頂破膿出結如雞屎者次也破爛無痂者下也凡遇此等收靨便須詢察曾犯何逆如血氣本實誤投補藥以邪得補反潰正氣如火爍爛宜天水散解之則邪火退而收靨齊矣如初飲冷水浸淫脾胃以致收靨不齊以除濕湯滲之則內滲其濕外燥其表令好收靨若頭面潰爛其氣腥臭及遍身手足和皮脫去宜分順逆果膿成毒化飲食如常更無他苦者順也膿水未成是名倒靨未可量痘到收時膿自干封藏收斂殼團樂莫教腐爛和皮脫此個還將倒陷看痘瘡成膿之後結為螺靨此毒從外解若不能結痂反成腐爛和皮脫去此倒陷毒氣入內也但逢倒陷毒深潛復腫翻生始不嫌頭面腫消空未補剝膚災近易先佔凡痘倒陷系中氣不足急用溫中托裡湯托之服藥後破者復加腫灌無痘處又復出一層謂之補空俗云翻生痘是也此正氣不虧邪氣不留雖過期延日不為害也如頭面不腫空處不補即易所謂剝床以膚切近災矣安可為哉靨時自利忽然侵順逆中間仔細尋膿血痂皮為順候不分水穀定歸陰收靨之時忽然瀉痢若膿血痂皮之物此脾強腎弱為順候痢儘自愈不可強治若不分水穀此腎強脾弱為逆候用炒米湯送豆蔻丸痢止則吉不止則凶豆蔻丸方見前過期不靨事蹺蹊臭爛渾身靨不齊黏席黏衣何所治白龍敗草指群迷凡痘成膿之後過期不靨渾身潰爛以致黏席黏衣用白龍散敗草散襯貼鋪床最佳收靨遲延須急治勞君察證毋拘執縱意違師徒自傷臨危施濟終難及凡痘當靨不靨須要詳審不可忽略如冬寒之時蓋覆少薄被寒風鬱遏不能靨者宜桂枝解毒湯疏解之如夏月衣被太厚熱氣熏蒸不能靨者宜去其衣被少令清涼用甘露解毒湯清之倘一向大便秘結裡熱太甚不能靨者宜當歸解毒湯微利之膽導法尤妙如泄瀉氣虛不能靨者此只收靨不齊欲呼坐漿干也不須妄治如元氣素弱以致難靨宜參歸化毒湯解之膿水將乾結靨時休教愚昧失支持不知禁忌多翻變卻是為山一簣辭世俗於痘收靨之時即殺雞食之或姜椒之類謂其和暖殊不知雞屬巽能動風辛能助火脾胃強者無害弱者反助火邪以致發癰傷胃口舌生瘡則至壞病者有之矣又或宜溫而過熱宜涼而過寒皆為犯禁亦能生變切宜慎之一向渾身涼且和靨時忽熱事如何微微發熱干膿水太甚焦枯病轉多痘瘡始終要有微熱不可盡去若收靨之時反大熱作渴煩躁此毒在內更防陷伏急用生津涼血葛根湯以清之破瘡復灌依然爛及至收成功愈慢淋漓膿血苦難當大補湯丸君莫憚凡痘瘡犯著皮嫩易破本不治之證但破損之後重複腫灌此正氣尚強毒不能入而發於外亦當依期收靨設不能靨乃正氣被邪氣剝削雖能逐邪出外不能逼邪成痂也急宜大補湯溫之不可因循反生災變數個頑瘡不肯收犯時鮮血卻長流如逢此證休輕易破膜傷筋命必休痘瘡破損灌腫作痛不能幹水一名疳蝕瘡一名陽瘡犯著即出血不止乃難治之證內服大補湯方見前外以綿繭散敷之若逡巡不治以致灌傷筋骨穿膜破空夭人生命者多矣灌瘡滿面血膿多敗面傷睛奈若何卻在良醫施妙手調和中外起沉疴如面瘡破爛反復腫灌膿血浸淫卻防壞眼殘形宜升麻解毒湯清之痘瘡抓破狀多般出血成坑水更干瘙癢焦疼微小事傷筋潰肉使形殘其痘瘡抓破之證非一有破而出血者陽瘡也宜當歸涼血散解之有破而無水便乾枯者此陷伏也要瘡復灌肉復腫者為佳內服托裡回生散有破而成坑者此內陷也內服托裡回生散外用白龍散方見前敷之若不詳審以上三症治之微則殘形甚則傷命收靨依期更著痂或時戰慄或言邪三元正氣將回復不必延醫不必嗟凡痘欲收靨之時痂皮圓靜但時或戰慄語言妄談此為正氣將復不能自持不必憂疑須臾自定入方天水散治痘誤投補藥反饋正氣而不收靨白滑石水飛一兩粉甘草細末五錢共研勻蜜水調以鵝毛蘸藥拂拭瘡上除濕湯治脾胃受濕收靨不齊川羌活漂蒼朮北防風淮木通結豬苓宣澤瀉漂白朮赤芍藥上薄桂淨水煎服溫中托裡湯治痘瘡尚未收靨忽然倒陷中氣虛也官揀參炙黃耆炙甘草牛蒡子當歸身淨連翹上薄桂杭青皮南木香大棗三枚為引水煎服白龍散治痘瘡渾身破爛不能懷抱者用干牛屎燒灰取中間白者研末篩過敷爛處敗草散用茅屋上爛茅燒灰研細篩過鋪於席上任其展轉此草多受霜露功能解毒故也桂枝解毒湯治痘為風寒鬱遏不能收靨上薄桂赤芍藥牛蒡子北防風淨蟬蛻生薑大棗引水煎服甘露解毒湯治夏月天令炎熱暑氣熏蒸不能收靨結豬苓宣澤瀉大麥冬淮木通小條芩地骨皮上薄桂淨連翹炙甘草水煎熱服當歸解毒湯治裡熱太甚大便秘結不能收靨懷生地大當歸火麻仁陳枳殼淨連翹酒大黃紫草茸淨水煎空心滾熱服膽導法治大便結燥血不潤腸以此通之不損元氣用大豬膽一個以小竹管插入膽內以線扎定吹氣令滿另以線打活結收住其氣以竹插入穀道內解去活結捏其膽令膽汁射入腸中直待氣透然後去膽便即通矣參歸化毒湯治元氣虛弱瘡不收靨官揀參炙黃耆當歸身牛蒡子炙甘草水煎服世人不知此等關係視若泛常不早求治待斃而已悲夫生津涼血葛根湯治收靨忽然大熱煩渴此里有毒也粉乾葛天花粉地骨皮當歸梢淮木通淨連翹牛蒡子酒黃芩北柴胡淡竹葉大揀參炙甘草水煎熱服大補湯治痘破爛復灌元氣傷殘不能收靨官揀參炙黃耆當歸身淨連翹上薄桂牛蒡子炙甘草大棗為引水煎服蠶繭散治痘瘡破爛水不能幹犯之血出用出子蠶蛾綿繭不拘多少以白生礬捶碎納入繭內炭火煅之待礬汁干研末干搽瘡上即安升麻解毒湯治面瘡破爛復灌膿血不幹綠升麻香白芷酒黃芩淨連翹淨蟬蛻淮木通牛蒡子密蒙花白蒺藜荊芥穗北防風大當歸炙甘草燈芯為引水煎熱服當歸活血飲治痘瘡抓破而出血者當歸尾鮮紅花酒黃芩淨連翹炙黃耆官揀參地骨皮牛蒡子生甘草燈芯為引水煎熱服托裡回生散治痘瘡破而無水即便乾枯者炙黃耆大當歸淨連翹上薄桂牛蒡子炙甘草水煎入燒過人屎調服落痂證治歌凡五首共三方痂皮應落偏遲落但恐斯時還作惡補脾實表有奇功未可逡巡輕棄藥收靨之後痂殼自殘若黏著皮肉不脫乃表虛也尤當禁忌不可因循恐生他變宜調元固本湯治之收靨之時不落痂昏昏喜睡莫咨嗟只因脾胃多虛弱調治專從戊己佳此證乃脾胃虛而好睡也胃屬戊土脾屬己土宜健脾開胃調元清神湯醒之落痂之後察瘡瘢音盤平整紅鮮日漸安若是凸凹兼黑黯好將敷藥補形完其瘡落痂之後瘢痕平整紅活者吉若瘢肉凸起或凹陷紫黑吉凶未可知也用滅痕散敷之瘡痂自落何勞急撏掐須防邪氣襲他年終作血風瘍此際浸淫空涕泣痂落依期不必憂緣何頭足更遲留陰陽孤獨如鰥寡安得同時取次收凡陽生者以陰成之陰生者以陽成之經曰孤陽不生孤陰不成其瘡收靨自人中平分上下髮際以上陽之陽也謂之孤陽足膝以下陰之陰也謂之孤陰所以瘡之收靨至此二處每每遲留不能便乾不可服藥聽其自然則吉入方調元固本湯治痘痂黏肉不脫官揀參炙黃耆當歸身淨蟬蛻炙甘草生薑大棗引水煎服調元清神湯治痘痂黏肉不脫而昏沉好睡官揀參炙黃耆大當歸杭麥冬廣陳皮炒棗仁炒川連炙甘草大棗為引水煎服滅痕散治痂落瘢肉凸凹紫黑密陀僧研為細末以乳汁調搽瘡疤如無乳汁蜜調亦可若此藥搽上凸凹者自平紫黑者自退應效者吉不應效者凶痘後餘毒證治歌凡三十一首共四十六方借問何為痘後癰只因平塌少成膿毒邪蘊聚難消散透節尋關出要衝凡痘初出一點血由血而化至膿膿成而毒解矣若出形之後應起發不起發應成膿不成膿一片空殼狀如蛇皮或平塌破損都無膿水本為死證緣其人脾胃素強又能飲食亦可以引日收效只是毒邪蘊蓄於裡必尋出路於關節之間而為癰腫但發一二處可治若流注於手足發之不止腫灌不愈久而死矣痘癰先要明經絡解毒調元兼里托決膿去毒急施功莫待殘形變為惡凡癰之發先看在何經絡分氣血多少而治之次看人之虛實以解毒托裡為先不可亂施敷藥以致毒不得出內炎筋骨而成壞證如腫而未成膿者用必勝膏貼之已成膿者將鈹針決破其膿以生肌散敷之若腫毒而元氣素弱者以十六味流氣飲流通之若氣血虛而泄瀉者加附子以溫之若元氣素強者用連翹解毒湯主之如癰毒日久膿血去多者以十全大補湯扶元解毒惡證無如痘後丹皮膚蘊火毒相干看他所發歸何部心腎之經治亦難赤火丹瘤惡候也流移紅腫其痛手不可近痘瘡之後有發丹瘤者因蓄火太甚不能發泄鬱於肌肉之間故發而為丹從頭上起過心即死從足下起過腎即死內服玄參化毒湯解之外用磁鋒砭法癮疹何為痘後呈肌膚蘊毒未全清若教發盡無停滯免得重重怪證生癮者皮膚間隱隱成疙瘩也俗人謂之風丹疹者皮膚點點狀如蚊蚤咬跡也痘後發癮疹因毒火未發盡藏於皮膚之間或搔癢因抓而成或因受風火相搏而成皆吉兆也正欲其發泄無使停留以變他證如發太甚內服防風敗毒散外以益元散拭之益元散方見前痘已收成靨不幹或時出血病難安從前毒氣藏肌表蝕肉傷肌不忍看此與前頑瘡不收相同凡覺痘瘡當靨不靨即防此證當內服大補湯外以綿繭散敷之綿繭散方見前翳膜何為眼內攢怪他熱毒壅於肝還睛去翳多奇術點洗徒招廢棄端小兒出痘之時即用黃柏膏和胭脂塗眼防斑瘡入眼也但斑瘡入眼本不在初多在收靨之時或滿面破爛重複腫灌膿血膠固毒火鬱蒸在內其斑瘡入眼或痘出已甚成就遲緩醫用辛熱之藥發之亦令斑瘡入眼又或收靨之時喜淡辛熱謂之干漿以致二火相煽亦令斑瘡入眼但在白珠上不必治久而自去惟在黑輪上者或掩蔽瞳仁急用密蒙花散治之兩目今朝乍畏明肝虛邪火暗傷睛涼肝養血功無比能使雙眸炯炯清凡痘後雙目見明不開暗則開者謂之羞明宜涼肝明目散治之若向暗處亦不開者卻防目中有瘡當如上法治之收後緣何便下紅多由倒陷毒歸中利完膿血應須愈強治翻為聚怨叢膿血痂皮一路來任他自止莫疑猜和中清熱施殘著劫澀輕投病轉乘痘後忽利膿血待其自止然後用和中清熱之劑不可便用止澀但痢勢甚者宜黃連解毒湯清解之膿血盡後宜和中湯痘證從前無倒陷緣何膿血利無時大腸鬱火多潛毒解毒通腸貴早施痘無倒陷之證卻有膿血之痢由於平日食煎炒素有積熱今因痘後氣血虛不能勝積故痢膿血也此名滯下必然腸鳴作痛裡急後重或因痘出之後飲食太多水停作泄熱毒乘虛入里便下膿血此名腸垢宜調胃承氣湯以徹其毒次用黃芩湯調其陰陽最怕收成嘔噦頻咽疼胃弱毒潛湮錯喉嗆水宜施治乾噦無聲死作鄰有聲有物謂之嘔有物無聲謂之吐有聲無物謂之噦食谷即吐謂之錯喉飲水而噴謂之嗆水今痘後凡有此等由熱毒壅塞胃口故令嘔吐咽門澀塞故令錯喉嗆水也惟乾嘔乃胃瘡腐爛不能納穀故時時張口似吐不吐乃不治之證亦有咽喉作痛而嘔吐失聲者乃咽喉腐爛亦不可治惟但嘔吐陳皮竹茹湯咽喉痛甘桔湯身已清安熱不除或因毒甚或元虛調元解毒分投用寒熱分明效自如痘既收靨則毒解而熱當除矣如熱一向不已非毒氣之餘烈必元氣之素虛惟以脈辨之如脈數形勇煩躁而熱引邪氣實也宜知母解毒湯如脈遲形怯熱而喜睡此正氣虛也宜黃芩調元湯收後渾身一向溫乍然發熱細評論內傷外感須分治此個真機妙法門痘靨之後一向溫暖和平並無餘熱今忽發熱不可以餘毒未解正氣之虛同論必因外感風寒其證頭目昏痛惡寒脈浮宜桂枝湯或因內傷飲食其證肚腹飽悶不喜飲食其脈弦滑以補中益氣湯加消導藥而運用之食飲如常腹裡疼蓋由脾弱化難能看他虛實行消導方顯明良三折肱收靨之後忽然腹疼或嘔或泄不思飲食此傷食之證虛則用補中益氣湯治之如無吐利腹痛氣急宜丁香脾積丸下之若腹滿而痛煩悶不寧此毒火入中急用雄黃解毒丸利之不然漸加喘急手足厥冷則難治矣收後緣何食不思偶然傷食少人知補脾消導為良法強忍成疳悔後遲一向能食收後反不能食聞食氣即嘔逆此必食傷甚則以脾積丸方見前治之微則以保和丸調之若隱忍不急求治久則消瘦漸成疳癆矣寒熱纏身似瘧侵不分早晚應期臨只緣脾胃多虛弱補氣升陽貴酌斟此因痘後氣血兩傷陰虛則內熱陽虛則外寒乍寒乍熱儼然瘧疾切不可以為瘧治但以補中益氣湯升舉之其病自愈收後渾身手足寒好將氣血作虛看六經脈細如將脫急早回陽病自安凡痘收靨之後手足厥冷六脈沉細元氣大虛急用調元生脈散以溫之稍用寒涼必取敗亡也強打精神睡思昏終朝何事不惺惺此因毒解神虛倦氣血和平體自寧收靨而好睡乃毒解神虛此常事也不必調治有等苟且之流欺人不知而取利庸下之徒妄用湯丸而致禍者戒之戒之睡思沉沉不識人恍疑中酒妄言頻只因熱伏心包絡保護心君妙入神凡收後昏睡連日不醒口中妄語或有醒時亦似醉人每多錯語此熱邪攻心心君不肯受邪傳於包絡宜導赤解毒湯清之或用安神丸亦佳收靨之餘搐搦縈責其火毒未全清清心散火風應退發作無休命必傾痘出發熱作搐此常候也若收靨之後反發搐者乃瘡發未透毒火內侵故也然此候發於收靨之餘血氣已衰治之甚難宜清神散火湯如藥對病者可治若連發不已死證也身已康寧手足攣分明血少致斯愆補脾養血誠仙訣不遇知音莫浪傳凡痘後手足忽然攣拘不能屈伸轉運乃血少不能養筋又或外被風寒水濕以致然耳不可用發散並疏風之藥以耗其血只宜當歸桂枝湯補脾養血則手足自和痘後還愁咳嗽多總由毒火肺中磨清金降火兼調氣肩息胸高若命何痘疹之後惟肺受傷至於收靨毒解宜乎寧矣若反咳嗽喘急乃毒火流入肺中也當清金降火宜寧肺湯保肺解毒服藥嗽不止胸高龜殼肩息者不治忽爾渾身腫脹形或風或水食偏停腫因肺受宜清表脹屬脾家利解寧痘收之後或面目浮四肢腫此屬於肺因表虛而受風寒仍宜汗解用加味五皮湯若腹脹如鼓眼胞微腫此屬於脾由脾胃虛飲水過多蓄濕於內所食過多積熱於中仍宜利解宜厚朴湯倘屬虛脹不可妄攻但宜萊菔子丸小便宜清偶澀遲膀胱蓄熱少人知不將導赤為良法只恐遷延有變時凡痘疹小便始終宜清若收後不利此熱積膀胱宜加減導赤散以清其心便貴滋榮乍覺難誰知腸胃液津干潤腸膽導宜兼用縱有餘邪便後安凡大便始終須宜潤澤一二日一次為佳若至於收靨後而大便秘結乃痘出太多血枯氣不潤腸宜潤腸丸兼膽導法方見前腠理疏通雨汗傾衛虛榮弱兩無情建中自汗湯偏勝盜汗歸黃六味平經曰衛氣者所以溫肌肉充皮毛肥腠理司開合也痘瘡之後衛氣受傷故收靨之後衛弱而汗出也醒時常出為自汗宜建中湯睡著而出者為盜汗當歸六黃湯血在身中本自寧火邪迫血血違經鼻中細出堪調治便尿中來命不停痘收靨後忽見血證大為危候蓋鼻血出於肺吐血出於胃溺血出於小腸便血出於大腸皆由毒入於內迫血妄行急宜涼血地黃湯止之服藥後血不止者不治忽吐蛔蟲證已非要知內熱又常飢但聞食臭蟲斯出嘔吐心煩蟲作威傷寒吐蛔責之胃寒痘證吐蛔責之裡熱由熱毒拂鬱於裡又不能食蟲無所養但聞食臭即湧出者宜黃連止蛔湯炎炎胃火成疳蝕辛熱頻餐陽毒熾牙齦臭爛怕穿腮藥有神功休論值凡痘瘡後牙齦生瘡時時出血謂之牙宣呼吸息臭謂之息露此走馬疳也由熱在陽明少陽宜內服洗心散外以蠶蛻散敷之如舌上生瘡赤者謂之赤口瘡此熱在心脾二經內服洗心散外用陰陽散敷之其瘡白者名白口瘡又名鵝口瘡此熱在心肺二經亦服洗心散外以朱礬散敷之食飲緣何不發肌多因氣血兩相虧和平丸散常宜服偏熱偏寒愈見離凡兒素常肌肥痘後羸瘦雖能飲食而不為肌膚乃氣血虛故也治之須兼陰陽不可偏勝偏陽則傷血偏陰則傷氣愈見乖離矣陰日宜服參苓白朮散陽日宜服當歸益榮丸痘後分明皮肉嬌切宜保護在昏朝風寒暑濕常宜避洗拭構撾禍莫饒痘後中虛食易傷辛香生冷莫輕嘗若貪口腹渾無忌犯卻中和變內傷此二條言收後調理之法在外也皮膚薄嫩易於感冒若不避風寒暑濕梳洗搏抬則至於癰腫者有之生瘡癬者有之在內也腸胃並弱難於克化若不分生熟軟硬寒熱涼溫任意食之則成脹滿者有之至於瀉痢者亦有之可不慎歟入方必勝膏治痘癰初腫而未膿者馬齒莧取汁公豬肪熬油好冬蜜三味等分同入砂鍋內熬成膏厚塗腫上生肌散治痘癰已成膿破爛不能收口香白芷一錢石龍骨五分浙貝母二錢赤石脂一錢新白芨一錢共為極細末敷十六味流氣飲治痘癰腫痛元氣素虛者官揀參大川芎當歸身赤芍藥北防風南木香炙黃耆上薄桂香白芷芽桔梗尖檳榔川厚朴臺烏藥紫草茸陳枳殼炙甘草氣血虛而瀉利者加熟附子大便秘結者加酒蒸大黃淨水煎半飢服連翹解毒湯治痘癰腫痛能食而元氣強者淨連翹香白芷大川芎當歸尾赤芍藥牛蒡子穿山甲炙甘草淨水煎服屬太陽經者本方加川羌活漢防己屬陽明經者本方加綠升麻粉乾葛屬少陽經者本方加北柴胡枯黃芩屬太陰經者本方加青化桂北防風屬少陰經者本方加川黃連淮木通屬厥陰經者本方加北柴胡杭青皮予按但云六經加味而不指明處所未免闕略今分晰之以便治療太陽經所屬項背腰臀足外臁足踹陽明經所屬額眉眶面胸兩乳牙齦少陽經所屬左右頭角耳前左右兩脅腋太陰經所屬中脘四肢兩足跗少陰經所屬臍腹手足心手足內臁足跟厥陰經所屬頭項小腹男婦陰器十全大補湯治痘癰破爛膿血去多速救元氣官揀參正川芎當歸身赤芍藥懷熟地白雲苓炙黃耆青化桂香白芷金銀花淨連翹炙甘草生薑大棗為引水煎服仍照以前加入引經藥凡見癰毒以上法治之不可因循恐成大患微則殘形甚則殞命玄參解毒湯總治痘後餘毒十種火丹潤玄參當歸尾懷生地鮮紅花淨連翹地骨皮熟石膏赤芍藥北防風淮木通荊芥穗淡竹葉十片為引水煎熱服磁鋒砭法法見四卷丹毒門防風敗毒散治痘後身發癮疹出而過多者北防風赤芍藥綠升麻粉乾葛生甘草水煎燈芯引熱服大補湯治痘靨而不幹犯之出血官揀參炙黃耆當歸身淨連翹上薄桂牛蒡子正川芎杭白芍香白芷炙甘草大棗三枚為引水煎服密蒙花散治斑瘡入眼翳障瞳仁密蒙花酒洗五錢穀精草五錢淨蟬蛻去翅足洗曬乾五錢五分望月砂炒一兩共為細末用豶豬肝一兩竹刀剖開每用末藥一錢擦在肝內水煎肝熟飲湯食肝神效不可輕用點洗之藥反成廢棄涼肝明目散治痘後雙目羞明怕日當歸身草龍膽北柴胡正川芎北防風密蒙花酒黃連用豶豬肝煎湯煮藥服之黃連解毒湯治痘後患痢其熱甚者酒黃連酒黃芩陳枳殼當歸尾酒大黃生甘草水煎滾熱服和中湯治痘後患痢膿血既清以此和之官揀參大當歸陳枳殼淮木通炙甘草薑棗引水煎溫服調胃承氣湯治痘後熱毒作痢腹痛裡急後重陳枳殼錦莊黃尖檳榔生甘草生薑三大片為引水煎滾熱服黃芩湯治痘後痢已經下後以此調其陰陽酒條芩酒黃連當歸身大川芎淮木通南木香赤芍藥炙甘草久不止加綠升麻腹痛加酒大黃水煎服陳皮竹茹湯治痘後嘔吐有聲有物雅黃連用吳茱萸同炒去吳茱萸用連正廣皮白雲苓竹茹一丸為引水煎熱服甘桔湯治痘後餘毒不清咽喉塞痛芽桔梗君大甘草君牛蒡子臣燈芯為引水煎服知母解毒湯治痘後餘邪作熱淨知母懷生地熟石膏地骨皮酒黃芩牛蒡子綠升麻天花粉生甘草淡竹葉為引水煎熱服黃芩調元湯治痘後元氣怯弱虛熱身倦官揀參酒黃芩大麥冬當歸身炙甘草生薑大棗為引水煎服桂枝解肌湯治痘後熱已盡除勿因外感作熱柳楊桂赤芍藥片黃芩官揀參粉乾葛北柴胡炙甘草生薑大棗竹葉為引水煎服補中益氣湯治痘後久已無熱因傷食發熱官揀參炙甘草漂白朮廣陳皮小枳實杭青皮南木香六神麯老麥芽炙黃耆生薑大棗為引水煎服丁香脾積丸治痘後傷食腹痛氣急京三稜去毛醋浸煨熟蓬莪朮去皮如上制公丁香南木香以上各五錢杭青皮去穰肥烏梅連核燒存性豬牙皂燒存性以上各三錢巴豆仁四十九粒煨煅去油極淨共為細末醋煮麵糊為丸如綠豆大每三丸或五丸七丸量兒大小白湯送下雄黃解毒丸治痘後傷食腹滿而痛煩悶不寧明雄黃一錢另研川鬱金三錢巴豆霜一錢共為末米糊丸綠豆大小茴香煎湯下三五丸保和丸治痘後一向能食今不思食聞食氣即嘔官揀參切片焙乾漂白朮各三錢白雲苓一錢五分炙甘草山楂肉老麥芽六神麯各一錢共為細末米糊丸極小每服一二錢米飲下補中益氣湯治痘後脾虛寒熱似瘧非真瘧也官揀參漂白朮北柴胡綠升麻廣陳皮上薄桂當歸身南木香炙甘草虛甚者加熟附子生薑大棗為引水煎服調元生脈散治痘後手足冷脈沉細極虛之徵官揀參炙黃耆炒白朮全當歸大麥冬北五味青化桂虛冷甚者加熟附片生薑大棗為引水煎服導赤解毒湯治痘後神昏妄語餘熱未除也淮木通懷生地大麥冬白茯神黑梔仁上揀參石菖蒲炙甘草燈芯為引水煎服安神丸治證同前真吐黃五分正雅連炒三錢當歸身黑梔仁各二錢五分共為細末以豬心血和勻為丸如綠豆大硃砂為衣每五七丸燈芯湯下清神散火湯治痘後毒邪未飛忽然作搐淮木通潤玄參大麥冬正川連大當歸官揀參白茯神炙甘草大便秘者微加酒大黃自利者倍人參水煎去渣以辰砂末調服當歸桂枝湯治痘後血少手足拘攣不能轉運官揀參當歸身正川芎白芍藥炙黃耆漂蒼朮川黃柏炙甘草氣虛肢冷加附片感冒風寒以致筋骨痛加羌活防風氣血大虛者加鹿茸虎脛淮牛膝薑棗為引水煎微加好酒一杯對服寧