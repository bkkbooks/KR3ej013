主十全大補湯若腹中微痛此惡露未盡也宜滌去之生化湯產後如逢出痘瘡此時胎去免憂惶只憑補益收功效莫犯寒冷生氣傷婦人產後出痘只以大補氣血為主十全大補湯其白芍用好酒炒熟不可妄用寒涼以傷生髮之氣也入方玄參地黃湯治婦女痘疹作熱經水不依期而至此妄動也懷生地潤玄參粉丹皮綠升麻黑梔仁炒蒲黃生甘草燈芯十莖為引水煎熱服四物合黃連解毒湯治證同前火盛毒重者用此當歸身懷生地杭白芍正川芎正雅連川黃柏條黃芩黑梔仁淨水濃煎熱服小柴胡加生地黃湯治婦女痘初作熱正值經期若四五日不止宜清血熱官揀參軟柴胡小條芩法半夏懷生地炙甘草生薑一片大棗一枚水煎熱服十全大補湯治婦女痘疹發熱經行之後當補之以免陷伏官揀參漂白朮白雲苓當歸身正川芎杭白芍懷熟地炙黃耆青化桂炙甘草生薑一片大棗一枚水煎溫服柴胡四物湯治婦女經血方淨適逢痘疹作熱宜升提官揀參軟柴胡小條芩當歸身正川芎懷生地杭白芍地骨皮杭麥冬光知母淡竹葉生薑一片引水煎熱服四物合導赤散治婦女經後出痘熱入血室神識不清譫妄全當歸正川芎杭白芍懷生地川木通懷熟地炙甘草燈芯十根水煎熱服安神丸治證同前與前方間服真川連全當歸杭麥冬白雲苓炙甘草以上各五錢鏡辰砂一錢梅花片二分五釐共為細末以豶豬心血搗和少加煉蜜杵千餘下為丸芡實大每一丸燈芯湯下桃仁承氣湯治婦女經閉日久正值痘臨宜疏去垢穢免留伏大桃仁二十個去皮尖研泥川莊黃二錢酒潤鮮紅花一錢生甘草五分桂枝尾五分先煎大黃桂枝紅花甘草湯成去滓入桃仁泥化開空心服四物合勻氣散治疏通經水之後以此調其氣血當歸身川芎京赤芍懷生地南木香京楂肉炙甘草水煎不拘時服十全大補湯方見前當歸養心湯治婦女痘疹經行之後忽然暴啞官揀參大揀冬綠升麻全當歸懷生地炙甘草燈芯二十根為引水煎熱服奪命丹治痘方起發正值經期其血大下以致陷伏以此與十全大補湯間服之淨麻黃蜜酒炙黑綠升麻各三錢山豆根鮮紅花牛蒡子淨連翹各二錢五分淨蟬蛻紫草茸人中黃各三錢共為細末蜜酒和丸芡實大每二丸薄荷葉煎湯化服參蘇飲治孕婦出痘發熱之初以此疏通腠理官揀參紫蘇葉芽桔梗粉乾葛信前胡廣陳皮白雲苓陳枳殼南木香炙甘草生薑一片紅棗一枚水煎服安胎飲治孕婦痘已出現以此固其胎氣揀人參漂白朮實條芩懷熟地正川芎全當歸杭白芍西砂仁老蘇葉廣陳皮炙甘草生薑三片紅棗三枚水煎溫服生化湯治孕婦出痘適逢正產產後腹痛惡露未盡當歸身五錢正川芎二錢光桃仁二十粒黑炮姜一錢炙甘草一錢淨水濃煎服麻疹骨髓賦麻雖胎毒多帶時行氣候寒溫非令男女傳染而成其發也與痘相似其變也比痘匪輕愚夫愚婦每視為泛常若死若生總歸於天命不知毒起於胃熱流於心始終之變腎則無證臟腑之傷肺則尤甚閉戶問途何若出門尋徑揚湯止沸不如去火抽薪初時發熱儼似傷寒目出淚而不止鼻流涕而不幹咳嗽太急煩躁難安以火照之隱隱皮膚之下以手抹之亭亭肌肉之間其形若疥其色若丹隨出隨沒乍隱乍現根窠若腫兮麻而兼癮皮膚若赤兮麻以夾斑似錦而明兮十有九吉如煤而黑兮百無一痊麻毒最重治法不同微汗常出熱勢越而不留清便自調毒氣行而無壅腠理拂鬱兮即當發散腸胃秘結兮急與疏通苟視大而若細恐變吉而為凶故衄血不必憂邪從衄解利血不必止毒以痢松所喜者身中清涼可畏者咽中腫痛飲水不休法在生津養血飲食若減方須清胃和中又如出之太遲發表為貴出之過甚解毒堪宜毋伐天和常視歲氣寒威凜凜毒勢鬱而不行火熱炎炎邪氣乘而作癘或施溫補勿助其邪若用寒涼休犯其胃制其過但取其平誅其暴必欲其正遠寒遠熱陰陽之勝負不齊責實責虛人稟之強弱或異麻疹既出將息尤難坐臥欲暖飲食宜淡風寒若襲兮為腫為熱鹹酸不禁兮為咳為喘異氣縱感變證宜參便多膿血兮倉廩血熱咳多涎沫兮華蓋傷寒口爛唇裂心火未退皮焦發槁榮衛將枯苟不詳於臨證何以見其折肱麻痘西江月凡二十首麻痘俗呼麻子蓋因火毒熏蒸硃砂紅點遍身形發自胃經一定切忌黑斑死證最宜赤似朱櫻大都治法喜涼清不許辛甘犯禁麻疹因何咳嗽蓋由肺胃相連肺金被火苦熬煎以致咳嗽氣喘治法清金降火不宜誤用辛甜蒸籠包子譬如然只要氣松火遍麻疹如何辨認分明狀似傷寒此多咳嗽有紅斑噴嚏眼中水現或見腹疼陣陣或時吐瀉相兼疹麻吐瀉不須嫌正要毒除熱減麻與痘瘡異治二家不可同方痘宜溫解疹宜涼又要現形為上若受風寒不出其間凶吉難量急宜發散保安康最怕神昏腹脹大凡麻痘未出詳看天令如何假如日暖又風和敗毒荊防堪可若是時行疫癘芩連消毒宜多用心調理救沉疴坐井觀天莫學且論荊防敗毒真為發散仙方荊防生地要相當酒炒芩連二樣桔梗人參甘草連翹牛蒡無雙玄參酒柏妙真良竹葉升麻停當又有芩連消毒散火解毒尤佳芩連梔子及升麻桔梗石膏多把甘草人參知母連翹牛蒡紅花引尋竹葉要多加此個方兒無價發散仍前不出令人真個憂疑麻黃酒蜜炒如煤梔柏芩連一例更著大黃酒炒連翹蒡子相宜石膏蟬蛻最為奇不效命難再立如見出時紫黑此般自古多凶急求人屎路朝東火煅成灰取用研碎酒調吞下須臾黑變為紅若還依舊黑朦朧縱有神丹何用麻已現形發熱化斑湯用為先石膏甘草及人參桔梗連翹靈驗若是毒多熱甚芩連消毒真傳大腸秘結大黃添務用微通數遍麻疹類多咽痛火邪熏爍無他連翹甘桔要多加牛蒡射干同下外用十宣妙散吹喉休要吁嗟假如藥後有爭差消毒芩連妙也麻疹再兼瀉痢預先用藥調醫瀉時減桂五苓宜加上甘草滑石如是痢兼赤白香連丸子相隨大端痢止便為奇不效令人疑忌麻咳聲聲氣促只消降火清金赤苓梔子並黃芩桔梗石膏靈應知母人參地骨栝蔞杏子玄參麥冬牛蒡妙如神竹葉將來作引麻後切防四證因循多致誤人遍身久熱欠清寧咳嗽連聲牽引牙齒疳生走馬痢下赤白難禁各求方法貴精純始是醫家絕品為甚身中壯熱只因餘毒連綿金花丸子用芩連龍膽梔仁堪羨鬱金雄黃解毒燈芯地骨湯煎若還脾弱熱長延集聖胃苓任選咳嗽頻頻不止或因不忌酸鹹又加火毒肺家延尤恐胸高氣喘體實兼行葶藶神虛清肺為先如斯調理保安痊莫向風波弄險葶藶丸除肺熱杏仁防己為奇牽牛葶藶棗相隨萊菔共研成劑清肺神丹降氣鹽湯煮焙陳皮芩連甘草杏仁泥蘇子同丸甚美口齒生瘡臭爛此名走馬牙疳金花丸子好求安外用除疳妙散先取尿缸白垢火燒白色如鹽更將五倍銅綠添砒棗燒灰靈顯赤痢瀉時鮮血黃連柏葉槐花枳殼荊芥穗同加痢止血除方罷白痢吳萸滑石樗根枳殼升麻烏梅取肉作丸佳赤白香連可下四疾更防死證臨門休要殊差兒多體熱瘦如麻咳嗽面青聲啞走馬唇穿齒落痢多噤口吁嗟此般即是死冤家任是神仙也怕麻疹證治歌凡二十五首共二十九方痘麻胎毒發於心胃腑相連熱毒侵咳嗽鼻中清涕出且觀雙目淚淋淋痘麻皆胎毒所為毒者火也痘為少陽相火陽道常饒故痘大而焮腫麻乃少陰君火陰道常乏故麻小而碎密心火旺則肺受之故治麻當以肺為主凡咳嗽者火炎於肺也鼻流清涕者以火鑠金而液自流也目中淚出乃肺熱移於肝也凡手掐眉目鼻面者肺熱證也凡遇冬溫最不詳民多疫癘發瘡瘍若逢斑疹相傳染可用湯丸預解良春溫夏熱秋燥冬寒此四時之主氣也冬應寒而反溫陽先暴泄火令早行人感其氣至於來春必生瘡疹未出痘麻者必感而發雖曰胎毒未有不由天行癘氣故一時傳染大小相似但見麻疹之出宜服代天宣化丸以預解之可使毒徹不為已甚也麻出須明歲氣先忽輕汗下致顛連察人虛實施方法暗損天和壽不堅麻初發熱與傷寒相似但麻疹則面頰赤咳嗽噴嚏鼻流清涕目中淚出呵欠喜睡或吐瀉或手掐眉目鼻面宜升麻葛根湯不可作傷寒妄用汗下也汗之則增其熱為衄血為咳血為瘡咽痛為目赤痛為煩躁為大小便不通下之則虛其里為滑泄為滯下經曰必先歲氣毋伐天和此之謂也麻喜清涼痘喜溫須知麻痘不同門麻苗痘實無人解寒熱宜分未可渾麻喜清涼痘喜溫暖此法人皆知之然麻疹初發亦宜和暖則易出所以發苗之初只要發出得盡則毒便解矣若痘必苗而秀秀而實毒斯解也然成實之時若太溫熱則反潰爛不收是痘後亦宜清涼故治痘麻無過熱無過寒溫涼得宜陰陽自和是為得之麻毒從來不可留出完毒解便無憂腹中脹痛邪猶伏喘促昏迷命必休麻疹只怕不能得出若出盡毒便解矣凡麻疹發熱之時當審時令寒暄以藥發之如時令大寒以桂枝葛根湯發之大熱以升麻葛根湯合人參白虎湯發之不寒不熱以荊防敗毒散發之如兼疫癘時行以人參敗毒散發之外以胡荽酒用苧麻蘸酒遍身戛之務令亟出若發而不出反加腹中脹痛氣上喘促昏悶譫妄者死證也過期不出勢淹延毒伏身中未得宣急用透肌休怠玩豈堪臟腑受熬煎發熱六七日已後明是麻證卻不見出此皮膚堅厚腠理閉塞又或為風寒襲之曾有吐瀉乃伏也急用發表之劑麻黃湯去杏仁加蟬蛻升麻外以胡荽酒散麻刮之如前未更衣者毒甚於里伏而不出涼膈散加牛蒡子發而解之再不出者死證也更衣謂大便也肺為華蓋臟稱嬌毒火炎蒸津液消喘嗽連聲痰唾少急須清潤救枯焦麻疹初發熱時未見出現咳嗽百十聲不已上氣促急面浮目胞腫時臥時起此火毒內蒸肺葉焦舉宜甘桔湯加石膏知母牛蒡子主之火熱熏蒸汗不停毒邪並迫血違經汗多衛表邪從解血去榮中毒少寧麻疹發熱自汗或鼻血出不須止之亦發散之義故汗者毒從汗散衄者毒從衄解但不可太過如汗太多人參白虎湯合黃連解毒湯清之衄太甚玄參地黃湯涼之發熱乍然生吐瀉由他頻出不須怕腸胃停汙自此清胞胎之毒全消化麻疹發熱吐瀉純是熱證不可作寒論乃火邪內迫毒在上焦則吐毒在下焦則瀉毒在中焦則吐瀉並作單瀉黃芩湯吐而兼瀉黃芩加半夏湯自利裡急後重黃連解毒湯合天水散毒火熏蒸氣上騰咽喉自此痛煩增從來麻痘多斯證解毒清咽效自能麻痘咽痛本為常候乃火毒熏蒸而痛也勿與喉痹同論妄用針刺蓋喉痹之證內作癰腫故宜以針決去惡血麻痘只是咽乾作痛宜甘桔湯或鼠黏子湯細細嚥之自愈麻毒如焚飲水饒炎邪未許一杯澆咽喉急燥心家熱津液頻枯胃脘焦麻疹渴喜飲水純是火邪肺焦胃干心火內亢故也初發熱作渴升麻葛根湯方見前加天花粉麥門冬渴甚人參白虎湯合黃連解毒湯方見前一齊湧出莫驚惶頃刻渾身朱錦莊似痘出時還又沒如癍紅處卻成瘡痘疹貴三四次出謂出勻麻疹貴一齊湧出謂出盡麻疹只要得出便輕減以火照之遍身如塗朱之狀此將出之兆出形細密與痘疹密者相似但麻疹粒粒成瘡非若癍又皮紅成片如蚊咬之跡也痘瘡赤豔癢來攻麻見紅鮮毒得松白色血虛猶可療黑斑惡證莫相逢痘麻之色不可同論大抵痘怕太紅皮嫩易破必生瘙癢麻喜通紅麻發於心紅者火之正色若麻色淡白心血不足宜養血化斑湯主之色太紅豔或微紫或出太甚並宜大青湯黑者死證也麻之出沒合陰陽出以溫和沒以涼連出不收陽氣盛遲遲間出是陰強麻疹出沒常以六時為準假如子後出午時即收午後出子時即收乃陽生陰成陰生陽成造化自然之數凡此旋出旋收者輕若一出連綿三四日不收乃陽毒太甚大青湯方見前解之逡巡不出乃風寒外束皮膚閉密宜荊防敗毒散方見前麻出渾身似火燒毒邪壅甚急難消解肌只許皮膚暖救里還期便溺調麻疹欲出則遍身發熱或煩躁或頭眩或身拘急及既出則身即清涼諸病悉解此一層麻疹隨收矣如麻既出熱甚不減此毒壅遏宜大青湯方見前以解其表小便澀大連翹湯以解其里大便秘涼膈散方見前加牛蒡麻瘡出盡得安和毒水清時奈若何拂拂熱煩邪尚熾頻頻嘔瀉毒猶多凡麻疹只要出得盡則毒邪解散正氣和平如怫怫發熱煩悶不寧如蛇在灰如蚓在塵之狀或嘔吐或泄瀉此毒邪壅遏尚未出盡煩熱黃連解毒湯嘔瀉黃連橘皮湯二者並外用胡荽酒以苧麻蘸酒搽之方法見前待麻出盡則煩熱自除嘔瀉自止矣麻毒流殃為伏邪幾經惡候致嗟呀雖然疫癘由天降也是因循人事差麻疹欲出未出之時即當早為發散以解其毒庶無餘災若不預解使之盡出以致毒蓄於中麻後必為壯熱日久枯瘁或成搐搦或為痢疾或咳血喘促或作疳䘌而死此雖一時疫癘之染未有不由人事之未盡麻後連日熱不除蒸蒸烙手發毛疏骨消骨立成疳瘦幸有良工藥可茹麻疹收後身有微熱此虛熱也不須施治待氣血和暢自然清涼若熱太甚或日久不減以柴胡麥冬散清之如發枯毛豎肉消骨立漸漸羸瘦柴胡四物湯主之發熱無休神漸昏忽然瘛瘲乍驚魂莫將痙病同調治退熱涼心命可存痘後熱不除忽作搐搦不可稱為驚風而用風藥宜導赤散加人參麥冬煎湯送安神丸方見女人麻疹條小便清者可治短少者不可治麻毒流殃走馬疳牙齦潰爛藥空含穿喉漏頰聲音啞早賦歸歟疾似驂凡麻後牙齦黑爛肉腐血出息臭沖人曰走馬疳馬鳴散主之若面頰浮腫環口青黑頰漏齒脫唇崩鼻壞者死證也宜從卷四齒牙門參考麻後泄瀉名休痢晝夜無停真可異勿輕劫澀圖霸功噤口毒深凶莫避麻後泄痢日久不已曰休息痢不可妄用澀劑以圖霸功宜黃芩湯合六一散煎送香連丸若嘔吐不能食謂之噤口更加腸滑不止或下鮮血或如煙塵水者死證也炎炎胃火金遭迫咳嗽百聲痰阻隔胸高肩息目虛浮擺手搖頭泉下客麻疹收後微咳此肺氣未平不須調治若咳轉甚喘氣上逆發則連綿不已此肺中伏火宜人參清膈散主之身熱門冬清肺湯主之若咳久不止面浮目胞腫胸高而喘息則聳肩血自口鼻中出面色或青或赤鼻燥昏悶搖頭擺手者死證也麻收禁忌切須防鹽醋雞魚慎勿嘗欲莫從心終是福物多爽口定為殃麻後通禁雞魚炙煿鹽醋之類須過七七之後方可食之惟宜食淡不可縱口以遺後患也麻收無恙將平復飲食如常未縱欲心胸絞痛忽傾亡疫癘侵凌名中毒曾見痘麻收後動止出入飲食如常忽然心胸絞痛而死者還是元氣怯弱疫癘之毒乘之正不能勝邪伏於中外若無病內已虧損故一中而死謂之中惡嬰孩初離胎殼中遍身斑駁似硃紅胎中熱毒於今現莫作時行麻疹攻凡小兒初生未滿月者遍身紅點俗呼奶麻子是也此胎中受熱故生下即發現於皮膚不可作時行麻毒論治妄用湯劑蓋臟腑嬌嫩不能勝湯丸也宜溯源解毒湯與乳母食之入方桂枝葛根湯治嚴寒時令麻毒難出以此發之柳楊桂粉乾葛赤芍藥綠升麻北防風炙甘草生薑三片淡豆豉一錢為引水煎服升麻葛根合人參白虎湯治炎天暑月毒為熱隔以此涼解之綠升麻粉乾葛白芍藥炙甘草淨知母熟石膏上揀參糯米一撮水煎服荊防敗毒散治天時不寒不熱以此平解之上揀參北柴胡正川芎芽桔梗荊芥穗白雲苓陳枳殼信前胡川羌活川獨活北防風炙甘草薄荷五片為引水煎熱服人參敗毒散時逢疫癘流行適值麻疹以此涼解之官揀參川羌活川獨活信前胡北柴胡川芎藭白雲苓陳枳殼芽桔梗炙甘草生薑三片水煎服胡荽酒俗名芫荽治麻疹不出以此發之胡荽四兩切碎先以好酒二杯壺內煎滾方入胡荽在內蓋定勿煎勿令泄氣以苧麻蘸酒遍身戛之使麻易出真神法也麻黃湯治麻疹六七日應出不出或風寒閉塞淨麻黃熟石膏淨蟬蛻綠升麻炙甘草蔥白三寸為引水煎服涼膈散治麻毒深重裡氣不通而應出不出錦莊黃白芒硝淨連翹黑梔仁南薄荷淡竹葉甘草梢水煎去渣加生蜜三匙和服甘桔湯治麻疹胃火炎肺金咳嗽面浮應出不出生甘草芽桔梗熟石膏淨知母牛蒡子生薄荷葉五片為引水煎服人參白虎合黃連解毒湯治麻疹自汗太過恐防衛弱以此止之官揀參淨知母熟石膏生甘草正雅連川黃柏片黃芩黑梔仁糯米一撮為引水煎熱服玄參地黃湯治麻疹衄血太過恐防傷陰潤玄參懷生地粉丹皮黑梔仁綠升麻杭白芍生蒲黃生甘草茅根即絲茅根也七莖為引水煎熱服黃芩湯治麻疹發熱自利枯黃芩白芍藥炙甘草大紅棗一枚為引水煎熱服黃芩加半夏湯治麻疹發熱吐瀉即前黃芩湯加半夏生薑黃連解毒合天水散治麻疹自利裡急後重欲作痢也正雅連川黃柏枯黃芩黑梔仁飛滑石炙甘草淨水濃煎空心滾熱服甘桔湯治麻疹咽喉疼痛飲食難艱生甘草君芽桔梗臣牛蒡子使燈芯十莖為引水煎服鼠黏子湯治證同前稍重者用此鼠黏子炒綠升麻鮮射干生甘草燈芯為引水煎熱服養血化斑湯治麻疹色淡白心血不足官揀參當歸身懷生地鮮紅花淨蟬蛻生薑大棗引水煎服大青湯治麻疹色太紅或微紫或出太甚鮮大青潤玄參懷生地熟石膏淨知母川木通地骨皮荊芥穗生甘草淡竹葉十二片為引水煎熱服大連翹湯治麻疹既出熱盛不減小便短澀淨連翹北防風瞿麥穗荊芥尾淮木通車前子當歸尾北柴胡淨蟬蛻赤芍藥枯黃芩白滑石黑梔仁紫草茸燈心十莖為引水煎熱服黃連解毒湯治麻疹出後仍發熱煩躁麻出未盡也川雅連川黃柏黑梔仁枯黃芩淨水煎滾熱服柴胡橘皮湯治麻疹熱邪未盡麻未出完而兼吐瀉官揀參軟柴胡廣陳皮枯黃芩法半夏白雲苓竹茹一團生薑一片為引水煎服柴胡麥冬散治麻疹收後大熱不退毒未出盡也官揀參軟柴胡北沙參大揀冬潤玄參草龍膽炙甘草燈芯一團為引水煎熱服柴胡四物湯治麻疹收後發熱不退毛焦肉削官揀參北柴胡枯黃芩當歸身正川芎懷生地杭白芍地骨皮杭揀冬淨知母淡竹葉桑葉三片為引水煎服導赤散治麻後熱不除而作搐懷生地淮木通麥門冬生甘草淡竹葉七片為引水煎服送安神丸馬鳴散治麻後牙齦潰爛臭氣衝人馬鳴蛻即蠶蛻也火燒過存性二錢五分人中白即尿桶垢刮取火煅如鹽五錢五倍子二錢白明礬二錢將礬打成塊裝入五倍子內火煅以礬枯為度共為極細末以米泔水洗口然後敷此黃芩湯合天水散治麻後患痢日久不已仍宜清解枯黃芩杭白芍白滑石粉甘草大棗二枚為引水煎熟去滓送後香連丸香連丸治證同前真雅連一兩以吳茱萸五錢同炒去吳茱萸不用南木香五錢銼細末廣陳皮五錢建蓮子去心皮二錢五分共為細末醋打神麯糊為丸如綠豆大每服一錢人參清膈散治麻後咳嗽日久連綿不已官揀參北柴胡當歸身杭白芍淨知母鮮桑葉漂白朮白雲苓炙黃耆地骨皮枯黃芩白滑石熟石膏生甘草生薑一片為引水煎服門冬清肺湯治麻後咳喘不已身熱而煩天門冬麥門冬淨知母鮮桑葉懷生地枯黃芩地骨皮信前胡北沙參炙甘草燈芯為引水煎服溯源解毒湯治乳子出胎後遍身奶麻大當歸懷生地正川芎杭白芍北沙參正川連廣陳皮上揀參淮木通淨連翹生甘草水煎乳母服之不可令兒服
