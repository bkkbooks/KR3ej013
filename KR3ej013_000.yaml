body:
  text: 小引稽自三墳啓祕神聖迭興本草內經昭垂星日蓋聖人繼天立極位育為功念天壤之間陰陽代謝運氣推遷至之先後已無成規應之早遲靡有定律其間六淫勝復釀為災眚哀此蒼黎能無因是而夭扎者此岐伯演十世之傳黃帝啓九章之問而有醫氏之學也伏讀黃帝之謂岐伯曰至哉聖人之道天地大化非夫子孰能通之請藏之靈蘭之室非齋戒不敢示夫聖如軒皇而於醫事崇尚若此豈非痌瘲一體胞與為懷欲登萬世斯人於仁壽者歟素問而下如伊尹湯液皇甫謐甲乙秦越人問難張仲景金匱王叔和脈經陶弘景肘後此數公者雖曰祖述靈素其實以作為述自茲以往醫事寥寥雖著作者代不乏人求其無偏無陂實難多觀惟明末李時珍張景嶽喻嘉言遞出闡明金匱發泄內經掃蕪穢而返清純有功於醫事者不小然數人雖産明代而其書始盛行於康熙初年大為世用蓋由聖天子臨御德孚中外仁協萬方近纂醫宗金鑑遍周海宇將見民無疵癘物遂生成故預産明良以襄位育之功非偶然矣惟幼科一門不無遺憾雖嘉言微啓其端而其言未竟豫每讀驚風之書未嘗不三嘆而流涕也豫幼稟虧多病於醫家色脈之要頓嘗究心長際仙師授金鼎火符性命之祕嗣是遨遊海嶽冀遇同儔竹杖芒鞋行蹤幾半宅內凡紳襟士庶名公巨卿以及至賤至微者蓋嘗隨録而方便之其臨證救治之多有非筆楮所能罄第念驚風之説在在訛傳莫獲辭而正之坐使無辜嬰稚枉受貽殃前後相仍迄無底止茲將驚風之説概為刪訂而附以一得之愚自稟於胎元火功爍艾以及雜證麻痘湯火瘡瘍無不周備匯為六卷計數十萬言書成付梓顏曰幼幼集成其中診治權衡一遵經旨岡或偏枯務期有當於理無害於人而後已非敢妄議前人遂其一隅之見第念保赤誠求不中不遠此書不無萬一之助勿忍終默而息不辭狂瞽請政大方豈曰井海甕天立言啓後亦聊體古聖仁民愛物之心欲自效其負暄之悃云爾時維大清乾隆十五年歲次庚午孟春月羅浮陳復正飛霞氏書於澻陽之種杏草堂凡例一幼科之書幾於汗牛其驚風之傳誠多謬誤喻嘉言陳遠公程鳳雛業已闢之指出病痙惜未申明病痙之由與治痙之法仍無著落不足服人豫茲徹底揭破以傷寒病痙雜病致搐並竭絶脫證分為三則以搐字概之曰誤搐曰類搐曰非搐條分縷晰證治判然名目既正庶治療不惑周虛中曰開此三大法門可濟無窮夭扎一幼科論證悉以陽有餘陰不足立説乖誤相承流禍千古後人誤以嬰兒為一團陽火肆用寒涼傷脾敗胃古初稟受敦龐貽害猶淺今非昔比怯弱者衆古方今病每多齟齬是故聊為刪訂非敢輕前人而執己見蓋亦因時制宜之用也一胎嬰芽嫩之姿乍離母腹如水上漚風前燭防護稍疏立見殤夭而幼科所用毒劣之方令其暗損真元陰陽榮衛即僥幸得生而精神已耗一生虛怯莫可補救況復不生者多茲於劫奪之方毒劣之味概行刪去而易以反正逆從之治無辜赤子或可免含冤於九地一顱囟肇於東漢衛沈而成於宋人錢仲陽其能用仲景地黃湯治賦稟不足以七味白朮散治瀉利作渴豈不卓然有見逮門人某隱其名存厚也假託其名輒用霸方劫奪致人夭枉遂致貽譏後世茲為用其所長去其所短非敢好為節略實所以成仲陽之初志一幼科惟從驚風摹擬而傷寒門類全然遺棄故學者但知有驚風不知有傷寒毫芒千里害豈勝言獨程鳳雛能見及此茲並纂入以備酌用痘疹為幼科切要諸家多不經意或另立一門學人以為源流各別不復留心討論今並纂入使知痘實幼科本有不敢不經心體察一痘科之書如馮氏陳氏聶氏翟氏萬氏雖皆不為無見而實繁簡不侔又惟萬氏明顯可以濟急惜原板毀於明末康熙二年復梓者則亥豕盈篇魯魚過半詩歌叶韻全亡證論先後重復識者鄙之豫甚惜焉因為詳悉刪潤纂入以成全璧一火功為幼科第一要務濟急無捷於此奈從前所傳悉犯關門逐盜之戒不惟無濟而反有害今以異授神火繪圖作歌公諸同志急迫之間可以回春頃刻一治療自有正方其未盡者復以經驗簡方並外治之法附於方後內有起死回生之訣若能留心記覽隨宜酌用其利無窮一是書不但為知醫者設即不知醫者亦能用之蓋理路通暢用方簡切並無幽渺難明之説家置一册可以對證調治自利利人不無小補一是書雖云編輯而幼科家言又未敢盡信以為確其理明義暢有裨實用者取之浮泛不切者去之間有未妥之處即參以鄙見並素所經驗者成全之故難分某段為何人之言非敢掩人之功為己有也蓋幼科非方脈之比以其病因疾苦莫能告人一匕下咽死生立判故不敢不為詳慎是書斟酌去取頗為得宜一是書文義荒疏由豫幼時未嘗學問只以無辜夭扎不忍坐視所以忘其固陋不禁率意言之語雖不倫理虛非誣明者幸毋以是見薄第原其忠愛之心而賜之規正是亦芻蕘之幸也復正再識
