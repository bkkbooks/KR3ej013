front:
  text: 裘序余讀太史公書而嘆越人之善乎方也邯鄲貴婦人則治婦人周貴老人則治老人秦人愛小兒亦即治小兒其施屢變然其所奏亦並效何哉蓋古者卜筮醫藥皆有專官世授其業不遷而為良苟能專其傳精其意通知其理而無所惑則婦人孺子老幼之各得其治吾以為雖不必越人可也後世專業既失凡其治方術者又不能精而多通由此婦人丈夫之與小兒始各為分科而小兒之中又有所為疹者疳者驚風者瘡瘍者與夫他疾多端之分部莊子所云道為天下裂者非耶然世之為小兒醫者雖習其書用其方往往無所效豈其傳於古者法猶有未備而道或猶有所未至也乎嶺南陳君飛霞自幼知醫以治小兒者多所乖誤而弊實中於驚風家言不憚大聲疾呼以闢其謬乃取前代之説存其精要辨其是非訂為一書名之曰幼幼集成其間以搐子易驚字標出誤搐類搐非搐三條既可使天下習驚風之教者廢然自返而又俾從書中所載病因證治循塗守轍庶幾於動無不當投無不宜君之心勤而語懇如此此蓋欲舉天下之幼扶持而安全之令一無夭札而後快也君學仙好道瓢笠灑然吾聞道家者流以老氏為宗老氏言三寶其一曰慈夫慈之為道大矣固不獨幼幼然幼幼則所以為慈君本此意行之而將托是書以為嬰兒孺子之福豈非仁人長者所樂與哉乃因其請而為之序云賜進士出身通奉大夫日講起居注官內閣學士兼禮部侍郎加二級西昌裘日修撰梁序醫之為言意也神存採心之間心可得解口不可得言然則方劑之著無益乎而非也觀乎靈樞素問肇自軒皇嗣是而醫家者流著書立説不一其人家相祖述代有師承於呂稽舊聞諦診視救其偏敗而濟乎夭死厥功偉焉則不事方書乃神於醫者之深造自得而非可以概天下也故醫者濟人之術而方書之作則以得諸心者傳諸世以濟人於無窮也獨是書憑臆見既虞師心之滯於偏書守成規又嫌膠柱而不知變蓋觀一言之誤貽害非輕而嘆方書之難言也雖然為方書難為方書而及幼科則尤難何則呱呱襁褓啼笑無端疾痛疴癢不能自白其臟腑未定則藥物不能多受其筋骨尚脆則針砭尤非易施誤用刀圭便傷生理此鍊師陳君飛霞三折肱於斯道有幼幼集成之作也君少慕沖舉學道羅浮龍虎功能洞然有得於性命之際乃瓢笠雲遊借醫藥以濟世謂世之醫小兒者因前人以傷寒病症稱為驚風訛謬相沿無論外感內傷遇發熱者率以驚風為名而妄用其法致扎傷者多心甚憫焉乃取在昔幼科諸書參互考訂按之臨證之所心得判其合離析其同異以搐字易驚字概曰搐將急驚慢驚慢脾三則易為誤搐類搐非搐分門別類詳其審切之訣附以經驗之方自胎孕乳哺及痘麻瘡瘍諸證胥辨晰而條貫焉將受梓徵敘於余余循覽之下嘆其宅心之良厚而殫精之不辭其瘁也君已疾多奇效有他醫治之垂絶君則曰可生服其藥無不活遇窶人療之不受謝有急需補劑者或更以參朮相資意所不合雖貴富人招之不可致蓋天真疏放不隨俗俯仰故遊情方外而有急病讓夷之思也是編也本長生之妙道作保赤之靈丹其斯為明六度而除四魔以自利利他乎其斯為父天地而母神明憫幼稚之顛連而弘煦嫗於吾胞乎後之業幼科者習於斯而有得將千載榛蕪一朝盡闢以治嬰孩自足以辨析毫芒隨機用巧而利賴靡涯矣余既重君之行高而志厚又信此書之足以行世而行遠而揆諸我夫子懷少之志暨天子恤幼之仁均有合焉爰浣筆以敘其端禮部進士文林郎候選縣尹龍泉梁玉撰
