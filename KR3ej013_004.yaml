body:
  text: 卷四腫滿證治經曰膚脹者寒氣客於皮膚之間腹大身盡腫皮厚按之窅而不起腹色不變此其候也又曰諸濕腫滿皆屬於脾又曰水病下為胕腫腹大上為喘呼不得臥者標本俱病夫腫滿之證悉由脾胃之虛也脾土喜燥而惡濕因中氣素弱脾虛無火故水濕得以乘之而脾愈不運則乳食凝而不化停積於中而腫滿作焉治腫者當以脾胃為本而以浮腫為標斯庶幾矣若以消伐克削為能事未有不致危殆者治腫當分上下經曰面腫者風足腫者濕凡腫自下而起者皆因於風其治在肺宜發散之參蘇飲合五皮湯腫自下而起者因於腎虛水泛或因於脾氣受濕宜滲利之故仲景云治濕不利小便非其治也宜五苓散加防己檳榔一身盡腫者或胎稟不足卒冒風寒或因瘧痢脾虛皆能作腫輕者胃苓丸重者加味胃苓丸當與末條參考凡小兒之腫在表者頭痛身熱此風寒在表宜微汗之五苓散少加麻黃葛根蘇葉杏仁以發之若身無熱五苓散加肉桂膀胱氣化小便利而腫消矣陽水腫身熱大便秘小便赤澀煩躁口渴以五皮湯作煎送沆瀣丹微下之陰水腫身不熱口不渴身冷怯寒二便自調平胃散加白茯苓草果木香藿香凡腫證先起於腹而散於四肢者可治先起於四肢後歸於腹者不可治若小兒元氣本虛復遇大病之後而渾身浮腫四肢冷不渴小便清長大便滑泄不思飲食此陰寒之極脾胃將絕治腫之方俱不可用惟以四君子湯加青化桂炮薑砂仁白蔻以救其脾胃斯可矣昧者但見其腫不知元氣之竭絕而猶消導利水復以舟車禹功暨大戟芫花甘遂劫奪之者此殺人之事慎之戒之入方參蘇飲方見卷三咳嗽門五皮湯方見卷二傷濕門五苓散方見卷二傷暑門胃苓丸方見卷二傷濕門加味胃苓丸即胃苓丸本方加後藥頭面腫初起略加麻黃作喘加桑白皮杏仁小便黃赤加木通身腫加五加皮腹脹加砂仁白蔻丁香枳殼腳冷不溫加附子上青桂防己平胃散方見卷三瘧疾門加味四君子湯治脾敗胃傷陰寒作腫多服自消官揀參一錢漂白朮一錢白雲苓一錢五分上青桂八分黑炮姜一錢西砂仁一錢白豆蔻一錢公丁香三分炙甘草五分大棗三枚水煎半飢溫服以愈為度水腫簡便方凡小兒患腫切須忌鹽鹽助水邪服之愈甚必待腫消之後以鹽煅過少少用之治水腫從腳起入腹則難治用紅飯豆五升水煮極熟取湯四五升溫浸兩膝之下冷則重暖若已入腹以紅豆煮湯日日服之亦消蓋紅豆之功專於行濕利小便故也治腳腫掘杉木根切斷而內色紅者為油杉方可用若切開白色者不堪以紅根切碎煎濃湯將腫腳先熏後洗一二次自消又方以紅糟一大碗加入生薑生蔥三味同煎湯先熏後洗又治頭面手足俱腫用苦葶藶一兩隔紙炒熟研細末以大紅棗蒸過去核取肉和前末杵勻為丸如小豆大每服七粒白湯下日三服五七日則小便多腫自消也忌鹹酸生冷傷寒傷濕腫以羌活切片萊菔子二味等分同炒香取起揀去萊菔不用只以羌活為末每服一錢初日一服二日二服三日三服效腫證氣喘男婦大小腫因積得既取積而腫再作小便不利若再用利藥性寒而小便愈不通矣醫者至此束手蓋中下二焦氣不升降為陰寒痞隔水遂凝而不通用熟附子三錢生薑二錢沉香三分同煎濃湯冷服大人附子一兩生薑六錢沉香磨濃汁以附薑湯對服不拘服數以愈為度身面浮腫坐臥不得取向東桑枝燒灰淋汁煮紅豆數升每飢即食之不得別飲湯水水腫本於脾虛不能制水水積妄行而為腫當以參術補脾為主使脾氣實則能健運而水自行切不可下脹滿證治經曰足太陰虛則鼓脹又曰胃中寒則脹滿又曰濁氣在上則生䐜脹夫脹滿者腹脹氣滿也由於脾肺氣虛不能健運所以作脹也有虛脹實脹熱脹寒脹大抵虛脹冷脹十之七八實脹熱脹十之二三蓋實熱之證人所易見或因傷食或因傷寒入里所以易知而易治虛冷之證由中氣虛衰脾氣不化而脹所以難見而難醫若以虛冷之脹而誤以為實熱之脹治之其變不可勝言矣虛脹者或因吐瀉之後或因服藥攻下太過致成腹脹者宜溫中調氣厚朴溫中湯若虛而兼寒者加附桂實脹者腹中原有食積或飲食過飽固結於中外證則胃口胸前高脹身熱口渴倦臥不語腹痛微喘目閉不開儼然虛極之象小兒此證最多而難識昧者不為詳審見其四肢不舉目閉不開誤以為慢驚而用寧神導痰之藥千中千死無一活者不知大實有羸狀即此是也急宜下之集成沆瀣丹集成三仙丹同服熱脹者或傷寒熱邪入里大便秘結小便短赤渾身壯熱面赤煩躁集成沆瀣丹寒脹者由中氣素寒冷滯鬱結無身熱口渴面唇青手足厥冷氣喘腹脹先以塌氣丸消之後以異功散調其脾胃凡遍身瘡疥因淋洗塗搽逼毒歸內而腹脹者輕則荊防敗毒散升散之重則集成沆瀣丹微利之瘡出脹消者吉瘡不出者凶經謂臟寒生脹滿蓋脾為陰中之至陰因脾濕有餘無陽不能施化如土之久於雨水則為泥矣豈能生育萬物必待和風暖日濕去陽生自然生長也凡此宜以辛熱之藥運用之可也經謂下之則脹已此以濕熱飲食有餘脾胃素實形體氣質壯實者言之也若脾虛內寒而氣不能運精微以成脹者只宜以甘溫補脾為主少佐辛熱以行壅滯之氣庶使脾土健旺脹滿運行斯可愈矣此經之所謂塞因塞用從治之法耳醫者不察乎此惟執下之脹已急於獲效病者喜行利藥以求通快不知暫快一時則真氣愈傷脹滿愈甚去死不遠矣諸家治脹治腫但知行氣利水克削並行輒用猛劑下之此速死之道不知脾氣虛極而腫而脹愈下愈虛惟劫目前之快而陰損真元禍不旋踵後賢幸加意焉入方厚朴溫中湯治胃寒心腹脹紫厚朴一錢五分真廣皮一錢黑薑炭一錢白雲苓一錢草蔻仁五分南木香五分炙甘草五分虛兼寒者加熟附子五分青化桂五分生薑三片塌氣丸治寒氣鬱結肚腹虛脹胡椒仁一兩全蠍尾五錢揀去鉤子洗淨炒乾上以胡椒略去皮取淨一兩炒過和蠍尾研末麵糊丸極小每服一二錢陳皮湯送下集成沆瀣丹方見卷二胎疾門集成三仙丹方見卷二類搐門異功散方見卷二傷食門荊防敗毒散治瘡疥毒氣內陷肚腹作腫荊芥穗北防風淨連翹陳枳殼綠升麻南薄荷川羌活川獨活粉乾葛川木通金銀花片黃芩正川芎黑梔仁炙甘草以上每味各一錢上身腫加蔥三莖下身腫加燈芯十莖水煎服腹脹簡便方治氣脹水脹用羯雞糞乾者一升炒焦黃色出火毒研細末以百沸湯三升淋汁每服一盞調木香檳榔末各五分此中滿蠱毒脹有一無二之方也治食脹氣脹用蘿蔔子一兩研細末水調濾汁用砂仁一兩以蘿蔔子汁浸一宿炒乾又浸又炒共七次為末每服一錢米飲調下黃疸證治經曰身痛而色微黃齒垢黃爪甲上黃黃疸也又曰溺黃赤安臥者黃疸已食如飢者胃疽夫黃疸之證古人多言為濕熱及有五疸之分皆未足以盡之予謂黃之大要亦惟有二曰陽黃曰陰黃而寒熱虛實總括二者之中無餘義矣一陽黃證因濕多成熱熱則生黃此則所謂濕熱證也其證必身熱煩渴或躁擾不寧或消穀善飢或小便熱痛或大便秘結其脈實而有力此證不拘外感風濕內傷食飲皆能致之但察兒之元氣尚強脾胃無損而濕熱果盛者直宜清火邪利小便茵陳五苓散最穩胃苓湯加茵陳亦佳若大便秘結熱甚者集成沆瀣丹一陰黃證全非濕熱而總由氣血之敗蓋氣不生血所以血敗血不華色所以色敗凡病黃而絕無陽證陽脈者便是陰黃或因大病之後或脾胃久虧故脾土之色自現於外其證喜靜惡動喜暗畏明神思困倦言語輕微畏寒少食四肢無力或大便不實小水如膏此皆陽虛之候與濕熱發黃者反如冰炭使非速救元氣大補脾胃終無復元之理且此證最多而昧者不察遂云黃疸同是濕熱而用茵陳梔子清火利水則無有不隨藥而斃者如四君子五君煎溫胃飲是其宜也凡小兒脾胃素弱常有積滯面色多帶黃白不可消積惟以集成肥兒丸多服使脾胃健食自消灌溉臟腑流行榮衛自然五色修明何黃之有小兒黃病昧者一概呼為濕熱無非除濕利水清熱退黃除此之外無別法矣豈知濕熱發黃者少脾虛發黃者多蓋脾土強者足以捍禦濕熱必不生黃惟其脾虛不運所以濕熱乘之治此者無非暫去濕熱茵陳五苓散亦佳黃稍退即速健脾不得屢用消耗而謂有是病用是藥也若面目俱黃而帶虛浮唇白舌淡口不渴身不熱夜無煩熱小便不澀不可認為濕熱而分利之速救脾胃四君子六君是其宜也凡服分利之藥黃久不退以致口淡心慌四肢軟弱憎寒發熱小便帶濁皆為虛甚宜四君子煎送八味地黃丸不可再行分利以致脾敗腎絕而死矣入方茵陳五苓散方見卷二傷濕門胃苓湯加茵陳方見卷二傷濕門此加茵陳一錢集成沆瀣丹方見卷一胎疾門四君子湯方見卷三瘧疾門五君煎治脾胃虛寒嘔吐泄瀉而兼濕者官揀參一錢漂白朮二錢白雲苓二錢炮薑炭一錢炙甘草一錢水一盅半煎服溫胃飲治中寒嘔吐吞酸泄瀉不思飲食官揀參一錢漂白朮二錢白扁豆一錢廣陳皮五分炮薑炭一錢大當歸一錢炙甘草六分水一盅煎七分服集成肥兒丸治小兒脾胃虛弱飲食不消肌膚瘦削如多服能令兒肥此丸久經效驗比諸家肥兒丸功獨甚建蓮肉二兩四錢去心皮炒西砂仁六錢酒炒漂白朮一兩土炒官揀參一錢切片焙乾京楂肉四錢炒杭白芍四錢酒炒廣陳皮四錢酒炒法半夏四錢炒白雲苓一兩乳汁蒸曬真雅連二錢薑製苡仁米六錢炒六神麯六錢炒炙甘草二錢共為細末煉蜜為丸彈子大每日早午晚各服一丸米飲化下六君子湯方見卷二類搐門八味地黃丸方見卷一保產門黃疸簡便方小兒急黃以絲瓜連皮帶子火燒存性研末每服一錢米湯下連進數服愈小兒黃如金色因積滯凝於脾家以糯稻草煎濃湯飲之數次效治小兒黃疸如金取山間薏苡仁根洗極淨煎湯服之自愈治濕熱發黃用生薑半斤茵陳半斤同搗爛以布包之時時周身擦之其黃自退腹痛證治帝曰願聞人之五臟卒痛何氣使然岐伯對曰經脈流行不止環周不休寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛凡病心腹痛者有上中下三焦之別上焦者痛在膈上此即胃脘痛也中焦者在中脘脾胃間病也下焦痛在臍下肝腎病也然有虛實之分不可不辨辨之之法但察其可按者為虛拒按者為實久病者多虛暴病者多實得食稍減者為虛脹滿畏食者為實痛徐而緩莫得其處者為虛痛劇而堅一定不移者為實虛實既確則治有準則夫腹痛之證因邪正交攻與臟氣相擊而作也有冷有熱有蟲痛有食積辨證無訛而施治必效挾冷痛者面色或青或白冷甚者面色暗淡唇口爪甲皆青此脾氣虛寒之極輕者當歸散重者燒脾散有吐瀉者保童丸挾熱痛者面赤壯熱四肢煩手足心熱宜四順清涼散加青皮枳殼大便秘者木香檳榔丸大便調者芍藥甘草湯食積痛者口中氣溫面黃唇白目無精光或白睛多多眠惡食大便酸臭宜三稜丸甚者消積丸下後六君子湯調之蟲痛者面白唇紅六脈洪大心腹疼痛口中涎沫及清水出腹內結聚成團摸之梗起一條小兒脾胃虛者最多此證宜烏梅丸凡腹痛喜手按及熱熨者為虛為寒速宜溫補如手不可按者為實速宜下之入方當歸散治腹痛有寒無熱大當歸一錢五分南木香五分青化桂一錢大揀參一錢炙甘草五分生薑三片大棗三枚水煎溫服燒脾散治傷生冷果菜停積中焦心脾冷痛黑炮姜一錢紫厚朴一錢草蔻仁五分西砂仁一錢六神麯一錢老麥芽一錢真廣皮一錢高良薑五分炙甘草一錢或丸或散或水煎俱可保童丸因傷風冷食積肚疼泄瀉嘔惡官揀參切片焙乾漂白朮土炒紫厚朴姜炒正廣皮酒炒白雲苓炒結豬苓焙宣澤瀉炒藿香葉焙公丁香搗法半夏焙白乾薑炒青化桂去粗白蔻仁炒杭青皮醋炒肉豆蔻煨南木香屑炙甘草各等分共焙燥為細末神麯糊丸彈子大每服一丸米飲化下四順清涼散治挾熱腹痛面赤壯熱四肢煩手足心熱杭白芍二錢白當歸一錢錦莊黃一錢炙甘草五分淨水煎滾熱服芍藥甘草湯此方無論寒熱虛實一切腹痛服之神效白芍藥一根重三錢粉甘草一根重二錢上二味俱要整的用紙七重包之水濕慢火煨熟取起杵爛煎湯服寒月略加肉桂數分更妙三稜丸治食積胃脘痛心腹痛小腹痛癖痛蟲痛京三稜煨蓬莪朮煨半夏曲焙小枳實麩炒正川連姜炒吳茱萸泡正廣皮酒炒杭青皮醋炒南木香屑尖檳榔炒川厚朴薑製川楝肉炒小茴香酒炒共為末神麯糊丸量兒大小加減米飲調服木香檳榔丸方見卷三食積門烏梅丸治胃冷蟲痛攻心嘔吐四肢冷官揀參川黃柏北細辛青化桂川熟附以上各六錢川黃連五錢正花椒大當歸黑薑炭以上各四錢肥烏梅三十個蒸去核收淨肉搗爛共為細末酒蒸烏梅肉搗膏和藥少加煉蜜為丸如芡實大每服一丸水送每日二三服以十分之一水煎服亦可腹痛簡便方治一切胃痛胸痛腹痛腰痛疼如錐刺不可忍者花椒不拘多少研為細末和少麵粉醋和成餅貼於痛處上鋪艾絨用火灸之疼立止一切腹痛不問虛實寒熱皆效用小麥杆燒灰地上出火毒將布包之滾水淋汁一服立止一切疼痛或寒或熱或積食或積血證莫能辨藥不能施有起死回生之妙用生薑一斤搗爛略擠去汁入鍋內炒熱用布分作二包先以一包熨痛處冷即換熱者勿令間斷如姜已干略加前汁拌之又炒又熨痛止乃已凡小兒腹痛摸其肚有一塊梗起者蟲痛也不須用藥惟令大人以手擦揉其塊處久久搓之半日許其蟲將死皆從大便而出痛立止小兒腹痛啼哭不止用南木香明乳香黑沒藥俱去油各五分水煎溫服小兒胎寒腹痛啼哭吐乳大便青色身出冷汗用薑黃一錢南木香乳香沒藥俱去油各三錢共為細末蜜丸芡實大每服一丸薑湯調下小兒盤腸氣痛月內之兒多有之其證腹內如蛙聲啼哭不止者是也蓋寒熱不和臟氣不行用梔仁五錢附子三錢同炒極枯取起揀去附子不用單取梔仁加入白芷一錢為末每服五分小茴香湯下小兒腹痛啼哭不止用乳香一錢去油燈花七枚同為末每服二分乳汁調服小兒蟲痛口流涎沫使君子取肉微炒為末五更時米飲調下小兒腹痛一痛即死者名為蟲痛似癇用乾漆燒灰白蕪荑二味等分為末每五分米飲調下證重者每服一錢小兒盤腸腹痛濃煎蔥湯澆洗兒腹仍以蔥搗爛炒熱作餅貼臍上良久屎出痛止癖積症治經曰新積痛可移者易已積不痛難已也又曰胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣脈宗氣也結而橫有積矣凡飲食之積其漸積者不過以飲食偶傷必在腸胃之內故可行可逐治無難也惟飲食無節以漸留滯者多成癖積於左脅膈膜之間此陽明宗氣所出之道也若飢飽無論飲食疊進以致陽明胃氣一有所逆則陰寒之氣得以乘之而脾不及化故余滯未消並腸外汁沫搏聚不散漸成癥疾矣然其初起甚微人多不覺及其既久則根深蒂固而藥餌難及今西北小兒多有此疾而尤於食麵之鄉為最正以面性多滯而留積於皮裡膜外所以不易治也惟當以漸消磨求法治之幸毋孟浪欲速妄行攻擊徒致胃氣受傷而積仍未及以速其危也癖者血膜化水則癖脅旁時時作痛時發潮熱或寒熱往來似瘧故瘧家多有此證凡瘧疾發過之後必令其熱退極盡方可飲食若熱未盡而飲食之則中脘多蓄黃水日久而成癖積小兒臟腑和平脾胃壯實則榮衛宣暢津液流通縱使多飲水漿不能為病惟脾胃不勝乳哺失調三焦不運水飲停滯冷氣搏之結聚而成癖也體素弱者消癖丸氣壯實者赭石挨癖丸大約有癖之兒虛者居多攻下之藥非可常用即不得已而用之待其略減用消癖丸緩緩消之至為良法入方消癖丸治癖在脅下面黃肌瘦午後發熱似瘧官揀參切片焙乾漂白朮土炒正廣皮酒炒白雲苓乳蒸杭青皮醋炒川厚朴薑製小枳實麩炒法半夏焙西砂仁酒炒六神麯炒陳麥芽炒以上十一味俱各二錢九肋鱉炙三錢京三稜煨蓬莪朮煨炮黑姜以上各一錢青化桂南木香各二錢正雅連薑汁炒二錢共為細末早米粉糊為丸每服一二錢量兒大小加減米飲下以癖消藥止赭石挨癖丸治腹中癖塊或生寒熱或時作痛小兒壯實飲食素強者方宜用之脾胃素弱者切不可服惟以前消癖丸攻補兼施久之自愈代赭石火煅醋淬至酥研末水飛過用杭青皮醋炒蓬莪朮煨南木香銼骨青化桂各三錢巴豆霜去油極淨取霜一錢川大黃二錢上為細末醋煮麵糊丸蘿蔔子大每服五丸淡薑湯送下積癖簡便方治癖積心腹內結如拳及臍腹痛不可忍用莊黃一兩酒蒸炮姜五錢熟附子三錢九肋鱉八錢用好醋將鱉甲煮一時久取起酥炙黃色為度共為細末用三年老米醋一升熬至半升和前末為丸綠豆大每服十丸空心米湯下取下積如魚腦敗血爛肉青泥即愈後用補脾調理按此方藥廉功大比挨癖丸力勝十倍允稱神妙小兒好食茶葉成癖用鮮榧子一斤空心晌午黃昏每服十四粒吃完即愈榧子京果鋪有賣小兒食積結痞塊用大紅棗一斤皮硝一兩同煮以水乾為度曬乾每日食此一棗徐徐服之自消小兒積久而成鱉腹內有形搖頭掉尾大者如杯小者如錢上侵入喉下蝕入肛或附脅脊或隱腸腹用生硫黃研極細末每日老酒調服一錢空心下久服自化硫黃鬚色如初出鵝雛者方可用帶青帶赤帶黑色者皆不堪此物最平穩任多服無礙蟲痛證治經曰腸中有蟲瘕蛟蛔皆不可取以小針又曰飲食者皆入於胃胃中有熱則蟲動蟲動則胃緩胃緩則涎出夫蟲痛者蛔蟲也蓋由小兒脾胃虛弱多食甘肥生冷留而為積積化為蟲動則腹痛發則腫聚一塊痛有來去乍作乍止嘔惡吐涎口出清水久而不治其蟲長至一尺則貫胃傷心殺人矣外證面白唇紅六脈洪大是其候也內有蟲必口饞好甜或喜食泥土茶葉火炭之類宜攻去之檳榔丸小兒蟲痛凡脾胃怯弱者多有此證其攻蟲取積之法卻又未可常用及取蟲之後速宜調補脾胃或集成肥兒丸或烏梅丸或六君子湯多服之以杜蟲之復生入方檳榔丸治小兒一切蟲積能殺諸蟲小檳榔一兩南木香五錢鶴蝨子五錢光貫仲五錢廣錫灰五錢陳漆渣燒灰正輕粉一錢白雷丸二錢巴豆霜一錢以漆渣灰五錢同眾藥研為細末醋煮麵糊丸麻子大每服二十丸五更時苦楝根皮煎湯下集成肥兒丸方見卷四黃癉門烏梅丸方見卷四腹痛門六君子湯方見卷二類搐門下蟲簡便方凡小兒甘肥過度或糖食甜物太多乃致濕熱久停而成積積久生蟲時發腹痛以手摸之腹內有塊或作一條梗起外證面白唇紅六脈浮洪其痛時作時止痛止即能飲食者蟲痛無疑又有腹痛一痛即死者亦是蟲證欲去此蟲無如苦楝根皮誠天下打蟲第一神方其法於月初旬蟲頭向上之時行之先夜掘苦楝根須取每年結子者方是母樹其根浮於土面者有毒不可用專取土中者淨洗泥土以刀刮其紅皮止取白皮四五錢兒大者六七錢切碎聽用次早以油煎雞蛋令兒嗅之以引其蟲頭向上而求食另於別室以水一盞濃煎苦楝皮湯一小杯不可使兒聞其藥氣一聞其氣蟲即潛伏矣俟藥熟以雞蛋與兒食即服藥半日不可飲食俟蟲下後方飲食之服藥後兒似困頓萬萬放心蟲下後精神如舊仍當急為健脾庶蟲不復生永無患矣諸汗證治經曰陽之汗以天地之雨名之又曰陽加於陰謂之汗又曰心為汗夫心之所藏在內者為血在外者為汗蓋汗乃心之液而自汗之證未有不由心腎兩虛而得之者然陰虛陽必湊之故發熱而自汗陽虛陰必湊之故發厥而自汗是皆陰陽偏勝所致也小兒臟腑嬌嫩膚腠未密或重衣厚被致內臟生熱熱搏於心故心液不能自藏而額汗出也額為心之位宜收斂心氣團參湯大病後氣血兩虛津液自汗或潮熱或寒熱發過之後身涼自汗日久令人黃瘦失治則變蒸疳宜黃耆固真湯睡中汗出醒來則止此心虛盜汗宜斂心氣養心血用團參湯睡中遍身有汗覺來久不幹者此食積盜汗脾冷所致益黃散脾虛泄瀉自汗後而遍身冷有時遇瀉則無汗不瀉則有汗此為大虛之候急當補脾理中湯待瀉止黃耆固真湯凡自汗上至胸下至臍此胃虛也當補胃四君子湯加黃耆肺虛自汗面白唇白六脈無力蓋因久嗽脾虛故令自汗四君子湯加麥冬五味傷風自汗宜實表桂枝湯傷寒汗出自頭至頸而止者欲發黃也茵陳湯如有實熱在內煩躁汗出不止者胃實也宜集成沆瀣丹微下之諸汗服藥久不止者用五倍子一個研細末醋和作一小餅貼肚臍以帶扎之效入方團參湯收斂心氣固心血能止自汗官揀參切片焙乾當歸身切片焙乾各二錢上二味分作二服用豶豬心一個切作二片用前藥二錢豬心一片水一盅煎湯空心腹黃耆固真湯治氣虛自汗嫩黃耆一錢官揀參五分漂白朮五分當歸身一錢炙甘草五分天圓肉三枚水煎服益黃散治食積盜汗正廣皮五錢杭青皮四錢訶子肉四錢粉甘草四錢公丁香二錢共為末大兒二錢小者一錢如感冒吐瀉加薑棗同煎服理中湯方見卷二乳子傷寒門四君子湯方見卷三瘧疾門桂枝湯方見卷二小兒傷寒門茵陳蒿湯治頭汗至頸而還將欲發黃茵陳蒿一錢五分川黃柏一錢黑梔仁一錢燈芯十莖水煎滾熱服汗證簡便方凡男婦小兒及產母一切虛證偶然大汗諸藥莫能止者蓋由玄府大開一時難閉所以服藥不能止先將五倍子末醋調作小餅子納入臍中以布扎之然後以舊蒲扇燒灰多加糯米粉和勻以夏布袋裝之自頭至足遍身輕撲之使其粉入毛竅玄府自閉虛汗即止神治也疝氣證治經曰邪客於足厥陰之絡令人卒疝暴痛又曰病在小腹痛不得大小便病名曰疝得之寒故疝氣者寒邪結聚而成也內則臍腹絞痛外則卵丸腫大專屬肝經與腎無涉蓋肝主怒小兒性急多叫哭而得之者此氣動於內謂之氣疝應行氣開鬱初宜柴苓湯升散之次宜加減二陳湯或木香內消丸如因久坐濕地得之者此冷氣入腹謂之寒疝宜溫中散寒加減當歸散茱萸內消丸有腫而不痛由中濕所致卵雖腫而無熱復不痛宜行濕消腫加減守病丸小兒素有疝氣或一年半年發者發則有形外連睪丸內貫小腹腫硬一條如小杵約長五六寸大小便不通宜當歸木香湯小兒木腎腫大不痛連年不消者不早治便為終身痼疾宜茱萸內消丸加牽牛子半生半炒取頭末用更灸臍旁章門穴大效取穴法以本兒手掌第五指本節橫紋對臍中心其中指頭盡處是穴小兒濕地上坐或有蚯蚓吹其卵腫大而垂者以鹽湯浸洗之蓋鹽能殺蚯蚓毒也或以蒼朮煎湯加鹽少許洗之效小兒陰囊生瘡㿉爛者謂之脫囊用紫蘇葉研末敷之以荷葉包之或用生荷葉火烘令軟包之雖囊丸露出亦可治也小兒外腎臊臭時復濕癢柴胡龍膽湯癢甚不可止者胡椒煎湯洗之入方柴苓湯治少陽膽經有邪而病疝官揀參一錢北柴胡一錢五分枯黃芩一錢法半夏一錢漂白朮一錢白雲苓一錢結豬苓一錢宣澤瀉一錢青化桂五分炙甘草五分生薑一片大棗一枚水煎熱服加味二陳湯治性急多哭卵腫痛連小腹謂之氣疝正廣皮法半夏白雲苓小茴香正川芎以上各一錢青化桂炙甘草各五分生薑三片水煎溫服木香內消丸治證如前南木香屑京三稜煨結豬苓焙宣澤瀉炒川楝肉炒正廣皮酒炒香附米酒炒以上各七錢杭青皮醋炒二錢共為末酒煮米糊為丸每服一二錢空心鹽湯下加味當歸散治受寒濕之氣小腹絞痛外腎紅腫並腹痛啼哭等證當歸身一錢五分吳茱萸三分青化桂五分正川芎五分黑薑炭一錢南木香五分小茴香一錢炙甘草五分水煎臨服加鹽七分空心溫服茱萸內消丸治寒濕所襲留伏作痛㿗疝偏墜吳茱萸醋浸一宿焙乾炒過青化桂去皮淨棗皮蒸去核搗元胡索醋炒大茴香鹽炒化橘紅炒杭青皮醋炒以上各一兩桃仁炒白蒺藜炒南木香屑以上各五錢共為細末酒煮麵糊丸龍眼核大每服一丸淡鹽湯送下加減守病丸治卵腫不痛此濕氣也又名木腎漂蒼朮鹽炒制南星炒香白芷焙以上各一兩京楂肉炒正川芎炒廣橘核炒法半夏焙六神麯炒吳茱萸炒以上各二錢五分共為細末酒煮麵糊為丸龍眼核大每服一丸小茴香煎湯化下當歸木香湯治小兒久疝不愈京楂核全當歸正川芎川木通小茴香川楝肉杭青皮結豬苓宣澤瀉以上各一錢南木香黑梔仁各五分上用淨水濃煎空心熱服龍膽湯治小兒外腎臊臭時復濕癢北柴胡一錢二分宣澤瀉一錢車前子八分川木通一錢懷生地一錢當歸尾六分龍膽草五分水煎空心服以飲食壓之疝氣簡便方治小兒疝氣腫痛用荔枝核炒焦五錢大茴香酒炒二錢五分共為細末每服一錢溫酒調下又方不論小兒及男婦一切疝氣以及諸般氣痛用荔枝核四十九個炒焦留白陳皮九錢生硫黃四錢共為末鹽水打麵糊為丸綠豆大遇痛時空心酒研送九丸良久再進一服不過三服全安小兒腎腫硬痛橄欖核荔枝核山楂核三件等分俱燒過存性研末每服一錢空心小茴香湯送下小兒疝氣痛全蠍不拘多少炒焦為末每三分小茴香煎酒送下小兒冷疝作痛陰囊浮腫川楝子去核五錢吳茱萸二錢五分炒研為末酒打麵糊為丸小豆大每服十丸鹽湯化下小兒疝久陰囊堅硬如石名為木腎用栝蔞連皮帶子二錢蓽茇二錢生薑二錢蔥白二錢酒煎熱服被覆暖臥取汗出效啼哭證治小兒初生百日一周之內神安意靜不妄笑多哭者易養如日夜啼哭不止為母者心誠求之渴則飲之飢則哺之痛則摩之癢則抓之其哭止者中其意也如哭不止當以意度之蓋小兒初生性多執拗凡有親狎之人玩弄之物一時不見其心不悅而哭謂之拗哭急與之勿使怒傷肝氣致病也假如又不止請醫視之如大哭晝夜不止者肝熱也瀉青丸如日夜啼哭身熱煩躁者心熱也導赤散俱用燈芯湯服入方瀉青丸此肝經之主藥凡幼科中截風定搐之方多用金石腦麝無益有損惟此方清心平肝疏風涼血凡小兒作熱不退將成風搐或已成風搐但服此丸其應如響方雖古方人不知用予昔遊潭州遇師指授始能用之凡幼科中抱龍保命至保新安金藥蘇合香丸一概不取惟此方為幼科截風定搐之第一神方也川羌活正川芎黑山梔龍膽草全當歸北防風以上俱各一兩錦莊黃五錢上藥合為一處以火烘燥研為細末煉蜜為丸青黛為衣如大豆大每服一二丸清茶化下導赤散治心經有熱一切煩啼不安皆效懷生地二錢川木通一錢五分枯黃芩一錢生粉草五分淡竹葉十四片燈芯十根水煎熱服夜啼證治小兒夜啼有數證有臟寒有心熱有神不安有拗哭此中寒熱不同切宜詳辨臟寒者陰盛於夜至夜則陰極發躁寒甚腹痛以手按其腹則啼止起手又啼外證面青手冷口不吮乳夜啼不歇加減當歸散心熱煩啼者面紅舌赤或舌苔白澀無燈則啼稍息見燈則啼愈甚宜導赤散加麥冬燈芯甚則加川連膽草神不安而啼者睡中驚悸抱母大哭面色紫黑蓋神虛驚悸宜安神丸定其心志及吐瀉後及大病後夜啼亦由心血不足治同上凡夜啼見燈即止者此為點燈習慣乃為拗哭實非病也夜間切勿燃燈任彼啼哭二三夜自定入方加味當歸散方見卷四疝證門導赤散方見卷四啼哭門十味安神丸治神虛驚惕至夜則啼官揀參白茯神大杭冬懷山藥正龍齒煅以上各二錢鏡面砂水飛寒水石水飛粉甘草以上各五分梅花片一分赤金箔十片共為細末煉蜜為丸芡實大每服一丸燈芯湯下夜啼簡便方小兒心熱面赤夜多啼泣硃砂五分牛黃一分共為末每一二分犀角磨湯調下又治同前證夜啼青黛研篩過每服二分燈芯十莖煎湯調服小兒一百二十日內夜啼用蟬蛻四十九個煎去前半截用後半截焙乾燥研末每服四分鉤藤湯下又方用蟬脫十四個去翅足焙乾入硃砂一分共研末蜜調塗母乳頭上令兒吮之納兒口中亦可小兒夜啼不論有餘不足皆有效用五倍子研末口中津唾和作餅子納肚臍以帶扎之效又方以灶心土研末二錢硃砂飛過一錢麝香少許共為末蜜丸綠豆大每服五丸水調下二便證治經曰北方黑氣入通於腎開竅於二陰夫二陰者前陰竅出小便後陰竅出大便又云前陰主氣後陰主血蓋膀胱之津液血所化也由氣而後能出太陰之傳送氣之運也由血而後能潤此便溺之流通見氣血之依附而人之所以為生者以其有此出入關竅耳清陽出上竅謂呼吸也濁陰出下竅謂大小二便也倘一息不運則機緘窮而死矣故二便不通加以腹脹氣喘嘔噦煩躁者不可治也凡二便秘宜八正散外用掩臍法蜜導法則前後俱通矣入方八正散治熱聚下焦二便不通淮木通白滑石黑梔仁車前子瞿麥穗錦莊黃白芒硝萹蓄俱等分看兒大小加減之除大黃芒硝在外將六味水煎極熟加入大黃再煎十數沸取起斟出澄清以芒硝沖服掩臍法治中下二焦積熱大小便秘連須蔥七莖不洗生薑一大塊淡豆豉三錢食鹽三錢同搗爛作一餅銚子烘熱掩肚臍以帛扎定良久氣通二便自利蜜導法治二便不通以此通其大便則下焦氣行而小便自通矣用冬蜜八兩煉至滴水成珠不散入皂角細末二錢和勻稍冷捻如小指大一條外以蔥涎塗上輕輕插入穀道中氣通則便利矣二便不通簡便方大小便不通經二三日危急者以皂角燒灰研末米湯調下一錢立通又方以蜂蜜一盞皮硝一錢白湯一盞空心調下另以皂角於桶內燒煙令兒坐桶上熏之即通又方用草烏一個削去皮略以麝香搽上抹以香油輕插穀道內名霹靂箭至捷二便不通百方不效肚腹脹痛咽喉窒塞或痰壅氣喘水米不下死在須臾宜急救之用甘遂五分麵包煨熟取出為末入麝香三釐搗飯為丸小兒服二分大人五分薑湯送下又方以小竹筒抹以蔥涎插入穀道以芒硝五錢研細香油半盞皂角末少許令人口含灌入穀道中少時即通小便不利證治經曰膀胱者州都之官津液藏焉氣化則能出矣又曰膀胱不利為癃不約為遺溺又曰肝有熱則小便先赤凡小便赤澀為熱小便自遺為寒熱者火有餘水不足治宜瀉心火滋腎水加味導赤散寒者火不足水有餘治宜溫腎水益心火益智散小便不通乃由臟氣虛受熱壅滯宣化不行非塞非痛但閉而不通腹脹緊滿宜五苓散加車前燈芯大病之後氣虛津液不足而小便閉者不可利之利則中氣日虛津液愈涸宜人參散小兒患淋小便淋瀝作痛不必分五種然皆屬火熱宜清利之海金砂散小兒久病氣虛而淋病者不可利小便宜六味地黃丸滋其化源小便自出而不禁者謂之遺尿睡中自出者謂之尿床此皆腎與膀胱虛寒也益智散加附桂龍骨小兒初便黃赤落地良久凝如白膏者謂之尿白傷脾所致久而成疳胃苓丸鹽湯下小兒小便出時色白混濁隨尿而來謂之白濁此心經虛熱宜清心蓮子飲入方加味導赤散治心熱肝熱小便赤澀淮木通懷生地炙草枯黃芩黑梔仁澤瀉北柴胡以上各一錢淡竹葉七片燈芯十莖水煎空心熱服益智散治水有餘火不足而遺溺益智仁五錢鹽水炒補骨脂三錢鹽水炒白雲苓五錢酒炒共為細末每服一錢鹽湯調下五苓散方見卷二暑證門人參散治氣虛津液不足小便不通官揀參一錢大麥冬二錢川黃柏五分炙甘草一錢生薑三片水煎服海金砂散治小兒諸淋皆屬於熱香附米酒炒正川芎酒炒赤茯苓屑炒以上各五錢白滑石水飛一錢陳枳殼炒宣澤瀉焙陳石葦焙尖檳榔炒以上各一錢五分共為細末每服一錢淡鹽湯調下胃苓丸方見卷二濕證門清心蓮子飲專治白濁建蓮子二錢白雲苓一錢五分益智仁一錢遠志肉五分大麥冬一錢官揀參五分石菖蒲五分車前子五分漂白朮六分宣澤瀉四分生甘草三分燈芯十莖水煎空心服小便簡便方凡小便不通服藥無效用商陸五錢研末入麝香少許先以舊夏布蓋於臍上將藥放布上待藥氣入腹一時即通小便數日不通遍身手足腫滿諸藥不應者用蘇葉一斤煎濃湯入腳盆內令患者坐盆上熏之冷則又添熱湯外用炒鹽熨臍上及遍身腫處良久便通腫消而愈又方用連須蔥白一斤搗爛炒熱分作二處各以布包輪流熱熨臍下即通小便閉結不通藥不能效用食鹽一兩調溫水服之良久以指入喉中探吐一吐即通蓋上竅不通下竅閉也又方以皂角研末吹些微入鼻中令其噴嚏亦是上升之意如水注閉其上竅則下竅不通稍升提之即時通矣大便證治經曰太陰司天陰痹大便難陰氣不用病在於腎又曰太陽之勝隱曲不利互引陰股夫飲食之物有入必有出也苟大便不通出入之機幾乎息矣急宜通之使舊谷去而新谷得入然有實閉有虛閉最宜詳審如形實氣實脈實又能食者的有可下之證則下之如八正散承氣湯木香檳榔之類擇而用之中病即止不可過也而形虛氣虛脈虛而兼食少者雖有可下之證宜緩不宜急但用保和丸加枳實微利之如平素便難者血不足也宜潤湯丸蜜導法入方八正散方見卷四二便門承氣湯方見卷二傷寒門木香檳榔丸方見卷三傷食門保和丸方見卷三傷食門潤腸丸治老人虛人小兒產婦大便閉結火麻仁去殼光杏仁去皮光桃仁去皮當歸尾酒潤陳枳殼以上各七錢五分金井膠炒蘿蔔子炒家蘇葉以上各三錢共為細末煉蜜為丸每服一二錢量人加減白湯送下蜜導法方見卷四二便門頭項囟證治經曰頭痛耳鳴九竅不利腸胃之所生也小兒頭囟之證多由脾胃而得又頭為六陽所會七竅居焉故小兒之頭四時宜涼但見頭熱即有病生宜預防之解顱者謂頭縫開解而顱不合也是由稟氣不足先天腎元大虧腎主腦髓腎虧則腦髓不足故顱為之開解然人無腦髓猶樹無根不過千日則成廢人其候多愁少喜目白睛多而㿠白色若成於病後者尤凶宜久服地黃丸外用封囟法囟腫者囟門腫起也脾主肌肉若乳哺不常飢飽無度或寒或熱乘於脾家致使臟腑不調其氣上衝為之填脹囟突而高如物堆垛毛髮短黃骨蒸自汗然亦有寒氣衝上而腫者則牢韌堅硬熱氣衝上而腫者則柔軟紅色然寒腫者十之一熱腫者十之九更有因包裹嚴密蓋覆過厚陽氣不得外出亦令赤腫皆用封囟法熱腫者瀉青丸寒腫者參蘇飲囟陷者有因泄瀉久而氣血虛弱不能上充髓腦故下陷如坑此乃胃虛脾弱之極宜急扶元氣若與枕骨同陷者百無一救此中有稟受父精不足母血虛羸而陷者有因久病而陷者然枕陷尤甚於囟陷二者皆腎元敗絕之證也俱參苓白朮散或八味地黃丸天柱骨倒小兒有色肥壯不為瘦悴孰知形體過肥中氣愈弱是盛於外而歉於內也忽然項軟傾倒者此肝經風熱也小柴胡加粉葛當歸白芍有因久病之後或泄瀉日久忽然頸項傾側名天柱骨倒最為危候速救真元大全大補湯加鹿茸有小兒生下頸便軟者胎氣不足也由稟父之腎元虛敗峻補先天其庶幾矣補腎地黃丸與六君湯間服天柱骨倒之證雖則三條總系真陽大敗之候為小兒之惡證保救真元是其大要外以生筋等藥貼之可也入方六味地黃丸方見卷一胎疾門封囟法治頭縫不合名曰解顱天南星不拘多少以薑汁炒枯研細末醋調塗於絹帛上烘熱貼囟門上以合為度瀉青丸方見四卷啼哭門參蘇飲方見卷三咳嗽門參苓白朮散方見卷三疳證門八味地黃丸方見卷一保產門小柴胡湯方見卷二傷寒門此加粉葛當歸白芍十全大補湯方見卷一保產門補腎地黃湯方見卷三哮喘門六君子湯方見卷二類搐門生脈散治筋軟無力天柱骨倒木鱉子六個蓖麻子六十個並去殼以藥研如泥先抱頭起以手摩其頸令熱津唾調藥塗頸項又方貼項軟生附子去皮二錢生南星去皮臍三錢共研末薑汁調攤貼患處頭項簡便方小兒解顱或因病後忽然囟門寬大頭縫四破此腦髓不充大虛之候用鹿茸防風白芨柏子仁四味各五錢共為末乳汁調作餅貼囟門上一日一換以合為度治小兒囟陷如坑由久病真元不足氣血兩虛大凶之候速宜十全大補加鹿茸薑棗煎服外用狗頭骨炙黃為末雞蛋清調敷之效目病證治經曰諸脈者皆屬於目又曰東方青氣入通於肝開竅於目夫目雖為肝竅而五臟俱備神之所託故白珠屬肺黑珠屬肝瞳仁屬腎兩角屬心上下眼胞屬脾五臟五色各有所司心主赤赤甚者心實熱也赤微者心虛熱也肝主青青甚者肝熱也淡青者肝虛也脾主黃黃甚者脾熱也淡黃者脾虛也目無精光及白睛多而黑睛少者肝腎俱不足也目內赤色心經積熱上攻宜瀉丙火從小便而出導赤散加黃連防風目內黃者脾熱也宜瀉黃散上下眼胞腫者脾經風熱亦同上治目連扎者肝有風也凡病或新或久肝風入目上下左右如風吹兒不能任故連扎也瀉青丸目直視者肝有熱也熱氣入目障其筋脈目之兩角俱緊不能轉運故直視也瀉青丸小兒初生目閉此胎熱也內服生地黃湯外用膽草煎湯洗目上一日七次恐延纏則損目小兒生下眼胞赤爛者由產時拭洗不淨以致穢惡侵漬兩目角故兩胞赤爛至長不瘥真金散小兒久嗽其目兩眶腫黑如物傷損白珠紅赤如血謂之血眼內服瀉白散外用貼法小兒生下數月之內目不見物謂之雀目由肝虛也六味地黃丸常以豬肝煮熟壓藥小兒熱病其目羞明喜暗者風熱也宜疏散風熱清陽散火湯入方導赤散方見四卷啼哭門瀉黃散治脾經積熱白珠生黃藿香梗一錢二分黑梔仁一錢熟石膏一錢北防風一錢炙甘草五分淨水煎半飢服生地黃湯治小兒胎熱初生眼閉不開懷生地一錢五分赤芍藥一錢正川芎五分大當歸一錢天花粉酒炒炙甘草各五分燈芯十莖長流水煎熱服真金散治小兒眼胞赤爛雅川連川黃柏大當歸赤芍藥各二錢光杏仁去皮尖五分上銼碎以乳汁浸一宿飯上蒸過取濃汁點眼內瀉白散治小兒久嗽兩眶黑腫白珠如血芽桔梗炙甘草廣陳皮桑白皮地骨皮各等分水煎熱服貼藥大生地一兩大黑豆一兩二味用水同浸一夜取起搗為膏貼眼皮上其血自散血淚即出腫黑即消六味地黃丸方見卷一胎疾門清陽散火湯治小兒風熱眼疾羞明喜暗小條芩荊芥穗正川芎北防風淨連翹黑梔仁當歸尾熟石膏各一錢川羌活炙甘草各五分燈芯十莖水煎食後服眼目簡便方治目生胬肉赤脈貫瞳白膜遮睛諸般雲翳用白丁香即麻雀屎也倒者為雌雀屎不用取豎立者雄雀屎也不拘多少取來研末水飛過如飛硃砂樣渣滓不用俟藥澄底傾去清水曬乾每以些微同乳汁研化點翳上其翳自去神方也取麻雀屎寺院中暨城樓上有赤眼腫痛用朴硝一撮以碗盛豆腐一塊將硝放豆腐上飯上蒸之俟硝已化去豆腐不用取汁點眼自愈敷火眼及風熱眼生南星五錢紅飯豆五錢共為末取生薑自然汁調作二餅貼兩太陽又敷火眼痛極用大紅棗取肉五六枚蔥三四根共搗如泥作二小餅閉目貼之令其發散蓋眼無風寒必不疼痛以此疏散立時見效昧者以為火眼必用涼藥敷貼而用黃連黃柏之類不知抑遏其火邪不能外出必變眼珠疼痛久不能愈慎之治爛弦風眼百藥不治此方最神用鮮色銅綠三錢研細末以生蜂蜜濃調塗粗碗內要調略干稀則少時流出矣用艾燒煙將碗覆艾煙上熏之須熏至銅綠焦黑為度取起冷定以乳汁調勻飯上蒸過搽眼皮上爛弦處百不失一治眼毛倒睫不起用五倍子為細末蜜調敷眼皮上其睫自起又方以無名異為末紙卷作捻點燈吹滅閉目熏之睫自起赤眼腫痛不消以精豬肉一片如指甲大以水洗淨其血貼於眼皮上良久易一片即消耳病證治經曰北方生寒在臟為腎在竅為耳又曰腎氣通於耳腎和則耳能聞五音矣故耳本屬腎耳珠前屬少陽膽經小兒有因腎經氣實其熱上衝於耳遂使津液壅而為膿或為清汁亦有因沐浴水入耳中灌為聾者內服蔓荊子散外用龍骨散搽之耳珠前後生瘡浸淫不愈者名月蝕瘡俗謂以手指月則令耳之前後生瘡皆用外治之法黃柏散搽之若耳中忽作大痛如有蟲在內奔走或出血水或干痛不可忍者用蛇蛻散有忽然氣塞耳聾此由風入於腦停滯於手太陽經宜疏風清火導赤散加防風或通竅丸耳旁赤腫者熱毒也若不急治必成大癰外用敷毒散內服消毒飲入方蔓荊子散治小兒腎氣上衝灌為聤耳蔓荊子一錢粉乾葛一錢赤芍藥一錢信前胡一錢桑白皮一錢淮木通一錢懷生地一錢杭麥冬一錢赤茯苓三錢綠升麻小甘草各五分燈芯十莖水煎服龍骨散治小兒聤耳流膿出汁以此吹之石龍骨煅明白礬煅真鉛丹炒以上各三錢胭脂胚三錢當門子五釐共為末以綿展干耳內膿水用小竹筒吹藥入耳黃柏散治小兒耳珠前後生瘡浸淫不愈川黃柏白枯礬海螵蛸白滑石石龍骨各等分共為末瘡濕用干搽瘡乾用豬油調搽蛇蛻散治耳中痛不可忍或出血水或干痛用蛇蛻燒灰存性為細末鵝毛管吹入耳中取蛇之善蛻以解散鬱火也導赤散方見卷四啼哭門通竅丸治小兒耳忽暴聾雄磁石煅一錢真麝香五釐共為細末以棗研爛和為一丸如棗核大綿裹塞耳中又以生鐵一小塊熱酒泡過含口內須臾氣即通矣敷毒散治小兒耳旁赤腫熱毒也恐防作癰用綠豆粉不拘多少以老醋調成膏敷腫處干則易之消毒散治小兒耳旁赤腫內服之藥川羌活北防風片黃芩淨連翹芽桔梗官揀參正川芎當歸尾北柴胡各七分小甘草四分生薑一片燈芯十莖水煎服耳病簡便方治小兒無故耳聾取龜尿滴入耳中效或以生麻油日滴三五次數日即愈耳內腫痛流膿出水用虎耳草又名倒垂蓮搗取汁多灌入耳中常常用之此治耳聾之妙藥略加枯礬更妙耳內膿水不幹用千層石榴花焙乾為末以小竹筒吹入耳內耳外生瘡用黃丹一錢松香八分輕粉一分共為細末香油調搽小兒耳後生瘡為腎疳以地骨皮研末篩出嫩末香油調搽粗末煎水洗諸蟲入耳取貓尿滴入耳中其蟲自出若用麻油滴之則蟲死難出取貓尿法以生薑擦其鼻則尿自出一切惡蟲入耳用稻草燒灰淋汁瀝入耳中其蟲即死而出也鼻病證治經曰西方白氣入通於肺開竅於鼻又曰五氣入鼻藏於心肺有病而鼻為之不利也蓋鼻為肺之竅鼻塞者肺氣不通於竅然肺主皮毛風寒外感則肺氣壅閉而鼻塞川芎膏鼻涕者肺為寒風所襲而津液不收則為鼻涕細辛散疏之鼻齆者肺受風寒久而不散膿涕結聚不聞使不聞香臭則齆矣萬金膏以上三證皆宜疏利俱用通氣散鼻乾者心脾有熱上蒸於肺故津液枯竭而干當清熱生津導赤散加麥冬如病已極鼻乾而黑竅張長出冷氣者肺絕也不治之證鼻淵者流涕腥臭此膽移熱於腦又名腦崩宜用辛夷散凡小兒初生三朝一七忽然鼻塞不能吮乳不得呼吸者因乳母夜臥之時不知迴避鼻中出氣吹兒囟門或因洗水未避風寒所以致兒鼻塞通關散鼻衄者五臟積熱所致蓋血隨氣行得熱而妄動溢出於鼻宜涼血降火加減地黃湯外用吹鼻散入方川芎膏治小兒外感風寒肺氣壅閉而鼻塞正川芎三錢北細辛一錢小藁本一錢香白芷三錢炙甘草三錢梅花片當門子光杏仁去皮尖各一錢共為末煉蜜為丸龍眼核大每服一丸燈芯湯化服細辛散治小兒風寒所襲鼻流清涕官揀參信前胡北細辛北防風正川芎炙甘草各等分共為末每服一錢薑蔥湯調服萬金膏治小兒風熱侵肺鼻齆不聞香臭川羌活正川芎北細辛淮木通淨麻黃石菖蒲各一錢共為末每服一錢以蜜和勻薑湯化服麗澤通氣散治小兒鼻塞鼻涕鼻齆川羌活川獨活漂蒼朮北防風綠升麻荊芥穗粉乾葛香白芷正川芎淮木通以上各二錢淨麻黃北細辛炙甘草以上各五分生薑三片大棗三枚水煎食後服辛夷散治小兒鼻流濁涕而腥臭辛夷仁五錢蒼耳子炒二錢五分香白芷二錢薄荷葉一錢雅黃連二錢共曬乾為末每服一錢蔥湯調下通關散治乳子鼻塞不能吮乳香附子正川芎荊芥穗直殭蠶北細辛豬牙皂以上各五錢共為細末以蔥白搗成膏每用藥末五錢與蔥膏和勻攤軟帛上臨臥烘熱貼兒囟門上早晨取去加減地黃湯治小兒鼻中出血懷生地二錢片黃芩二錢黑梔仁二錢赤芍藥一錢白茅根一錢水煎空心熱服吹鼻散治小兒鼻中出血黑梔仁炒亂油發燒存性各等分共為極細末以些微吹鼻中鼻病簡便方鼻疳破爛用杏仁去皮尖以紙包壓去油以成白粉為度每杏仁粉二分對真輕粉一錢和勻吹患處鼻流濁涕不止名曰鼻淵乃風熱在腦故也用蒼耳子炒辛夷仁白芷薄荷等分為細末每用一錢臨臥蔥湯調服不以數拘以愈為度鼻中流臭黃水名控腦沙用紫貝子俗名南蛇牙齒粵人呼狗屐螺取二三枚火煅醋淬為末紙包放地上去火毒每服一錢大人二錢以絲瓜藤煎湯調藥空心服以愈為度鼻被破傷或擦落急以貓兒頭上毛剪碎以口中津唾調敷之自愈疳瘡蝕鼻破爛不堪用五倍子燒灰存性研末以臘豬油和塗之口瘡證治經曰中央黃色入通於脾開竅於口又曰脾氣通於口脾和口能知五味矣故口者脾之外候凡鵝口者口內白屑滿舌如鵝之口此肺熱而心脾為甚故發於口也內服沆瀣丹外以保命散吹之口瘡者滿口赤爛此因胎稟本厚養育過溫心脾積熱熏蒸於上以成口瘡內服沆瀣丹外以地雞擂水搽瘡上地雞即扁蟲人家磚下有之口糜者滿口生瘡潰爛乃膀胱移熱於小腸膈腸不便上為口糜以導赤散去小腸之熱五苓散去膀胱之熱當以二方合服口瘡服涼藥不效乃肝脾之氣不足虛火泛上而無制宜理中湯收其浮游之火外以上桂末吹之若吐瀉後口中生瘡亦是虛火理中湯昧者以為口瘡悉為實熱概用寒涼必不救上齶有脹起如懸癰者此名重齶由脾胃挾熱氣血不能收斂而成用針刺去惡血內服沆瀣丹外以碧雪吹之小兒兩頤流涎浸漬胸前者此名滯頤蓋涎者脾之液口為脾竅脾胃虛寒不能收斂津液故涎從口出而滯於頤宜溫脾丹小兒口頻撮者氣不和也蓋唇應乎脾氣出於肺脾虛不能生肺故口頻撮異功散補脾生肺愈矣小兒口撮面青多哭此陰寒之至肝脾虛冷臍下痛也理中湯溫之小兒急欲吮乳而口不能吮者心脾有熱舌不轉運瀉黃散清之入方集成沆瀣丹方見卷一胎疾門保命散治小兒鵝口瘡箭頭砂枯白礬明牙硝三味俱五錢共為細末吹之導赤散方見卷四啼哭門五苓散方見卷二傷暑門理中湯方見卷二乳子傷寒門碧雪散治小兒懸癰重齶茸蒲黃洋青黛白硼砂明牙硝生甘草各等分共為細末吹之溫脾丹治小兒脾冷流涎浸漬頤間南木香法半夏各三錢黑炮姜漂白朮各三錢廣陳皮杭青皮各一錢上為末煉蜜為丸龍眼核大每服一丸米飲下異功散方見卷三傷食門瀉黃散治小兒心脾有熱舌不轉運不能吮乳赤茯苓片黃芩川黃柏川黃連黑梔仁宣澤瀉茵陳蒿各一錢燈芯十莖水煎熱服口瘡簡便方口瘡破爛並治咽喉喉癬喉癰用鳳凰衣即伏雞子殼內皮也微火焙黃橄欖燒存性兒茶三味俱等分共為末以一錢為則加冰片五釐口疳搽患處喉病吹入之即能進飲食口瘡久不愈虛火也用生附子一個切焙為末醋和作餅男左女右貼腳心引火下行自愈小兒口角生瘡名燕口瘡以亂髮燒灰存性米飲調服外即以此敷之又方蒸飯時收甑蓋上流下氣水搽之即愈口唇腫黑癢痛不可忍先以磁鋒砭去惡血以古銅錢磨豬油塗之治走馬牙疳及各樣口疳多年田野中白螺螄殼研爛少加兒茶共為細末吹患處即愈口疳瘡及咽喉疼痛用吳茱萸二兩研末少加麵粉醋調作二餅貼於足心以布扎之過夜即愈舌病證治經曰南方生熱熱生火火生心心主舌在竅為舌又曰心氣通於舌心和則舌能知五味矣夫舌為心之苗胃之根小兒多生舌病以心脾之積熱也故有重舌木舌弄舌舌胎等證宜辨其虛實而治之重舌者心脾有熱蓋脾之大絡出於舌下有熱則氣血俱盛附舌根下忽重生一舌而短小內服沆瀣丹外以針刺去惡血用蒲黃黃柏末敷之木舌者心脾積熱之氣上衝故令舌腫漸漸長大塞滿口中若不急救必致害人內服沆瀣丹外以針刺去惡血以碧雪散竹瀝調勻敷之弄舌者脾臟虛熱令舌絡緊時時舔舌俗人稱為蛇絲驚者是也切勿以寒涼攻下治之少與瀉黃散服之不效四君子湯或渴欲飲水面無紅赤色此脾胃津液不足不可誤認為熱宜七味白朮散面黃肌瘦五心煩熱而弄舌者此疳證也須從疳證門參考宜集聖丸大病後精神困倦飲食少思而弄舌者凶候蓋氣血兩虛精神將脫速以十全大補湯挽救之舌上黑苔其熱已劇急以薄荷煎湯洗之如舌轉紅色者可治涼膈散下之洗不紅者不治泄瀉後舌上白苔此津液不深不能上潮於口為虛熱也理中湯入方集成沆瀣丹方見卷一胎疾門碧雪散方見卷四口瘡門瀉黃散方見卷四口瘡門七味白朮散方見卷三泄瀉門集聖丸方見卷三疳證門十全大補湯方見卷一保產門涼膈散治心脾有熱舌上黑苔淨連翹一錢黑梔仁六分錦大黃五分薄荷葉六分片黃芩六分芒硝五分生甘草四分竹葉七片燈芯十莖水煎臨服加生蜜十匙對服舌病簡便方治重舌木舌腫滿強硬或疼不止不能言語宜用粗針線扎箸頭上刺患處甚者數十刺為妙只針舌尖及舌兩旁舌中心及舌下切不可針犯之令出血不止其刺出之血以紅色者毒輕紫色者為重黑色者最危仍以蒲黃研末擦舌上即消舌或脹大腫硬即時氣絕名為翣舌翣衫入聲用皂礬不拘多少新瓦上以火煅變紅色為度放地上候冷研細搽舌上立愈重舌木舌皆效翣蔽根之飾謂如翣之蔽大相上也舌腫滿不能出聲以梅花冰片研爛敷之或以食鹽百草霜共為末井水調敷即效絆舌者舌根下有筋一條絆其舌尖令舌短縮不能吮乳細視之明見舌根之下有筋如線牽絆其舌用針輕輕挑斷之挑時但挑此筋不可誤傷舌根為禍不小曾見愚婦以刀割斷之誤傷舌根流血不止而死舌斷能重生用活蟹一隻炙乾為末敷之此方至神至驗齒牙證治經曰天有列星人有齒牙又曰手陽明之脈入下齒中足陽明之脈入上齒中故知上牙屬胃下牙屬大腸齒屬腎凡齒生遲者腎氣不足也蓋腎主骨齒者骨之餘腎不足則髓虧不能充乎齒所以齒遲宜地黃丸上下牙床腫者此手足陽明實熱也涼膈散為君加知母石膏升麻為佐頻頻含咽重齦者腎臟積熱附齦而腫痛也以針刺去其血用鹽湯洗淨黃柏為末敷之效小兒有多食肥肉齒牙臭爛不可近者名為鼻息此胃膈實熱也內服沆瀣丹外以荊瀝和薑汁含嗽牙疳者初作臭氣次則齒牙黑甚則齦肉爛而出血名為宣露此由腎熱其氣直奔上焦故以走馬為喻宜速治之若上下唇破鼻穿齒落者名曰崩沙氣喘痰潮飲食減小則不可治內服沆瀣丹外以如聖散敷之夢中咬牙風熱也由手足陽明二經積熱生風故令相擊而有聲也必在夢中者風屬陽動則風行於陽靜則風歸於里也宣風散咬牙一證惟痘疹見此為危候余則皆無大害亦有因病戰慄鼓頷而鬥牙者治其本證則自止也牙齒落後不復生者由於舌舔之故其肉頑厚用針刺去其血以鼠骨散搽之自生入方六味地黃丸方見卷一胎疾門涼膈散方見卷四舌病門如聖散治小兒走馬疳並崩沙宣露用婦人尿桶中白垢刮下瓦上煅至煙盡一錢銅綠二分麝香半分共為末先以蠟樹葉浸米泔水洗淨後搽此藥宣風散治夢中咬牙尖檳榔五錢廣陳皮一兩五錢炙甘草五錢共為末每服一二錢蜜湯調空心服鼠骨散治小兒齒落不生用雄鼠一隻爛去皮取全骨炙枯研細末加麝香一分擦刺處良久以薑湯漱之齒病簡便方牙齦潰爛諸藥不效者以鹽欖二三個連皮帶核火中煅過存性加冰片半分搽之神效走馬牙疳臭爛出血紅棗三枚去核以明雄研末填滿棗內新瓦盛之火煅存性研末搽之又方鳳凰衣未得見水者焙黃少加枯礬共為細末搽之咽喉證治經曰咽喉者水穀之道也喉嚨者氣之所以上下者也又曰一陰一陽結謂之喉痹蓋咽者胃管主納水穀而居後喉者肺管專主呼吸而居前為人一身之總要若胸膈鬱積熱毒致生風痰壅滯不散發於咽喉病名雖多無非熱毒速宜清解緩則有難救之患輕則甘桔湯重則化毒湯如痘瘡咽喉痛者毒氣上攻也加減甘桔湯喉中生瘡不能吮乳化毒湯小兒為諸骨所哽骨大難嚥者以鵝毛掃咽吐之骨小者用海上方治之入方甘桔湯治小兒胸膈積熱致生風痰而患喉痹粉甘草四錢芽桔梗四錢以淨水煎細細嚥之化毒湯治小兒咽喉證危迫者芽桔梗南薄荷各一錢荊芥穗炙甘草各一錢五分白芒硝一兩山豆根一錢五分馬牙硝白硼砂各二錢五分明雄黃鏡面砂各一錢共為細末每服一錢白湯調下仍以此藥吹喉中海上方治小兒諸骨所哽用金鳳花根搗碎以米醋濃煎用有嘴瓶盛之口銜瓶嘴仰面吸藥吞之其骨即下吞藥勿令沾牙又或以玉簪花根亦可如上法咽之咽喉簡便方治喉閉乳蛾用雞內金勿洗陰乾燒過存性研末以小竹筒吹之即破而愈雞內金即雞肚腹內肫皮也咽喉內生瘡鼻孔內赤爛若作喉風治立死用白霜梅一個燒存性枯礬一錢穿山甲炙枯一錢共為細末吹喉中神效喉瘡已破瘡口疼痛難進乳食用豬腦髓蒸熟姜醋調和服之自愈咽中結核不通水食危困欲死用百草霜以蜜和丸如芡實大每一丸白湯化開灌之甚者不過二次愈誤吞針用磁石研末以黃蠟熔化和丸如豆大吞下針共丸藥同從大便出誤吞銅錢金銀釵環之類只以米糖多服之久之自出誤吞銅錢生慈菇搗汁多飲自然消化生荸薺搗汁飲更妙誤吞竹木及魚骨哽咽不下用象牙磨濃汁調服若吞鐵鉤子以沙糖拌象牙末服治諸骨哽咽不下用葳靈仙三錢煎湯頻頻咽之其骨即軟如綿而下諸骨哽咽用狗一隻倒吊取口涎徐徐與咽即化又或以狗涎半盞沙糖半盞調服立消凡誤吞金銀銅鐵之類以鹽欖燒灰研末水調下其物即出此方經驗極多凡諸骨哽咽谷樹葉搗爛取汁服其骨自軟而出蓋葳靈仙谷樹葉楮實子皆能軟骨故也龜胸龜背證治龜胸者胸高脹滿形如覆掌多因乳母多服五辛酒面炙煿之類或夏月熱乳宿乳與兒蓋兒肺氣最清為諸臟華蓋日久痰滯則生風熱肺受火邪則胸骨脹起麻痘之後多有此證宜清肺降火杏仁煎龜背生下不能保護以客風入於骨髓或兒坐早勞傷氣血或咳嗽久以致肺虛而腎亦無所生矣腎主骨風寒乘虛而入於骨髓致精血不能流通故成龜背宜松蕊丹外以龜尿塗法此從前所論證治也予按龜胸有治龜背乃不治之證前人證治猶有未善雖曰客風入骨坐早勞傷咳嗽肺虛然未窺其病源無非以現在者言之也凡小兒稟受真元足者嘗見其赤身裸體當風露坐半周之後坐以座欄從未聞有客風入骨坐早勞傷嗽久而病龜背之說此證蓋由稟父母精髓不足元陽虧損者多有之不觀小兒龜背正在命門之間漸次骨節浮露其腰如弓實因骨痿不能支撐之故豈風邪為患哉此證百不一救原無治法而前人強立松蕊丹反用麻黃大黃獨活防風一派攻伐之藥適足以速其殤也若以鄙見但當以六味地黃丸加上桂鹿茸救其先天復以四君六君之類扶其胃氣或可十中保一除此之外並無治法若謂松蕊丹能治龜背吾不信也入方杏仁煎治小兒肺受熱邪而患龜胸錦大黃好酒九蒸九曬天門冬去心真杏仁去皮尖取淨仁淮木通各一錢二分桑白皮甜葶藶熟石膏各八分水煎臨臥時服加增分兩以蜜為丸徐服更妙松蕊丹治小兒龜背姑存之可也黃松花陳枳殼北防風川獨活以上各一兩淨麻黃信前胡川大黃青化桂以上各五錢為末蜜丸綠豆大每服十丸米飲下六味地黃丸方見卷一胎疾門四君子湯方見卷三瘧疾門六君子湯方見卷二類搐門鶴膝證治小兒鶴膝因稟受腎虛血氣不充以致肌肉瘦削形如鶴膝外色不變膝內作痛屈伸艱難若焮腫色赤而作膿者為外因可治若腫硬色白不作膿者是屬本性難治屬外因者十全大補湯加蒼朮黃柏防己屬本性者以六味地黃丸加鹿茸補其精血仍須調補脾胃以助生化之源入方十全大補湯方見卷一保產門此加蒼朮黃柏防己六味地黃丸方見卷一胎疾門五軟五硬證治小兒生後有五軟五硬之證乃胎元怯弱稟受先天陽氣不足不耐寒暑少為六淫所犯便爾五軟見焉五軟者頭項軟身體軟口軟肌肉軟手足軟是為五軟然頭項軟肝腎病也肝主筋腎主骨肝腎不足故頭項軟而無力手足軟脾胃病也脾主四肢脾胃不足故手軟而懶於握足軟而慵於步也身體軟陽衰髓怯遍身羸弱而不能強立口軟者虛舌出口而懶於言肌肉軟者肉少皮寬肌體虛尪之象也總之本於先天不足宜地黃丸以補肝腎而更所重者在胃蓋胃為五臟六腑之化源宜補中益氣升舉其脾氣倘得脾胃一旺則臟氣有所稟諸軟之證其庶幾矣五硬者手硬腳硬腰硬肉硬頸硬也仰頭取氣難以動搖氣壅疼痛連於胸膈手心腳心冰冷而硬此陽氣不榮四末也為獨陰無陽難治若肚筋青急乃木乘土位俱宜六君子湯加薑桂升麻柴胡以補脾平肝若面青而小腹硬者不治入方六味地黃丸方見卷一胎疾門此加鹿茸上桂補中益氣湯方見卷一保產門六君子湯方見卷二類搐門此加乾薑上桂升麻柴胡丹毒證治小兒赤遊丹毒皆由心火內壅熱與血搏或起於手足或發於頭面胸背遊移上下其熱如火痛不可言赤如丹砂故名丹毒凡自腹出四肢者易治自四肢入腹者難治治丹之法先用辛涼解表使毒漸消方可搽敷若先不解毒遽用搽敷必逼毒入腹以致不救小兒一歲以外者易治未周歲者難治治之得法無論大小予嘗治百日內外火丹從陰囊下起按法治之三日後陰囊蛻去一殼而愈小兒十種丹毒如三日不治攻入腸胃則不救宜逐一辨認依方治之百不失一凡治丹毒俱宜先服防風升麻湯以解毒發表次用磁鋒針去其血則毒隨血散至神至捷百發百中入方防風升麻湯總治十種丹毒北防風綠升麻黑梔仁大麥冬荊芥穗淮木通粉乾葛南薄荷潤玄參牛蒡子以上各一錢粉甘草五分燈心十莖水煎熱服便閉加大黃利之瓷針砭法用上清瓷器輕輕敲破取其鋒銳者一枚將箸頭劈破橫夾瓷針露鋒於外將線紮緊以瓷鋒正對丹毒之處另以箸一條於瓷鋒箸上輕輕敲之其血自出多刺更妙毒血出盡立時見功治丹若不砭去惡血專用搽敷十不救一十種丹證一飛灶丹從頭項起腫然後散開先用蔥白搗取自然汁塗之效二走灶丹從頭項起紅腫痛苦異常用紅飯豆研末雞蛋清調塗三鬼火丹從面部起紅腫用灶心土研為細末雞蛋清調塗四天火丹從背上起赤點用桑白皮切碎焙乾為細末羊油調塗五天灶丹從兩臂赤腫黃色起用柳木燒炭研末淨水調塗六水丹先從兩脅起赤腫用多年鏽鐵磨濃汁豬油調塗七葫蘆丹先從臍下起用尖檳榔切碎焙乾研末米醋調塗八野火丹先從兩腳起紅腫用乳香去油研末以羊油調塗九煙火丹從腳背上起紅腫用豬槽下土研末麻油調塗十胡漏丹從陰囊下起紅腫用門檻下千腳土研末羊油調塗更有胎毒重者遍體皆是速用蕓薹子即油菜子也秤過一兩酒一大壺和研濾去渣取酒復煎數沸不拘時溫服一盞又方蕓薹菜即油菜也取菜葉搗爛敷之隨手即消如無生菜乾者為末水調敷凡丹毒遍身或連腰周匝百方不能治者惟此最神水痘露丹水痘似正痘外候面紅唇赤眼光如水咳嗽噴嚏涕唾稠黏身熱二三日而出明淨如水泡形如小豆皮薄痂結中心圓暈更少易出易靨溫之則痂難落而成爛瘡切忌姜椒辣物並沐浴冷水犯之則成姜芥水腫自始至終惟小麥湯為準小兒生後百日內外半歲以上忽然眼胞紅腫面青黯色夜間煩啼臉如胭脂此因伏熱在內發之於外初則滿面如水痘腳微紅而不壯出沒無定次至頸項赤如丹砂名為露丹以三解散疏散之入方小麥湯治小兒水痘白滑石地骨皮生甘草各五分官揀參川大黃淨知母川羌活各四分葶藶子五分小麥一十四粒引水煎熱服三解散治露丹官揀參北防風明天麻川鬱金節白附錦莊黃枯黃芩直殭蠶北全蠍陳枳殼南薄荷京赤芍小甘草隨宜加減燈芯十莖水煎熱服破傷風證小兒或因跌僕或刀斧破傷風邪暗襲傷處發腫謂之破傷風速宜治之不然則發痙矣內服疏風活血散外以紫金錠塗之疏風活血散治小兒破傷風已痙未痙者皆治全當歸懷生地赤芍藥北防風以上各一錢二分鮮紅花大川芎廣蘇木炙甘草以上各六分生薑三片大棗一枚水煎熱服紫金錠山慈姑三兩五倍子三兩芽大戟一兩五錢明雄黃鏡辰砂各一兩真麝香三錢共為細末糯米飲和藥為錠磨水塗之癍疹證治小兒癍與疹宜分證候陰陽其焮腫於外者屬少陽相火謂之癍其證發於面部或背部或四肢極其稠密色如錦紋紅赤者胃熱也紫黑者胃爛也宜消癍青黛飲其紅點發於皮膚之內不出者屬少陰君火謂之疹其證發於胸腹手足稀而少者此由無根失守之火聚於胸中上蒸於肺隱於皮膚而成小疹其狀如蚊跡蚤斑而非錦紋也理中湯癍疹自吐瀉者慎勿止之因其毒氣從上下出宜調中氣若吐瀉後遍身發熱癍如錦紋者恐防熱氣乘虛入胃其夏月多有此證化癍湯癮疹多屬於脾以其隱隱在皮膚之間發而多癢或不紅者俗人名為風丹加味羌活散又方消斑青黛飲治陽毒發斑正雅連熟石膏淨知母北柴胡黑梔仁潤玄參綠升麻懷生地片黃芩以上俱各一錢官揀參洋青黛炙甘草各五分生薑三片豆豉二十一粒水煎熱服化斑湯即人參白虎湯治陽明胃熱發斑官揀參一錢熟石膏四錢淨知母二錢炙甘草一錢淡竹葉一錢粳米一撮水煎熱服加味羌活散治癮疹作癢世俗謂發風丹者是也川羌活信前胡芽桔梗蘇薄荷陳枳殼明天麻香白芷正川芎淨蟬蛻以上俱各一錢官揀參炙甘草各五分生薑三片水煎熱服搽藥方蕓薹菜搗爛取汁生鐵鏽生大黃等分研末以蕓薹汁調塗之諸瘡證治經曰諸痛癢瘡瘍皆屬心火世間瘡瘍癤疥惟小兒最多豈其稚陽純氣易與歲運火政相乘耶抑不識不知而寒溫動定之乘其道耶復有父母之遺毒為兒終身之害者可不有以治之乎小兒初生遍身蟲疥與乎流水風瘡一皆胎毒也切勿外治宜內服胡麻丸倘誤用搽洗逼毒入腹以致腹脹危候也急服解毒湯為佳凡頭面遍體有瘡原未搽洗而瘡忽自平更加痰喘氣急者切不可下宜連翹丸解托之小兒未過周歲無論一切瘡疥皆不宜搽洗總以胡麻丸為主治至穩小兒生癰毒腫癤皆氣血凝而火熱乘之內服大補湯外以紫金錠塗之頸上結核腫脹發熱者內服胡麻丸外以五倍子為末醋水調敷一日二易為妙入方胡麻丸治小兒風瘡疥癬嫩苦參五錢何首烏蒸胡麻仁炒蔓荊子炒葳靈仙炒荊芥穗焙皂角刺炒以上各三錢石菖蒲炒白菊花各二錢上為細末酒打米糊丸每一二錢量兒大小竹葉煎湯調下解毒湯治小兒瘡疥誤用搽洗逼毒入腹以此托之潤元參淨連翹綠升麻片黃芩京赤芍全當歸川羌活北防風懷生地荊芥穗淮木通以上各一錢炙甘草五分燈芯十莖水煎熱服大便秘加酒大黃連翹丸治小兒瘡疥毒陷入里以此托之淨連翹桑白皮白頭翁粉丹皮北防風川黃柏青化桂淡豆豉海螵蛸軟秦艽川獨活以上各三錢上為細末煉蜜為丸龍眼核大每一丸燈芯湯下大補湯治小兒或生癰疽出膿之後或頑瘡破爛久不收口凡一切癰瘍皆屬不足切不可再用寒涼官揀參一錢嫩黃耆正川芎淨連翹香白芷白雲苓大歸身漂白朮懷生地赤芍藥炙甘草以上俱各二分生薑三片大棗三枚水煎半飢服每日一劑瘰癧證治小兒瘰癧由肝膽二經風熱血燥而成蓋二經常多氣少血倘怒則肝火動而血熱腎陰虛則不生木而血燥燥則筋病累累然結若貫珠其候多生於耳之前後連及頤項下至缺盆及胸腋之側又謂之馬刀初起如豆粒漸如梅李或一粒或數粒按之則動而微痛不甚熱久之則日益以甚或頸項強痛或午後微熱或夜間口乾飲食少思四肢倦怠或堅而不潰或潰而不合皆由氣血不足往往變成疳癆此證本非外科切忌刀針爛藥取去其核昧者不識病源誤用爛藥取核不知肝膽二經內有相火抑鬱不伸而生瘰癧為之益氣養榮舒筋散郁猶恐不暇何敢用刀針爛藥以致破爛不收膿血交併耶予目擊其誤治致死者不可勝紀凡小兒患癧不可妄治只宜內服單方切忌取核慎之戒之凡小兒頸項結核或三五粒十數粒或痛或不痛或熱或不熱用牆根下鳳尾草梗如鐵線而黑葉似鳳尾本草內名石長生即牆縫中所生小蕨箕也單取其根水洗淨每用一兩以糯米濃酒一碗瓦瓶濃煎去渣服酒每日一服勿求速效多則一月少則二十日其核全消再不復發此藥氣味平淡更不苦寒實為神授藥賤而功弘誠仙方也凡小兒耳之前後忽有瘡作核如杏核大小不一名馬刀瘡為瘰癧之根用桃樹白皮切三指大一塊刮去外皮留內一層貼瘡上以艾炷於桃皮上灸之覺熱痛即止毋令傷皮明日又灸不數次而核消矣治小兒瘰癧未潰者令內消已破者能收口服此一月痊愈用直殭蠶半斤先用清水洗三次去石灰淨曬乾炒枯另將晚米半斤炒熟共研細末米糊為丸重一錢一顆每日空心時以夏枯草煎湯兒大者二丸小者一丸研爛調服常須以甘肥葷潤之物滋澤之入方紫霞膏治瘰癧初起未成者貼之自消已成者貼之自潰已潰核存者貼之自脫並治諸色頑瘡破爛不愈疼痛不已者俱皆神效用明淨松香一斤研末鮮色銅綠二兩研末以真麻油四兩入鍋內先煎數沸滴水中不散方下松香熬化次下銅綠煎至白煙將盡其膏已成退火傾入瓷罐收之凡用時於熱湯內燉熔旋攤旋貼集成白玉丹專治瘰癧破爛多年不愈連及胸腋老子曰下士聞道大笑之不笑不足以為道此則世人聞方大笑之不笑不足以為方藥則至賤不堪功則神丹莫並專治瘰癧破爛連及胸腋臭穢難聞三五載十數載不愈者藥到病起用新出窯礦石灰一塊滴水化開成粉用生桐油調勻乾溼得中先以花椒蔥煎湯洗淨其瘡以此塗之不數日痊愈真奇事也昔予道門一友患瘰癧爛及胸腋十數載不愈一愚人傳此方用之立應後以冶人無不愈者誠仙方也楊梅瘡證治夫梅瘡一證以其腫突紅爛狀如楊梅故爾名之西北人名天泡瘡東南則名棉花瘡蓋小兒患此者實由於父母貽毒傳染而致也然非尋常胎毒之可比蓋青樓豔質柳巷妖姬每多患此而少年意興誤墮術中由泄精之後毒氣從精道乘虛直透命門以灌衝脈所以外而皮毛內著筋骨凡衝脈所到之處無不受毒此其為毒最深最惡設初起之時治不如法去毒未淨而隨至敗壞殞生者有之矣或遺毒兒女以致生而不育者有之矣世人見此惡道而不寒心知避者愚亦甚矣小兒亦有不因遺毒而成蓋因偶傷濕熱即或患此亦不過在皮膚肌肉之間而已治之者能知清熱解毒除濕自必痊愈無足慮也附案予高友少年不慎嘗發梅瘡治不如法以致毒氣內伏外雖愈而內成結毒每夏月則手心多現紫疹如鵝掌風樣及其生子皆於月內二十七日必發此毒初從陰囊之下紅癍數點似火丹之狀不數日則延及遍體皮肉潰爛形類火燒晝夜啼號諸藥莫救延至半月則精神竭脫而死連生三子有如一轍友悔恨無及力懇於予予雖感其誠敬而實不得其法因靜思熟計恍然有得蓋此毒從泄精後乘虛透入命門直灌衝脈已為負隅之虎矣而且盤踞多年根深蒂固何可動搖倘剿捕不得其法反致蹂躪疆場損我民物古人云多算勝少算不勝苟非攻堅破壘搗巢覆穴不足以絕其根株因自制一方名竄毒丸以鯪鯉甲頭尾胸脊以及四足各用鱗甲數片取其穿山透穴率領諸藥直趨毒巢則內而臟腑外而經絡凡衝脈所行之地無處不到以之為君用刺猥皮仍以上法各取其刺雖搜毒之功不如鯪鯉而以毒攻毒力則過之故以為臣用蟬蛻蛇蛻雖為解毒清熱之需實所以取其蛻脫之義以之為佐以芩連梔柏清其雷龍之火用皂刺土苓槐花領毒外出不使久留精竅以之為使復略加人參護其胃氣使之宣行藥力庶無潰亂壅遏之虞以為四路救應制而服之誠所謂得心應手針芥相投藥未盡而毒出忽於左腳臁發一惡瘡皮肉紫黑痛苦異常號呼床第一月方痊嗣是手掌如故所生子女不特不發梅瘡而並毫無疥癬可見病有萬殊理無二致予素未諳外科而能拔茲社鼠城狐之毒恃此理也倘無其理而欲邀天之幸吾未能信小兒梅瘡最為惡候倘發於一二月間或半歲之內最難救治以其毒稟先天來路既遠方藥難及即日服數匙之藥杯水車薪終難有濟昧者但以搽洗之法治之適足以阻其出路反致內攻不救只當緩以圖之庶能保全先以胡麻丸修制精細每日服之三七之後內毒將盡方用點藥不三日而瘡盡愈矣此法至神至捷第不可用之太早恐內毒未盡也入方梅瘡點藥杏仁一兩熱湯泡去皮以綿紙包之木捶緩緩捶去油此物極難得干必數十換紙方得油淨以成白粉為度謂之杏霜每杏霜一錢加入真輕粉八分明雄一分共研勻先以槐花煎濃湯將瘡洗淨瘡濕則以藥干搽之瘡干則以公豬膽汁調塗三日痊愈百發百中此方不特治小兒梅瘡凡外科下疳瘡蠟燭瘡藥到病除久經效驗瘡疥雜方凡半周一歲乳子偶患瘡瘍最忌外治必先服解毒之藥數劑然後稍用外治無不愈者倘不先解毒而妄用搽敷必致逼毒入內反為大害慎之治疥神方大風子肉三錢輕粉明礬各五分共為末聽用生以臘豬油二兩入麻黃五錢同入鍋內熬之以麻黃色黑為度濾去渣退火冷定調前末搽之治癩痢白禿頭瘡方用雞蛋十個去殼攪勻入小鍋香油蕩成一餅乘熱蓋兒頭上一時許蛋冷取下又將上面用油煎熱再覆頭上數次愈妙不可言黃水頭瘡即肥瘡也其瘡黃水流下即沿生漸至眉耳不治則殺人用黃連五錢輕粉三錢共為細末麻油調成膏塗粗碗內須乾溼得中將碗覆轉下燒艾煙燻之緩緩燒煙熏至黑色為度放地上出火毒次加冰片三分研勻香油調塗數次即愈一切無名腫毒諸般火丹熱瘭濕瘡取陰地蚯蚓糞四兩皮硝二兩共研末新汲井水濃調厚敷患處干則易之治熱毒瘡疥用生石膏生硫黃陳細茶各二錢共為末以生豬油和藥搗勻搽之小兒諸般疳瘡生於面上遍身爛成孔臼儼如大人梅瘡於蒸飯時甑蓬四連滴下氣水以碗盛取掃瘡上數日即愈百方不效者此法如神治小兒熱瘡用雞蛋五枚煮熟去白專取蛋黃再以亂髮一團如雞子大同入鍋內以炭火熬之初甚干次則發焦乃有液出久熬則液漸多而黃髮盡化而成液以黃髮盡為度取起冷定取塗瘡上即以苦參末滲之此神方也神治小兒頭上軟癤此癤愈而復發至難除根用枳殼一個刳去穰磨令口平以麵糊塗抹枳殼四圍安貼於癤上於一邊安一燈芯以通膿水則膿自出愈後枳殼自脫更無痕跡枳殼即臭橘子是也鮮者更妙樹名鐵籬笆多刺而硬人家園圃多植之以御宵人者此方不獨治軟癤凡久年頑瘡臁瘡不能收口依法用之無不愈者湯火簡便方凡湯火傷初起即以食鹽研末用米醋調勻敷患處頻塗不絕暫時雖痛卻能護內不壞然後用藥敷貼切不可用冷物塌冷水洗並涼藥敷貼予每見以冷水衝擊者使熱氣不得出必致內攻而不救慎之凡湯火傷悶亂不省人事急以蜂蜜調湯灌之若至重者急以煮過好熟酒數十壺入浴盆內以患兒浸酒中雖至重者不死女兒火燒手且駸駸至掌即以酸醋升余浸之出醋尚痛少時痛止不瘡不膿不疤痕奇方也治湯火傷久經效驗者凡湯火傷爛皮已脫去惟有鮮肉或臭爛不堪諸藥不治者用豬毛一籃以破鍋炭火煅紅入豬毛在內煅之少時豬毛消化而成黑液取起冷定略加大黃數錢共研細末再加冰片一分研勻香油茶油蠟燭油俱可調搽至神至靈之方也凡遭火藥燒壞者先以好酒洗淨次用雞蛋黃熬油聽用以大黃研末雞蛋油調搽即愈
