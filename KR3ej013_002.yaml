body:
  text: 卷二胎病論兒之初生有病亦惟胎弱胎毒二者而已矣胎弱者稟受於氣之不足也子干父母一體而分而稟受不可不察如稟肺氣為皮毛肺氣不足則皮薄怯寒毛髮不生稟心氣為血脈心氣不足則血不華色面無光彩受脾氣為肉脾氣不足則肌肉不生手足如削受肝氣為筋肝氣不足則筋不束骨機關不利受腎氣為骨腎氣不足則骨節軟弱久不能行此皆胎稟之病隨其臟氣而求之所謂父強母弱生女必羸父弱母強生兒必弱故小兒有頭破顱解神慢氣怯項軟頭傾手足痿軟齒生不齊發生不黑行住坐立須人扶掖者此皆胎稟不足之故也胎毒者即父母命門相火之毒也命門者男子以藏精女子以系胞道家謂之下丹田也夫二五之精妙合而凝純粹之精溶液而成胎淫佚之火蓄之則為胎毒矣蓋人生而靜天之性也感物而動人之欲也成胎之後其母之關係尤繁凡思慮火起於心恚怒火生於肝悲哀火鬱於肺甘肥火積於脾淫縱火發於腎五欲之火隱於母胞遂結為胎毒凡胎毒之發如蟲疥流丹濕瘡癰癤結核重舌木舌鵝口口瘡與夫胎熱胎寒胎搐胎黃之類是也更如一七之臍風百日之痰嗽半歲之真搐一周之流丹此又毒之至酷至烈而不可解者也胎寒者母娠時患熱病多服寒冷之藥又或過餐生冷令兒受之生後昏昏多睡間或吮乳瀉白此內因也或百日之內忽病寒栗口冷手足蜷曲不伸腹痛啼叫不止此生後受寒得之治宜溫散指迷七氣湯助胃膏為佳胎熱者母娠時喜食辛熱炙煿之物或患熱病失於清解使兒受之生後目閉面赤眼胞浮腫弩身呢呢作聲或啼叫驚煩遍身壯熱小便黃澀此胎熱也若不早治則丹瘤瘡癤由此而至宜集成沆瀣丹徐服解之以平為度胎搐者母娠時曾因驚恐氣傳於子生後頻頻作搐其後身熱面青手足搐掣牙關緊閉腰直身僵睛邪目閉多啼不乳此乃胎癇不治之證如因身有熱而作者必先啼叫雖曰胎病由外因也宜天麻丸後以六味地黃湯滋其化源久服自愈盤腸氣者幼科稱內吊者是也皆因胎氣鬱積壅結榮衛五臟六腑無一舒暢其氣不能升降築隘腸胃之間抵心而痛其聲轆轆如貓吐惡乾啼口開手足皆冷宜疏散通氣調中散及木香丸臍突者小兒多啼所致也臍之下為氣海啼哭不止則觸動氣海氣動於中則臍突於外其狀突出光浮如吹起者捏之則微有聲用亂髮燒灰枯礬等分為細末敷突臍上以膏藥貼之自消不乳者小兒生下三二日間忽然不乳當詢問之勿以不乳作臍風治蓋臍風有多啼撮口之證此則無之但不乳耳有吐乳乳之又吐者或因拭口不淨惡穢入腹也宜用檳榔木香甘草煎湯與服如啼哭不乳者腹痛也亦胎寒之證宜木香丁香乳香當歸甘草煎湯與服如無以上諸證無故不乳宜問其母之乳汁多少乳多者傷乳也宜少節之不久自思乳矣乳少者必有他證細心察之胎黃者兒生下面目渾身皆黃如金色或目閉身上壯熱大便不通小便如梔子汁皮膚生瘡不思乳食啼哭不止此胎中受濕熱也宜茵陳地黃湯母子同服以黃退為度胎肥者兒生下遍身肌厚肉色通紅面色亦紅而黑睛多時時生痰自滿月以後漸漸肌瘦五心熱而大便難白睛粉紅色此名胎肥是亦在胎時母食甘肥濕熱太過流入胞中以致形質虛肥血分壅熱也加減大連翹飲外以浴體法浴之胎怯者生下面無精光肌肉瘦薄大便白而身無血色目無精彩時時哽氣多噦者此即治怯也非育於父母之暮年即生於産多之孕婦成胎之際元精既已澆漓受胎之後氣血復難長養以致生來怯弱若後天調理得宜者十可保全一二調元散助之入方指迷七氣湯一切腹痛寒熱多啼不乳等證皆由陰陽不升降氣道壅塞而然並宜此方凡人身內之氣呼吸出入無刻不與天道陰陽之氣通故六淫外襲則感而致病一定之理也內氣閉塞則天道不通升者不升降者不降寒熱由此而生也是方疏利臟腑神化無窮最宜領會廣陳皮杭青皮藿香葉芽桔梗蓬莪朮香附米法半夏上肉桂公丁香益智仁老生薑大紅棗炙甘草上㕮咀水二碗煎至一碗母子同服助胃膏治胎寒內釣胃氣虛弱胸脅脹滿哯乳便青白豆蔻肉豆蔻須炮煨去油官揀參廣木香各兩五錢公丁香三錢藿香葉雲茯苓漂白朮土炒真青桂西砂仁炙甘草各一兩廣陳皮一兩二錢洋沉香二錢懷山藥一兩五錢為末蜜丸芡實大每一丸炒米湯化服集成沆瀣丹音亢械北斗夜半所降之甘露也治小兒一切胎毒胎熱胎黃面赤目閉鵝口口瘡重舌木舌喉閉乳蛾渾身壯熱小便黃赤大便閉結麻疹斑瘰遊風疥癬流丹癮疹痰食風熱痄腮面腫十種火丹諸般風搐並皆神效此方古書未載得之異授微似古之神芎丸近有能者妙出化裁而增損之遂為幼科有一無二之神方作三焦之主治蓋凡臟氣流通者必不鬱滯或受毒於妊前或感邪於誕後遂爾中氣抑鬱則見以前諸證方內所用黃芩清上焦之熱黃柏清下焦之熱大黃清中焦之熱又藉其有推陳致新之功活血除煩之力能導三焦鬱火從魄門而出猶慮苦寒凝膩復加檳榔枳殼之辛散為行氣利痰之佐使川芎薄荷引頭面風熱從高而下趨連翹解毒除煩赤芍調榮活血牽牛利水走氣分而舒郁滑石清潤抑陽火而扶陰又能引邪熱從小便而出用治以前有餘諸證應如桴鼓豫生平最慎攻伐惟此方用之最久功效莫能殫述真濟世之良方也杭川芎九錢酒洗錦莊黃九錢酒蒸實黃芩九錢酒炒厚川柏九錢酒炒黑牽牛炒取頭末六錢薄荷葉四錢五分粉滑石水飛六錢尖檳榔七錢五分童便洗曬陳枳殼四錢五分麩炒淨連翹除去心隔取淨六錢京赤芍炒六錢上十味依方炮製和勻焙燥研極細末煉蜜為丸如芡實大月內之兒每服一丸稍大者二丸俱用茶湯化服乳母切忌油膩但覺微有泄瀉則藥力行病即減矣如不泄再服之重病每日三服以愈為度此方斷不峻厲幸毋疑畏惟胎寒胎怯面青白者忌之六麻丸治胎搐先以此丸通其經絡次服地黃丸明天麻薑製法半夏北防風川羌活牛膽星直殭蠶北全蠍各五錢為末蜜丸芡實大每一丸鉤藤湯下六味地黃丸即仲景所制金匱地黃丸原治腎水虧損小便淋瀝頭目眩暈腰腿痠軟陰虛發熱自汗盜汗憔悴瘦弱精神疲困壯水之主以制陽光此方是也錢仲陽以之治小兒胎怯稟受先天不足並肝疳白膜遮睛瀉血失音身瘦瘡疥腎怯語遲解顱行遲等證薛立齊又以治小兒肝經血虛燥熱腎經虛熱作渴小便淋祕痰氣上壅或風淫客氣瘰癧結核或四肢搐搦眼目瞤動或咳血吐血頭目眩暈或咽喉燥痛口舌生瘡或稟質不足解顱失音五遲五軟腎疳肝疳凡肝腎不足之證皆宜用此以滋化源其功不能盡述豫按錢薛二翁能用此方治小兒先天不足誠卓然有識者豫所敬佩奈今之小兒體質元氣更不及前古以地黃丸為補劑今則實為涼劑矣此藥用於陰虛枯燥者誠為得宜倘兒肌肥面白脾弱多痰者服此必致膩膈變生他證其害不小非方之不良由今稟受愈薄也豫故為之斟酌其炮製必使地黃陰凝之質稍近陽和不致沉寒沍沴始能免膩膈損脾之患也大懷地四兩以西砂仁一兩不必捶碎生薑二兩切片縫一小夏布袋盛此二味同地黃入砂鍋以水煮二晝夜方入好酒煮一晝夜以地黃糜爛為度取起其袋不用以地黃搗膏聽候白雲苓二兩乳汁蒸曬懷山藥三兩乳汁蒸曬淨棗皮二兩炒研粉丹皮一兩酒炒宣澤瀉一兩鹽水炒焦上依炮製和勻一處焙燥研為細末和前地黃膏少加煉蜜石白內杵勻重錢半一顆半周一歲者每用一丸三五歲者二丸俱空腹鹽湯化下倘丸一時未備即以前藥十分之一但宜炮製不可生用水煎服之名六味地黃湯功效更捷調中散治嬰孩盤腸氣腹內築痛青木香川楝子暗沒藥白雲苓上青桂杭青皮萊蔔子陳枳殼尖檳榔炙甘草等分入蔥白二寸鹽一錢水煎空心服茵陳地黃湯治初誕小兒面目渾身其黃如金胎中受濕熱也懷生地京赤芍正川芎大當歸天花粉赤茯苓結豬苓茵陳蒿宣澤瀉諸藥隨時定分兩水煎母子同服大連翹飲治胎肥解熱毒淨連翹瞿麥穗白滑石牛蒡子車前子川木通北防風炒梔仁片黃芩荊芥穗大當歸北柴胡京赤芍淨蟬脫炙甘草竹葉十片燈芯十莖水煎熱服浴體法治胎肥明天麻二錢淨全蠍去毒箭硃砂各五分烏蛇肉酒浸枯白礬洋青黛各三錢真麝香一分共研勻每用三錢水三碗桃枝一握同煎十沸溫熱浴之但勿浴背調元散治胎怯揀人參漂白朮白茯苓化橘紅大當歸甘枸杞炙甘草各二錢陳粳米三合為末每服二三錢龍眼煎湯調下八味地黃丸治稟受先天不足即前六味地黃丸加青化桂一兩熟川附一兩治稟賦命門火衰凡齒遲語遲行遲囪門開大腎疳等證或火衰不能生土以致脾土虛寒不思乳食夜多漩溺皆稟先天不足自晬周時即有虛病腎病能自幼填補亦多可復此方用水煎名八味地黃湯經曰益火之源以消陰翳此之謂也凡乳母肥白者母子同服驚風闢妄喻嘉言曰驚風一門古人鑿空妄談後世之小兒受其害者不知千百億兆蓋小兒初生陰氣未足性稟純陽身內易致生熱熱盛則生風生痰亦所恆有乃以驚風命名隨有八候之目夫小兒腠理不密更易感冒寒邪寒邪中人必先入太陽經太陽之脈起於目內眥上額交巔還出別下項夾脊抵腰中是以病則筋脈牽強遂有抽掣搐搦種種不通名目妄用金石腦麝開關鎮墜之藥引邪深入臟腑千中千死徒據小兒八歲以前無傷寒之說而立驚風一門殊不知小兒不耐傷寒故初傳太陽一經早已身強多汗筋脈牽強人事昏沉病勢已極湯藥妄投危亡接踵何由得至傳經解散哉故言小兒無傷寒也不知小兒易於外感惟傷寒為獨多而世之妄稱驚風者即此也是以小兒傷寒要在三日內即愈者為貴若至傳經則無力耐之矣且傷寒門中剛痙無汗柔痙有汗小兒剛痙少柔痙多世俗見其汗出不止神昏不醒便以慢驚為名妄用參耆朮附閉塞腠理熱邪不得外越亦為大害但比金石差減耳所以凡治小兒之熱切須審其本元虛實察其外邪重輕或陰或陽或表或里但當徹其外邪出表不當固邪入里也仲景原有桂枝湯舍而不用徒事驚風毫釐千里害豈勝言哉又曰小兒體脆神怯不耐外感壯熱多成痙病後世多以驚風立名有四證八候之鑿說實則指痙病之頭搖手動者為驚風之抽掣指痙病之卒口噤腳攣急者為驚風之搐搦指痙病之背反張者為驚風角弓反張幼科翕然宗之病家坦然任之不治外淫之邪反投金石腦麝之藥千中千死而不悟也又曰凡治小兒痙病妄稱驚風名色輕用鎮墜之藥者立殺其兒此通國所當共禁者也蓋小兒不耐傷寒壯熱易致昏沉即於其前放銃訥喊有所不知妄捏驚風輕施鎮墜勾引外邪深入內臟千中千死從未有一救者通國不為厲禁寧有底止哉又曰婦人産後血舍空虛外風易入仲景謂新産亡血虛多汗出喜中風故今病痙後賢各從血舍驅風成法可遵非甚不肖者不妄用鎮驚之藥不似小兒驚風之名貽害千古在賢智且不免焉茲約通國共為厲禁革除驚風二字不許出口入耳凡兒病發熱昏沉務擇傷寒名家循經救治百不失一於以打破小兒生死關天人共快也痙擎上聲風強病也前為喻先生闢除驚風指明病痙之說誠善矣第驚風之名誤傳既久沉迷者衆倘不為之剖晰詳明指出證候治療俾臨證者有所依歸則後人何能深信豫不辭狂瞽請為詳晰申明之蓋病痙非止一端男婦皆有不特小兒為然也如太陽過汗變痙風病誤下變痙瘡家誤汗變痙産後汗多遇風變痙跌撲破傷冒風變痙表虛不任風寒變痙一切去血過多變痙然男婦病此醫者皆從太陽厥陰循經救治未聞以驚風之治治痙者無如小兒病痙獨以驚風為名而治者由宋人之訛傳也一人倡之遂群起而和之然亦無師之智各為臆說愈趨愈下遂致於離經叛道乃有黃帝不知幼小之妄談殊不知內經通評虛實論有乳子病熱乳子病風熱脈證之辨刺逆論有嬰兒肉脆血少氣弱毫針之傳經雖三章而脈證治療井然可據蓋以今日之丈夫即昔年之乳子他時之方脈即此際之幼科人此人也理此理也安可岐之為二故不易立科分孰料後人不特岐之而並皇皇經旨全然抹煞矇蔽後人耳目得肆其無稽之妄談背經毀聖罪無可逭所以嘉言痛闢其謬者有由來矣豫亦非妄言附和實有成見蓋臨證四十餘載所治嬰幼以萬計從不以驚風掛齒頰亦未嘗遇一兒之驚風間有傷寒病痙昏迷不省者豫以火功蘇之仍為循經治療無不生全從未假一抱龍蘇合為之鎮墜開關可見喻氏之言確乎其不爽矣或曰經以風寒濕合邪而病痙今乳子未離襁褓安得有風寒濕而病痙乎曰子謂風寒濕嬰兒絶少殊不知風寒濕惟乳子為獨多如藜藿之兒房廊卑隘戶牖蕭疏衣褓單寒坐臥非處風寒之來孰能悉為捍禦膏粱之子過於慎重於其甫生輒閉戶塞牖不親風日不窺外門重衣疊綿溫暖過度微汗時出腠理甚疏偶然脫換風寒則乘虛而入矣至於濕氣尤為難避凡衣褓不幹非濕乎衾褥遺溲非濕乎澡浴糞穢非濕乎愚夫愚婦遇兒有疾重衣覆被包裹嚴密以致雨汗淋漓失於更換非濕乎嬰兒患是三者於隱微之中而醫者莫之能測也況幼科諸君臨證不察病源惟以驚風二字橫於胸臆及至診視但見發熱昏沉即以驚風名之輒以開關鎮墜截風定搐之死法以治變幻莫測之傷寒抑遏其表邪邀攔其出路乃致荼毒以死而死者不知其然父母不知其然醫者亦不知其所以然而死之也此非後人之咎作俑者不得辭其責矣妄名之害其禍最酷不特舉世兒科滿口驚風而舉世病家亦滿口驚風其至愚至惑者又惟婦女為尤甚習俗相沿竟成一驚風世界最可駭者遇兒有疾亦不察其為傷寒為雜證為內傷外感且先曰病由於嚇致醫者聞之正中下懷不辨是嚇非嚇先與之鎮驚及其引邪入里壯熱不退醫者復不究其熱之在表在裡為虛為實且先曰熱則生風矣病家聞之適合其意不察有風無風乃囑其醫者先需截風定搐之藥醫必投其所好而與之病家坦然無疑而受之南轅北轍劫奪誤投病日沉危而病家不以為怪設有明者辨證既確不事驚風而病家不喜是必更醫必致覆水難收死而後己如此死者亦不可盡歸咎於醫蓋病家有以致之也籲妄名之為害如此乎録諸家驚風論愚有小注以辨其惑有曰急驚身熱目赤口鼻氣粗痰涎潮壅忽然而發發過容色如舊未有不因外感內傷而無故身熱目赤氣粗痰壅而發者此突然而來亦摹擬之辭也有因驚駭者亦有不因驚駭者大都是火燥木急由寒傷筋急者居多未可盡指為火燥也故身先有熱未有身涼而發二語好但應體究熱從何來始有實據若但曰身先有熱不知此熱在表在裡未足服人證皆屬陽宜用涼劑豈有不經疏散而輒用涼劑不慮其引邪入里乎除熱化痰則驚自息昔人謂痰生熱熱生風風生驚其實皆本氣自病何所據而知為本氣自病世人不解風自內生焉知其不由外至而盡由於內生未確徒執天麻膽星栝蔞貝母殭蠶全蠍雜亂風痰之藥治之不應由於遞相授受以致禍世殃民千古恨事更以廣東蠟丸牛黃紫雪治之及至元氣損傷虛痰上逼胸膈膨脹則謂證變結胸有是理哉此開門揖盜引邪入里誤治致敗之故有曰驚者嚇也驚由嚇致由兒先有內傷復來外感肺竅痰迷心無所主一著驚而即發也既知先有內傷復來外感以致於肺竅痰迷心無所主此實由於病非由於驚也今日一著驚即發則所重在驚治之者不治痰而治驚置內傷外感於不問而從事於無據之驚棄本逐末其害可勝言哉有曰驚生於心痰生於脾風生於肝熱出於肺此一定之理也半真半妄難曰確然熱盛則生風風盛生痰痰盛生驚此賊邪必至之勢上云驚生於心痰生於脾風生於肝熱出於肺驚風痰熱皆本臟自生何以又為賊邪不幾認主作賊乎療驚必先豁痰豁痰必先祛風祛風必先解熱而解熱又以何者為先乎肺主皮毛皮毛為熱邪出入之門戶此又明指外邪則非心肝脾肺自生矣彼風寒暑濕燥火六淫之來前云風自內生此又明言六淫外至不知孰是孰非皮毛受之即入犯乎肺肺本出熱地也肺出清肅之地何以見肺為出熱之地經曰形寒飲冷則傷肺此門戶豈熱邪可以出入而寒邪獨不可以出入乎燥火暑邪一入則熱與熱依而熱虛風寒濕邪一入肺竅為之閉塞六淫初來無過皮毛猶為太陽所主若肯為之疏散豈能便入肺竅而至於閉塞耶則熱無所泄而熱亦盛若解熱必先祛邪上云療驚必先豁痰豁痰必先祛風祛風必先解熱解熱必先祛邪豈非在先竟不祛邪以致邪不能解而發熱生風生痰生驚今者仍從發表祛邪起而後解熱祛風豁痰定驚何若在先肯為解表祛邪豈不一了百當又何致費如此周折乎幼科鎮墜止瀉之誤於斯盡見矣有曰急驚者肝經血虛火動生風此另換題目別開生面蓋風生則陰血愈散陰火愈熾陰虛則陽火熾此陰火又不知指何物為言也火動肺金愈虛肝邪愈熾宜滋肝血養脾氣若屢服祛風化痰瀉火之劑而不效若果火盛生風則祛風化痰瀉火之劑不為誤用今屢服而不效蓋由證侯不確藥不對病所以費如許揣摹亦終歸於無濟也便宜認作脾虛血損便宜認作是無確見上味模稜急補脾土急補脾土則知誤治致變刻不容緩不然何用急乎有曰急驚屬木火土實屢言木邪凌土木旺土衰何能有上實之證木實則搐而有力目上視動扎頻土實則身熱面赤而不吐瀉偃臥合睛治宜涼瀉亦有因驚而發者因驚而發神虛可知此為火虛非火實也以致牙關緊急壯熱等證此內有實熱外挾風邪此所挾之風不知指內生之風耶外來之風耶當截風定搐截風定搐四字比干將莫邪龍泉太阿更勝百倍今天下幼科皆用此利器也有曰急驚者壯熱痰壅竄視反張搐搦掣動牙關緊急口中氣熱頰赤唇紅脈浮洪數此肝邪風熱陽盛陰虛證也脈浮洪數飲冷便結明是傷寒之證未經疏解以致熱邪入里表裡皆急方顯以上諸證非疏里不足以解表猶敢以急驚稱之耶有曰小兒驚風肝病也亦脾腎心肺病也諸書皆以小兒天癸未足腎不主病惟心肝脾肺主之今忽言及於腎誠所謂破天荒矣蓋小兒之真陰未足柔不濟剛故肝邪易動人身榮衛脈度每日寅時起於手太陰肺然後五十度周於身至丑時終於足厥陰肝寅時復交於肺為陰陽大會之臟真邪起元之所而幼科目為肝邪則人生無不邪之臟矣則木能生火火能生風風熱相搏則血虛血虛筋急寒傷陰榮多見筋急筋急則眩掉反張強直之類皆肝木之本病也此本內經太陽筋所生病而為驚面之色相可笑至其相移木邪侮土則脾病木盛金衰則肺病木火上炎則心病木火傷陰則腎病肝為乙木陰柔之體芽檗之姿發生之本天地無此風木則春生夏長秋實冬成者以何物為利蓋五運無此丁壬則蒼黃赤素玄運行於五天之中者以何物為從合六氣無此巳亥則司天在泉循環於左右兩間更以何物為對化人生無此肝膽則受胎一月如露方凝之際以何間為重始肇基化元莫大乎此而幼科一倡百和曰為萬惡凶淫之害氣諸臟逢之無不焦頭爛額乃至於動風生火凌土侮金傷陰害水諸惡畢備即攻伐並至不足以盡其辜除非殺此嬰兒使肝木無置身之地始可祛其凶殘也違心背理其何以堪或曰大都腎水未足肝氣有餘所以害及諸臟亦或有之今必謂其無恐難盡信曰嘻此言愈相矛盾矣既知腎水未足肝氣有餘則此無根之木偏勝之氣搖搖不定欲住無因正宜速救根本滋水以生之養血以配之汲汲培補猶恨其遲致認為賊邪者克之凌之虐之坐令其凋殘摧折挽救無由不亦大可悲哉此五臟驚風之大概也此處明言五臟驚風則驚風之屬五臟也明矣治之之法有要存焉一曰風二曰火三曰痰四曰陽虛五曰陰虛忽談陽虛陰虛之法有曰急慢驚風古人所謂陰陽癇也癇為痼疾非是暴病不應排入急驚屬陽慢驚屬陰驚邪入心則致面紅頰赤惕惕夜啼入肝則面目俱青眼睛竄視入腎則面黑惡叫齧齒咬人入肺則面色淡白喘息氣急入脾則嘔吐不食面色淡黃前云驚者嚇也惟心臟受之足矣此處忽曰驚邪入心入肝入腎入肺入脾又不知指驚邪為何物而嘵嘵然論之也然風非火不動火非風不發風火相搏而成驚風故心肝二臟主之前云驚邪在五臟則肝風無與焉於此又必扯入肝風以證其木火生風之妄語令人欲嘔然火虛則金傷水失其母而火無所畏且木無所制而脾土又受傷矣獨不可曰水盛則火傷土失其母而水無所畏且金無所制而肝木又受傷矣牽枝帶葉何患無辭不過欲實一肝風名目而纍及於五臟即失火殃魚亡猿禍木未若是之婪也有曰急驚者陽證也小兒陽常有餘陰常不足經曰陽氣者若天與日失其所則折壽而不彰又曰陽精下降其人夭易以陽為君子陰喻小人非貴陽賤陰蓋以陽主升生陰主肅殺故也幼科之人必欲相反聖人則扶陽抑陰幼科則護陰賊陽每每以陽有餘陰不足為方然雖諄諄言之究竟不知其所謂若謂血為陰氣為陽經曰嬰兒肉脆血少氣弱未嘗曰血少氣多蓋謂真氣未生惟此呼吸一線而已今認為有餘必使此一線之氣出入全無方可謂陽不足乎若謂寒為陰熱為陽寒主收斂熱主發生人之所賴者惟此陽和而已有此陽和則百骸五官方能運動今認為有餘必使此溫暖之氣寂滅無餘至於四肢僵木遍體寒水方可謂陽不足乎若謂水為陰火為陽天一非陰地二非陽坎戌非陰離巳非陽更為不切若謂肝為陰肺為陽金不制木肝氣有餘不知肝屬厥陰職司藏血血乃陰榮乙癸同源誤認為陽益倍殊謬若謂肝為陰膽為陽膽無出入雖屬少陽專司半表半裡有病惟宜和解表裡嚴禁汗吐下三法今誤認少陽膽經之熱為陽火有餘輕用涼瀉攻下之治不幾故變常經甘蹈誤世之譏乎若謂真陽有餘小兒天癸未足真陽尚未肇基一發無謂若謂五臟為陰六腑為陽即應專瀉六腑之陽不應以心火肝風為賊邪乃以黃連甘遂大寒大毒之物以瀉其不足之陰不知果何所指而嘵嘵其詞豈小兒別有所謂陽有餘陰不足乎豫之識見短淺不足以窺其幽深易於生熱熱盛則生風生痰生驚巴人下里之音通國和之者歟且食飲難節忽歸咎於食飲喜怒不常忽委罪於性情暴怒傷陰暴喜傷陽傷陰則瀉傷陽則驚上雲陽常有餘既有餘則傷不為害今曰傷陽致驚則陽之不可傷者又在言外矣辭執兩端難堪為式小兒暴喜傷乳上云暴喜傷陽此言暴喜傷乳乳為血液本非屬陽何以暴喜傷之乎夫乳甘緩戀膈又歸咎於乳汁特有發明乳食之議矣又兼外感寒邪則痰凝壅塞鬱滯熏蒸乳既戀膈寒復外侵以致於痰凝壅塞鬱滯熏蒸治療之術惟有絶其乳食為上著不然病根何時得斷哉內有食熱外感風邪上云乳滯挾寒邪此云食熱挾風邪一片迷離夢境心家熱盛則生驚前云驚由嚇致此言心熱生驚肝家風盛則發搐肝風心火交爭前云風非火不動火非風不發是風火交相為用者此言風火交爭不知所爭者何物也因乃痰生於脾風生於肝驚出於心熱出於肺驚風痰熱四證若具八喉生焉此篇從陽盛陰虛生熱生風說起乃至食飲喜怒乳哺冷熱寒邪內傷外感多般妝點仍然說到驚風痰熱四字止費如許心思不過欲為驚風二字作陪襯不知無本之舉謬誤之談任極口鋪來說來總不順理無非東扯西拽以誑俗人耳目明眼者必不為其所欺也有曰急慢驚風或聞大聲或大驚而發搐發過如故此無陰也當下之內經言大驚卒恐氣血分離此正神志受傷陰陽破散挽救尚虞其不及何以見無陰而當下不慮及其下多亡陰乎此證本因熱生於心既大驚卒恐心熱何來身熱面赤嗜飲口中氣熱大小便黃赤劇則熱也蓋熱盛則生風屬肝陽盛陰虛也故下之以除其痰也上云發過如故下云身熱面赤種種熱證若謂未發搐前而見此證此由於病非由於驚也若謂發搐之後而見此證則前之所謂發過如故者不幾囈語乎小兒痰熱客於心間無怪乎驟用巴豆甘遂以逐心間之痰豈知小兒作搐縱使有痰不過阻於脾之大絡塞其氣道耳何嘗能入心間而以大毒之物伐及無辜傷其神明之臟欲不成癇其可得乎因聞非常之聲動而發搐矣若熱極不聞聲及驚亦自發搐也聞聲悸惕神虛者有之修煉家以精生氣氣生神神之倚氣如魚依水凡小兒稟受薄者先天既不足於妊前癸水復未成於現在故元精未足元氣無根所以元神最怯每多聞聲則惕此實神虛膽怯不足之證而幼科不但不憐其元神不足而偏指為心火有餘不但指心火有餘而並肝風脾痰肺熱一總扯入以證其驚風痰熱四證八候之妄言復有聞非常之聲見異類之物乍然驚怪動惕此正神魂無主榮衛俱亂搖搖泛泛欲定不能之際而不為之防護保救猶曰熱生於心必欲下之以除其痰入井下石雪上加霜此等人不知是何肺腸洵堪詫異有曰小兒平常無事忽然壯熱手足搐搦眼目戴上涎潮壅塞牙關緊急身熱目赤既曰平常無事則無病可知乍見以上種種惡候必如俗人所言鬼病也不然何以平常無事而忽凶危若是耶豈知小兒易感風寒易傷乳食在先半日邪已入內兒不能言父母未覺邪郁不伸所以乍然而搐觀其忽發壯熱之言可知矣非風寒入里為壯熱即食飲停滯為壯熱此實因病而致豈平常無事之謂哉治此無難但應察其受病之源外因則達之發之內因則導之奪之病邪既去神性自寧焉耳若必曰無因而致在俗人必疑為鬼祟求之巫覡庸工必目為驚風妄為治療兩相耽誤奈之何哉此急驚屬陽病在腑每云驚風為心肝所主此處忽云屬腑不知心肝屬腑乎屬臟乎要問幼科之開天祖師方能辨白豫則眼花撩亂莫能識也有曰急驚者陽證也俱腑受病耳小兒客痰熱於心膈是少陽相火旺每言心火此曰相火新奇經云熱生風因時火盛而作不知此火何由而盛蓋東方之震木得火氣而發搐此處不言肝風心火作搐硬說為少陽相火作搐但聞雷得火而豐未聞震得火而搐杜撰有曰身熱脈浮精神恍惚或吐瀉不思乳食發搐即半陰半陽合病身熱脈浮外感風寒也吐瀉兼作內傷飲食也但曰外感內傷足矣何必曰半陰半陽原其意不過以身熱脈浮屬太陽吐瀉屬陽明太陰凡幼科所言者無非心肝脾之臟病若曰外感內傷則驚風痰熱之證何處安頓豈不自呈敗露乎身熱脈沉精神倦怠或吐不瀉又有乳食發搐亦半陰半陽合病身熱脈沉屬太陰但吐不瀉屬陽明明是陽明傷食太陰受寒顯然夾食傷寒偏不明言悲哉有曰亦有急驚涼瀉而不愈或與吐下藥太過變為慢驚者此等之言益見背謬諸書以急驚為陽為實熱既是急驚則用涼瀉無疑何以不愈蓋因誤以傷寒表證為急驚所以不愈也既涼瀉不愈則認證不確自應愧悔何昧焉不察而更用吐下之藥乎涼瀉一誤吐下再誤而不變為壞證者未之有也非病之能變由醫變之也又有慢驚補溫而不愈變為急驚者幼科疏忽於此數語盡見底裡既以脾虛陰寒為慢驚則用溫補適為恰當今不特不愈反加變證蓋誤以傷風自汗為慢驚不知此證本有風邪在表正宜解肌今誤用溫補而致變偏不言錯認病源誤用反藥而曰病變急驚即至於死亦曰病變於死與醫何涉可謂善為說辭者矣有曰病有陰陽急驚風屬熱病在心肝二臟謂之陽癇慢驚風屬虛寒病在脾肺二臟謂之陰癇此以寒熱分陰陽也以寒熱分陰陽雖曰牽強猶可混賴以心肝二臟主陽癇不通五臟屬陰六腑屬陽急驚發於六腑為易治慢驚發於五臟為難治此以臟腑分陰陽也上節言急驚屬實熱病在心肝二臟慢驚屬虛寒病在脾肺二臟此以急慢二驚皆屬五臟也明矣與六腑無涉下節即云急驚發於六腑慢驚發於五臟是又以臟腑均有驚風也夫六腑者膀胱胃膽小腸大腸三焦六經是也其六經證治輕重不等理應指明急驚發於何腑五臟者心肝脾肺腎五經是也其五經證治貴賤不同理應指明慢驚發於何臟後人始有實據今竟不指明第泛言急驚發六腑慢驚發五臟豈急驚之來六腑齊病應用六經之藥治之乎慢驚之至五臟均傷應用五經之藥治之乎必無是理若以上節心肝脾肺之言為是則與下節六腑五臟不相侔矣若以下節六腑五臟之言為是則與上節心肝陽癇脾肺陰癇相矛盾矣蓋腑臟關乎表裡豈容混稱如腑為表臟為里表病不可治里里病不可治表不易之規以其陰陽不同內外自別不可誤治者也今詳前說既驚風之屬臟屬腑者已無定論而臨證之治表治里者安有成規吾恐其李帽張戴勢所不免如前諸家之論非但臟腑混淆表裡不辨而反多增名色眩人心目曰風曰痰曰驚曰嚇曰火曰熱曰血虛曰木急曰相火曰陰火曰外感曰內傷曰喜怒曰乳哺曰陽盛曰陰虛曰屬腑曰屬臟究於驚風二字毫無著落其論證如此支離治療何能不誤不為規正其害豈勝言哉諸家之說已見於前種種不經殊難盡述夫古哲立言自有定理如仲景傷寒六經表裡汗下和溫井然不亂孰敢妄贊一辭獨此驚風之說紛紜鼎沸莫可究詰醫事動關生命豈容混亂經常不特來學無歸練達者難言不惑豫因不辭狂悖易去驚風字樣庶知病各有名治無致誤在醫者俾不致入海求蟾病者亦可以鑑車易轍矣辨明致妄之由易去驚字驚風二字千古疑城嘉言欲打破人鬼關其實未易能也蓋從前有此名目後人莫敢翻其成案惟從驚風摹擬究竟愈摹愈失愈論愈晦其實由於仲陽立名之不慎也在伊當日或適因嬰兒傷寒病痙乍有反張搐搦之態故偶立驚風之名亦猶方脈中之驚悸驚惕驚慌等類初亦未嘗即欲以此兩字示法來茲而門人繼述不善遂以驚字為驚嚇之驚風字即驚字之變文觀幼科書中凡青為風者皆曰青為驚可知矣謬為小兒之病悉由驚而生風誤以傷寒無汗之表證為急驚以傷風自汗之解肌證為慢驚以脾敗胃傷竭絶之證為慢脾妄立諸驚名色眩惑後人何嘗有一毫實際裨於治療而諸家旋祖其術極力敷演亦不過隨波逐浪猜度摹擬初無理要可以服人是仲陽偶以一字之乖訛而後世受禍如此其烈也至於見證立名更為舛謬如小兒傷寒病痙外證有頭項強背反張目上視此金匱所謂能仰不能俯者屬太陽則稱天吊驚眼目下竄即金匱之頸項𠘧𠘧音殊海藏之低頭下視屬二陽合病則稱看地驚兩腳掣跳海藏所謂肘膝相構屬陽明則稱馬蹄驚兩手牽引海藏所謂左右搐搦屬少陽則稱彎弓驚傷寒病痙誤用驚藥耗其津液而筋脈受傷遂致兩手拘攣已為不治之證乃猶稱鷹爪驚虛證肆行攻伐乃致脾敗胃絶四肢軃曳奄奄待盡猶復稱撒手驚至於陰寒腹痛面青口撮口吐白沫曰鯽魚驚脾虛生熱舌絡緊急不時舔舌曰蛇絲驚蛔蟲貫膈大叫一聲即昏悶不省曰烏鴉驚兒病作熱本為常候曰潮熱驚食飲停滯胸腹飽悶曰膨脹驚更有諸多不通名項莫能枚舉夫以上諸證皆表裡寒熱分明證候顯然可據而若輩不究病源妄立名色悉以驚字目之設也人病陽明內實逾垣上屋則將名飛天驚陰極發燥欲臥泥水中則將名劈地驚少陰昏沉嗜寐則將名瞌睡驚中消多食無厭則又名叨餮驚乎荒唐鄙野雖奚童爨婢有所不言而醫者公然筆之於書後人見其證皆驚證紋悉驚紋相與依樣葫蘆一倡百和以為一遵古法誰曰不然不知論證可任其牽強而治療不容於假借如傷寒病痙由風寒濕三氣合邪病在太陽陽明少陽與心驚肝風脾痰肺熱風中牛馬若以驚風治之則無辜心肝脾肺枉受剝膚而風寒濕外至之邪翛然磐石此豈有一可乎豫欲為之更改之以為非易去驚風二字仍恐流禍無已將欲以痙字痓字易之又慮其不入俗因思幼科以搐掣名驚今即以搐字易驚字屏去禍害之驚祛除籠統之風總名之曰搐庶不駭聽而又不失病痙之本來復以急驚慢驚慢脾之入石堆者易之為誤搐類搐非搐之三寶筏提攜沉溺穩步康衢將於是乎在焉何謂誤搐蓋傷寒小兒最多由醫者治不如法抑遏其表邪莫能外解故壯熱不退遂爾變而為痙則有搐搦反張之候要知此證由風寒濕所致雖有身熱俱皆表邪非火熱之比且與內經諸痙項強諸風掉眩諸寒收引之例恰正相符因剔出風寒二痙歸於誤搐條下俾臨證者知為傷寒病痙不致有開關鎮治之害何為類搐蓋傷暑瘧痢咳嗽丹毒瘡痘霍亂客忤中惡其證顯然可見辨認既明一藥可愈何至作搐由醫者遷延時日或抑遏邪氣無所發泄間有變為搐者搐非固有所以謂之類搐要知此證由火熱居多實非風寒惟咳嗽瘧疾微兼表邪治者宜審今遵內經諸熱瞀瘈皆屬於火之例共一十條總歸於類搐條下逐證注明各從本門為治以免截風定搐之患何謂非搐蓋小兒大吐大瀉久病病後脾敗胃絶昏睡露睛虛痰來往此竭絶之證而幼科以為慢脾風更以大驚卒恐神魂離散之證為急驚風不知以上二證死生呼吸猶敢以驚風稱之耶因體東垣非風之意竟以非搐名之使後人知此等證候全非風搐而治風治搐之法遠擯三舍庶可以保全竭絶而不致於夭折無辜也以上三門逐證分晰其所用藥方一遵經旨罔敢立異要使幼科之證毫無遺漏而驚風二字不屏自卻人鬼關豈徒打破行將化為瓊樓玉宇矣周虛中曰雄辭閎辨駁得諸家之言驚者無可置喙快極快極新立誤搐類搐非搐分門別證曰誤搐即傷寒病痙也蓋頭項強背反張目上視屬太陽低頭下視口噤不語手足牽引肘膝相構屬陽明眼目或左或右而斜視手足或左或右而搐搦屬少陽此實三陽表證豈得混稱為驚風痙由誤致今故易名誤搐然痙有剛柔治非一類以柔痙列之於首剛痙次之更詳其致痙之由與治痙之方總歸於誤搐條下證治井然有據明者當不以豫為妄也柔痙傷風有汗為柔風性軟弱也經曰太陽病發熱汗出不惡寒者名曰柔痙其證初起發熱自汗口中氣熱呵缺頓悶手足動搖甚則反張由風邪傷衛榮衛不和小兒體弱者最多此證亦因腠理不密自汗無時所以風邪易入幼科見其多汗昏沉輒以慢驚稱之按此條風邪傷衛本屬輕證若能早為解肌調和榮衛藥到病起誤作慢驚妄投補劑其禍不可勝言矣此即前諸家所云慢驚溫補而不愈變為急驚者即此例也剛痙傷寒無汗為剛寒性剛徑也經曰太陽中風重感寒濕而變痙蓋傷風原有汗愚人不知重衣厚被令其大汗汗多衣褓必濕濕久寒生滲注關節故為重感寒濕寒濕內閉反令無汗是名剛痙其證初惡風寒發熱頭痛偎藏於母懷者是也小兒口不能言父母一時不覺但見其發熱不知其惡寒但見其昏沉不知其頭痛醫者見其發熱滿口稱為驚風置傷寒表裡於不問惟事鎮墜涼瀉抑遏其表邪不能外出必致延及於三陽太陽傳陽明陽明傳少陽所以有身熱足冷頸項強急頭身俱熱面目紅赤獨搖頭卒口噤背反張手足搐搦眼目斜視此則三陽經之全痙幼科所稱四證八候者即此也斯時正宜循經用藥解去三陽之邪其病霍然而起倘舍此不圖邪必自三陽而入於三陰發熱腹痛四肢傴僂能俯不能仰已成陰痙凶危之候猶以慢驚風稱之風藥亂投死將旋踵哀哉此即前諸家所云急驚涼瀉而不愈或與吐下藥太過變為慢驚者即此例也按傷寒之來豈初日便能變痙由醫者誤治致之耳蓋邪自太陽而入太陽之脈上起於頭中行於背下至於足因其經脈受邪榮衛澀滯則頭項背足皆有痛楚牽強之象幼科見此便詫為驚風妄行鎮墜以致邪無所伸而後乃變為痙此際尚不知為誤治所致而反謂小兒固有之證此其所以為誤中之誤也嘗觀夏初明治小兒作搐而死以至三五日不醒者悉用天保採微湯投之而愈其子禹鑄廣傳其方惜無一家發明之致後人莫維其義豫不辭饒舌聊為剖露夫天保採微湯乃敗毒散不換金正氣散升麻葛根湯三方合湊者也其中作用以羌獨走太陽而祛寒發表以蒼前升葛陳朴甘苓走陽明而除濕解肌以芎柴入少陽而和解表裡以桔半枳藿芍藥入太陰而和榮逐飲或問既為三陽表藥何以輒及於太陰曰小兒全藉脾肺為行藥之主此實扶中氣以托邪豈引邪入里之謂耶然其中一十七味並非五金八石三黃四神而能於死中求活者豈疏解之藥可以起死回生乎由從前誤以傷寒作驚治未經發散以致邪閉而死今投疏解以生者亦不過為從前補其闕失耳豈有奇特深義哉第此等之治猶為末著若早循經治療又何至如是凶危始效獵人之羅網四張希庶幾乎一遇苟如鄙刻所集一見小兒發熱昏沉即為之分別有汗無汗有汗者解散肌邪無汗者開通榮衛領邪外出神志自清又何者閉塞昏迷之變耶附血虛寒襲太陽病痙案周虛中曰張景嶽有云太陽血少者多有戴眼反張之證俗醫稱為驚風誤矣蓋太陽經脈起於目內眥上額由後頸下背脊至足小指凡有血虛不能榮養經絡者一著寒邪則收引而急縮理固然也時俗不察往往以豁痰截風之劑耗其血液豈不悖哉此景嶽之特見也豫憶往者張乃媛年五六歲體極瘦削一日群坐忽然顛倒作反弓狀自言樓上有鬼眼目翻騰見白而不見黑幼科群集作驚風治不效已經三日矣觀其人之骨露筋浮明系太陽少血況樓為枯木鬼屬陰邪亦系寒氣傷榮所致乃遵景嶽之言與道翁先生相商榷用厥陰門中當歸四逆湯為主甫投一劑黑睛稍現反弓之狀亦減於是連進三服而安又姻翁高某某乃妾冬月擁爐向火忽然背筋抽引作痛頭足彎後四肢厥逆眼皮吊起不能下亦用前湯倍加當歸大劑煎服一劑而痊可見先生之力闢驚風確乎不謬而太陽之痙又有血虛體弱之不同也痙有剛柔剛痙無汗柔痙有汗小兒剛痙少柔痙多而且肌膚薄腠理疏不勝發表惟宜解肌治痙當以金匱為主奈金匱之方未敢輒用而世人亦不能用今之所選獨海藏五方金匱一方雜選一方附血虛寒襲一方以為嬰兒病痙之準則其隨機應變又在後賢神而明之豫又何敢以拘入方海藏桂枝葛根湯治傷風項背強身熱自汗柔痙此蓋邪在太陽微兼陽明用此方通其榮衛則外受之邪有出無入其所全甚大嫩桂枝一錢白芍藥一錢五分粉乾葛一錢五分老生薑一錢大紅棗三枚炙甘草一錢水煎熱服仍欲微似有汗庶風邪自出而汗孔自閉但不可令其大汗致傷榮氣海藏桂枝加川芎防風湯治發熱自汗柔痙比前方藥性輕微嫩桂枝一錢五分白芍藥二錢北防風一錢正川芎一錢老生薑一錢大紅棗三枚炙甘草一錢水煎熱服豫按此方不特治痙凡小兒外感初起發熱不論有汗無汗皆宜用之效捷桴鼓人所未識海藏柴胡加防風湯治汗後不解乍靜乍躁目直視口噤往來寒熱此證太陽陽明已罷邪尚未解傳入少陽半表半裡故以小柴胡湯加防風和解之不使之入里也官揀參七分北柴胡一錢片黃芩一錢製半夏一錢北防風一錢炙甘草五分老生薑三片大紅棗一枚水煎熱服海藏防風當歸湯治發汗過多發熱頭面搖卒口噤背反張者太陽兼陽明也宜去風養血速救陰榮以靜勝躁也北防風一錢五分當歸身二錢正川芎一錢大生地一錢五分淨水煎熱服金匱栝蔞根桂枝湯治太陽頭痛身熱身體頸項俱強無汗為剛痙此即先因傷風自汗汗多衣濕濕久寒生反而入內故謂重感寒濕寒濕內閉反令無汗故見以前諸證此榮衛閉塞也設不用此通其榮衛則未痙者成痙已痙者難愈矣栝蔞根一錢五分嫩桂枝一錢白芍藥一錢五分老生薑一錢大紅棗三枚炙甘草一錢水煎熱服榮衛既和微汗而解豫按小兒發熱身體頸項俱強在幼科必以為驚風矣孰肯認為太陽陽明之病痙而用此開通榮衛之方若早知為傷寒能用此方則未痙者不痙已痙者可瘳其如偏執驚風舍太陽陽明之邪而不治反攻其無過之心火肝風致令外邪愈強內氣愈弱不至於死地不止也凡小兒傷寒無汗者不論已痙未痙皆當以此方為主出入加減斷無不效之理豫非親履實踐必不敢妄言以誤世也羚羊角散治剛痙身熱無汗頭項強直四肢疼痛煩躁心悸睡臥不寧羚羊角屑真犀角屑北防風白茯神陳枳殼大麥冬去心官揀參粉乾葛北柴胡熟石膏炙甘草以上各七錢五分真龍齒煅二錢五分上研粗末每用三錢水一盞煎至半盞去渣溫服不拘時豫按此證先由風寒濕閉其腠理不能開通內出之氣壅而為熱則風寒濕不能自強皆化而為熱矣尚在肌肉之間猶未入里故以辛涼解散之實治熱也非治風寒濕也嘉言謂此方治傷寒陽痙深得清解之法海藏附子散治陰痙手足厥冷筋脈拘急汗出不止頭項強直頭搖口噤此由多汗亡陽也青化桂七分川附片七分漂白朮一錢五分正川芎一錢川獨活八分大紅棗五枚水煎溫冷服當歸四逆湯治小兒血虛體弱寒邪傷榮以致眼目翻上身體反張蓋太陽主筋病故也當歸身嫩桂枝杭白芍以上各三錢川木通炙甘草以上各二錢北細辛一錢大紅棗五枚水煎熱服以上所選之方原為誤搐病痙而設其下類搐十條證候不同各隨本門用方不得與誤搐混同論治曰類搐即幼科所云驚風餘證者是也原非小兒固有由遷延而致豫故名為類搐何以言之蓋暑證瘧痢咳嗽丹毒瘡痘霍亂客忤中惡其證顯然可見但能識證詳確則一藥可愈醫者審視不的藥罔對證遷延時日其熱愈甚小兒陰血未充不耐壯熱熱盛則神志昏悶陽亢必津液受傷血不榮筋則手足搐掣此正與內經之諸熱瞀瘛瞀音務人事昏悶也瘈音翅手足抽掣也皆屬於火之例相符概將以下十證皆列類搐條下仍逐證注明各依本門用方庶與誤搐非搐之寒熱虛實治不相淆矣暑證經曰太陽中熱暍是也其證初起面垢身熱自汗煩躁不安唇舌皆赤氣出如火小便赤澀口中大渴此證常見夏秋按此條在藜藿之兒多有之以其坐臥烈日之中澡浴寒澗之內以致暑氣入里內熱外寒故見以前諸證醫者見其身熱自汗口渴煩躁疑為驚風妄用風藥反燥其血以致心中噎悶昏不知人甚則反張搐搦皆由血不榮筋煩熱過甚之故也若膏粱之兒不涉長途不經酷日暑證尚少何有暑風若謂高堂廣廈口餐生冷身納風涼而得之者即傷寒之類又何暑之可稱古人謂暑傷心其實心不可傷傷之必死蓋心為君主之官虛靈湛寂神性居之邪不易犯止因六氣之中以暑配君火故曰暑傷心然所犯者心包絡耳包絡為心之宮闕捍蔽外邪不容輕侮惟由暑熱搖撼外郭故神志為之昏惑但瀉其太陽丙火則少陰君主神志自寧矣宜卻暑丹入方卻暑丹治小兒傷暑誤用風藥致心神昏悶煩躁不安甚則搐搦漂白朮五錢白茯苓五錢潔豬苓五錢宣澤瀉五錢青化桂二錢片黃芩五錢正川連三錢鏡辰砂二錢炙甘草五錢上為細末煉蜜為丸如芡實大每服二三丸量兒大小加減麥冬湯化服或十中取一煎服亦可瘧疾經曰夏傷於暑秋必痎瘧其證初起呵缺頓悶發熱口渴面帶黃白頭額有汗一哭汗出其熱漸退二三分不久復熱如故喉內痰鳴一哭即嘔嘔則痰出每日如此者即瘧證也按內經謂十二經皆有瘧究其所因而大要不離乎少陽膽經夫瘧之不離乎少陽猶咳嗽之不離乎肺也蓋凡寒熱往來總為少陽所主早能和解表裡分理陰陽則瘧邪霍然而散由其誤認驚風輕施鎮墜以致正邪激搏榮衛遲留陽欲入里陰內阻之陰欲出表陽外遏之少陽欲升不得升太陰欲降不得降乃致精神潰亂臨瘧而搐宜清脾飲解之其搐自止入方清脾飲治小兒熱瘧作搐不必治搐惟治其瘧杭青皮一錢製半夏一錢枯黃芩一錢草果仁五分白雲苓一錢北柴胡一錢真陳皮一錢漂白朮一錢川厚朴一錢炙甘草五分生薑三片大棗三枚水煎熱服痢疾經曰飲食不節起居不時陰受之則入五臟下為飧泄久為腸澼其證初起兩眉皺而多啼由腹痛也煩躁不安由裡急後重也數至圊而不能便或赤白相兼或單紅單白是其候也按此證雖曰內傷飲食莫不由於外感而發也有至妙之治人所不知但以人參敗毒散升散之其病即減設有食飲停滯輕則消導之重則疏通之去其積垢無不愈者昧者不察反投訶蔻止澀之乃致積毒內郁腹痛裡急欲圊不能此通因通用之證而反通因塞用遂爾神昏擾擾者有之矣急用沆瀣丹三仙丹二藥同服疏通之後其病自去入方集成沆瀣丹方見二卷胎病論集成三仙丹治小兒縱口飲啖食物過多有形之物填塞腸胃之間不能轉運傳送脾氣抑鬱所以發熱不退眼閉難開人事昏沉四肢癱軟儼然虛極之象古人謂大實有羸狀即此證也昧者以為虛證而峻補之或疑為驚風而鎮墜之百無一救速以此丸同沆瀣丹同服待其下後人事即清豫救治既多剖心相告痢疾誤用澀藥閉其濕熱比食物有形之塞殆有甚焉速宜下之不下即死五靈脂一兩南木香五錢巴豆仁四十粒上將靈脂木香研為細末聽用以巴豆剝去殼取淨肉四十粒去其肉上嫩皮紙包水濕入慢火中煨極熟取起另以棉紙包之緩緩捶去其油紙濕則另換以成白粉為度謂之巴霜與前二味和勻醋打麵糊為丸緑豆大以硃砂為衣曬乾收貯每服五丸或七丸九丸量兒大小加減合沆瀣丹二三丸同研爛茶清調下待其下後其病立愈此起死回生之藥勿以常方視之咳嗽經曰咳嗽上氣厥在胸中過在手陽明太陰其證初起面赤唇紅氣粗發熱咳嗽痰鳴或眼胞微浮額上汗出此外感風寒急宜疏解按咳嗽致搐其證嘗少蓋外感以咳嗽為輕內傷以咳嗽為重大凡春溫夏熱秋燥冬寒四時正病與夫時行疫癘即至重至危之候但有咳嗽便是生機蓋外感一傳於六經斷不致死故謂外感以咳嗽為輕至於酒色狂蕩之輩平素嗜欲不節耗費過傷但逢咳嗽即為可慮倘治不如法則虛勞肺痿肢足而待故謂內傷以咳嗽為重嬰兒知識未開內傷何有所有咳嗽無非寒熱二者而已矣寒固傷肺熱亦傷肺醫者能的辨其寒熱對證用方效無不捷其如不識陰陽罔分寒熱應辛散者而反涼瀉應滋潤者反用升浮乃致寒者愈寒燥者愈燥欲不聲音不轉眼翻手搐其可得乎治宜集成金粟丹入方集成金粟丹此丸專能疏風化痰清火降氣並治咳嗽上氣喘急不定嗽聲不轉眼翻手搐凡諸家截風定搐之方皆不及此方之聖倘前醫用藥不當誤而致搐昏沉不醒即以全身燈火醒之用此丸一服即痊九制牛膽南星二兩明天麻一兩薑汁炒節白附一兩薑汁炒淨全蠍揀去尾足以滾湯泡淨去其鹽泥曬乾炒一兩明乳香去油淨一兩代赭石火煅紅以好醋淬之煅七次淬七次研細末以水飛曬乾一兩直殭蠶炒去絲一兩赤金箔五十張真麝香三分梅花片三分共為細末煉蜜為丸皂角子大貼以金箔每用一丸薑湯化服此方比抱龍金液保命至寶定命等方功倍十百惟虛寒之痰無根之氣絶脫之證不可用之以其降令重也制南昌法用生南星半斤研極細末盛於碗內取牛膽一枚傾出膽汁於碗內將南星末和勻仍復裝入膽皮之內懸有風無日之處俟其陰乾有膽之時將前膽剖破取出南星研末仍以膽汁和勻裝入懸之能裝過九膽誠為至寶任彼正真牛黃莫能及此且今之牛黃切無真者若市肆膽星一膽而已不可用丹毒千金曰丹毒一名天火皆風熱惡毒所為入腹則殺人其證由心火熾盛熱與血搏或起於手足或發於頭面胸背遊移上下其熱如火赤如丹砂形如錦紋其痛非常凡自胸腹而散於四肢者易治自四肢而入腹者難治按丹毒雖曰風熱而有胎毒之發者十之八九小兒最多方脈無此世有丹毒傷生而不知者蓋此毒每發於隱密之處倘父母不覺遂致傷兒大凡小兒頭面四肢胸背脅腋忽有紅暈一點漸次散開色如錦紋外帶黃色即是火丹速宜砭去惡血內服沆瀣丹庶不致內攻作搐倘醫者不知針砭妄用搽敷逼毒入內必致作搐而死每見丹毒之禍兒者比比矣入方集成沆瀣丹方見二卷胎病論磁鋒砭法法見四卷丹毒證治瘡癰經曰諸痛癢瘡瘍皆屬心火按瘡癤疥癬小兒獨多由胎毒淫火使然也治之者宜清熱解毒使之外出可也倘醫者視為泛常不先內托解毒誤用砒硫毒藥搽之逼毒內入以致瘡忽自平其證腹脹便閉身無血色目閉不開手足動搖此毒氣內攻也此條與方脈之發背癰疽偶傷風濕而手足搐搦角弓反張者大不相侔蓋彼因誤傷風濕而病痙此因誤用搽敷而致搐病因不同治宜各別速服雄黃解毒丸微下之瘡出則吉瘡不出如喘者死入方雄黃解毒丸治瘡瘍毒氣內攻腹脹便閉身無血色目閉不開並能解一切瘡疥之毒更可下痰追蟲打積明雄黃一錢川鬱金二錢巴豆霜一錢上為細末醋打米糊為丸緑豆大每服三五丸白湯送下以利為度痘瘡痘稟先天胎元之毒遇時行而即發其證初起兩眼含淚珠如水晶鼻氣出粗睡中驚惕兩耳紋現惡熱不惡寒痘證也按初起發熱三四日間應與疏通腠理微解表邪使毒氣易出若不行疏散以致腠理固閉熱盛神昏而搐矣此常候也先宜人參敗毒散升散之次用導赤散加硃砂以制其猖撅痘出則吉屢搐者凶收靨後作搐此痘毒倒陷雄黃解毒丸紫草湯下痘復出者吉搐不止者凶五六卷痘疹門論證最詳宜考入方人參敗毒散治四時感冒並痘瘡升散之用川羌活七分川獨活五分北柴胡五分信前胡四分正川芎五分白雲苓五分真枳殼五分芽桔梗五分上揀參三分炙甘草四分姜一片棗一枚水煎熱服導赤散此清心經之熱從小便而出大生地三錢川木通二錢生甘草一錢上作一劑竹葉七片為引水煎臨服加硃砂末一分調服雄黃解毒丸方見先條瘡瘍門附案澻陽文庠立天張君有子三歲於今春布種神痘一夕作搐十數次痘師某者坐守其家莫能得定次早微明張君來寓叩門因訴其作搐之由豫念故人之子往視之見其昏迷不醒手足搐掣各處艾火疤無數問所服藥一派涼瀉豫知其誤治乃以全身燈火醒之即能開聲因用人參敗毒散令其母子同服一劑而搐止痘出可見理之未明毫釐千里蓋痘麻初起全賴陽和升生之氣故發熱本為正候由其不與疏通腠理毒郁不伸乃致作搐此時正宜升散助其生機顧乃反用艾火堵截之用涼藥鎮墜之欲其搐止其可得乎是幼科驚風之說皆此輩釀成之禍於患者何有焉霍亂經曰足太陰厥氣上逆則霍亂其證先傷於食後感風寒邪正相爭心腹絞痛有上吐下瀉者有上不得吐下不得瀉者所以煩躁悶亂其證最急速宜鹽湯探吐之俟其吐瀉之後乃用藿香正氣散分理其陰陽可也但見喘而搐者不治按此乃乾霍亂也俗名絞腸痧由其上不得吐下不得瀉所以抽搐昏亂若上既能吐下既能瀉則宿食痰飲俱去安有昏亂之理若曰大吐大瀉之後而見昏憒此即脫證之例豈作搐之謂耶看書若止隨文解義則執一不化皓首無成然此猶為中人言之也至有全不知書道聽途說訛訛相指以致於誣民惑世者此類醫中盡多昔人謂巫者對本宣科教風掃地豫謂巫者猶能對本宣科而醫中之不肖者即欲宣科更苦幹無本可對然則醫風之掃地不殆有甚乎入方鹽湯探吐法法見二卷霍亂門藿香正氣散治內傷脾胃外感風寒吐瀉霍亂等證藿香梗家蘇葉大腹皮真廣皮芽桔梗白雲苓法半夏六神麯香白芷以上各一錢川厚朴炙甘草各五分上作一劑生薑三片大棗三枚水煎溫服客忤小兒客忤由兒真元不足神氣未充故外邪客氣得以乘之經曰邪之所湊其氣必虛不治其虛安問其餘忤者謂外來人畜之氣忤觸其兒之正氣也或因生人遠來或因六畜暴至或抱兒戲騎牛馬或父母騎馬遠歸未及薰衣即抱其兒則馬汗不正之氣從鼻而入經曰五氣入鼻藏於心肺則正氣受忤此外因之客忤也其證口吐青黃白沫面色變異喘急腹痛反側不安手足瘈瘲第此證神不昏亂為異耳治宜塗囟法搐鼻法內服攝生飲復有內因客忤或兒平日所喜者乃戲而奪之平日所畏者乃戲而恐之凡親愛之人喜食之果玩弄之物心之所繫口不能言一時不得遂逆其心志其候昏昏喜睡寤不惺惺不思乳食即其證也宜先順其心意內服沉香安神丸並惺惺散入方塗囟法專治客忤等證灶心土一錢明雄黃五分真麝香半分共為細末棗肉和勻捏作一餅子照囟門寬窄為樣以餅貼囟上取艾絨作豆大一粒灸三炷即止搐鼻法治傷風傷寒頭目不清並治客忤正川芎藿香葉鮮藜蘆各三錢玄胡索粉丹皮鏡辰砂飛各二錢共為極細末以少許吹鼻中得嚏則邪氣出矣攝生飲治一切卒中大小科同制南星南木香法半夏各一錢半北細辛漂蒼朮石菖蒲炙甘草各一錢上作一劑生薑三片水煎熱服沉香安神丸治內因客忤官揀參一錢漂白朮真廣皮陳枳殼芽桔梗青礞石煅各五錢炙甘草上沉香各一錢鏡辰砂飛一錢真川連一錢五分共為細末蜜丸芡實大每一二丸麥冬湯下惺惺散方見卷二乳子傷寒門中惡此證比之客忤為更甚蓋客忤無非外來人畜不正之氣中惡則中惡毒之氣如老柩荒厝淫祠古樹冷廟枯井敗屋陰溝皆有惡毒之氣存焉小兒觸之從鼻而入肺先受之閉其清道填塞胸中忽然而倒四肢厥逆兩手握拳上氣喘急者是也復有中惡毒之物者亦謂之中惡如菌草河豚瘟牛疫馬自死六畜並水雞蝦蚌之類自口而入則胃腸受之故心腹刺痛腹皮青黑悶亂欲死前後二證俱宜霹靂散搐其鼻令其噴嚏之後毒氣已出然後用藥前證中毒氣死者用返魂湯此中毒物死者用雄黃解毒丸下去之入方霹靂散治中惡卒死並一切卒暴之證豬牙皂三分北細辛五分大川芎五分香白芷五分躑躅花半分明雄黃二分真麝香半分上為極細末每用少許以燈芯三寸長蘸藥點鼻孔內以得噴嚏為驗返魂湯治中惡卒死宜此主之即仲景之麻黃湯也因其毒氣閉塞肺竅以此開通之淨麻黃去節二錢光杏仁去皮七個炙甘草一錢蔥白三寸水一盞煎半盞分數次服雄黃解毒丸方見卷二類搐瘡瘍門一曰非搐即幼科之慢驚風慢脾風者是也按幼科有言曰急驚傳慢驚慢驚成慢脾慢脾者純陰之證也然慢驚亦有虛熱嘗多便祕痰壅氣塞便誤認為實熱妄用巴黃以下痰行便或妄投腦麝以通竅涼臟致使陰氣愈張陽氣愈弱幸不死而成此證又有一名虛風因吐瀉日久風邪入腸乃大便不禁面色虛黃脾氣已脫真元已虧繼此發熱即是慢脾此不必皆由急驚傳至男子以瀉得之為重女子以吐得之為重其候面青舌短頭低眼合吐舌咬牙聲音沉小睡中搖頭四肢微搐冷而不收身則有冷有熱痰涎凝滯神志昏迷沉沉喜睡逐風則無風可逐療驚則無驚可療乃至重之候十難救一二也治法大要生胃養脾回陽益志鎮心定魄化痰順氣若眼半開半合手足不冷二便澀滯此尚有陽證須溫和化痰理氣不可即用回陽然亦不可因陽證而用清涼之藥此僅虛火往來會成如陽證耳在幼科所論者如此豫見此等辨論娓娓其辭自相矛盾乖誤多端惟有拊膝長噓而已孰料幼科譾劣一至此哉既知慢脾為純陰之證又誤以慢驚之虛熱作實熱誤下痰誤通竅乃致變為慢脾又有因吐瀉日久風入腸胃大便不禁面色虛黃脾氣已脫真元已虧繼此發熱即是慢脾如此之候即應急救真元維持竭絶何得以眼之半開半合手足不冷二便澀滯為尚有陽證不可即用回陽籲此淺近之理猶且未明而尚欲立言傳世乎蓋眼之半開半合名為昏睡露睛此脾胃兩傷敗極之證安得目為有餘手足為諸陽之本四時皆宜溫和今手足不冷猶幸有一線微陽牽引接續尚未至於厥逆豈可謂之陽證二便澀滯由其氣血傷敗大腸枯焦無以滋榮傳送又豈裡實便祕之比哉此等之證治之得法尚可挽回而乃稱為陽證為之順氣化痰豈眼之半開半合手足不冷二便澀滯果為陽熱有餘耶抑由痰凝氣滯耶不然化痰順氣將焉用之嗚呼幼科淺陋莫可挽救凡小兒有熱不辨表熱裡熱虛熱實熱陽浮作熱陰極發躁一概稱為陽火今慢脾之熱無非純陰之證真陽被逼不能存貯浮越肌表散漫無歸亡在傾刻即急為收攝斂納猶慮不及而反謂之陽證必欲其口鼻無氣兩眼不開四肢冰雪二便長流始可謂之陰證乎立言者見地如斯繼述者自可知矣豫故於此等之證以非搐名之使知一意挽救不用猜度且亦不須細辨請以幼科夏禹鑄之言以明斯證之誤亦可見豫言之不虛也夏禹鑄曰世人動曰慢驚豫獨曰慢證蓋此證多成於大病之後庸工一見病愈遂不防守去路或初誤汗誤下吐瀉久而脾胃虛極故成慢證慢字緩字雖對急字而言然所以成此證者亦由於父母怠慢之故或有汗多不止者聽之吐瀉不止者聽之以致汗多亡陽吐久亡胃瀉久絶脾成難起之證故曰慢證慢證何驚之有以慢證而云驚皆屬庸醫見兒眼翻手搐握拳形狀似驚故以驚名之一作驚治或推或拿或火是猶兒以下井而復落之以石也慢證者脾虛也眼皮屬脾脾敗故眼皮不能緊合而睡則露睛虛則脾失元氣故兩目無神而漂泛脾敗則枯涎無統故凝滯咽喉而有牽鋸之聲手足為脾胃所司脾胃敗故四肢厥冷虛必生寒寒則大便瀉青而小便清利便知為慢脾之候若療驚則無驚可療祛風則無風可祛除痰則無痰可除解熱則無熱可解惟脾間枯痰虛熱往來耳治此或以六君子湯加炮姜或理中湯加附子此夏氏之見超乎流俗申明慢驚慢脾一皆竭絶之證而療驚祛風除痰解熱之治毫不可用先得我心之所同然者今以夏氏所云吐瀉脾敗之證列之於前復以景嶽所云大驚卒恐次之歸於非搐條下以見此等之證總非風搐庶不乞靈顱囟枉害無辜也以上治法悉依夏氏張氏原方豫毋容復贅吐瀉經曰少陽所至為湧嘔又曰春傷於風夏生飧泄其證先傷乳食後感風邪乃致脾胃受傷吐瀉不止漸至遍身四肢口鼻俱冷手足微掣昏睡露睛蓋小兒全賴乳食以為命吐多則乳食不入瀉多則乳食不藏吐則傷氣瀉則傷血乳食既絶氣血復傷速救真元以免竭脫入方六君子湯治小兒吐瀉之後脾胃大傷或大病之後不思乳食一切久病中氣虛寒並皆治之官揀參一錢漂白朮二錢白雲苓一錢五分法半夏五分真廣皮五分炙甘草一錢四肢厥冷加炮姜甚者加附子五分手足搐掣加青化桂七分鉤藤一錢上作一劑煨姜三片紅棗三枚早米一撮水煎溫服理中湯方見卷二乳子傷寒證治大驚卒恐幼科以此為急驚故詳辨明之張景嶽曰小兒忽被大驚最傷心膽之氣內經口問篇曰大驚卒恐則氣血分離陰陽破散經絡厥絶脈道不通陰陽相逆經脈空虛血氣不調乃失其常此內經概言受驚之病有如此矧小兒氣血尤非大人之比若受大驚卒恐則真神氣失散憒亂不堪尚何實邪之有斯時也收復正氣猶恐不暇顧可復為清散耶即如硃砂琥珀之類不過取其鎮墜之意亦非救本之法今幼科諸書皆以大驚之證例作急驚誤亦甚矣不知急驚由於風熱慢驚由於脾腎之虛皆不必由驚而得余之千言萬語闢除驚風只消景嶽二十三字便以道盡後賢若肯於此數語體認更不必豫之瑣瑣於斯也而此以大驚致困者本乎心膽受傷神氣陡離之病當以收復神氣為主宜祕旨安神丸團參散獨參湯之類加金銀等物煎服之入方祕旨安神丸原治心血虛而睡中驚惕並治大驚卒恐官揀參淨棗仁白茯神法半夏以上各一錢大當歸杭白芍小橘紅各七分北五味七粒炙甘草五分上為細末煉蜜為丸如芡實大每服一丸生薑湯化下團參散治心虛血熱自汗盜汗並治大驚卒恐官揀參白當歸等分上為細末用獖豬心一個切作三片每以藥末一錢用豬心一片煎湯調服獨參湯治氣虛氣脫神散魂離以此亟救元陽神草還丹之名誠不愧也官揀參不拘多少同炒米煨薑紅棗濃煎湯徐徐服之實有起死回生之力或曰傷寒病痙與非搐二條不可用驚風之治已聞命矣而類搐十條既為火熱何以不用驚風門中截風定搐涼瀉鎮墜之法治之此何意也曰暑瘧嗽痢痘霍亂丹瘡病雖不一而搐由病致第尋其源治其病而搐自止若不去病而用截風定搐涼瀉鎮墜之治作抑遏其病邪非但搐不能止必致變生他證醫者復不察其本病未去疑為驚風症重藥不去病而用毒劣劫奪之者每見治驚風愈治愈危乃至不救者皆此弊也曰由談驚風而得治病求源之要誠至論也請筆之以為來學式以上誤搐類搐非搐證共一十四條即幼科之急驚慢驚慢脾者盡止於此業已條分縷晰逐款逐條注明矣臨治者當知各證之病源有別而治療之攻補自殊不得復以急驚慢驚慢脾混同立論而以截風定搐之死法統治之從前未經剖露猶謂陷於不知今已證治判然惟祈後賢留心討論神而明之醫稱仁於是乎不相遠矣附小兒時疫證治吳又可曰凡小兒感冒風寒瘧痢等證人所易知一染時疫人所難窺所以耽誤者良多蓋幼科詳於痘疹吐瀉驚疳並諸雜證在傷寒時疫甚略之一也古人稱幼稚為啞科蓋不能盡罄所苦以告師師又安能悉夫問切之義所以但知其身熱不知其頭疼身痛但知其不思乳食心胸膨脹疑其內傷乳食安知其疫邪傳胃也但見嘔吐噁心口渴下利以小兒吐瀉為常事又安知其協熱下利也又何暇致思為時疫二也小兒賦質嬌怯筋骨柔脆一染時疫延捱失治即便兩目上吊不時驚搐肢體發痙十指勾曲甚則角弓反張必延幼科正合渠平日學習見聞之證因多誤認為慢驚風遂投抱龍丸安神丸竭盡驚風之劑轉治轉劇因見不啼不語又將神門眉心亂灸艾火雖微內攻甚急兩陽相搏如火添油死者不可勝計深為痛憫今凡遇地方疫毒流行大人可染小兒獨不可染耶但所受之邪雖一因其氣血未足筋骨柔脆故所現之證為異耳務宜求邪以治故用藥與大人倣佛凡五六歲以上者藥當減半一二三四歲者四分之一可也又腸胃柔脆少有差誤為禍更速臨證尤宜加慎入方太極丸凡疫癘流行之時小兒作熱即是時疫乍有眼目上竄角弓反張手足搐掣不可誤認驚風但以時疫之治自愈天竺黃五錢膽南星五錢酒大黃二錢直殭蠶三錢真麝香二分梅花片二分共為細末端午日午時修合煉蜜為丸如芡實大硃砂為衣凡遇疫證薑湯化服一丸神效癇證錢仲陽曰小兒發病因氣血未充神氣未實或為風邪所傷或為驚怪所觸亦有因妊娠時七情驚怖所致若眼直目牽口噤流涎肚膨發搐項背反張腰脊強徑形如死狀終日不醒則為痙矣按仲陽之說亦明知有痙病而謂終日不醒者為痙不知痙病為三陽表證據幼科所稱驚癇為心肝脾肺之裡證今反以表病腑病為重里病臟病為輕經脈行於皮膚肌肉者為重經脈行於內臟貫膈者為輕邪傷傳導之腑為重邪傷神明之臟為輕顛倒背謬令人不解仲陽尚為此言又安保後人之不訛傳也萬密齊曰癇者卒然而倒四肢強直目閉或眼珠翻上不轉口噤或有咬其舌者口中涎出或無涎者面色或青或白面色或青或白後賢仔細著眼或作六畜聲其狀不一乃小兒之惡證也昏暈一時即醒如常矣其發也或以旬日計或以月計或以歲計古人有三癇五癇之名證治太多似無一定之說故後學不知其所從也凡治癇之法幼科所載其方甚多而無可取者惟豫家祕新方名斷癇丸誠治癇之神方也豫按密齊之說不為無見乃私心竊喜賴有斯人為之砥柱及考其斷癇之方則皆寒涼攻伐鎮墜毒劣之藥豫又以為不盡然焉夫癇者痼疾也非暴病之謂亦由於初病時誤作驚治輕施鎮墜以致蔽固其邪不能外散所以留連於膈膜之間一遇風寒冷飲引動其痰倏然而起堵塞脾之大絡絶其升降之隧致陰陽不相順接故卒然而倒病至於此其真元之敗氣血之傷瞭然在望挽之不能猶認作此中之邪無異鐵石非攻堅破壘不足勝其冥頑嗚呼以嬌嫩虧歉之體而猶入井下石豈司命慈幼之心哉因録原方以正其惑斷癇丸此方重墜寒涼毒劣用之增困川黃連青礞石石菖蒲辰硃砂蚌珍珠鐵華粉膽南星白甘遂上沉香白茯苓別以人參一錢白朮三錢煎湯煮糊為丸豬心湯下通心丸本非心病何用通心伐及無辜未可為訓辰硃砂馬牙硝明雄黃真麝香白附子陳枳殼正川芎白茯苓揀人參川黃連金銀箔蜜丸麥冬湯下此即所謂斷癇丸也豫謂此等之見似未離乎幼科習氣夫病至於癇非稟於先天不足即由於攻伐過傷每見癇兒無不肌肥面白神慢氣怯即萬氏亦謂面色或青或白豈有青白之兒能任攻伐者乎只因中氣素弱脾不運化則乳食精微不化榮衛而化為痰偶值寒凝即倏然而發豈必心竅有痰而後發哉若果心竅有痰則已懵然一物何以發過清明如故可知非痰迷心竅之證誤作痰迷心竅之治愈攻愈敗愈發愈勤不至於廢棄不止也有識者補救尚虞不暇猶敢以礞石硃砂珍珠鐵粉之重墜傷其心氣以甘遂大毒之物損其心血更加黃連之苦寒敗胃雖有一錢之人參如紅爐點雪後方硃砂牙硝雄黃金箔之類亦猶是也原其意不過謂重墜可以鎮心苦寒可以瀉火毒劣可以攻痰此等治癇無異赧王伐秦救趙而周趙卒為秦並雖理或有說而勢所不能也故豫之治癇從不用治癇之方而十全其十此等之證非用從治之法莫能成功其如幼科諸君枋榆自足高遠厭聞惟知見證治證不知古哲有見痰休治痰見血休治血有汗勿止汗逢熱莫退熱喘生毋降氣精遺勿澀泄之訓此蓋從治之法而幼科視為泛言寄司命之責者固如是乎有見者毫不治痰而痰自不生毫不治癇而癇自不作此其所以為神也入方消風丸凡治小兒諸般癇證先服此丸七服此非治癇之藥用以疏散外感開通經絡庶後藥得以流通故耳南薄荷川羌活川獨活北防風明天麻荊芥穗正川芎北細辛以上俱一錢膽南星二錢上為細末煉蜜為丸重一錢一顆每日一丸薄荷蘇葉湯化服服完七丸方服後藥集成定癇丸治小兒癇證從前攻伐太過致中氣虛衰脾不運化津液為痰偶然有觸則昏暈卒倒良久方蘇此不可見證治證蓋病源深固但可徐圖惟以健脾補中為主久服痰自不生癇自不作矣倘系年深日久者與河車八味丸間服無不愈者官揀參一兩切片焙乾漂白朮一兩五錢切片土炒白雲苓一兩切片薑汁蒸過曬乾真廣皮一兩酒炒法半夏一兩石菖蒲五錢取九節者切片白當歸一兩酒洗曬切青化桂五錢去皮潯桂不用杭白芍一兩酒炒白蔻仁一兩酒炒漂蒼朮一兩用黑芝麻拌炒南木香五錢忌火真龍齒一兩火煅醋淬研末水飛過曬乾取五錢赤金箔三十張鏡面砂三錢研末水飛曬乾聽用上藥各依分兩制過合為一處焙乾研細末篩過煉蜜為丸龍眼核大以硃砂為衣貼以金箔曬乾以瓷瓶收貯每日早午晚各服一丸薑湯化服癇證未久者服此倘年深日久者早服河車八味丸午晚服此無力備參者不用亦可河車八味丸治小兒癇證年深日遠肝腎已虧脾肺不足心血耗散證候不時舉發此證總歸於虛不可以為有餘而攻逐之致成不救但以此丸早服以救肝腎前定癇丸午晚服以寧心健脾生肺則萬舉萬全真神治也紫河車一具頭生男者用白礬煎湯揉洗極淨用薑汁同酒煮爛大地黃三兩薑汁砂仁同酒煮爛淨棗皮一兩炒乾粉丹皮五錢酒炒宣澤瀉五錢鹽水炒乾嫩鹿茸二兩切片炒乾白雲苓一兩五錢乳汁蒸曬懷山藥一兩五錢酒炒川熟附七錢五分切焙乾燥青化桂七錢五分去粗皮研北五味一兩去梗炒乾大麥冬一兩去心糯米拌炒上藥依法炮製和為一處焙極干研為細末煉蜜為丸龍眼核大每早一丸用淡鹽湯化服以飲食壓之午及臨臥各用前定癇丸一服幼科預宜修制應用丸粟七方消風丸凡疏通腠理清解表邪啓發皮毛流利經絡病之初起者用之方見卷二癇證門集成金粟丹凡開關通竅下氣利痰醒昏定痙一切危急者用之方見卷二咳嗽門集成沆瀣丹音亢械凡導滯清熱降火利膈解胎毒去積熱通利二便用之方見卷二胎疾門瀉青丸凡退熱平肝清表裡定痙搐解煩退熱表裡兩急者用之方見卷四啼哭門理中丸凡脾虛中寒面青腹痛寒嘔寒瀉四肢厥冷一切虛寒者用之方見卷二乳子傷寒之理中湯加增分兩炒研蜜丸即理中丸三仙丹凡飲食過多有形之物填塞中焦及痢疾大便不通一切宜攻下者用之方見卷二痢疾門太極丸凡遇年歲疫癘流行小兒發熱昏沉甚則作搐者時疫也宜用此方見卷二小兒時疫門以上七方皆宜預為修制以備急需凡古方截風定搐之藥無所用之不必留意乳子傷寒證治幼科謂小兒八歲以前無傷寒不知此語出於何經夫寒風暑濕燥火為六氣政令乃陰陽代謝之機豈傷人之物只因人之臟氣不足者各從其類而翕受之因其偏受而致病所以謂六淫之邪其來自天決無擇人而入之理今謂小兒八歲以前無傷寒不知寒邪不傷八歲以前之幾乎抑八歲以前之兒不受寒邪之傷乎若謂八歲以前天癸未足則八歲以後天癸仍未足則應云十六歲以前無傷寒又何獨以八歲為言哉夫癸腎內藏真陽與膀胱為表裡今癸水真陽未足則王水清寒故寒邪之來各從其類竟趨太陽寒水之經以寒召寒誠莫能御所以小兒傷寒為最多今謂其無傷寒不幾令小兒之病傷寒者束手待斃皆死非命乎非小兒無傷寒因其榮血未充易於生熱治之不當即變而為痙幼科指為驚風者即此是也然小兒傷寒貴於急治但不宜發表由其肌膚薄腠理疏恐致汗多亡陽若能於初起之時即為解肌祛其表邪從外而出則必無變痙之虞矣或曰傷寒同一病耳而乳子與小兒治各有異何也曰乳子筋骨柔脆不耐傷寒初入太陽即人事昏沉渾身壯熱筋脈牽強醫不詳辨誤認驚風其禍立至所以乳子傷寒貴於急治故辨證不繁用方宜簡若遷延時日則無力耐之矣是以與小兒之傳經論治者緩急不同其證初起男體重面黃而帶慘色女面赤而帶慘色喘急惡寒口中氣熱呵缺頓悶項急者是也如惡風寒心偎藏其身於母懷者是藏頭伏面此謂表證可與解肌桂枝防風湯如惡熱出頭露面揚手擲足煩渴便祕掀衣氣粗是為里證略疏通之小柴胡湯加大黃中病即止如頭額冷手足冷口中氣冷面色暗淡大便瀉青此為陰證裡虛當救其里宜理中湯如大熱大渴自汗此表裡實熱宜和解柴胡白虎湯清之又有先傷風寒後傷飲食或先停飲食後感風寒名夾食傷寒其證壯熱頭痛噯氣腹脹大便酸臭留連不解大柴胡湯下之體素弱者猩猩散入方桂枝防風湯治半周一歲以至三五歲幼兒傷寒初起惡寒發熱體重面黃或面白喘急口中氣熱呵缺頓悶速以此方解散肌肉之邪此方有汗能止無汗能發不致過汗亡陽為幼科解表之第一方嫩桂枝一錢半杭白芍二錢北防風一錢半老生薑一錢大紅棗五枚炙甘草一錢上作一劑水煎熱服有痰加北芥子一錢有嘔吐加陳皮半夏各一錢熱多加柴胡一錢胸緊氣急加枳殼桔梗各一錢小柴胡湯加大黃治小兒裡熱惡熱出頭露面揚手擲足煩渴燥糞掀衣氣粗微利之官揀參七分北柴胡一錢半片黃芩一錢法半夏一錢炙甘草五分錦莊黃一錢生薑三片紅棗三枚為引水煎熱服理中湯治陰證裡虛頭額冷手足冷口中氣冷面色暗淡大便泄青官揀參一錢漂白朮二錢炮薑炭一錢五分炙甘草一錢大棗三枚為引水煎濃涼冷服柴胡白虎湯治表裡皆熱大熱大渴自汗官揀參一錢熟石膏二錢淨知母一錢北柴胡一錢炙甘草一錢合一劑用早粳米一撮為引水煎熱服大柴胡湯治夾食傷寒其證壯熱頭痛噯氣腹脹大便酸臭延綿不解北柴胡一錢五分錦莊黃一錢法半夏一錢赤芍藥一錢小枳實一錢二分生薑三片大棗一枚為引水煎熱服惺惺散治小兒真元不足氣血怯弱內傷外感熱不能受官揀參一錢漂白朮一錢五分白雲苓一錢白芍藥一錢芽桔梗一錢天花粉一錢酒炒北細辛五分正川芎一錢北防風一錢生薑三片紅棗三枚為引水煎熱服小兒傷寒類治出程鳳雛慈幼筏帝曰人傷於寒而傳為熱何也岐伯曰夫寒盛則生熱也帝曰今夫熱病者皆傷寒之類也小兒八歲以後氣血充足經脈完固傷寒與大人同治仍自表達里先皮毛次肌肉次筋骨腸胃絲毫不爽其始也先從太陽寒水一經有惡風惡寒頭痛脊強等證寒鬱皮毛是為在表脈浮緊無汗為傷寒麻黃湯發之得汗而解脈浮緩有汗為傷風以桂枝湯散之汗止而解疏太陽經在最外一層故邪入皮毛即先傷之皮毛不能傳變由太陽之絡脈傳入本經而後內入諸經也邪客皮毛即玄府閉汗孔也人身臟腑之氣無刻不與外氣通通故和暢玄府閉則內氣不能發泄而生熱非風寒能變熱也此時但發其皮毛玄府開而邪隨汗散矣麻黃桂枝汗皮毛之方非解中之藥也若表不解熱積而日甚從本經反而之內及各經之井榮俞合交會之處則熱傳於他經而各經並見矣經脈所出為井所溜為滎所注為俞所入為合十二經脈莫不皆然太陽既罷無頭痛惡寒脈又不浮為表證罷而在中乃陽明少陽之間脈不浮不沉而在乎肌肉之間皮毛之下然有二焉若微洪而長陽明脈也外證鼻乾不眠用葛根解肌脈弦而數少陽脈也外證脅痛耳聾口苦寒熱往來以小柴胡湯和之蓋陽明少陽不從標本從乎中治若有一毫惡寒邪尚在表雖入中還當兼散邪疏肌肉不能傳變肌肉之中皆經絡也經絡謂之中里則臟腑表則皮毛臟腑之氣血惟經絡傳達外邪之壅熱亦惟經絡傳變故陽明少陽皆從中治中者經病也非胃與膽病也陽明屬胃少陽屬膽皆外之經絡受病非內之胃與膽病也經病用和解必由汗散然非開發皮毛之法矣蓋邪初客表經中陰津受傷但啓其毛竅而汗自通及熱傳中經血液燔灼竅雖啓而汗為熱隔不能外達庸工不知尚用風熱之藥以發其表益助熱而耗陰汗源乾涸究竟不得汗而斃者多矣仲景和解只清解熱邪而津液自存陰汗既充湧出肌表而外邪自然煥散此養汗以開玄府與開玄府而出汗者迥乎不同也邪在陽明則解肌邪在少陽則和解然病猶未退既為傳裡實熱脈不浮而沉按之筋骨之間所謂陽明胃腑病也與經病不同陽明經病已罷至此傳入於胸中之胃腑矣若脈沉實有力外證不惡風寒而反惡熱譫語大渴六七日不大便皆腸胃燥實致之輕則大柴胡湯重則三承氣大便通而熱退矣疏熱邪入里驅出為難故就大便通泄從其近也得汗而經邪從汗解非汗為害而欲驅之也便矢而腑邪從矢出非矢為難而欲攻之也矢與糞同醫不察此但知消克瀉下之法始終禁絶飲食求一便矢為能事殊可笑矣寒邪直入三陰之經名曰直中乃三陽主氣衰無熱拒寒也故初起即手足厥冷或戰栗蜷臥不渴或腹痛嘔吐泄瀉或口吐涎沫面如刀刮不發熱而脈沉遲無力此不從陽經傳入同治之例更當外證何如輕則理中湯重則姜附湯四逆湯治之疏傷寒者由皮毛經絡而後入臟腑初雖惡寒發熱而終為熱證其人必素有火者直中臟腑始終惡寒而並無發熱等證其人必素無火者一則發表攻裡一則溫中散寒兩途判然明白證有反常者如發熱面赤煩躁揭去衣被飲冷脈大非陽證乎然投涼藥而死者何也內有伏陰也切其脈不論浮沉大小必指下無力按之筋骨之間皆然甚者服一切茶湯及藥皆吐此陰盛格陽乃白通湯加人尿豬膽汁證仲景將傳經直中並論正謂有陰證似陽陽證似陰耳如太陽證頭疼發熱當脈浮而反沉又似少陰矣故用麻黃附子細辛湯少陰證脈沉應無熱而反發熱又似太陽矣須用甘草乾姜附子湯陰證四肢厥逆而陽證亦有厥逆此四逆湯與四逆散不同也陰證下利陽證亦有漏底此理中湯與黃龍湯不同也傷寒總括五法一曰發表其證脈浮發熱身痛惡寒脊項強氣喘咳嗽頭痛四肢拘急口舌和脈不沉口不渴大小便如常方主麻黃桂枝青龍之屬一曰解肌脈尺寸俱長目痛鼻乾漱水不欲咽方主葛根湯升麻葛根之屬一曰和解脈不浮不沉往來寒熱嘔吐脅痛胸前脹滿耳聾頭汗盜汗目眩口苦方主小柴胡大柴胡之屬一曰攻裡脈至沉而有力潮熱惡熱腹痛下利轉失氣手足心腋下有汗出咽乾齒燥目不明譫語發狂小腹滿下利清黃水不得眠小便多自汗外證頭痛發熱俱罷方主白虎小承氣六一順氣之屬一曰救里脈沉無力下利清穀小便清長四肢厥冷嘔吐清水涎沫背惡寒蜷臥多眠囊縮爪甲青吐蛔乾嘔舌卷手足拘急身體痛如被杖方主理中四逆真武白通之類入方麻黃湯治太陽經寒傷榮發熱無汗惡寒淨麻黃嫩桂枝光杏仁炙甘草各等分水煎熱服得汗而解桂枝湯治太陽經風傷衛發熱自汗惡風嫩桂枝一錢五分杭白芍二錢老生薑一錢五分大紅棗五枚炙甘草一錢水煎熱服仍得微汗不可大汗大青龍湯治太陽證見風脈淨麻黃熟石膏各三錢嫩桂枝一錢光杏仁五枚炙甘草四錢老生薑一片大紅棗一枚水煎溫服惟恐汗多太陽證而見風脈是有頭痛身熱無汗惡寒但脈不緊而緩為傷寒兼中風之候故合麻黃桂枝用之風寒外盛則人身之陽郁為內熱石膏所以加也曰大青龍言其行雲致雨之速然苟不善用則亡陽之禍變為筋惕肉瞤矣可不慎哉小青龍湯治表不解心下有水氣乾嘔或咳或噎或喘淨麻黃嫩桂枝白芍藥製半夏以上各一錢二分炙甘草白乾薑北細辛各五分北五味十二粒水煎溫涼得所徐服表不解者頭痛身熱尚在也渴時飲水過多故心下有水氣咳噎喘者水寒射肺也有聲無物曰乾嘔此方麻桂草發表夏辛姜散水氣芍藥和陰血五味收肺氣所謂青龍者東方木神主發育萬物之義葛根湯治陽明胃經目痛鼻乾不眠粉乾葛一錢五分赤芍藥嫩桂枝炙甘草各六分淨麻黃去節一錢鮮蔥白三莖老生薑一片大棗一枚淨水煎熱服如惡寒加麻黃惡風加桂枝如正陽明腑病不惡寒有汗而渴當用白虎湯升麻葛根湯治邪在陽明經無汗惡寒發熱緑升麻粉乾葛赤芍藥炙甘草淨水煎熱服此方疏表去寒和血調氣故為痘家之用惺惺散方見前乳子傷寒門小柴胡湯治少陽膽經耳聾脅痛寒熱往來口苦北柴胡三錢官揀參片黃芩法半夏炙甘草各一錢生薑一片大棗一枚為引水煎服按此經無出入之路不可汗下止此湯和解之如兼陽明證本方加葛根芍藥如尚有惡寒等證用大柴胡湯太陽經表之表也行身之背陽明經表之裡也行身之前少陽經半表半裡也行乎兩脅之旁過此則少陰太陰厥陰俱入臟為里大柴胡湯治表症未除里證又急汗下兼行北柴胡一錢五分片黃芩一錢白芍藥一錢法半夏八分錦莊黃七分小枳實四分老生薑三片大紅棗一枚水煎空心熱服白虎湯治身熱大渴而有汗脈洪大者無渴者不宜熟石膏三錢淨知母二錢炙甘草一錢晚粳米一撮淨水煎濃熱服邪入於裡內有實熱故惡熱熱越故有汗里燥故有渴邪盛故脈大邪在陽明故脈長白虎者西方金神也名此者欲秋金之令行而夏火之炎息耳此暑月熱病發熱正方石膏寒中之藥淡而辛能汗能利必其人有大汗而渴齒燥脈洪長可用若無汗脈虛而不洪長或重按全無雖壯熱口渴象白虎證此脾胃氣虛元陽不足誤服必死調胃承氣湯治太陽陽明不惡寒反惡熱大便祕結而嘔日晡潮熱錦莊黃三錢白芒硝二錢炙甘草一錢生薑五片水煎熱服大承氣湯治陽明太陰譫語五六日不大便腹痛煩渴並少陰舌乾口燥日晡發熱脈沉實者錦莊黃五錢川厚朴二錢小枳實二錢白芒硝三錢老生薑五片用水煎滾熱服小承氣湯治六七日不大便腹脹滿悶病在太陰無表證汗後不惡寒潮熱狂言而喘者錦莊黃三錢川厚朴二錢小枳實二錢淨水煎濃滾熱服桃仁承氣湯治外證已解大便黑小便利為瘀血證錦莊黃二錢五分白芒硝一錢五分嫩桂枝一錢光桃仁十粒炙甘草一錢水煎滾熱空心服凡用三承氣者須以手按病人自胸至小腹果有硬處手不可近又看其舌之燥滑何如然後分別當急下者宜大承氣湯可少與者宜小承氣湯宜微和胃氣者調胃承氣湯此以仲景聖法用之也小建中湯治傷寒腹中急痛陰陽相乖嫩桂枝一錢白芍藥二錢炙甘草一錢新餳糖五匙老生薑五片大紅棗三枚淨水濃煎半飢服陰證腹痛不大便桂枝芍藥湯腹痛甚桂枝大黃湯腹痛自利小便清白宜四逆理中黃耆建中湯治傷寒汗後身痛脈遲弱者炙黃耆一錢五分炒白芍二錢青化桂一錢炙甘草一錢老生薑五片大紅棗五枚煎好入餳糖三匙再煎一沸服若微溏泄者或嘔者皆不用汗多耗損陰氣不能榮養筋骨故痛陽虛故脈遲汗後故脈弱此乃建立中氣使生長榮衛通行津液則表不虛而身痛自愈理中湯治太陰即病自利不渴寒多腹痛人參片二錢漂白朮三錢炮乾薑一錢炙甘草一錢淨水濃煎溫涼徐服真武湯治汗發過多心下悸頭眩身瞤振振欲劈地者熟附片白芍藥白雲苓各二錢漂白朮一錢五分老生薑二錢淨水濃煎溫涼得中服心亡津液腎氣欲上而凌心故悸汗多亡陽虛邪內動故眩瞤欲劈地真武者北方之神能司水火不使蛟龍起陸者也白通湯治少陰下利無脈熟附子三錢白乾薑一錢五分鮮蔥白三莖淨水濃煎冷服少陰主禁固二便寒邪居之則失其權矣故下利蔥白所以通陽氣也姜附所以散陰寒也能散能通差足盡少陰之職服此湯利不止復厥逆無脈乾嘔而煩即加童便半杯豬膽汁五匙服之脈微續者生脈暴出者死麻黃附子細辛湯治少陰病始得發熱脈沉淨麻黃三錢熟附片三錢北細辛一錢淨水煎濃溫冷服病發於陰當無熱有熱者乃太陽經表裡相傳之證也少陰虛則太陽之邪由絡直入其不盡入者留為表熱故用麻黃以發汗辛附以溫中中外互攻而賊邪自服矣四逆湯治陽氣亢極血脈不通四肢厥逆在臂脛之下若陰證則上過乎肘下過乎膝矣北柴胡白芍藥小枳實炙甘草等分淨水濃煎遠熱服陽邪傳入於陰里有結熱陽不能伸於四末故四逆而不溫用枳實所以破結氣而除裡熱用柴胡所以升發真陽而回四逆甘草和不調之氣芍藥收失位之陰夫傷寒以陽為主四逆則有陰進之象若用苦寒下之必致陽益虧失故用此方甘草瀉心湯治厄逆脈洪大心火上奔肺不得納炙甘草二錢正川連五分法半夏一錢片黃芩一錢官揀參一錢白乾薑一錢老生薑一錢大紅棗五枚淨水濃煎對人參湯服胃寒厄逆脈微細乾薑半夏丁香柿蒂治之若因失下大便實者小承氣湯治之玄參升麻湯治發癍咽痛黑玄參一錢五分緑升麻一錢炙甘草一錢淨水濃煎熱服陽毒升麻湯治赤癍狂言吐膿血緑升麻一錢五分真犀角一錢鮮射干一錢片黃芩一錢官揀參一錢炙甘草八分淨水濃煎對人參湯熱服陽證誤溫當汗失汗當下失下或下早邪熱入胃或下遲熱留胃中皆致發癍赤者二方可治紫黑必死世有內傷發癍者胃氣極虛一身之火浮游於外宜補以降之此證人多不識桃仁湯治狐惑聲啞光桃仁二十粒槐花子二錢陳艾葉一錢大紅棗三枚淨水久煎極濃空心熱服狐惑者失汗所致食少胃空蟲咬其臟則上唇生瘡為惑蟲食其肛則下唇生瘡為狐其候齒燥聲啞惡食面目乍赤乍白乍黑舌上白苔唇黑四肢沉重喜眠服此須臾以黃連犀角湯清之黃連犀角湯服桃仁湯後服此真犀角三錢正川連二錢肥烏梅四個南木香三分淨水濃煎磨木香沖服雄黃鋭散治蟲食肛狐惑證明雄黃光桃仁干苦參正川連青葙子各等分為末艾汁和勻如小指尖大綿裹納入穀道中日易之牛蒡根湯治發汗不透餘毒在心包絡今瘥後昏沉甚至手足搐搦或寒或熱牛蒡根淨麻黃川牛膝制南星各六錢上為末每服五分好酒調下日三服牡蠣澤瀉湯治前證腰以下浮腫者左牡蠣宣澤瀉甜葶藶天花粉等分上為細末每服一錢米飲調下黃龍湯治發熱不退或寒熱往來北柴胡三錢炒黃芩赤芍藥炙甘草各二錢老生薑三片大紅棗三枚為引水煎熱服傷風證治經曰風為百病之長清淨則肉腠閉拒雖有大風苛毒弗之能害否則天有八風乘虛感襲又曰賊風虛邪避之有時賊風者如立春日起肝木王七十二日西風為賊邪金剋木也立夏日起心火王七十二日北風為賊邪水剋火也立秋日起肺金王七十二日南風為賊邪火剋金也立冬日起腎水王七十二日西南風為賊邪土剋水也三六九十二月脾土每季王一十八日東風為賊邪木剋土也此對衝之風最能傷人然中氣足腠理密者始能無害其所以受邪致病者皆怯弱之體故風邪得以乘之或有不慎而感受者頓然頭痛鼻塞呵缺喘急身熱脈浮者是也蓋肺主皮毛風入皮毛多為咳嗽其指紋紅紫而長外感候也復有傷風自利腹脹而手足冷者脾怯也當與和脾而兼發散有潮熱多睡氣粗嘔吐乳食不消大便黃白而嗽者脾肺受寒不能受納而吐也若傷風多淚脅痛目腫而咳者兼肝證也舌苦面赤汗流而嗽者兼心證也面黃唇腫少食噁心兼脾證也面白眶腫上氣喘急為肺本病也嗽而腰疼者兼腎證也入方人參敗毒散人參無力措辦者不用亦可治小兒四時感冒以及傷風咳嗽凡咳嗽痰不應者每日二服不拘劑數以痰豁為度官揀參五分白桔梗陳枳殼正川芎甘草白雲苓川羌活川獨活信前胡北柴胡北防風荊芥穗各一錢生薑一小片為引水煎熱服忌油脾怯者倍雲苓加懷山扁豆脾肺寒者倍雲苓加白朮懷山藿梗兼肝證倍柴胡加白芍微加青皮兼心證倍獨活加連翹木通兼脾證加六曲山楂麥芽兼肺證倍枳殼加北芥子兼腎證倍獨活傷暑證治經曰因於暑汗煩則喘滿靜則多言體若燔炭汗出而散又曰氣盛身寒得之傷寒氣虛身熱得之傷暑嬰兒之患夏秋為甚蓋火土旺於長夏正當金水受傷稚陽陰微已失天和加之暑熱陽氣浮於外生冷戕於中夏失長養則不能生金而病於暑然有中暑而病者有因暑而致病者雖病有不同而總由於暑故其為病有陰陽二證曰陰暑曰陽暑治由冰炭不可不辨也陰暑者因暑而受寒也凡膏粱之兒畏暑貪涼不避寒氣又或居深堂廣廈或乍熱乍寒之時不謹衣被以致寒邪襲於肌表其證頭痛無汗惡寒身體拘急四肢痠疼此以暑月受寒雖名陰暑即傷寒也治宜溫散五積散清暑益氣湯不惡寒而發熱者人參白虎湯熱退後用調元生脈散補之又有不慎口腹過食生冷瓜果涼茶冷水以致寒涼傷臟而為嘔吐瀉利腹痛等證此亦因暑受寒寒邪在內治以溫中為主加味五苓散不應理中湯陽暑者藜藿之兒有之常在烈日之中坐於熱地之上澡浴寒澗之內其證發熱頭痛煩躁大渴大汗脈洪滑大便乾結小便赤痛者白虎湯脈虛煩渴而少氣者人參白虎湯若眩暈者生脈散兼吐瀉者薷苓湯凡治暑證最當辨其陰陽寒實若外中熱邪內亦煩躁而熱者此表裡俱熱方是陽證治宜清補如前若脈虛無力或為惡寒背寒或為嘔惡或為腹痛泄瀉或四肢鼻尖微冷或不喜涼茶冷水或息促氣短無力以動之類皆陽中之陰證也凡見此類但當專顧元氣四君子為主治或理中湯加芍藥若虛寒甚者則舍時令而從證附桂在所必用切不可因暑熱之名而執用寒涼解暑則禍不可勝言矣入方五積散治陰暑受寒頭痛無汗惡寒身體拘急四肢痠疼以此溫散之香白芷真廣皮川厚朴芽桔梗陳枳殼正川芎杭白芍白雲苓漂蒼朮大當歸製半夏嫩桂枝黑炮姜炙甘草生薑三片紅棗三枚水煎服清暑益氣湯治傷暑煩熱自汗口渴畏寒發熱者官揀參六分炙黃耆一錢漂白朮一錢六神麯五分宣澤瀉五分川黃柏五分杭青皮五分粉乾葛一錢北五味三分炙甘草五分生薑一片大棗三枚為引水煎熱服人參白虎湯治中暑不惡寒而發熱者官揀參一錢熟石膏二錢淨知母一錢炙甘草一錢晚粳米五錢水煎熱服口渴甚加麥冬一錢北五味五分調元生脈散平肝木益脾土瀉邪火補元氣小兒要藥官揀參一錢炙黃耆二錢大杭冬一錢北五味三分炙甘草一錢生薑三片大棗三枚大煎溫服加味五苓散治暑證之要藥也漂白朮二錢白雲苓二錢結豬苓二錢宣澤瀉二錢青化桂一錢藿香梗一錢宣木瓜一錢西砂仁一錢生薑一片大棗一枚燈芯十莖引水煎熱服理中湯治陰暑嘔吐瀉利腹痛官揀參三錢漂白朮三錢黑炮姜一錢五分炙甘草二錢大棗三枚引水煎溫服白虎湯治陽暑發熱頭痛煩躁大渴大汗脈洪實大便祕結小便赤痛熟石膏三錢淨知母二錢炙甘草一錢晚粳米一兩水一碗先煎米熟納後三味同煎滾熱服生脈散固中氣清火熱保肺金官揀參一錢大杭冬三錢北五味七分水煎極濃溫服薷苓湯治陽暑脈虛兼吐瀉漂白朮二錢陳香薷一錢五分白雲苓二錢結豬苓二錢宣澤瀉二錢青化桂一錢白扁豆一錢五分川厚朴一錢炙甘草五分生薑一片大棗一枚燈芯十莖引水煎服四君子湯方見三卷瘧疾門理中湯加芍藥治傷暑腹痛泄瀉即本方加炒白芍藥一錢五分傷濕證治經曰諸濕腫滿皆屬於脾又曰風雨則傷上清濕則傷下是濕之為病有出於天氣者雨露是也有出地氣者泥水是也有出飲食者酒漿生冷是也有出人事者汗衣臥濕如小兒澡浴糞穢衣褓不幹皆是也然所因雖異悉由乎脾氣之虛而辨治之法其要惟二一曰濕熱一曰寒濕盡之矣病而發熱者謂之濕熱病而多寒者謂之寒濕濕熱之治宜清宜利熱去濕亦去也寒濕之治宜燥宜溫非溫不能燥也一濕熱證其證發熱身痛多煩渴小便赤澀大便祕結脈見洪滑方是熱證宜利宜清柴苓湯茵陳飲如果濕熱之甚或元氣壯而兼祕結不通者方可推蕩之集成沆瀣丹一寒濕證惟脹滿泄瀉嘔吐皆寒濕之病也凡小兒喜弄冷水坐臥濕地其證頭痛身重寒熱往來宜胃苓湯如兼嘔吐加藿香砂仁如因中濕浮腫者胃苓湯合五皮湯如不效必用溫補俟陽氣漸復則陰邪始退如理中湯八味丸宜擇用之凡脾虛多病濕內因酒面停滯嗜瓜果喜生冷燒炙甘肥以致濕熱壅溢而為病者此內因也復有坐臥濕地霧露陰雨所客澡浴為風所閉涉水為濕所郁鬱於肌腠則發黃此濕由外生可見內外所感皆由脾氣虛弱而濕邪乘而襲之中濕發黃者茵陳五苓散不效六君子湯燥里而黃自退入方柴苓湯治中濕惡熱如瘧官揀參一錢北柴胡一錢五分枯黃芩一錢法半夏一錢漂白朮一錢結豬苓一錢宣澤瀉一錢上青桂五分白雲苓一錢炙甘草五分生薑三片大棗三枚水煎熱服茵陳飲治中濕發黃作熱大小便澀茵陳蒿二錢黑山梔一錢五分赤茯苓一錢甜葶藶一錢小枳實五分生甘草五分燈芯十莖水煎食前服沆瀣丹方見卷二胎疾門胃苓湯治中濕頭重體重往來寒熱和水土調脾胃漂蒼朮二錢炒厚朴一錢廣陳皮一錢炒白朮一錢白雲苓一錢結豬苓一錢宣澤瀉一錢炙甘草五分上青桂五分生薑三片水煎食前服五皮散此方合胃苓湯專治浮腫神效生薑皮大腹皮茯苓皮桑白皮五加皮以上各二錢燈芯十莖大棗三枚為引水煎空心服理中湯方見卷二傷暑門八味地黃湯方見卷一保産門茵陳五苓散治中濕發黃茵陳蒿二錢漂白朮一錢白雲苓一錢五分結豬苓一錢宣澤瀉一錢青化桂五分炙甘草五分生薑三片大棗三枚為引水煎服六君子湯方見卷二非搐門霍亂證治經曰足太陰厥氣上逆則霍亂又曰不遠熱則熱至熱至則身熱吐下霍亂夫霍亂之病起於倉卒其證揮霍擾亂無有寧止故名霍亂多因夾食傷寒陰陽乖隔上吐下瀉而煩躁悶亂者是也蓋人有三焦上焦受納水穀主入而不主出中焦腐化水穀流行於五臟六腑下焦分別水穀主出而不主納故邪在上焦則吐邪在下焦則瀉邪在中焦則上吐下瀉凡霍亂得吐瀉則邪氣上下得出斯無苦也陳莝出盡而吐瀉自止乃有上不得吐下不得瀉為乾霍亂又名絞腸痧其病因脾胃之邪無從而出若加喘滿作搐者十不救一其有上吐下瀉者當分寒熱而治之亦宜止其乳食恐其增痰也故霍亂飲米湯必死以其助胃邪故也宜藿香正氣散有先瀉後吐者乃脾胃虛寒故先瀉白水而吐亦不多口氣緩而神色慢額上有汗六脈沉細此為虛冷宜溫之六君子湯不愈則理中湯加藿香木瓜各一錢有先吐後瀉者乃脾胃有熱故喘促唇紅吐多面赤渴飲水漿脈洪而數此為熱也宜和解之五苓散加藿香其乾霍亂上不得吐下不得瀉最為危迫速用鹽湯探吐之必待其吐出宿食積痰然後用藥或以針刺十指甲邊令血出或刺膝灣名委中穴出血即解後用藿香正氣散入方藿香正氣散治風邪傷胃陰陽不和上吐下瀉紫蘇葉一錢大腹皮一丸芽桔梗一錢白雲苓一錢製半夏一錢五分川厚朴一錢真廣皮一錢炙甘草一錢生薑三片大棗三枚水煎熱服六君子湯方見卷二非搐門理中湯方見卷二乳子傷寒門此加藿香木瓜五苓散方見二卷中暑門加藿香鹽湯吐法其法以溫水調食鹽略咸一大碗令兒服之良久以指探其喉間則吐一吐即松霍亂簡便方凡霍亂吐瀉腹痛者切忌熱湯及米湯犯之必死必待其吐瀉後一二時久服藥過後俟其胃氣稍回渴止知飢方可以稀粥與之凡霍亂嘔吐不能受納藥食危甚者速以新汲水和百沸湯各一盞和勻名陰陽湯飲數日即定凡痰瘧及宿食惡毒之物阻塞中焦而令腹脹欲作霍亂者即與鹽湯令其頓服吐盡痰食即安霍亂吐瀉諸藥不效緑豆胡椒各二十一粒研細水煎服如口渴甚者將二物研細以新汲井水調服則安一方以六一散一二錢濃薑湯調服夏月更妙蓋六一散涼薑湯熱亦寒因熱用之意也乾霍亂即絞腸痧其證忽然心腹絞痛不可忍上不得吐下不得瀉痰壅腹脹手足厥冷六脈沉細或伏死在須臾真惡候也急用食鹽一兩生薑五錢搗散同鹽炒黑色水一大碗煎數沸溫服良久以指探喉中探吐之或不吐即瀉絞腸痧亦有陰陽陰痧腹痛手足冷看其身上有紅點以燈火於紅點上淬之陽痧腹痛手足暖以針刺其十指背近爪甲處一韭葉許出血即安仍先自兩臂捩下其惡血令聚指頭然後刺之凡發痧手足厥冷腹痛用溫水一碗令病人伏臥凳上以手蘸水拍其兩膝灣名委中穴看其有紫黑點現以針刺出惡血即愈脾脈肝脈腎脈三陰之脈皆從此委中穴過又法以香油拍兩手曲池穴即肘內灣處以貯麻蘸油戛之颳起紫疹立刻即愈肺脈心脈心包絡脈皆從此曲池而過以上所為亦疏散之意也
