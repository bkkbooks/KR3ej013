body:
  text: 卷三咳嗽證治帝曰肺之令人咳何也岐伯曰五臟六腑皆令人咳非獨肺也又曰邪在肺則病皮膚痛寒熱上氣喘汗出咳動肩背夫肺為華蓋口鼻相通息之出入氣之升降必由之路故專主氣經曰形寒飲冷則傷肺由兒衣太薄及冷飲之類傷於寒也經曰熱傷肺由兒衣太厚愛養過溫傷於熱也又曰皮毛者肺之合皮毛先受邪氣邪氣得從其合使氣上而不下逆而不收充塞咽嗌故令咳嗽也凡有聲無痰謂之咳肺氣傷也有痰無聲謂之嗽脾濕動也有聲有痰謂之咳嗽初傷於肺繼動脾濕也在小兒由風寒乳食不慎而致病者尤多矣經曰五臟六腑皆令人咳然必臟腑各受其邪而與之要終不離乎肺也但因痰而嗽者痰為重主治在脾因咳而動痰者咳為重主治在肺以時而言之清晨咳者屬痰火午前嗽者屬胃火午後嗽者屬陰虛黃昏嗽者火浮於肺五更嗽者食積滯於三焦肺實者頓嗽抱首面赤反食肺虛者氣逆虛鳴面白飧泄肺熱者痰腥而稠身熱喘滿鼻乾面紅手捏眉目肺寒者嗽多痰清面白而喘惡風多涕故治者各因其虛實寒熱而調之斯無誤矣因於寒者則氣壅喘促聲濁而無汗鼻塞聲重宜參蘇飲微汗之咳而氣逆喘嗽面白有痰此肺本經病宜清肺飲咳甚葶藶丸微利之咳而喉中介介有聲面赤發熱心煩或咽喉痛聲啞者此肺病兼見心證宜清寧散咽喉痛沆瀣丹咳而面黃體倦痰涎壅盛或吐痰或吐乳食此肺病兼見脾證大抵咳嗽屬脾肺者居多以肺主氣脾主痰故也宜橘皮湯咳而面青多怒痰涎壅盛而發搐者蓋因咳嗽聲不能轉所以瞪目直視此肺病兼見肝證宜集成金粟丹咳而面色暗黑久咳而吐痰水此肺病而兼見腎證宜六味地黃丸加麥冬五味咳而聲不出口鼻出血者此氣逆血亦逆也須順氣寧嗽為主宜人參冬花膏咳而久不止並無他證乃肺虛也只宜補脾為主人參五味子湯咳而胸高骨起其狀如龜者謂之龜胸此肺熱之極陽火熏蒸而致也清燥救肺湯咳而日久胸前疼痛口吐膿血腥臭者此肺火壅盛已成癰也桔梗湯治不如法其證多死凡咳嗽痰涎壅塞逆氣衝並而作搐者多難治故頭搖目上視及閉目呻吟手足擺舞肩息胸突喉中痰鳴口噤不乳喘而手足冷皆死證也入方人參敗毒散此方辛平升散為咳門第一神方舉世少有知者凡有咳嗽無論內傷飲食外感風寒夾濕夾毒不拘男婦大小胸緊氣急咽痛口苦痰不相應即用此方升散之或感冒重者服此其咳愈甚不知者以為藥不相符棄而勿服不知正是升散之力佳兆也再服之漸次輕減不拘劑數只以痰應為度聲響痰出是其效也枯燥之人數劑之後略加沙參玉竹當歸白芍生地麥冬之類以滋其陰無不愈者再有叮嚀凡咳嗽初起切不可誤用寒涼及滋陰之藥閉其肺竅為害不小但以辛散為先著俟痰應之後漸加滋陰則得矣官揀參五七分不用亦可芽桔梗一錢二分正川芎一錢白雲苓一錢陳枳殼一錢信前胡一錢川羌活七分川獨活五分北柴胡一錢南薄荷一錢荊芥穗一錢北防風一錢淨連翹一錢炙甘草五分生薑一片為引水煎半飢服每日二劑參蘇飲治四時感冒頭痛發熱咳嗽痰盛此方不如前方用之多不效姑存之官揀參五分白雲苓一錢陳枳殼一錢法半夏一錢信前胡一錢芽桔梗一錢老蘇葉一錢粉乾葛一錢真廣皮一錢炙甘草五分生薑三片蔥白三寸水煎溫服取微汗清肺飲治氣逆而咳面白有痰信前胡一錢北柴胡七分桑白皮五分陳枳殼一錢淨知母一錢川貝母一錢南薄荷七分白雲苓一錢白桔梗一錢金井膠一錢大麥冬一錢荊芥穗一錢炙甘草五分水煎熱服切忌油膩葶藶丸治乳食沖脾傷風咳嗽面赤身熱痰多喘嗽甜葶藶去土隔紙略炒黑牽牛炒光杏仁去皮尖炒黃色另研漢防己炒上藥等分為細末入杏仁泥和蒸棗肉為丸緑豆大每五七丸薑湯化下量兒大小加減此丸因乳食傷脾痰甚者及壯實小兒可用之苟不因乳食所傷並怯弱者本方去牽牛易家蘇子等分炒研為丸效清寧散治心肺有熱而令咳嗽宜從小便利出桑白皮蜜炒甜葶藶微炒赤茯苓酒炒車前子炒炙甘草減半上為細末每服五分生薑大棗煎湯調服集成沆瀣丹方見卷二胎熱門橘皮湯治咳嗽痰甚嘔吐法半夏一錢白雲苓一錢真廣皮一錢旋覆花一錢北細辛五分官揀參五分芽桔梗一錢陳枳殼一錢炙甘草五分生薑三片大棗一枚水煎徐服集成金粟丹方見卷二類搐門六味地黃湯方見卷二胎疾門人參冬花膏治氣逆咳血痰中見血官揀參天門冬麥門冬款冬花川貝母桑白皮金井膠片枯芩白當歸以上各一錢北五味炙甘草各五分上為細末煉蜜為丸龍眼核大每一丸燈芯湯下人參五味子湯治久嗽脾虛中氣怯弱面白唇白此神方也官揀參一錢漂白朮一錢五分白雲苓一錢北五味五分杭麥冬一錢炙甘草八分生薑三片大棗三枚水煎溫服清燥救肺湯喻嘉言制治諸氣膹郁諸痿喘嘔皆屬肺之燥也鮮桑葉經霜者得金氣而柔爛不凋取之為君用一錢炙甘草利胃生用一錢熟石膏稟清肅之氣極清肺熱用一錢二分官揀參生胃之津養肺之氣七分胡麻仁炒研一錢真阿膠八分杭麥冬去心一錢二分北杏仁泡去皮尖炒黃七分枇杷葉一片刷去毛蜜塗炙黃用水一碗煎六分頻頻分二三次服痰多加川貝母栝蔞血虛加生地黃熱甚加犀角羚羊角桔梗湯治肺癰出膿血芽桔梗二錢白當歸一錢川貝母一錢栝蔞皮一錢漢防己一錢光杏仁五分陳枳殼一錢薏苡仁二錢生黃耆一錢鮮桑葉一錢潤玄參一錢用蘆茅桂三錢為引水煎熱服百晬嗽論凡乳子百日內有痰嗽者謂之百晬嗽或出胎暴受風寒或浴兒為風所襲或解換褓裳或出懷餵乳而風寒得以乘之此病由外來者或乳汁過多吞咽不及而嗆者或啼哭未定以乳哺之氣逆而嗽者此病由於內生者皆能為嗽第前汗下之劑難於用之以其胃氣方生不能勝藥故也故曰百晬嗽難醫然雖曰難醫正未嘗曰不醫豫之治此未為不多其用藥之治有案在後復有不治之治更為捷徑而又百治百愈但須乳母聽戒治之無難凡遇百晬嗽先用荊防敗毒二小劑母子同服服完止藥惟令乳母忌口凡葷酒油膩鹽醋酸鹹姜椒辛辣青菜麵食之類一概屏絶惟用香茶白飯少佐橘片橙片以清其乳雖兒嗽至重者不過十日八日得哺清乳嗽自愈矣倘不聽戒復不擇醫徒然服藥有名無實竟何益哉附案澻陽明經高君作梅翁與令弟云軒翁同於甲寅五月舉子然皆膏粱之稟胎元怯弱於七月間兩兒同患百晬嗽豫謂云翁曰公郎面白唇淡白眼帶青嗽聲連續痰不相應此肝風有餘肺氣不足雖有喘嗽未可以常法治之設投疏風清肺適足益燥傷陰不特嗽不能愈而證必加重云翁深以為是乃投人參五味子湯其應如響四劑全瘳計用人參二錢八分作翁者其體更弱外候面白眼青自汗多嗽滿頭青筋囟門寬大因謂之曰令侄正同此證已服補脾保肺之劑愈矣公郎中氣更虛速宜用參始不費手適有老嫗專挑馬牙者從內阻之復有醫者從外阻之力言不可用參服參則不可治且云未見百日之兒敢用參者老嫗更囑其母曰道翁丸藥切不可服其中多有人參服之為害不淺其母聞之以為誠然於是視豫藥如砒毒矣作翁因素艱嗣息莫能主張於豫言似有陽是陰否之意豫見其遲疑不決亦不敢強姑聽之此醫日一診視自七月下旬治起直至十月初旬作翁往府考貢其病愈治愈危竟至奄奄一縷而逆證叢生無可救藥醫者束手乏策老嫗緘口無言皆絶跡不至矣夫人輩無所倚仗復懇於豫豫嘆曰早聽豫言何有今日乃入診視見其面目如藍形體惟皮束骨聲啞無音咳嗽氣促雨汗淋漓四肢搐掣逆證全具毫無生機因不忍釋手詳為審視惟兩目神光尚存豫曰生機或在是乎遂以大參一枝天員五粒蒸湯與服初服小半豫為抱之環步室中審其呼吸之息氣雖未減而亦不見其增即與服完良久覺氣稍順豫喜曰得之矣遂用大參二錢天員肉七粒蒸湯服之竟獲大效是夜汗搐俱止喘嗽略亦輕減第苦於人小體弱即二錢之參湯亦須一夜方能服完幸豫此時行動勻靜數載未曾設榻終夕無眠竟與抱之晝夜不一釋手醒即豫服服後仍睡數日之後則鼾聲如雷睡眠極隱呼吸極長豫知為氣復神歸之效如此者十晝夜諸證已愈八九惟形色未復音聲未亮豫曰功程雖半未敢暫停參鬚倍之於是每日大參四錢天員十四粒如前調理計前後二十晝夜共用官揀六兩有零始奏全績於是聲音清亮面色紅融肌肉復生精神勝舊今已長成儼然美丈夫矣而且聰明持達經史皆通他日翱翔奚能限量如此之證如此之治不特世人未見醫家未聞即諸書亦所未載半歲乳子而用六兩之參起沉疴於萬難之日苟無定識者未必有成故拜懇同道但須認證真確不必拘泥古方神而明之存乎人耳或問二證皆百晬嗽何以前證用藥而後證獨用參者何也曰有理焉前證在七月間正肺金旺時為風邪沖並但傷其中氣他臟無涉故以四君子補脾生脈散保肺收其耗散之金得返清肅之令中氣一回應手而愈後證自七月起至於十月金已退氣正當水旺木相之時由腎水無源所以肝木失養誠母病子傷故面目俱青手足搐掣此非肝強實肝敗也內經有善則不見惡則見之之言顯然可證在常俗之輩見其搐掣又必為之鎮驚化痰截風定搐矣誰復為之保固真元維持竭絶哉不知此等之證陰陽兩敗臟腑俱傷苟非大力之品莫可挽回所以屏去雜藥獨用人參之甘溫天員之甘潤味極純正飼之兒喜況人參之力在陰益陰在陽益陽榮衛氣血精神意智無不補者而且晝夜不徹則真元陰受其長養之功烏得不效又曰初服即效而必待三七之日始奏全績者何也曰克削過傷枯燥已極如旱苗焦壤暴雨無裨心淙淙潤澤始可盈科至於三七之久天地來復之機業已三至人身榮衛已周一千五十度升降有恆神氣已足不藥之慶夫復何疑此等之治非謂世之嬰兒一有咳嗽便當用參第稟受先虧胎元怯弱者有不得不用之勢獨惜前醫偏執己見即數分之參斷不肯用孰知用至六兩之多始收全效可見辨證不真誤人非淺故筆此以為擇醫者勸咳嗽簡便方小兒咳嗽聲不出者紫菀微炒研末杏仁去皮尖研如泥等分煉蜜為丸芡實大每服一丸北五味七粒煎湯化服肺實咳嗽痰喘葶藶子隔紙炒為末棗肉為丸龍眼核大每服一丸白湯化服咳嗽多痰葶藶子隔紙炒知母微炒各五錢研末砂糖為丸芡實大每服一丸白湯化下小兒喘嗽發熱自汗吐紅脈虛無力人參切片焙乾天花粉切片酒炒等分為末每服五分蜜湯調服以瘥為度秋天肺燥咳嗽無痰北沙參一味每服五錢淨水濃煎熱服小兒百晬嗽痰壅喘咳用貝母五錢淡薑湯潤濕飯上蒸過甘草半生半炒二錢五分研細末砂糖為丸龍眼核大每服一丸米飲化服熱痰咳嗽痰出稠濃或咽喉痛制南星製半夏各三錢半枯黃芩七錢焙燥為末砂糖為丸芡實大每用一丸薑湯化服哮喘證治經曰犯賊風虛邪者陽受之陽受之則入六腑入六腑則身熱不得臥上為喘呼又曰肺病者喘咳逆氣肩背痛汗出夫喘者惡候也肺金清肅之令不能下行故上逆而為喘經曰諸氣膹郁皆屬於肺喘者肺之膹郁也吼者喉中如拽鋸若水雞聲者是也喘者氣促而連屬不能以息者是也故吼以聲響言喘以氣息名凡如水雞聲者為實喉如鼾聲者為虛雖由於痰火內郁風寒外束而治之者不可不分虛實也有因外感而得者必惡寒發熱面赤唇紅鼻息不利清便自調邪在表也宜發散之五虎湯有因熱而得者必口燥咽乾大小便不利宜葶藶丸微下之有因宿食而得者必痰涎壅盛喘息有聲先用山楂神麯麥芽各三錢煎湯與服消其食次千緡湯素有哮喘之疾遇天寒暄不時犯則連綿不已發過自愈不須上方於未發時可預防之有一發即能吐痰者宜服補腎地黃丸加五味故脂多服自愈有發而不吐痰者宜痰喘方凡哮喘初發宜服蘇陳九寶湯蓋哮喘為頑痰閉塞非麻黃不足以開其肺竅放膽用之百發百中或胸膈積熱心火凌肺熱痰壅盛忽然大喘者名馬脾風蓋心為午火屬馬言心脾有風熱也小兒此證最多不急治必死用牛黃奪命散下之效凡大病久病之後或久服寒涼克削之後或久吐久瀉之後忽然氣急似喘非喘氣息短促名為短氣短者斷之基氣將脫也速宜挽救人參五味子湯效又有虛敗之證忽然張口大喘入少出多而氣息往來無滯此腎不納氣浮散於外大凶之兆速投貞元飲不效理陰煎加人參鹿茸或可挽救如汗出如油發潤而喘者肺絶也汗出如油張口大喘者命絶也直視譫語而喘者肝絶也凡大病正氣欲絶無根脫氣上衝必大喘而絶矣入方五虎湯治寒邪入肺而作齁䶎蓋齁䶎為寒痰固結非此方不能解散淨麻黃七分光杏仁一錢陳細茶一錢熟石膏一錢五分炙甘草四分淨水煎空心服葶藶丸方見卷三咳嗽門千緡湯治痰閉肺竅喘息有聲法半夏二錢大皂角五分老生薑一錢炙甘草一錢水煎服以上皆素無哮喘而暴發者用補腎地黃丸治先天不足肝腎虛者通用熟地黃懷山藥山萸肉各一兩嫩鹿茸淮牛膝各二兩粉丹皮白雲苓宣澤瀉各一兩北五味補骨脂各一兩上為末蜜丸緑豆大每服三錢淡鹽湯空心下痰喘方治哮喘無痰者蓋痰入於肺竅不能出故也官揀參制南星製半夏栝蔞霜香附米皂角灰真廣皮炒蘿蔔子炒各等分共為末薑汁煮神麯糊丸麻子大每服一錢薑湯化下蘇陳九寶湯治風寒閉肺而作哮喘淨麻黃五分紅雲皮五分南薄荷五分青化桂取心五分紫蘇葉四分桑白皮五分大腹皮一錢光杏仁四分炙甘草六分生薑三片水煎臨服加童便少許沖服牛黃奪命散治胸膈有痰肺脹大喘黑牽牛半生半炒取頭末五錢錦莊黃酒潤曬乾陳枳殼麩炒各一兩上為細末每服一錢五分白湯調下量兒大小加減臨服加蜜數匙以氣平為度人參五味子湯方見卷三咳嗽門貞元飲景嶽新方治氣短似喘呼吸急促提不能升咽不能降勢甚垂危常人但知為氣急其病在上而不知元海無根肝腎已敗此子午不交氣脫證也大熟地五錢白當歸三錢炙甘草一錢水煎熱服如兼嘔惡或惡寒者加煨姜五片氣虛脈微至極者速加人參如肝腎陰虛手足厥冷加肉桂一錢理陰煎景嶽新方治腎肝虧敗不能納氣浮散作喘干熟地三錢白當歸二錢炮姜灰一錢五分炙甘草一錢手足冷者加熟附子一錢青化桂一錢水二盅煎七分熱服哮喘簡便方治痰氣壅塞雪梨汁一杯生薑汁四分之一蜂蜜半杯薄荷細末一兩和勻器盛重湯煮一時之久任意與食降痰如奔馬化痰丸絲瓜燒存性為細末棗肉為丸如彈子大每服一丸薑湯化下化痰最捷兼能止嗽墜痰丸治一切風痰濕痰老痰痰火胸痞滿氣壅塞黑牽牛四兩炒止取頭末一兩大皂角去皮弦及子酥炙黃四錢生白礬三錢共為細末米糊丸每服一錢兒稍大者二錢空心薑湯服痰涎從大便出久病之人五日十日一服病緩者半月一服治醋嗆成吼用甘草二兩去赤皮每段切二寸長兩半劈開用豬膽二枚取汁浸甘草三日取起火上炙乾為末蜜丸緑豆大每晚臨臥服二錢茶湯送神效哮喘久不止不拘老小一服即止並治小兒奶哮石膏半夏栝蔞仁陳皮麻黃各一錢五分枳實杏仁各一錢甘草七分生薑五片水煎熱服清金丹治一切吼疾或痰或食遇厚味即發者尤妙蘿蔔子蒸熟曬乾為末豬牙皂燒存性等分共為細末薑汁打麵糊丸緑豆大每服一二十丸薑湯送下諸疳症治夫疳之為病亦小兒惡候十六歲以前其病為疳十六歲以上其病為癆皆真元怯弱氣血虛衰之所致也究其病源莫不由於脾胃蓋胃者水穀之海也水穀之精氣為榮悍氣為衛榮衛豐盈灌溉諸臟凡人身充皮毛肥腠理者氣也潤皮膚美顏色者血也所以水穀素強者無病水穀減少者病水去谷亡則死矣凡病疳而形不魁者氣衰也色不華者血弱也氣衰血弱知其脾胃必傷有因幼少乳食腸胃未堅食物太早耗傷真氣而成者有因甘肥肆進飲食過餐積滯日久面黃肌削而成者有因乳母寒熱不調喜怒房勞之後乳哺而成者有二三歲後穀肉果菜恣其飲啖因而停滯中焦食久成積積久成疳復有因取積太過耗損胃氣或因大病之後吐瀉瘧痢乳食減少以致脾胃失養二者雖所因不同然皆總歸於虛也其證頭皮光急毛髮焦稀腮縮鼻乾口饞唇白兩眼昏爛揉眉擦鼻脊聳體黃鬥牙咬甲焦渴自汗尿白瀉酸肚脹腸鳴癖結潮熱酷嗜瓜果咸炭水泥者皆其候也然治寒以溫治熱以涼此用藥之常法殊不知疳之為病皆虛所致即熱者亦虛中之熱寒者亦虛中之寒積者亦虛中之積故治積不可驟攻治寒不宜峻溫治熱不可過涼雖積為疳之母而治疳必先於去積然遇極虛者而迅攻之則積未去而疳危矣故壯者先去積而後扶胃氣衰者先扶胃氣而後消之書曰壯人無積虛則有之可見虛為積之本積反為虛之標也如惡食滑瀉乳食直下牙齦黑爛頭項軟倒四肢厥冷下痢腫脹面色如銀肚硬如石肌肉青黑肛門如筒口吐黑血吐利蛔蟲併為不治初病者以集聖丸為主久病者但以肥兒丸調之以補為消可也凡疳之初起者集聖丸為主方其有五臟兼證從權加減不必多求方法入方蘆聖丸治冷熱新久一切疳證以此為主真蘆薈酒蒸五靈脂炒夜明砂炒真廣皮酒炒杭青皮醋炒蓬莪朮煨使君肉炒南木香屑白當歸炒正川芎酒炒以上俱各二錢官揀參三錢切片焙乾正川連薑製乾蟾蜍酥炙俱三錢西砂仁酒炒二錢上為細末用公豬膽一枚取汁將前末和勻粟米糊丸龍眼核大每服一丸米飲調下各證加減法一病有咬牙舒舌舌上生瘡愛飲冷水唇紅面白喜伏地臥此心疳也本方去莪朮砂仁青皮陳皮川芎木香六味加生地茯苓膽星各二錢硃砂甘草各一錢一面青目生白膜泄瀉夾水或青色此肝疳也本方去莪朮砂仁陳皮木香四味加膽草梔仁防風天麻蟬蛻各二錢青黛一錢五分一愛食泥土冷物飲食無度身面俱黃發稀作穗頭大項小腹脹腳弱間或泄瀉肌瘦晝涼夜熱不思乳食此脾疳也專用本方一鼻下赤爛手足枯細口中腥臭或作喘嗽右腮晃白此肺疳也本方去莪朮砂仁青皮川芎木香四味加桑皮桔梗蘇葉阿膠炙甘草各二錢外用澤蘭葉銅緑輕粉等分為末貼爛處一兩耳內外生瘡腳如鶴膝頭縫不合或齒縫臭爛變成走馬疳此腎疳也本方去莪朮砂仁青皮陳皮木香靈脂六味加熟地茯苓山藥萸肉各三錢丹皮澤瀉各二錢一食積久而成疳其證形瘦腹緊時發潮熱羞見生人見之則哭本方去蘆薈靈脂二味加人參黃耆白朮茯苓半夏枳實厚朴炙草神麯麥芽鱉甲三稜各二錢一久泄不止胃虛成疳此疳瀉也本方去蘆薈莪朮靈脂三味加白朮茯苓肉蔻訶子各二錢加人參三錢一久痢不止胃虛成疳此疳痢也本方去蘆薈莪朮青皮靈脂四味加訶子肉建蓮肉各三錢一瘧久未已胃虛成疳此必有癖謂之疳瘧本方去蘆薈靈脂二味加黃耆鱉甲柴胡半夏神麯三稜各二錢倍人參三錢一腦疳皮毛光急滿頭瘡餅腦熱如火髮結如穗遍身多汗腮腫囟高令兒眼痛其病在肝本方去莪朮砂仁青皮陳皮四味加膽草川芎升麻羌活防風各二錢一脊疳蟲食脊膂發熱黃瘦積中生熱煩渴下痢拍背如鼓鳴脊骨如鋸齒或十指皆瘡頻齧指甲宜安蟲丸蓋五疳或有停食成積積久生蟲或如絲髮如馬尾多出於頭項背腹之間蟲色黃白赤者可治青黑者難治也安蟲丸即本方去莪朮砂仁青皮陳皮當歸川芎六味加苦楝根白皮貫衆蕪荑檳榔各二錢名安蟲丸一蛔疳皺眉多哭嘔吐清沫腹中乍痛痛時腹中結聚成塊摸之梗起滿肚青筋唇口紫黑腸頭齧癢者是也蛔從口鼻出者難治宜安蟲丸即上方一丁奚疳手足極細項小骨高尻削體瘦腹大臍突號叫胸陷者是也集聖丸本方一哺露疳虛熱往來頭骨分開翻食吐蟲煩躁嘔噦者是也集聖丸本方一無辜疳因浣衣夜露被無辜鳥落毛所汙小兒服之身體發熱日漸黃瘦腦後項邊有核如彈丸按之隨動軟而不痛其中有蟲如米粉宜刺破其核以膏藥貼之內以本方去莪朮砂仁靈脂三味加黃耆鱉甲檳榔各二錢一疳熱由於胃脾虛弱陽浮於外氣不歸元只以補脾為主使陽氣收斂熱自退矣用參苓白朮散多服為妙或兼脾陰虛者間服六味地黃丸一疳渴由胃氣下陷津液不生故也宜補其胃使清陽上升津液漸生渴自止矣七味白朮散一走馬疳蟲病也齒屬腎腎主虛才受熱邪直奔上焦初起口臭名曰臭息次則齒黑名曰崩砂甚則齦爛名曰潰漕有血迸出名曰宣露甚至齒皆脫落名曰腐根縱得全活齒不復生外證腦熱肌瘦手足如冰寒熱時有滑泄肚痛口臭乾渴齒齦破爛爪甲黧黑身多瘡疥痘疹之後多有此證不可救治毒歸於腎故也初起者清胃散另有治法在齒牙本門一鬾病兒將周歲母復有娠兒飲其乳謂之鬾音忮乳以成此證或有母患別病兒飲其乳以類母病者有之蓋母之血氣若調乳則長養精神血氣一病乳則反為病根母既妊娠精華下蔭衝任之脈不能上行氣則壅而為熱血則鬱而為毒小兒神氣未全易於感動其候寒熱時作微微下利毛髮脫落意殊不悅甚則面色萎黃腹脹青筋瀉青多吐日漸尪羸竟成疳證俗以孕在胎中因兒飲乳其魄識嫉而致兒病故謂之胎妒龍膽湯一骨蒸之病多起於胃其始也邪火上衝而能啖火消爍而善飢蓋胃為氣血之海氣血不足邪火殺穀水穀之精氣不足濟之漸成口穢煩躁夜熱朝涼毛焦口渴氣促盜汗形如骨立謂之消疸若大便日十餘行肢瘦腹大頻食多飢謂之食並此皆邪火為害耗傷津液而致者大肥兒丸入方參苓白朮散治脾胃虛弱飲食不進或嘔吐瀉痢大病之後補救脾胃此方為神官揀參切片焙乾漂白朮土炒白雲苓乳蒸懷山藥炒各一兩五錢芽桔梗焙薏苡仁炒建蓮肉去心炙甘草各一兩共為細末每服一二錢薑棗湯調服六味地黃丸方見卷二胎疾門七味白朮散方見卷三泄瀉門清胃散治走馬牙疳雅黃連白當歸緑升麻懷生地粉丹皮白芷梢等分北細辛減半淨水煎滾熱服龍膽湯治小兒鬾病草龍膽鉤藤鉤北柴胡芽桔梗赤芍藥正川芎官揀參白雲苓各一錢炙甘草五分井水煎服外以夜明砂不拘多少以紅紗作一小袋盛之系兒胸前大肥兒丸治小兒脾胃虛弱泄瀉骨蒸官揀參切片焙乾山楂肉炒漂白朮土炒真廣皮炒蓬莪朮炒川厚朴薑製六神麯炒雅川連薑製胡黃連炒杭青皮醋炒白雲苓乳蒸杭白芍酒炒地骨皮酒炒宣澤瀉炒肉豆蔻煨尖檳榔正川芎炒北柴胡酒炒使君肉炒乾蟾蜍煅炙甘草各五錢五穀蟲一兩共為末煉蜜為丸彈子大米飲化下加減肥兒丸治一切久病成疳總歸虛處不可以前法治之只宜以此丸久服以補為消無不愈者官揀參切片焙乾嫩黃耆蜜炙漂白朮土炒白雲苓乳蒸廣陳皮酒炒杭青皮醋炒白歸身酒洗大鱉甲醋炙正川連薑製南木香屑使君肉炒乾蟾蜍酥炙炙甘草各等分上為細末另以山藥打糊為丸量兒大小加減日日服之以米湯調下病愈藥停疳證簡便方小兒疳積黃瘦骨立頭上瘡痂發如麥穗用乾蟾蜍三五隻去四足以香油塗之炙焦為末蒸黑棗去核取肉搗膏和蟾末為丸龍眼核大每日三服積垢自下多服之形容自變其病如失又方買天漿蟲四兩洗極淨曬乾微炒為末加甘草細末五錢米糊為丸彈子大每服一丸米飲下小兒諸疳日久身面生瘡爛成孔凹如大人楊梅瘡樣用蒸糯米飯時甑蓋四邊滴下氣水以碗盛取掃瘡上數日即效百藥不驗者此方如神疳蝕口爛用糞蛆洗漂極淨曬乾微妙為末褐衣燒灰減半共研勻頻吹口內效小兒口疳破爛人中白煅過厚黃柏蜜炙焦二味等分少加冰片共研末以鹽茶洗口後以藥搽之走馬牙疳及齒齦腐爛黑臭者用溺壺內多年積垢名人中白煅紅一兩兒茶五錢黃柏薄荷青黛各一錢冰片三分共研細末先以溫水漱口然後吹藥於疳上每日六七次吹藥之時涎從外流者為吉涎收向內者毒入里也不治牙疳鼻疳人中白煅一錢五分毛褐灰枯白礬各一錢為細末濕者干搽乾者先以香油潤濕然後搽藥急疳蝕爛口鼻欲死海中紫貝子煅過俗名南蛇牙齒又名砑螺嶺南稱狗支螺者是也炭火煅過為末臘豬油調塗牙疳潰爛穿唇破舌並治口瘡胡黃連五分膽礬兒茶各一錢五分共為細末搽之嘔吐證治經曰諸逆衝上皆屬於火諸嘔吐酸皆屬於熱又曰寒氣客於腸胃厥逆而出故痛而嘔夫嘔吐者陽明胃氣下行則順今逆而上行故作嘔吐其證有聲有物謂之嘔有物無聲謂之吐有聲無物謂之噦又曰乾嘔久病見此者死蓋小兒嘔吐有寒有熱有傷食然寒吐熱吐未有不因於傷食者其病總屬於胃復有溢乳哯乳嘔噦皆與嘔吐相似而不可以嘔吐治之更有寒熱拒隔之證又有蟲痛而吐者皆當詳其證而治之凡治小兒嘔吐先宜節其乳食節者減少之謂也凡嘔吐多渴不可與之茶水水入復吐終不能止必強忍一二時久而後以米湯與之吐自止矣寒吐者乳片不消多吐而少出面白眼慢氣緩神昏額上汗出脈息沉微宜溫中消食輕者藿香正氣散不止理中湯加藿香又不止參香散再若不止此陰盛格陽謂之拒格急以理中湯一劑用公豬膽汁和童便少許將藥潤濕炒熟煎服即止此內經熱因寒用之法也蓋陰寒太過陽熱之藥拒而不納故以豬膽汁童便為嚮導其始則同其終則異下咽之後陰體漸消陽氣乃發也熱吐者面赤唇紅吐飲少而出物多乳片已消色黃遍身發熱而煩躁夏月多此證宜五苓散加藿香不止藿連湯再不止用理中湯煎熟調六一散冷服即止此寒因熱用也傷食吐者眼泡浮腫面色微黃足冷其熱日輕夜重或吐餿酸之氣或吐黃水或吐青痰其脈弦實而滑此有宿食也宜下去其積乃止消積丸傷乳吐者才乳即吐或少停而吐此因乳食無度脾胃嬌嫩不能運化此滿則溢也名嗌乳但宜節其乳則吐自止哯乳者時時吐乳而不多似吐非吐皆胃虛所致也宜參香散有乳多而吐出者非真吐也苟不知禁即成真吐也百日內小兒多有之蓋身小身軟必等乳母擁抱之苟有傾側乳即溢出此人事也不須用治嗽吐者兒有咳嗽必待其嗽定方可與乳若嗽未定以乳哺之其氣必逆乳不消化而為痰痰氣壅塞嗽不得轉而吐乳也枳桔二陳湯小兒初生三日內吐乳者用丁香三粒陳皮三分生薑三片煎服自止又不若煨薑湯更妙此豫用最多者蓋三四日內總皆寒吐也初起哯乳即當調治如哯不已即成吐吐不已即成嘔嘔不已即成噦至此胃氣大虛精神漸脫矣若嘔吐不已日漸沉困囟陷囟腫青筋大露者並頻吐不食昏沉語塞喘急大熱常吐腥臭者皆死噦者有聲無物最惡之候凡久病之後而見此者皆為不治豫按為醫者臨診治病貴能體貼病情能用心法大凡嘔吐不納藥食者最難治療蓋藥入即吐安能有功又切不可強灌胃口愈吐愈翻萬不能止豫之治此頻多先將薑湯和黃土作二泥丸塞其兩鼻使之不聞藥氣然後用對證之藥煎好斟出澄清冷熱得中止服一口即停之半時之久再服一口又停之良久服二口停之少頃則任服不吐矣斯時胃口已安焉能得吐愚人不知明見其吐藥不納偏以整杯整碗強灌之則一吐傾囊而出又何藥力之可恃乎此等之法不但幼科可用即方脈亦當識此倘臨證不體病情全無心法即如嘔吐一證雖能識病雖能用藥其如不納何哉入方藿香正氣散方見卷二類搐門理中湯方見卷二乳子傷寒門參香散治小兒胃虛作吐諸藥不止官揀參切片焙乾上沉香銼末公丁香研藿香梗焙南木香銼屑各等分共為細末每服五七分木瓜煎湯調服五苓散方見卷二中暑門此加藿香藿連湯治小兒熱吐不止真雅連七分薑汁炒紫厚朴一錢薑汁炒藿香葉一錢生薑三片大棗三枚水煎熱服六一散方見卷三痢疾簡便方清積丸治食停胃口而作吐西砂仁十二個酒炒公丁香九粒烏梅肉三個蒸去核取淨肉巴豆仁二粒煨捶去油共研細末米糊丸緑豆大每服三丸白湯送枳桔二陳湯治小兒胸膈有痰咳嗽作吐陳枳殼一錢芽桔梗一錢白雲苓一錢五分法半夏一錢真廣皮一錢炙甘草五分生薑三片大棗三枚水煎熱服嘔吐簡便方小兒嘔吐外證不熱不渴面白唇淡神慢氣怯寒吐也用生薑一大塊直切薄片勿令折斷層層摻鹽以貯麻緊扎外用草紙七層包之水濕慢火煨令熟取起去麻紙將姜搗爛和早米煎湯服立止小兒卒嘔不止生薑取自然汁一盞煎滾聽用蜂蜜四兩煉熟聽用每服用薑汁一匙蜜二匙白湯調服每日五六次效小兒胃熱嘔吐外證面赤煩躁身熱作渴手足心熱者熱吐也黃連一錢薑汁炒熟石膏一錢共為細末每服一錢白湯調下吐止止後服又用枇杷葉火上炙之刷淨毛每用葉三片煎湯熱服立止小兒乾嘔極惡之證用甘蔗取汁聽用生薑取汁聽用臨服用蔗汁六匙薑汁二匙和勻溫熱服不用湯水調凡嘔吐服藥不納者內有蛔蟲在膈間蛔聞藥氣則動動則藥出而蟲不出但於嘔吐藥中加入川椒十四粒則不吐矣蓋蛔得椒則伏矣治小兒一切吐逆不拘冷熱及久吐諸藥不效者用硫黃五錢水銀一錢同研至不見星薑汁打米糊為丸小豆大三歲者三丸大人則三四十丸以陰陽水送下此二味加增分兩入陽城罐內封固以炭火升煉之即是靈砂為仙家所用之物最能升降陰陽交濟水火乃扶危濟困之神丹也泄瀉證治經曰水穀之寒熱感則害人六腑又曰虛邪之中人也留而不去傳舍於腸胃多寒則腸鳴飧泄食不化多熱則溏如糜夫泄瀉之本無不由於脾胃蓋胃為水穀之海而脾主運化使脾健胃和則水穀腐化而為氣血以行榮衛若飲食失節寒溫不調以致脾胃受傷則水反為濕谷反為滯精華之氣不能輸化乃致合汙下降而泄瀉作矣凡泄瀉腸鳴腹不痛者是濕宜燥滲之飲食入胃不住或完穀不化者是氣虛宜溫補之腹痛腸鳴瀉水痛一陳瀉一陳者是火宜清利之時瀉時止或多或少是痰積宜豁之腹痛甚而瀉瀉後痛減者為食積宜消之體實者下之如脾泄已久大腸不禁者宜澀之元氣下陷者升提之泄瀉有五寒熱虛實食積也但宜分別所瀉之色凡暴注下迫屬火水液清澄屬寒老黃色屬心脾肺實熱宜清解淡黃色屬虛熱宜調補青色屬寒宜溫白色屬脾虛宜補醬色屬濕氣宜燥濕餿酸氣屬傷食宜消脾土虛寒作瀉所下白色或穀食不化或水液澄清其候神疲唇口舌俱白色口氣溫熱宜理中湯或六君子湯熱證作瀉瀉時暴注下迫謂其出物多而迅速也便黃溺赤口氣蒸手煩渴少食宜五苓散加梔仁有傷食及滯瀉者其候口噯酸氣吞酸腹脹一痛即瀉一瀉痛減保和丸消之如食已消痛已止而猶泄瀉不止者乃脾失清升之氣氣虛下陷補中益氣湯有風瀉瀉而色青稠黏乃肝木乘脾宜六君子湯加防風柴胡白芍有濕瀉腹內腸鳴肚不痛身體重而瀉水或兼風者水穀混雜宜升陽除濕湯凡大瀉作渴者其病不論新久皆用七味白朮散生其津液凡痢疾作渴亦然蓋白朮散為渴瀉之聖藥倘渴甚者以之當茶水不時服之不可再以湯水兼之則不效矣久瀉不止多屬虛寒宜參苓白朮散加肉豆蔻煨熟為丸服之自止久瀉未止將成疳者參苓白朮散加肉豆蔻煨倍加懷山藥共為末每日服之則泄瀉自止津液自生不致成疳矣經曰五虛者死一脈細二皮寒三少氣四泄瀉不止五飲食不入五虛悉具者死能食者生凡瀉不止精神好者脾敗也吐瀉而唇深紅者內熱也色若不退者死面黑氣喘者死遺屎不禁者腎氣絶也入方理中湯方見卷二乳子傷寒門六君子湯方見卷二類搐門五苓散方見卷二傷暑門此加梔仁補中益氣湯方見卷一保産門升陽治濕湯治風濕作瀉緑升麻一錢北柴胡一錢六神麯一錢北防風一錢二分宣澤瀉一錢結豬苓一錢漂蒼朮一錢五分真廣皮五分炙甘草五分生薑三片大棗三枚水煎熱服若胃寒腸鳴加益智仁半夏各一錢七味白朮散治泄瀉津液下降煩躁大渴官揀參一錢漂白朮一錢白雲苓一錢南木香三分藿香葉一錢粉乾葛二錢炙甘草五分水煎當茶飲此方治小兒陽明本虛陰陽不和吐瀉而亡津液煩渴口乾以參朮甘草之甘溫補胃和中木香藿香辛溫以助脾茯苓甘淡分陰陽利水濕葛根甘平倍於衆藥其氣輕浮鼓舞胃氣上行津液又解肌熱治脾胃虛弱泄瀉之聖藥也兼治久瀉不止口渴無度並痢疾口渴幼科之方獨推此為第一後賢宜留意焉參苓白朮散方見卷三疳證門泄瀉簡便方治水瀉或飲食過度或飲冷水冒暑而發用生薑搗爛三錢陳細茶三錢濃煎湯飲立止蓋泄瀉由臟腑陰陽不和姜能和陰茶能和陽是以多效體素薄者加蓮子去心二錢泄瀉因傷濕而起米穀不化不思飲食困弱無力用白朮土炒白茯苓各三錢水煎食前服腹痛者加炒白芍一錢炙甘草五分泄瀉因於寒者腹痛手足冷用胡椒十四粒生薑三錢淡豆豉三錢煎湯熱服泄瀉腹痛奇方用雞蛋一枚將小頭打一小孔入胡椒七粒在內以紙封頂紙包煨熟酒送更效胡椒吞與不吞不拘脾虛久瀉用白朮土炒山藥酒炒蓮肉去心蒸熟砂仁酒炒各一兩共為細末以白砂糖二兩和勻每服一二錢米飲調下又方用早米造飯鍋巴取四兩研末蓮子去心蒸曬為末四兩白糖四兩共和勻每服二三錢白湯調下每日三服集成止瀉散治久瀉如神此方經驗最多用車前子以青鹽水炒七次稱過二兩白茯苓炒二兩山藥炒二兩炙甘草六錢共為細末每服二三錢炒米湯調烏梅湯更好真神方也傷食證治經曰飲食自倍腸胃乃傷東垣云飲者無形之氣也食者有形之血也由此推之乳為血液飲之類也谷有糟粕食之類也乳之與食原非同類豈可不辨乎哉凡小兒飲食傷脾之證非可一例而論有寒傷有熱傷有暫病有久病有虛證有實證但熱者暫者實者人皆易知而寒者久者虛者人多不識如今之小兒以生冷瓜果致傷胃氣而為腹痛瀉利者人猶以為火熱而治以寒涼是不識寒證也有偶因停滯而為脹痛人皆知其實也然脾胃之素強者即滯亦易化惟其不能化者則恆有脹滿之證又或有不食亦知飢少食即作脹或有無飢無飽全不思食或因病有傷胃氣久不思食本非有餘之證時醫遇此無論有餘不足鮮有不用開胃消導之劑者是不知虛證也蓋脾胃原有運化之功用今既不能化食則運用之職已失其權而尚可專意克削以益其困乎故凡欲治病必先藉胃氣以為行藥之主若胃氣強者攻之則去而疾常易愈此以胃氣強而藥力易行也胃氣虛者攻之亦不去此非藥不去病以胃氣本弱攻之則益弱而藥力愈不行胃愈傷病亦愈甚矣若乃體質貴賤尤有不同凡藜藿之兒壯健之質及新暴之病自宜消伐惟速去為善如以弱質弱病而不顧虛實概施欲速攻治之法則無有不危矣凡素喜冷食者內必多熱素喜熱食者內必多寒故內寒者不喜寒內熱者不喜熱然熱者嗜寒多生中寒寒者喜熱多生內熱內經所謂久而增氣物化之常氣增而久夭之由也凡治病者又當於素稟中察其嗜好偏勝之弊凡飲食致病傷於熱者多為火證而停滯者少傷於寒者多為停滯而全非火證大都飲食之傷必因於寒物者居多而溫平者次之蓋熱則易於腐化流通所以停滯者少馮楚瞻曰凡小兒傷食皆由胃氣怯弱今時之醫以平胃散為脾胃之準繩孰知平胃者胃中有高阜則能使平之使一平即止不可過劑過則平地反成坎矣又不若枳實丸為勝方為潔古老人所制用枳實一兩白朮二兩補多於消先補而後消也但此丸原為傷食者設今若專以為補脾藥又誤矣夫枳實有推牆倒壁之功用之不當能無克削即如山楂神麯麥芽舉世所常用者然山楂能化肉積凡多年母豬肉之不爛但入山楂一撮登時皮肉即糜又産婦兒枕痛以山楂煎服兒枕立化可見其破滯之功豈可輕用曲麥者以米飯在瓷缸中必藉曲以釀酒必藉蘖以成糖脾胃在人身中非瓷缸比原有化食之功今食不化因其所司者病也只補其運用之能而食自化何必用此消克藥哉大凡小兒原氣完固脾胃素強者多食不傷過時不飢若兒先因本氣不足脾胃素虧者多食易傷如攻伐一用飲食雖消而脾氣復經此一番消伐愈虛其虛後日食復不化猶謂前藥已效湯丸疊進展轉相害羸瘦日增良可悲矣故醫有貧賤之醫有富貴之醫膏粱子弟與藜藿不同太平之民與瘡痍自別鄉村裡巷頑夫壯士暴有所傷攻伐之劑一投可愈倘膏粱幼稚稟受怯弱嬌養柔脆一例施之貽害不小矣楚瞻曰人之脾胃雖能化食實由於水火二氣運用其間非脾胃之所專能也內火盛則脾胃燥水盛則脾胃濕皆不能健運乃生諸病如消渴證火偏盛而水不能制水腫證水偏盛而火不能化惟制其偏而使之平則善矣制者非謂去水去火之意人身水火本自均平偏者病也火偏多者補水配火不必去火水偏多者補火配水不必去水譬之天平此重則彼輕一邊重者只補足輕之一邊決不鑿去馬子蓋馬子一定之數今人見水利水見火瀉火是鑿馬子者也小兒之病傷食最多故乳食停滯中焦不化而成病者必發熱惡食或噫氣作酸或惡聞食氣或欲吐不吐或吐出酸水或氣短痞悶或腹痛啼叫此皆傷食之候也便宜損之損之者謂姑止之勿與食也使其自運經謂傷之輕者損谷則愈矣損之不減則用胃苓丸以調之調之不減則用保和丸以導之導之不去則攻下之輕則木香檳榔丸重則消積丸傷食一證最關利害如遷延不治則成積成癖治之不當則成疳成癆故小兒之強壯者脾胃素實恃其能食父母縱之以致太過停留不化此食傷脾胃真傷食也可用前法治之如小兒之怯弱者脾胃素虛所食原少或因略加即停滯而不化此乃脾虛不能消穀轉運遲耳非真傷食作傷食治則誤矣惟宜六君子湯助其健運多服自愈凡小兒脾胃實者倘縱其口腹不知節制則飲食自倍腸胃乃傷而實者必致為虛矣其體之虛怯者能節其飲食則腸胃不傷穀氣漸長而虛者終變為實矣凡傷食吐瀉後則其所傷之物俱去只與和其胃氣或異功散或六神丸入方潔古枳實丸治小兒傷食脾不運化以致面黃肚大此方補多消少誠為傷食運化之良方漂白朮二兩用土拌炒小枳實一兩酒炒胃虛不思飲食者加藿香葉五錢焙西砂仁五錢酒炒名香砂枳實丸小兒體質肥白有痰者加真廣皮五錢酒炒法半夏五錢焙名橘半枳實丸上藥炒制以鮮荷葉包飯煨熟去荷葉將飯同前末搗勻為丸極小每一二錢半飢白湯下胃苓丸方見卷二傷濕門保和丸治飲食停滯胸膈痞悶腹脹等證六神麯炒真廣皮炒法半夏白雲苓炒各一兩京楂肉三兩淨連翹炒蘿蔔子炒各五錢共為細末煉蜜為丸每服一二錢薑湯下丁香檳榔丸治傷食消之不去以此下之黑牽牛炒取頭末五錢尖檳榔炒五錢錦莊黃五錢酒蒸曬乾南木香三錢六神麯炒一兩共為細末薑汁打米糊為丸量兒大小加減用之此方亦不峻厲白湯送下消積丸方見卷三嘔吐門六君子湯方見卷二類搐門異功散專治脾胃虛弱吐瀉之後大病之後以此調理官揀參切漂白朮土炒白雲苓乳蒸真廣皮酒炒炙甘草各等分生薑大棗水煎服為末薑棗湯調服亦可六神丸與異功散主治同實脾之功勝之官揀參切片焙乾漂白朮土炒白雲苓乳蒸懷山藥乳蒸白扁豆炒炙甘草各等分共為末煉蜜丸彈子大每服一丸薑湯化下食積證治經曰新積痛可移者易已也積不痛難已也夫飲食之積必用消導消者散其積也導者行其氣也脾虛不運則氣不流行氣不流行則停滯而為積或作瀉痢或成癥痞以致飲食減少五臟無所資稟血氣日愈虛衰因致危困者多矣故必消而導之輕則和解常劑重必峻下湯丸蓋濁陰不降則清陽不升客垢不除則真元不復如戡定禍亂然後可以致太平若積因脾虛不能健運藥力者或消補並行或補多消少或先補後消潔古所謂養正而積自除故前人破滯削堅之藥必假參朮贊助成功經曰無致邪無失正絶人長命此之謂也夫食者有形之物傷之則宜損其谷其次莫若消之消之不去則攻之此治初傷乳食之法也倘治之不早以致陳莝菀聚乃成積也其候面色黃白或青黃腹大或緊食少腹痛發則數日不止而醫者治積不問平日所傷之物是寒是熱並不察兒之形氣或虛或實可攻不可攻竟用偏寒偏熱峻下之藥而犯虛虛之戒其害豈勝言哉如先傷熱乳熱食者則為熱積傷冷乳冷食者則為冷積五穀之類為食積禽畜之類為肉積菜果之類為冷積故藥宜分寒熱冷積應用消積丸熱積木香檳榔丸仍用原傷之物作湯送之謂之溯源湯凡用攻下取積之藥必先補其胃氣如六君之類預服數劑扶其元神然後下之免傷胃氣也如小兒體質素怯者雖有積必不宜下當以補為消六君子湯加莪朮木香共為細末薑汁打神麯糊丸每一二錢米湯下久服自消今兒稟受怯弱者衆有積皆當識此攻積之藥慎勿輕用入方消積丸方見卷三嘔吐門木香檳榔丸方見卷三傷食門六君子湯方見卷二類搐門此加莪朮木香食積簡便方消積丸消食消水消氣消痞消脹消腫消積其功甚捷惟久病虛羸者不宜用此比前消積丸藥力輕緩不甚峻厲香附米酒炒一兩五靈脂淘淨一兩黑牽牛炒去頭末二兩共為細末醋打麵糊丸緑豆大每服一二十丸食遠薑湯送下治傷冷食及難化之物用生薑紫蘇煎濃湯置浴盆內令患者乘熱坐湯內以手揉其腹胸以熱湯淋之氣通即化矣又方以生薑搗爛紫蘇搗爛炒熱布包尉胸腹如冷再炒再尉神效治傷食停積不消用白酒麴即釀酒小曲炒二兩老麥芽取淨末一兩共為細末每服二錢白湯調下治粽傷及糯米所傷更妙治飲食停滯飽悶不消以糯米一升炒熱以布包之分作二包於臍腹上輪換尉之助其脾氣轉運也立消因食肉停滯不消用山楂子三十粒捶碎煎濃湯飲之自化因食犬肉成積不治則殺人用山楂肉二十四粒杏仁去皮尖二十四粒煎濃湯飲自化因食牛肉腹脹不消用干稻草一把煎濃湯滾熱飲之自消因麵食腹脹生薑搗汁沖好酒熱服即消又方以生蘿蔔取汁溫熱服神應凡食麵必用醋斷不作脹因食菱角腹痛作脹生薑搗取自然汁以滾湯沖服立消因食瓜果生冷太多以致腹脹氣急用真青化桂去粗皮取肉研細末以飯搗和為丸緑豆大小兒每服五丸稍長者十丸水送病愈藥停凡小兒病醫認證不確錯用反藥或煩躁不寧或嘔瀉不止欲與解去其藥用黑豆一杯甘草三錢煎濃湯服之自解倘無黑豆緑豆亦好發熱證治經曰陽勝則熱陰勝則寒重寒則熱重熱則寒寒傷形熱傷氣又曰氣實者熱也小兒之病多有發熱然幼科論證太繁來學眩目莫得其要豫謂小兒之證惟宜明顯簡切有裨於治療足矣今以小兒發熱分為四大證一曰表熱一曰裡熱一曰虛熱一曰實熱表裡虛實既明則大綱在手然後逐證辨認又豈能逃其冰鑑乎一小兒無故發熱多由外感風寒其證喜人懷抱畏縮惡風寒不欲露出頭面面帶慘色不渴清便自調吮乳口不熱或鼻塞流涕或噴嚏渾身拘急此表熱也初起時一汗可解桂枝湯加柴胡粉葛熱服取微汗效若元氣怯弱者四君子湯加防風柴胡粉葛一發熱時喜露頭面仰身臥揚手擲足揭去衣被渴欲飲水吮乳不休者口渴也吮乳口熱小便赤大便閉此裡熱也宜解利之導赤散煎送瀉青丸一虛熱者多從大病之後或溫熱或潮熱如潮汐有定期也或渴或不渴大小便如常宜補之竹葉調元湯一實熱者面赤腮燥鼻孔乾焦喜就冷或合面臥或仰面臥露出手足揭去衣被大渴不休大小便祕宜微下集成沆瀣丹以上四熱為綱其下雜證為目有綱有目而猶不能辨別者未之有也傷風發熱其證自汗身熱呵缺目赤多睡惡風喘急此因解換褓裳受風所致治宜解肌柴葛桂枝湯熱退之後略宜滋陰傷寒發熱其證無汗身熱呵缺頓悶項急面赤喘急惡寒口中氣熱此因脫換受寒所致治宜惺惺散熱退後微服沆瀣丹以防內熱既傷風寒發熱又兼吐瀉者不可發散此脾胃虛怯也但以五苓散煎送理中丸傷熱發熱多在夏月其證身熱自汗作渴昏睡手足俱熱此因天氣過熱而包裹過厚受其熱也人參白虎湯以解其熱次以調元生脈散補之傷暑發熱夏月有之其證身熱自汗作渴昏睡手足冷此由高堂廣廈陰冷太過中氣受傷所致先以調元生脈散補其氣次服四君子湯以防吐瀉心熱者渾身發熱面青自汗心悸不寧脈數煩躁狂叫恍惚此心熱也導赤散加黃連夜熱者夜間作熱旦則退去此血虛也六味地黃湯加龜板當歸白芍斂納陰氣傷寒無汗服表藥而汗出其熱不退又復下之熱仍不退乃表裡俱虛氣不歸元陽浮於外此為虛熱不可誤用寒涼即當和其胃氣裨陽氣收斂其熱自退四君子湯加炮姜疳熱者形色黃瘦食不長肌骨蒸盜汗泄瀉無恆肚大腳小多起於大病之後失於將息又或傷飢食飽脾氣受傷六君子湯加當歸白芍壯熱者一向熱而不已由氣血壅實五臟生熱鬱蒸於內則睡臥不安精神恍惚蒸發於外則表裡俱熱燥急喘粗甚則搐搦以導赤散煎湯送瀉青丸大小便祕者集成沆瀣丹煩熱者躁擾不安五心煩躁四肢溫壯小便赤澀此心經有熱宜導赤散加麥冬梔仁積熱者面赤口瘡大小便黃赤此表裡俱實或因內傷酒面煎炒炙煿或誤投峻補之藥或外因厚棉爐火溫暖過度皆能生熱此人事所致宜沆瀣丹清解之虛熱者或汗下太過津液枯焦或大病之後元氣受傷皆能生熱其證困倦少力面色青白虛汗自出神慢氣怯四肢軟弱手足厥冷此氣虛發厥血虛發熱大虛證也四君子湯加炮姜甚則加附子熱退以平劑調之客熱者乍有乍無邪熱干心則熱形於額故先起於頭面而後身熱恍惚多恐聞聲則惕此正氣虛而熱邪勝故邪正交爭發熱無定乍進乍退如客之往來莫測也導赤散先徹其邪後以團參散護其正氣血熱者每日已午時發熱過夜則涼此心經血熱也輕則導赤散重則四順散入方柴葛桂枝湯治小兒傷風自汗發熱嫩桂枝一錢杭白芍一錢五分北柴胡一錢粉乾葛一錢炙甘草八分老生薑一錢大紅棗五枚淨水濃煎熱服惺惺散方見卷二乳子傷寒門集成沆瀣丹方見卷二胎疾門五苓散方見卷二傷暑門理中湯方見卷二乳子傷寒門人參白虎湯方見卷二傷暑門調元生脈散治夏月傷熱發熱以此扶其元氣官揀參六分炙黃耆一錢五分杭麥冬一錢北五味五分炙甘草五分老生薑三片大紅棗三枚水煎溫服四君子湯方見卷三瘧疾門導赤散方見卷四啼哭門六味地黃湯方見卷一胎疾門六君子湯方見卷二類搐門瀉青丸方見卷四啼哭門團參散方見卷二非搐門四順清涼散方見卷四腹痛門神奇外治法疏表法小兒發熱不拘風寒食飲時疫痘疹並宜用之以蔥一握搗爛取汁少加麻油在內和勻指蘸蔥油摩運兒之五心頭面項背諸處每處摩擦十數下運完以厚衣裹之蒙其頭略疏微汗但不可令其大汗此法最能疏通腠理宣行經絡使邪氣外出不致久羈榮衛而又不傷正氣誠良法也清裡法小兒發熱至二三日邪已入里或乳食停滯內成鬱熱其候五心煩熱睡臥不寧口渴多啼胸滿氣急面赤唇焦大小便祕此為內熱以雞蛋一枚去黃取清以碗盛之入麻油約與蛋清等再加雄黃細末一錢攪極勻復以婦女亂髮一團蘸染蛋清於小兒胃口拍之寒天以火烘暖不可冷用自胸口拍至臍輪止須拍半時之久仍以頭髮敷於胸口以布扎之一炷香久取下不用一切諸熱皆能退去蓋蛋清能滋陰退熱麻油雄黃拔毒涼肌故也此身有熱者用之倘身無熱惟啼哭焦煩神志不安者不必蛋清專以麻油雄黃亂髮拍之仍敷胸口即時安臥此法多救危險之證功難殫述解煩法凡小兒實熱之證及麻疹毒盛熱極其候面赤口渴五心煩熱啼哭焦擾身熱如火上氣喘急揚手擲足一時藥不能及用水粉一兩以雞蛋清調勻略稀塗兒胃口及兩手掌心復以釀酒小曲十數枚研爛熱酒和作二餅貼兩足心布扎之少頃其熱散於四肢心內清涼不復啼擾開閉法凡小兒風痰閉塞昏沉不醒藥不能入甚至用艾火灸之亦不知痛者蓋因痰塞其脾之大絡截其陰陽升降之隧道也原非死證用生菖蒲生艾葉生薑生蔥各一握共入石臼內搗如泥以麻油好醋同前四味炒熱布包之從頭項背胸四肢乘熱往下尉之其痰一豁倏然而醒此方不特小兒凡閉證皆效引痰法凡小兒痰嗽上氣喘急有升無降喉中牽鋸之聲須引而下行用生白礬一兩研末少入麵粉米粉亦可蓋生礬見醋即化成水入麵粉取其膠黏故也好醋和作二小餅貼兩足心布包之一宿其痰自下暖痰法凡小兒胸有寒痰不時昏絶醒則吐出如緑豆粉濃厚而帶青色此寒極之痰前法皆不能化惟以生附子一枚生薑一兩同搗爛炒熱布包尉背心及胸前尉完將薑附捻成一餅貼於胃口良久其痰自開納氣法凡小兒虛脫大證上氣喘急真氣浮散不得歸元諸藥莫效用吳茱萸五分胡椒七粒五倍子一錢研極細末酒和作餅封肚臍以帶扎之其氣自順通脈法凡小兒忽爾手足厥冷此蓋表邪閉其經絡或風痰阻其榮衛又或大病之後陽不布散於四肢速用生薑煨熟搗汁半小杯略入麻油調勻以指蘸姜油摩兒手足往下搓挪揉捩以通其經絡俟其熱回以紙拭去之凡小兒指紋滯澀推之不動急以此法推豁之蓋此法不論陰陽虛實用之皆效定痛法凡小兒胸中飽悶臍腹疼痛一時不能得藥用食鹽一碗鍋內炒極熱布包之向胸腹從上尉下蓋鹽走血分最能軟堅所以止痛冷則又炒又尉痛定乃止男婦氣痛皆用此法以上九法非古書所有實豫異授心傳經驗既久神應無方筆之於書以公世用治病端本澄源至要口訣凡臨病家診視小兒無論病之輕重證之順逆稍長者令其本身忌口乳子即令乳母忌口嚴禁葷酒油膩酸鹹辛辣但可香茶白飯稍用蜜餞糖食而已蓋乳房為胃經所主飲食入胃腐化精微而為榮血貯於衝脈衝脈載以上行遂變赤為白而為乳汁小兒賴此以為命與乳母氣候相關吉凶共際是以母食熱子受熱母食寒子受寒母食毒子中毒又惟葷酒油膩甘肥凝滯之物為尤甚故凡小兒有病但得乳母忌口即不藥亦能自愈不觀窮鄉僻壤藜藿單寒之家所育之子肥實壯健而且少病病亦易愈人但云他人之子何以易育不知他家無甘肥凝膩口腹清淡所以病少而易育自家乳母縱口飲啖葷酒不忌醫雖用藥得法其如乳汁不清胃口油滯不能宣布藥力所以多病難醫也此至緊至要關頭醫者不為切戒其咎在醫至於病家每多自誤凡乳子有病其母於房勞食飲寒暑喜怒一毫不慎惟責效於醫之草根樹皮詎知刀頭圭角能勝其無情之相火能制其有質之油膩耶徒令醫者勞心病兒受苦深可悲憫復有婦人姑息之愛切要提防昔豫一堂弟年八歲因病傷寒幾死得遇明者保全稍能步履醫囑嚴忌葷腥豫伯母覿面承錯私以爛蹄花一碗與之病人見肉登時食盡時豫目睹其事夜即變證四肢厥冷口吐白沫喉內痰鳴兩目直視而絶豫伯與醫者驚惶無措莫測其由因詢曾食何物伯母堅辭無有微風不露豫亦莫敢直言醫者無可下手遂辭去豫取山楂肉炒研細末以濃薑湯調灌數次蓋山楂多服最能通利五更大瀉數行所下油膩膠滯之物內有精肉猶存人事倏清伯見所下之物始知食肉生變痛詈其母幾至反目幸豫在側開解之令豫調理豫為暢脾而安此等曖昧苟非豫之目擊伯母必不直告即至真死彼亦不言醫者亦不知其何以變證而死可見婦女誤事為禍如此其烈也凡類此者以天下之大又豈特一人而已故凡遇膏粱宦室不可不諄切言之以杜其姑息之害小兒在胎之時衝脈運血以養之及其産下衝脈載血以乳之乳為血化所以兒之脾胃獨與此乳汁相吻合其他則皆非所宜矣凡小兒一周二歲止可飲之以乳切不可餔以穀食蓋穀食有形之物堅硬難消兒之脾氣未強不能運化每多因食致病倘乳少必欲借穀食調養者須以早米炒熟磨粉微入白糖滾湯調服不致停滯至於肉食尤為有害凡小兒五歲之內能忌肉食終身無脾病無奈愚夫愚婦莫可理喻見兒病稍愈即以肉食飼之謬云虛補不如實補謂藥補為虛肉補為實不知此語出於何經妄誕無知真堪唾罵及其脾胃凝滯兒病復作始為倉惶懊悔是誰之咎故小兒病後必不可妄用葷腥只可素食調理或一月半月待其脾氣已健始可略與清湯仍不得過用甘肥蓋甘肥之物非但不能益兒適足以致病醫者能知此意治病必不掣肘病家能依禁忌斷無反復之虞此非摸擬之辭實知之深見之確端本澄源莫切乎此豫雖未學臨證有年病家之弊無不周知故不得不剖心相告庶後賢知所提備云痢疾證治經曰飲食不節起居不時陰受之則入五臟填滿閉塞下為飧泄久為腸癖夫飧泄者水穀不化也腸癖者下痢是也小兒之病傷食最多內有宿食停積更受外感則成痢矣古今方書以其閉滯不利故又謂之滯下其證裡急後重或垢或血或見五色或多紅紫或痛或不痛或嘔或不嘔或為發熱或為惡寒此證之陰陽虛實最宜詳審庶不致誤仍當以脈證辨之凡身熱作渴脈數有力而能食者為熱身涼不渴脈沉無力而不能食者為寒初起腹中苦痛裡急後重者為實宜急下之集成沆瀣丹集成三仙丹二藥同服立應如兼外感者必身有寒熱不可遽下凡痢由外感而發者最多急宜發散若下之早必致引邪入里而為綿延之證以倉廩散疏解之因傷風得之者則純下清血蓋風傷其陰絡致血不循經所以血妄下宜胃風湯赤白相兼者心主血因傷熱得之則心移熱於小腸故赤者從小腸來肺主氣因傷熱得之則肺移熱於大腸故白者從大腸來皆以芍藥湯治之調血則便膿愈行氣則後重除此治痢之要法也又法以黃連阿膠丸加當歸木香治血痢於血中行氣以胃苓丸加當歸白芍治白痢於氣中養血有積者治痢保和丸痢久不止名休息痢切不可止澀和中丸最妙後有集成至聖丹專治久痢百不失一有泄瀉變痢者有痢變泄瀉者先瀉後變痢者脾傳腎也為賊邪難治先痢後變瀉者腎傳脾也為微邪易治蓋初瀉變痢者此氣病傳入血中宜養血為主加調氣之藥不可誤下以傷胃氣初痢變瀉者血病傳入氣中以調氣為主加養血之藥不可收澀恐毒氣留而不去覆成痢也瀉變痢者加味四物湯痢變瀉者加味四君子湯痢久不止脾胃受傷中氣下陷則為脫肛熱毒上逆則食入便吐不思乳食謂之噤口久痢陰傷腎氣虛敗則兩膝紅腫謂之鶴膝脫肛者胃氣下陷後重不除努掙太過故腸頭脫出宜養血調氣微加升提之品則痢止肛自收矣升麻湯外用洗法托法噤口者乃胃虛逆氣上衝而吐也有不思飲食皆虛損也宜參苓白朮散米湯調服凡痢疾能食者吉不能食者凶鶴膝者兩膝紅腫如鶴之膝小兒痢後多有此證乃腎虛之極宜補腎地黃丸加牛膝鹿茸痢疾腹脹中氣虛也胃苓丸調之倘因毒氣未盡庸流誤服澀藥而致腹脹者為實也不可作虛治保和丸消導之痢疾不治證痢見五色五臟俱敗痢如煙塵水如屋漏水下痢久肛門如竹筒如魚腥久痢唇紅舌胎氣促心煩坐臥不安大渴飲水面容似朱者皆死證也入方集成沆瀣丹方見卷一胎疾門集成三仙丹方見卷二類搐門倉廩湯即人參敗毒散加陳倉米方見卷二小兒傷風門治傷風痢疾及時行疫痢大小相似者宜先服此即人參敗毒散加陳倉米煎服即名倉廩湯喻嘉言以此方為治痢之聖藥無論新久必用此藥升散之深得逆流挽舟之法也豫每用之輕者三四劑即愈矣不必另方重者服藥後外證悉去惟腹痛裡急後重未除者以沆瀣丹三仙丹同服推去積滯無不愈者蓋倉廩湯治痢與用四逆散治痢同意後賢宜深究焉胃風湯治風冷客於腸胃泄下鮮血及腸胃濕毒下如豆汁或下瘀血官揀參一錢漂白朮一錢五分白雲苓一錢白當歸一錢正川芎五分杭白芍一錢上桂心五分陳粟米一撮姜一片棗一枚水煎溫服河間芍藥湯調血便膿愈行氣後重除此方是也杭白芍一錢五分大當歸一錢雅川連五分實黃芩八分錦莊黃五分尖檳榔一錢南木香三分淨水濃煎熱服黃連阿膠丸治血痢於血中行氣正雅連一錢東阿膠二錢白雲苓一錢當歸身一錢南木香一錢共為細末水丸每服一二錢米飲下胃苓丸方見卷二傷暑門治白痢於氣中養血本方加當歸白芍白朮治痢保和丸治痢疾積滯未盡或在先原未得下今已脾虛不可下者宜服此廣陳皮法半夏白雲苓陳枳殼川厚朴正雅連京楂肉六神麯老麥芽以上諸味各一錢南木香尖檳榔炙甘草各五分共為細末另以神麯煮糊為丸每服一二錢米飲下和中丸治休息痢及疳痢官揀參炙甘草當歸身正川芎車前子結豬苓宣澤瀉六神麯老麥芽建蓮肉以上各二錢漂白朮白雲苓真廣皮杭白芍南木香炮薑炭肉豆蔻各一錢共為細末酒煮麵糊丸每服一二錢米飲下加味四物湯治先水瀉而變痢者當歸身正川芎杭白芍懷生地白雲苓正雅連南木香各等分水煎空心熱服加味四君子湯治先痢而後瀉者上官揀漂白朮白雲苓當歸身杭白芍炙甘草各一錢生薑三片大棗三枚水煎溫服升麻湯治虛痢脫肛仍調氣養血微帶升提緑升麻一錢五分官揀參漂白朮白雲苓芥穗真廣皮當歸身杭白芍北防風以上各一錢炙甘草五分肥烏梅一粒水煎食後服脫肛洗藥五倍子五錢白芒硝一錢荊芥穗一錢五分煎湯熏洗仍以五倍子研末敷之方以軟帛托入參苓白朮散方見卷三疳證門補腎地黃丸方見卷三哮喘門此加虎脛牛膝鹿茸補腎地黃丸方見卷二傷暑門保和丸方見卷三傷食門痢疾簡便方治痢疾用干馬齒莧煮爛紅痢以蜂蜜拌白痢以砂糖拌紅白相兼蜂蜜砂糖各半拌食一日二次連湯服之更妙按馬齒莧名五方草其葉青梗赤根白花黃子黑五行俱備所以寒熱赤白皆治六一散此方取天一生水地六成之之義為北方壬癸之精以其清暑毒去濕熱分陰陽利小便瀉丙水從小便而出故為治痢妙方白滑石研細末以清水調飛其重濁滓質不用待其水清去水曬乾每滑石末六兩加甘草細末一兩研勻聽用白痢用六一散七錢乾薑末七分紅痢用六一散七錢紅曲末七分各用薑汁打麵糊為丸梧桐子大每服一二錢白湯下久痢不止用紅糖白糖餳糖各三錢甘草一錢陳茶葉二錢同煎熟露一宿次早溫熱服神效噤口痢不思飲食以臘豬肉去肉取骨鍋內煎濃湯徐徐服之百發百中治赤白相兼用山楂肉不拘多少炒研為末每服一二錢紅痢蜜拌白痢紅砂糖拌紅白相兼蜜砂糖各半拌勻白湯調服空心下更妙此藥不分虛實不分久近皆效甚穩甚驗集成至聖丹新出治冷痢久瀉百方無驗者一服即痊凡痢之初起實熱實積易知而易治惟虛人冷積致痢醫多不以為意蓋實熱之證外候有身熱煩躁唇焦口渴肚疼窘迫裡急後重舌上黃苔六脈洪數證候既急治者亦急輕則疏利之重則寒下之積去而和其陰陽無不愈者至於虛人冷積致痢外無煩熱躁擾內無肚腹急痛有赤白相兼無裡急後重大便流利小便清長此由陰性遲緩所以外證不急遇此切不可姑息但以集成三仙丹下之以去其積倘不急下必致養虎貽患其積日久漸次下墜竟至大腸下口直腸上口交界處有小曲折隱匿於此為腸臟最深之處藥所不到之地證則乍輕乍重或愈或發便則乍紅乍白或硬或溏總無一定任是神丹分毫無濟蓋此積不在腹內而在大腸之下諸藥至此性力已過盡成糠粃安能去此沉匿之積所以冷痢有至三五年十數年不愈者由此故也古方用巴豆為丸下之者第恐久病神虛未敢輕用今以至捷至穩鴉膽子一味治之此物出閩省云貴雖諸家本章未收而藥肆皆有其形似益智子而小外殼蒼褐色內肉白而有油其味至苦用小鐵錘輕敲其殼殼破肉出其大如米敲碎者不用專取全仁用之三五歲兒二十餘粒十餘歲者三十多粒大人則四十九粒取天圓肉包之小兒一包三粒大人一包七粒緊包空腹吞下以飯食壓之使其下行更藉此天圓包裹可以直至大腸之下也此藥並不峻厲復不肚痛俟大便行時有白凍如魚腦者即冷積也如白凍未見過一二日再進一服或微加數粒此後不須再服服藥時忌葷酒三日戒鴨肉一月從此除根永不再發倘次日肚中虛痛用白芍一根甘草一根俱重三錢紙包水濕火內煨熟取起捶爛煎湯服之立止不忍隱祕筆之於書以公世用瘧疾證治經曰痎瘧皆生於風又曰夏傷於暑秋必痎瘧夫風與暑陽邪也寒與水陰邪也然風為陽中之涼氣暑為熱中之寒邪合是四者而言無非皆屬乎寒故俗號為脾寒謂病邪客於肌肉之間而脾應肉也及瘧之將發必先手足厥冷以脾主四肢也經言暑者言時氣也寒者言病氣也雖邪氣自淺而深郁寒成熱然終不免寒為本熱為標耳久而不解縱實變虛非大補真氣大健脾胃莫能瘳也瘧必有寒有熱蓋外邪伏於半表半里正在少陽所主之界出與陽爭陰勝則寒入與陰爭陽勝則熱即純熱無寒為溫瘧純寒無熱為牡瘧要皆自少陽而造其極偏故補偏救弊亦必還返少陽之界使陰陽協和而後愈也謂少陽而兼他經則有之謂他經而不涉少陽則不成其為瘧矣瘧之不離乎少陽如咳嗽之不離於肺也凡小兒觸冒風寒暑濕客於皮膚積於臟腑邪正相攻陰陽偏勝發為寒熱往來陽不足則先寒後熱陰不足則先熱後寒寒多熱少者陰勝陽也熱多寒少者陽勝陰也陰陽互攻則寒熱相半其初也必內有痰食致臟氣不流故發而為瘧瘧之正發有定期其間有一日間日二三日者此臟氣有盛衰邪之輕重不等也發於夏至後處暑前者三陽受病傷之淺而暴也發於處暑後冬至前者三陰受病傷之遠而深也發在子後午前者陽分受病易愈發在午後子前者陰分受病難愈尤當以寒熱多寡稟受強弱而參之則得矣瘧疾之證始而呵缺繼而足冷面色青黃身體拘急戰栗頭項腰脊俱痛寒去未已內外皆熱頭痛而渴但欲飲水嘔惡煩滿而不嗜食者皆其候也由小兒脾胃素弱邪氣得以乘之雖有寒熱虛實之不同然要不離乎脾胃其證亦有五乃風寒暑濕食也治法之要宜分初中末而治之初則截之謂邪氣初中正氣未傷略與疏解則驅之使去不可養以為患也中則和之謂邪氣漸入正氣漸傷或於補中加截藥或於截中加補藥務適其中以平為期末用補法謂邪久不去正氣已衰當補其脾胃為主使正氣復強則邪不攻自退矣一風瘧因感風得之惡風自汗煩渴頭疼風陽也故先熱後寒初時宜發散桂枝白朮湯不退小柴胡加常山檳榔烏梅截之久而不退補中益氣湯多服自愈一寒瘧因感寒得之無汗惡寒攣急面慘寒陰也故先寒後熱宜發散寒邪養胃湯加桂心不止平胃散加檳榔草果截之久不止六君子湯加薑桂一暑瘧因傷暑得之陰氣獨微陽氣獨發但熱不寒煩渴少睡嘔惡時見肌肉消爍宜解暑毒柴胡白虎湯不止去石膏加貝母常山檳榔截之久不止補中益氣湯一濕瘧因冒襲雨濕汗出澡浴坐臥濕地得之身體重痛肢節煩疼嘔逆脹滿胃苓湯不退平胃散加茯苓檳榔常山截之久不止參苓白朮散一食瘧一名痰瘧由飲食不節飢飽有傷然也凡食啖生冷魚肉油膩之物以致中脘停痰皆為食瘧其候飢不欲食食則中滿嘔逆腹痛宜去其食四獸飲不止以二陳湯送紅丸子久不止六君子湯加青皮薑桂有瘧痢並作者初用小柴胡加當歸白芍檳榔以解表導滯不已六君子湯加桂枝瘧後腫此病極多胃苓丸五皮湯下不消六君子湯加薑桂砂仁四肢冷者加附子瘧後食少黃瘦不長肌肉者將欲成疳但以平瘧養脾丸調之多服自愈有夜瘧此邪在血分宜麻黃桂枝湯加地黃紅花不止以四物湯合小柴胡湯加升麻提出陽分用四君湯加常山烏梅檳榔截之入方桂枝白朮湯治感風而發熱瘧嫩桂枝一錢杭青皮一錢真廣皮一錢正川芎五分香白芷五分法半夏一錢二分白雲苓一錢漂白朮六分家蘇葉七分芽桔梗五分尖檳榔五分生薑三片大棗三枚水煎於未發前二時服小柴胡湯方見卷二傷寒門補中益氣湯方見卷一保産門養胃湯治感寒發瘧草果仁薑製五分藿香葉一錢五分真廣皮薑汁炒一錢上桂心一錢炙甘草五分生薑三片烏梅一粒水煎熱服平胃散治寒瘧不止以此截之漂蒼朮一錢二分紫川朴一錢五分真廣皮一錢二分炙甘草一錢尖檳榔一錢草果仁薑汁炒極熟一錢生薑三片大棗三枚水煎清早空心服六君子湯方見卷二類搐門柴胡白虎湯治傷暑發瘧但熱不寒官揀參一錢北柴胡一錢二分片黃芩一錢法半夏一錢熟石膏一錢五分淨知母一錢炙甘草一錢晚粳米一撮生薑三片大棗三枚水煎未發前服胃苓湯方見卷二傷濕門參苓白朮散方見卷三疳證門四獸飲治食瘧和胃消痰官揀參一錢法半夏一錢二分白茯苓二錢真廣皮一錢漂白朮一錢二分老生薑一錢大紅棗一枚肥烏梅三粒炙甘草五分淨水濃煎半飢服二陳湯方見卷三嘔吐門紅丸子治食瘧食積氣滯腹脹京三稜蓬莪朮杭青皮真廣皮真胡椒白乾薑以上各三錢共為細末早米粉煮糊為丸緑豆大黃丹為衣每服一二十丸二陳湯煎送五皮湯方見卷二傷濕門平瘧養脾丸不問遠年近日此藥不發不截誠治瘧之王道又擅去瘧之良能也官揀參切片焙乾漂白朮土炒白茯苓乳蒸真廣皮酒炒杭青皮醋炒法半夏焙漂蒼朮焙紫川朴薑製北柴胡酒炒嫩黃耆蜜炙結豬苓炒宣澤瀉炒嫩桂枝焙小常山焙大鱉甲醋炙白當歸酒炒正川芎酒炒粉甘草炙草果仁薑製各等分共為細末酒煮麵糊丸米粒大每服一二錢米飲下有痞塊者加三稜莪朮久瘧體虛者非此莫愈麻黃桂枝湯治夜瘧血分有邪宜用此發散其血中風寒淨麻黃一錢柳桂枝一錢二分片黃芩一錢光桃仁十五粒炙甘草一錢大生地一錢鮮紅花五分蔥白一莖水煎熱服四物湯合小柴胡湯治夜瘧以此提出陽分大熟地二錢大當歸一錢五分杭白芍一錢正川芎一錢官揀參五分北柴胡一錢片黃芩一錢法半夏一錢炙甘草五分緑升麻一錢生薑三片大棗三枚水煎熱服加味四君湯治夜瘧已出陽分以此截之官揀參一錢漂白朮二錢白雲苓一錢五分炙甘草一錢小恆山一錢尖檳榔一錢肥烏梅三粒生薑三片大棗三枚水煎發日微溫服瘧疾簡便方小兒凡發瘧疾多有病氣須常燒檀香以僻其邪更常熏其衣褓等物氣穢去而邪易除矣凡瘧藥必露者瘧乃暑邪之因露為肅殺之氣性理大全謂霧屬陽露屬陰霧生物露殺物則知暑邪逢露即解矣凡瘧疾口渴切不可飲冷水冷茶並生冷之物犯之其病益甚惟以薑湯乘熱飲之此良法也凡瘧疾熱未全退切不可令其飲食必俟其熱已退盡方可食之不然終成癖積凡服止截之藥必須餓過發時不發方可吃粥食早瘧必再作下次截藥無靈矣清邪止瘧方李士材制升麻柴胡各二錢提陽氣上升使遠於陰而寒可止黃芩知母各一錢五分引陰氣下降使遠於陽而熱自已生薑三錢卻邪歸正甘草五分和其陰陽二三劑自止四神酒治久瘧不止一服即住永不再發用常山一錢五分檳榔一錢丁香五分烏梅一個好酒大半碗略煎露一宿發日空心冷服無痰不成瘧所以瘧家多蓄痰涎溢飲常山能破涎逐飲故有截瘧之功然須用於發散表邪之後及提出陽分之時則發無不中矣凡服常山切勿熱服須露一宿為妙熱服則吐生用亦吐與甘草同服亦吐凡大虛之體切宜斟酌未可遽投小兒邪瘧其發無時日期不定乍早乍晚或有或無者名為邪瘧以麝香五釐同好京墨同研書去邪辟魔四字於額上效小兒熱瘧不寒者用穿山甲一兩大紅棗十個同燒存性為末每用一錢發日五更白湯調服小兒久瘧不止用大鱉甲小者不用以醋炙枯研末每一錢或錢五隔夜一服清晨一服將發時一服無不斷者瘧來寒多熱少飲食不思用良薑一兩麻油炒炮姜一兩共為末每二錢用豬膽汁調成膏臨發時熱酒調服或以豬膽汁和丸如芡實大每服七丸酒送亦佳膽屬甲木取其引入少陽也消渴證治經曰心移熱於肺傳為膈消又曰二陽結謂之消夫消渴者枯燥之病也凡渴而多飲為上消肺熱也多食善飢為中消胃熱也渴而小便數膏濁不禁為下消腎熱也雖為火盛水衰之證然由虛熱者多實熱者少若作有餘治之誤之甚矣始而心肺消渴脾胃消中或腎虛消濁傳染日久即腸胃合消五臟乾燥精神倦怠以致消瘦四肢將為不起之候初起治之得法必不至是一消渴由心火動而消上上消乎心移熱於肺渴飲茶水飲水又渴名曰上消小便最多由其水不能停所以飲水無厭若飲一溲一者可治飲一溲二者不可治宜蓮花飲為主次以生津四物湯滋其陰庶幾有濟一消肌脾火動而消中中消於脾移熱於胃喜多食食無足時小便色黃各曰中消宜人參白虎清胃保中一消濁乃上消之傳變肺胃之熱久不清乃致動而消腎移熱於膀胱小便渾濁色如膏脂名曰下消宜加味地黃湯滋其真陰久服可愈以上渴證初起者宜用前法倘日久不愈津液枯焦其渴愈甚若仍用黃連花粉苦寒之類未有不致危殆者惟七味白朮散對證之藥放膽用之非此不愈入方蓮花飲治上消口渴飲水不休白蓮鬚粉乾葛白雲苓大生地以上各一錢真雅連天花粉官揀參北五味淨知母炙甘草淡竹葉以上各五分燈心十莖水煎熱服生津四物湯治上消已服蓮花飲後用此白歸身大生地杭白芍淨知母大麥冬官揀參以上各一錢正川芎正雅連天花粉川黃柏炙甘草以上各五分肥烏梅一粒燈芯十莖水煎熱服人參白虎湯治中消消穀易飢食無厭足官揀參一錢熟石膏二錢淨知母一錢五分炙甘草一錢加晚粳米一兩為引水煎以米熟為度澄清熱服加味地黃湯治下消小便渾濁色如膏脂大懷地二錢正懷山一錢五分山茱肉一錢二分宣澤瀉六分粉丹皮一錢白雲苓一錢二分建蓮肉七分淨知母五分芡實米一錢大麥冬一錢北五味十四粒淨水濃煎清晨空心服七味白朮散治小兒久病消渴口乾不止惟此最神放膽用之方見卷三泄瀉門消渴簡便方蠶繭湯通治三消之證用蠶繭殼或取絲綿結塊者取來煎湯時時當茶飲飲至二七無不愈者蓋此物與馬同氣皆屬午火在人為少陰君火善伏膀胱之火引陰液上潮於口而渴自止昧者以為膀胱之火作祟不知膀胱之火不能收攝已隨小便而去惟其不能上潮所以津液不生而口作渴不觀仙家運用三昧真火以心為君火命門相火膀胱民火起火必自膀胱始而後相火君火三火齊發煅煉陰魔真火熏蒸甘露自降何渴之有消渴日夜飲水無度用豬肚一個洗極淨入淡豆豉五錢在內以線縫之煮極爛取汁飲之肚亦可食又方煮豬血清湯不入油鹽多飲極效此物善能滋陰降火專走血分脾氣虛者間日飲之恐防作泄故也諸血證治經曰營者水穀之精也調和於五臟灑陳於六腑乃能入於脈也生化於脾總統於心藏受於肝宣布於肺施泄於腎濡潤宣通靡不由此凡吐血者榮衛之氣逆也蓋心者血之主肺者氣之主氣主煦之血主濡之營養百骸溉灌筋脈升降有常自然順適或外感六淫內傷飲食氣留不行血壅不濡是以熱極湧泄不無妄動之患且氣有餘便是火火乘於血得熱妄行上奔而為吐血也故小兒吐血因傷食者最多蓋陽明多氣多血若鬱熱內逼必致榮血妄行所以小兒吐血屬胃者十之七八更有尚在襁褓而吐血者多由重帷暖閣火氣熏逼或過啖辛辣流於乳房兒飲之後積溫成熱熱極上崩或吐血或衄血或尿血或便血者有之矣若久嗽血者是又肺虛所致宜保肺滋陰肺朝百脈之氣肝統諸經之血脾胃有傷榮衛虛損故血失常道而妄行倘氣虛神倦唇無紅色者切勿寒涼宜四君子湯先救其脾脾實則血止矣血虛者精神如舊唇舌如常以四物湯加參術補氣即所以生血也吐血者胃中積熱火逼其血而妄行故從口吐出宜清其胃火使血歸經蓋血屬陰陰主降凡血證從下出者順從上出者皆逆也清胃散鼻血者脾熱傳肺虛火上炎血行清道故血從鼻出宜加味四君子湯有咳嗽而吐血者此心腎水火不升降火炎無制肺胃枯燥宜滋陰降火湯切不可作童子癆治有大便下血者糞前見血者為近血蓋自大腸來也黃連解毒湯糞後見血者為遠血從胃脘小腸來也清胃散止之久不止者補中益氣湯加胡連入方四君子湯方見卷三瘧疾門四物湯方見卷三瘧疾門此加人參白朮各一錢清胃湯治吐血並糞後血黑梔仁懷生地粉丹皮大當歸以上四味各一錢雅川連五分淨水濃煎滾熱服加味四君子湯治脾傳肺血從鼻出官揀參一錢漂白朮一錢白雲苓一錢粉甘草八分芽桔梗一錢大麥冬二錢黑梔仁一錢片黃芩一錢五分燈芯十莖竹葉七片水煎熱服滋陰降火湯治小兒咳嗽見血升水降火大生地當歸身杭白芍淨知母建蓮肉潤玄參大杭冬以上七味各一錢真雅連天花粉炙甘草以上三味各五分淨水濃煎清晨空心服黃連解毒湯治吐血並便前下血正雅連五分川黃柏一錢小條芩一錢黑梔仁一錢燈芯十莖水煎滾熱服補中益氣湯方見卷一保産門諸血簡便方凡吐血鼻血低頭掬損肺臟而吐血以及上下一切血證用百草霜掃下研為細末以糯米煎湯大人每服三錢小兒每服一錢米飲調服三服立愈百草霜須鄉間燒茅草鍋底取之燒柴炭者不用凡鼻血如注頃刻流至數升無藥可解急將患者頭髮解開將髮梢浸新水盆內良久血即止止後仍服涼血清火之藥至浸發亦不可太久只問病者心內覺有涼氣即止久則涼冷入心恐生別證至神至奇此可治稍大之兒乳子無發可浸又方治鼻血不止用大蒜一枚去皮研如泥作餅子如錢大左鼻出貼左足心右鼻出貼右足心兩鼻俱出貼兩足心立時即止即以溫水洗去之又方以亂髮燒灰吹鼻以線扎中手指根左鼻出扎左右鼻出扎右又以梔子燒灰研末吹鼻內又方治鼻血以韭菜搗汁一杯童子小便一杯和勻溫暖服之血散火降立時即止蓋韭菜散血童便降火故也大便瀉血用亂油發雞冠花側柏葉俱燒灰三味等分研極細末每服一錢水酒調服又方用霜後乾絲瓜燒灰存性研為細末每服一錢酒調空心服下血危篤不可救者用乾絲瓜一條燒灰存性研末聽用槐花燒灰存性研末聽用每以絲瓜末一錢槐花末五分共研勻米飲調空心服小兒小便血淋用雞白屎白如粉者炒極焦研末每五分酒調空心服小兒尿血烏梅燒灰存性研為細末每次一錢米飲調下
