body:
  text: 卷五萬氏痘麻天元賦痘本胎毒俗名天瘡傳染由於外感輕重過於內傷初起太陽壬水克乎丙火次歸陽明血水化為膿漿所喜者紅活鮮潤可畏者黑陷焦黃勢若燃眉變如反掌皮膚臭爛血氣虛尪若救焚兮徙薪何如焦額似拯溺兮落井不及寬裳原乎一元肇化二索成祥欲火動而妄作胎毒熾而流殃啼聲驟發機毒深藏命門養火胞戶收熔待四時之疫癘動五臟之皮囊榮氣逆於腠理惡血發於膀胱二火相煽四大成瘡毒之輕者發則微貴乎調養毒之重者發則密急於提防至於運氣推遷在於勝復升降時令乖異無非寒熱溫涼苟陰陽之逆理為氣候之反常五行鬱而災見九曜窒而變彰癘氣流行無論郡邑鄉黨惡毒傳染豈分黎庶侯王此則不形於診貴在能制其亢先事解散兮十全八九臨時區處兮恥尋常大抵氣運先歲痘疹屬陽春夏為順兮樂其生長秋冬為逆兮惡其收藏暴寒兮恐邪毒之郁遏暴熱兮慮腠理之開張膿疱春而莫療黑陷夏以為殃秋斑實惡冬疹非祥此逆四時之令休誇三世之方且如證候殊形臟腑異狀肝主淚而水泡肺主涕而膿漿心斑紅豔脾疹赤黃惟腎經之無證惟變黑而可妨所以觀乎外候因而辨其內臟呵欠頓悶兮肝木之因咳嗽噴嚏兮肺金之相手足冷而昏睡兮脾土困於中央面目赤而驚悸兮心火炎於膈上耳骩屬腎溫暖如常二處爍熱兮下極火炎而必斃四肢厥冷兮中州土敗而傾亡先分部位次察災祥陽明布於面中太陽行於頭上心肺居胸膈之要肝膽主脅腋之旁手足司於脾胃腰背統於膀胱泄瀉者邪甚於下嘔吐者邪甚於上氣逆而腹痛隱隱毒深而腰痛皇皇心熱甚而搐搦胃邪實而癲狂鼻燥咽乾肺受火邪而液竭屎硬溺澀腎由火旺而精亡氣弱減餐者不任其毒神強能食者不失其常欲決重輕但觀發熱如占順逆須認其瘡毒甚兮身如炎火熱微兮體或清涼若寒熱之來往定徵兆之佳祥數番施出兮春回陽谷一齊湧出兮火烈昆崗蚊跡蚤斑刻期而為鬼錄蛇皮蠶殼引日而返泉鄉不喜珠紅更嫌灰白最宜蒼蠟切忌紫黃常要明潤兮恐薄嫩之易破不宜乾枯兮防搔癢之難當惡候如此上工審祥面頰稀而磊落清安可保胸膈密而邊串凶吉難量頂要尖圓不宜平陷漿宜飽滿切忌虛空兼之顏色喜老而惡嫩皮膚愛糙而怕光焰起根窠終防癢塌丹浮皮肉必致夭殤頭面預腫兮三陽亢甚手足厥冷兮五臟摧傷瘡堆喉舌毒纏頸項咽喉痛而呼吸則難飲食少而吞吐則嗆此天命之安排豈人力之可仗煩躁悶亂兮七神離散譫語眩冒兮五毒猖狂鼓項戰慄兮肺敗咬牙口噤兮腎傷渴不住兮焦膈瀉不止兮滑腸失聲兮咽爛吼氣兮腹脹晝夜搔爬兮將榮衛之外脫乳食斷絕兮必胃氣之受戕腫忽消毒歸於里色反黑疔起於瘡食谷則嗆兮在嬰兒之命促飲水則噴兮較醫工之短長輕重反復調理乖張輕變重而可畏重變輕而莫慌風寒素慎飲食如常出入禁乎男女蓋覆適其溫涼內無妄動治不乖方此則變輕之候實為保命之良若當犯乎禁忌或誤投乎丸湯徒肆房室不順陰陽外感不正之氣內傷不時之糧平人且病患者敢當是以順則逆而逆則險宜乎輕變重而重則亡發自肺經相連脾臟氣熱味辛燥金受克形寒飲冷華蓋先傷浩飲則水來侮土而成泄痢過食則脾不運化而作痞脹皮毛虧損肌肉虛尪起發遲而不胖壯收靨緩而作膿瘡輕則延綿乎時日重則泣送於效邙奈愚夫之不曉致生命之夭亡不信醫而禱諸神鬼枉殺牲而號乎穹蒼藥貴中病醫不執方喜行溫補者動稱乎文山專用涼瀉者祖述乎仲陽貴其因人而治相時而行正氣為先戒開門延寇解毒為急休視虎如狼首尾不可汗下法之固執緩急各有權宜治之經常拘其繩墨者如守株之待兔惑於方書者似多岐而亡羊且如紅焮紫腫兮涼血為上灰白平陷兮補氣最良出不快兮責表實而發散可用便或秘兮責裡實而疏利何妨毒不能速解毒甚者令微汗之散越熱不可盡除熱劇者使小便之清長三陰多寒兮必投辛熱三陽多熱兮無過苦涼安可惡寒而喜熱莫知貴陰而賤陽是故補氣者參耆白朮養血者歸芍地黃發散表邪輕葛根而重官桂疏通里實微枳殼而甚大黃解毒兮芩連梔子快斑兮荊防牛蒡連翹藥內之要領甘草方中之君相咽痛求諸甘桔頭腫取乎羌防木通利其小水人屎攻其黑瘡氣逆兮青皮陳皮胃寒兮丁香木香泄瀉無如苓朮嘔吐莫若生薑麥冬乾葛而止渴厚朴腹皮而消脹望月砂退翳有準穿山甲折毒無雙枳實麥芽山楂子消宿食而克化大黃乾葛地骨皮解餘熱以清涼咳嗽以枳桔又用杏仁痢疾以黃連再同木香苦參主乎熱毒溺白治其疳瘡用之合宜工可稱良其諸藥物各有主張春夏桂枝而少服秋冬芩連而莫嘗瘡若干枯白朮非其質貴色如紅豔黃耆豈可入方裡虛少食者勿投枳實表虛多毒者休使生薑汗自出兮用乾葛重虛其表溺本數兮加木通再損其陽泄瀉酸臭兮訶蔻不宜輕用嘔吐清冷兮連梔安得作湯凡用芩連必資炒制如加丁桂須假寒涼應制伏而不誅無過保和平而萬壽無疆大勢若平餘邪須講熱毒流肝兮雙睛生翳火邪入脾兮四肢成瘍口內生瘡兮爛齦破舌腹中作痢兮腐胃敗腸皮膚嫩而洗浴太早因以添熱臟腑虛而甘肥太過遂致內傷若中風寒凝痰作嗽灰白頂陷灌蝕歸瘡嗟夫惟此證候其苦非常外纏皮肉內連腑臟改換形容如蛇蛻皮龍換骨淋漓膿血若蚓在灰蟮在湯軒岐置而未言秦漢棄而無方古無此證或云起於建武今有是疾相傳得於南陽拘於日數者不知輕重之責執其偏見者枉增虛實之防本溫再熱已寒又涼徒自膠而必固反致惡而見殃透骨髓之真詮非其人而不授宣肺腑之秘奧牢記誦而莫忘痘疹西江月凡四十九首痘疹毒從何起母胎火毒流傳生來穢物下喉咽藏在命門裡面一旦天行時氣感令相火熬煎毒從骨髓見皮間彼此一般傳染五臟各有形證認時須要分明往來寒熱睡脾經呵欠頓悶肝證咳嗽噴嚏受肺面紅驚悸屬心惟腎清靜忌邪侵手足耳尻俱冷五臟各有一證其間治法難同肝為水肺泡為膿大小瘡形異種脾證發為疹子心經現作斑紅腎為黑陷病多凶縱有靈丹何用痘疹要知順逆天時人事相隨大端陽火是根基若遇陰寒不喜春夏發而多吉秋冬逆以何疑如逢稠密必凶危稀少方為平易治法而今不定清涼溫補分明各持一見論紛紜自曰予為神聖解毒喜行涼瀉補中愛使辛溫不明時令與元神枉自捕風捉影假令天時暄熱辛溫助為災殃嚴凝涼解雪加霜病者如何抵擋壯實再行溫補虛尪又使寒涼虛虛實實伐元陽無異隔靴爬癢看取時行疫癘天時熱氣炎炎精神肥健食能兼解毒清涼甚便若是風寒太甚虛羸吐瀉連綿此宜溫補法為先又在醫人活變痘疹要知輕重吉凶順逆精通毒輕瘡少順家風湯藥不宜妄用瘡密毒重為逆皮膚寸寸成膿此般形證例多凶仔細扶持休縱輕者三四次出頭面胸背稀疏小便清利大便稠飲食如常充足重者遍身齊出狀如麻子麥麩咽疼泄瀉悶悠悠飲食不思可惡多有先輕後重只因觸冒風寒房勞不避穢腥干食飲偏於冷暖閒雜人帶穢厭諸般禽獸盤桓庸工術淺誤湯丸反使痘瘡變換重者變輕何以常常和暖衣衾房中謹密少人行飲食隨時添進未見誤投湯藥不曾妄啖酸腥此為人事奪天靈安可歸於有命要識痘瘡死證無過五證分明紫黑喘渴悶何寧癢塌咬牙寒噤灰白頂陷腹脹皮嫩易破成坑泄瀉氣促見鬼神聲啞頭面足冷既識五般死證其間吉病如何瘡頭飽滿作膿窠任是推磨不破四畔根盤紅活安眠靜臥平和光壯收靨不蹉跎管取疥疾勿藥黑陷乾枯腎敗咬牙寒戰肝傷失聲喘氣肺摧創泄瀉脾虛腹脹癢塌悶亂心死狂言見鬼神亡皮嫩易破氣無陽便血陰崩模樣首尾不可汗下汗時腠理開張風寒易入透斑瘡收靨不齊火旺誤下必犯脾胃無事自取內傷泄瀉黑陷致傾亡枉使魂靈飄蕩大抵痘瘡未出先須升葛參蘇如斯不出汗忙疏紅點見時藥住大便若還秘結輕輕四順相符假饒自利伐無辜定與閻羅掌簿調痘無過二法補中解毒兼行補中參朮草耆苓枳實山楂有應解毒芩連梔柏連翹枳實防荊芎歸養血妙如神加減消詳前定血氣要分虛實但於瘡色推求紫腫紅焮血實由四物內加解毒灰白中陷氣弱四君子是良謨略加解毒藥相符補氣實脾無誤但是痘瘡初出如逢熱盛昏醒解毒發散藥先行莫待臨渴掘井桔梗升麻乾葛連翹甘草黃芩牛蒡梔子木通荊蟬蛻防風作引若是如常潮熱只消乾葛升麻芩連甘草赤芍加牛蒡連翹無價或用參蘇飲子青皮木香內加煎來一服勝靈砂痘見表疏才罷初熱多生搐搦急將導赤疏通木通甘草與防風生地黃連同用再加辰砂調服須臾救護朦朧此方端的有神功管取行之必中壯熱不曾出現大便秘結難通癲狂唇裂眼珠紅此證凶險堪慟急與芩連梔柏大黃酒炒疏中連翹牛蒡與木通貫眾射干俱用自此出而稠密認他虛實調醫虛家泄瀉色如灰大補十全堪取若是腫焮紅綻芩連梔柏芎歸翹蒡升葛枯甘奇此個真機妙秘灰白不能起發又加泄瀉頻頻溫中妙藥不宜停急急扶危濟困當歸黃芩芍藥甘草乾姜人參木香梔子及青陳官桂丁香靈應毒甚常生咽痛可憐飲食難嘗射干甘桔最相當連翹升麻牛蒡若是痘堆頸項此名鎖膈悽惶一朝破爛命將亡變作喑啞水瘡起髮狀如蠶殼乾枯不見水漿此名血竭毒歸藏不治必然命喪當歸地黃養血參耆甘草溫良連翹牛蒡與木香桔梗青皮發旺起發常將捻視切防黑陷來攻若然黑陷現其中藥點許多妙用豌豆七粒燒過亂髮火鍛和同珍珠水浸胭脂紅針破搽之自腫藥點反加黑陷喪門弔客匆匆百祥牛李與宣風總是脫空賣弄不如人貓雞犬四般舉煅和同木香湯引妙無窮妙法半文不用起發初生瘙癢比於癢塌爭差傷寒身癢表留邪痘亦同茲休訝治用疏風涼血荊防翹蒡芎麻地黃歸葛效堪誇竹葉木通無價大抵痘宜脹痛最嫌虛癢相干只因飲食濕邪攢心火克而悶亂外宜茵陳艾炬內宜參朮湯丸若還止癢證方安抓破面皮凶斷何為正面怕癢面含五臟精華假如破損實堪嗟氣散魄飛魂罷尤忌先傷正額心經火帶虛邪幾番試驗不爭差寄語明人體察相火位居正額出現胖壯休先果然額上痘蟬聯大抵凶而不遠喜是兩頤口鼻始終都在其間任教稠密勢纏綿到底終無傾險起發成漿欲靨忽然泄瀉來攻此時脾胃不宜空變出百端可慟多是內傷飲食只求藥有神功若還消腫泄淋濃父母北邙泣送先用人參白朮黃耆炙草煨姜茯苓山藥及木香大劑煎來溫養不效次求豆蔻木香芡實良方三番只有異功良此實盡頭酌量記取成漿欲靨最防厭穢腥膻大黃蒼朮共燒煙可解一切穢厭內服調元飲子黃耆炙草人參當歸蒼朮酒芩連犯著荊防即變到得成漿痘熟依時都要成痂若還腐爛臭腥加此是表虛堪訝急進參耆歸術荊防蒼葛升麻連翹牛蒡密蒙花休得弄真成假若是痘瘡熟爛皮破膿血淋漓內服歸術與參耆牛蒡連翹官桂外用多年敗草曬乾研細成灰鋪開床蓆任施為最解火邪毒氣痘熟不能收效反行破爛成瘡一時焦痛甚難當請問如何發放但取甘草滑石辰州豆粉清涼蜜調塗上便安康此法不留書上有等痘瘡純正緣何日久難收請君仔細問根由不可臨時差謬或是曾傷冷水或因秘結熱留兩般治法各推求不枉青囊異授果是曾傷冷水濕傷脾胃皆虛脾應肌肉主中區無怪血膿流注可用參耆蒼白青陳甘桔無拘丁香官桂有方書救里收表妙處如是大便秘結三朝一七未通此為熱氣內蒸烘因此毒難開縱內服歸黃麻子大黃略入相攻再行膽導妙無窮管取成痂去壅收後許多餘證醫家須要分明毒留肝臟目生疔翳障瞳人隱隱毒入肺脾癰腫責歸手足陽明內傷外感要調停免致多生怪病兩目忽然腫痛痘家毒入肝經輕為浮翳掩瞳睛重則終身廢病去翳菊花蟬蛻蒙花蒺藜穀精各為細末共和勻湯煮豬肝作引癰毒發於肢節常常膿血不幹不知調理早求安廢疾終身為患內服千金托裡外塗太乙金丹排膿長肉未為難任是千金不換痘後不宜澡浴痘疤皮嫩易傷不知禁忌受寒涼遍體熱生痛僵此因傷寒勞復不宜官桂麻黃只須九味羌活湯次以補中調養痘後或傷飲食致令腹痛非輕不宜轉下損脾經消導方為對證白朮人參枳實黃芩大麥青陳山楂白茯與砂仁積化痛疼俱定痘爛不齊收靨正面灌痛流膿急防兩目毒來攻解毒清涼好用酒炒芩連梔柏連翹蟬蛻木通升麻牛蒡苦參同細研酒丸酒送大凡痘瘡一證名為百歲聖瘡如龍蛻骨換心腸又似蟬蛻殼樣出現光壯收靨落痂顏色相當飲食寒暑順陰陽自此精神長旺痘有順險逆並五善七惡之症順證氣血沖和痘毒宣暢精神素健飲食如常不必施治險證氣血不舒痘毒壅遏或雜證攪擾開落失期速宜施治逆證痘毒凝結氣血乾枯怪證叢生病不對藥治之無功五善一飲食如常二大小便調三瘡色紅活皮厚堅實四脈靜身涼手足溫暖五聲音清亮動止安和五者不能盡得得一二亦自清吉七惡一煩躁悶亂譫妄恍惚二嘔吐瀉利飲食不能三黑陷焦枯癢塌破爛四頭面預腫鼻煽肩抬目張唇裂五喉舌潰爛食入即嘔飲水則嗆六寒顫咬牙聲啞色黯七腹脹喘促四肢厥冷七者不必皆有有一二亦自難為七惡之外又有渾身血泡心腹刺痛伏陷不起便溺皆血尋衣撮空是又卒死而不救者痘疹總略歌凡一十一首共一十五方痘雖火毒肇胚胎不遇天行不見災郡邑若逢疵癘日預施靈藥解將來凡痘疹之證皆由父母胎毒蓄於命門之中命門者下極丹田也為人身生化之源或遇冬溫陽氣暴泄人則感之觸動相火至春夏生長之時即發傳染相似是謂天行疫癘也未出痘疹者但覺冬溫宜先服解毒之藥如辰砂散三豆湯代天宣化丸之類使毒氣無傾伏留連之患如脾胃素弱者更宜調其胃氣間以四君子湯加陳皮木香之屬與之使胃氣和暢榮衛流通使痘易出易靨也予按代天宣化即韓氏之五瘟丹也苦寒克削損胃敗脾縱能解疫癘之毒未必能預解先天之毒即使能之亦只可行於藜藿稟實之兒倘膏粱稟怯不察妄投吾恐毒未解而胃先損痘未至而中已寒預伐無辜暗傷真氣及出痘時反不能救夭枉相仍咎將誰諉蓋藜藿稟實而毒輕無俟於解膏粱稟薄而毒重勢不能解豈有先天之毒深藏潛伏於命門之中毫未發覺而敢用此沉陰冱寒之品預伐其生機誠為危道必不可行即欲解之又不若三豆湯之為得也欲知痘疹吉凶機察色觀形在細微年壽山根猶緊要鮮明可喜黯青非痘疹未出之先欲知吉凶輕重但於面部推之其色紅黃明潤者吉青黑昏暗者凶相書以山根管命宮年壽管疾厄所以二處猶為緊要也汗下雖然謂不宜刻舟求劍豈通醫能分虛實知權變可越乾坤造化維首尾不可汗下誠痘科固執之言然亦自其平證語之耳若遇風寒外襲應出不出則汗劑仍不可少如大便連日不通煩悶狂躁不與下之寧不夭人生命是下劑之在所必用但能消息虛實與時權變斯可謂之通醫始終便溺自調嘉便若艱難事可嗟腹脹喘呼多壅遏急行疏導免留邪此言可利則利者也大抵豆瘡始終小便清利而大便滋潤者為順若小便或秘急宜利其小便宜八正散若大便秘結速用通幽湯滋潤之痘家脈證喜中和徐疾由來不可過弦急浮洪為實候微遲短澀屬虛多夫人以胃氣為主脈亦當以胃氣為主脈有胃氣則氣象中和所謂弦不弦石不石者是也太過為實不及為虛最宜消息痘疹傷寒證一般上工臨證貴詳端休將汗下輕相試解表和中病自安痘疹發熱與傷寒相似但傷寒只見一經形證若痘疹則五臟之證皆見如呵欠頓悶肝證也乍冷乍熱手足梢冷好睡脾證也面燥腮赤咳嗽噴嚏肺證也驚悸不寧心證也尻涼耳涼腎之平證也若尻耳俱熱則邪伏腎經也痘疹雖然本屬陽往來微熱始相當倘逢晝夜身如火解毒須教小便長凡痘疹屬陽非熱不成故治痘不可盡除其熱如熱太甚毒未發盡只宜解毒兼利小便宜連翹升麻葛根湯食飲能多胃氣充自然榮衛兩豐隆休言食少無他慮但恐脾虛毒內攻痘疹始終能食者其人脾胃素強自然氣血充實易壯易靨若一旦食減即宜詢問或咽喉腫痛宜甘桔湯傷食者橘皮湯若非以上二證因脾胃氣弱不能消食者宜參苓白朮散運用之最宜安靜號和平表裡無邪心自清忽爾躁煩宜審諦更防神爽欠分明痘瘡以安靜為貴此表裡無邪不必服藥但有煩躁必毒氣壅並表裡不寧宜審諦之如搔爬不寧瘡癢也心神不寧裡熱也呻吟不止瘡痛也非折肱之手莫能識其病情以上治療見後四時分治證須真暑濕風寒各有因異氣莫教經觸犯災危反復立纏身大凡治病之道春夏養陽秋冬養陰故春病治在肝夏病治在心秋病治在肺冬病治在腎不可逆也治痘之人切須識此如天有烈風暴雨酷暑嚴寒常要謹其帷幙適其寒溫寒則蓋覆欲厚熱則居處欲清苟傷熱則血氣淖澤瘡易腐爛偏寒則血氣凝滯瘡難起發若有觸犯輕則變重卒生異證是謂災怪如暴風連日病見傷風之證治以桂枝葛根湯如寒威凜烈病見傷寒之證治以正氣散若酷暑熏蒸病見熱證治以人參白虎湯倘值久雨浸淫有受濕之證泄瀉身重治以胃苓湯治痘皆言在補脾補中有害少人知虛虛實實休輕放審證施方貴合宜凡痘瘡始終以脾胃為本若飲食如常六腑充實不須服藥若補其脾反增煩躁為害非輕倘不能食常多泄瀉此氣虛也宜四君子湯助之可也入方辰砂散預解時行痘毒鏡面砂一錢研末水飛乾絲瓜近蒂三寸連皮帶子燒灰存性上研末蜜水調分三次服三豆湯預解痘毒不損元氣紅飯豆一升黑大豆一升鮮綠豆一升生甘草三兩上以三豆淘淨甘草切碎入雪水八升若無雪水以長流水代之同煮豆熟為度去甘草將豆曬乾又入原湯內再浸再曬汁盡為度逐日取豆與兒食之最解痘毒代天宣化丸即五瘟丹預解時行疫癘傳染相似並治痘毒人中黃屬土甲己之年為君片黃芩屬金乙庚之年為君川黃柏屬水丙辛之年為君黑梔仁屬木丁壬之年為君雅黃連屬火戊癸之年為君鮮苦參佐荊芥穗佐北防風佐淨連翹佐山豆根佐牛蒡子佐家蘇葉佐前五味視年之所屬者以為君其餘四味以為臣為君者分兩倍之為臣者半之為佐者如臣四分之三冬至之日修合為末取雪水煮升麻湯加竹瀝在內煮神麯糊為丸龍眼核大用辰砂明雄為衣每服一丸竹葉湯下制人中黃法取大甘草不拘多少納於新竹筒中緊塞其口放在糞缸中浸七七日取起曬乾聽用八正散治痘疹小便秘澀宜清心火利膀胱淮木通白滑石小甘草淨連翹綠升麻結豬苓赤茯苓陳瞿麥淡竹葉以上各一錢燈芯十莖水煎熱服通幽湯治痘疹大便秘結宜潤腸涼血降火紫草茸當歸尾懷生地火麻仁陳枳殼酒大黃尖檳榔鮮紅花桃仁泥俱等分生薑一片為引水煎熱服連翹升麻葛根湯治痘毒不能盡發宜升托之淨連翹綠升麻粉乾葛京赤芍芽桔梗酒黃芩黑梔仁淮木通麥門冬牛蒡子白滑石炙甘草淡竹葉七片燈芯十莖為引水煎熱服加味甘桔湯治痘疹不能飲食由咽喉作痛大甘草芽桔梗君牛蒡子鮮射干綠升麻荊芥穗燈芯十莖水煎熱服橘皮湯治痘疹不能飲食由傷食所致廣陳皮杭青皮陳枳殼南木香生甘草山楂肉白雲苓麥芽一撮為引水煎空心服參苓白朮散治痘疹脾胃虛弱不思飲食官揀參漂白朮白雲苓粉甘草京楂肉真廣皮芽桔梗南木香砂仁三粒為引水煎半飢服桂枝葛根湯治痘疹初起傷風咳嗽自汗嫩桂尖京赤芍粉乾葛北防風炙甘草生薑三片大棗三枚水煎熱服略暖蓋覆正氣散治痘疹初起因傷於寒作熱無汗頭身痛肢強漂蒼朮廣陳皮川厚朴南木香淨麻黃柳楊桂炙甘草生薑三片大棗一枚水煎溫服人參白虎湯治痘疹初起夏月傷暑大熱煩躁作渴官揀參淨知母熟石膏陳香薷大麥冬藿香葉白扁豆淡竹葉炙甘草粳米一撮為引水煎熱服胃苓湯治痘疹初起傷濕泄瀉身重漂蒼朮廣陳皮紫厚朴漂白朮白雲苓結豬苓宣澤瀉嫩桂枝炙甘草燈芯十莖水煎熱服四君子湯治痘疹脾虛食少更多泄瀉官揀參漂白朮白雲苓炙甘草生薑三片大棗三枚引水煎服四物湯治痘疹能食大便秘瘡紅腫白當歸正川芎杭白芍懷生地生薑一片引水煎熱服發熱證治歌凡一十五首共二十五方痘瘡初起身先熱輕重吉凶何以別熱輕毒淺吉堪云熱重毒深凶可說凡發熱乍進乍退與微熱者其痘必稀而輕毒亦淺不必服藥若蒸蒸作熱煩躁昏眩其痘必密而重毒亦深宜發表解毒托裡加味葛根湯初逢熱渴邪藏里切忌冰瓜與冷水生津止渴是良圖小渴任之而已矣凡發熱作渴因痘毒內蒸銷其津液故令口乾而渴微者頻以炒米湯與之切不可以冷水凍柿柑梨西瓜菱角之類食之反傷胃氣亦不可以椒薑湯飲之恐生瘡毒而有他變渴甚不止宜解毒葛根湯如痘已出齊或起發或收靨而渴不止者宜人參麥冬散如泄瀉不止而作渴者此脾胃虛弱津液枯也宜七味白朮散腹痛剛逢發熱時毒攻於裡報君知大腸秘結須攻下莫待臨危悔已遲書云發熱腹中痛痘瘡毒內攻發多生不久發少更防癰可見痘疹腹痛即是毒氣內攻便當托裡化毒為上不可逡巡以生他變若飲食如常而腹痛者宜化毒湯如大便秘結煩躁作渴而腹痛者宜三黃解毒湯若泄瀉而腹痛者宜建中托裡湯發熱腰疼毒伏留幾人逢此得優遊人參敗毒真奇絕痛減瘡稀病可瘳凡痘疹發熱腰痛其證最惡速用人參敗毒散托之服藥痛止者吉不止者凶初時發熱多風搐要識病源屬肝木木能勝土又歸心風火相爭脾不足凡痘瘡發熱有作搐者因木邪盛而侮土以導赤散加辰砂服之即止此痘甚好以搐搦發散於四肢故也如痘應出不出而搐搦不止宜瀉青導赤散解之服藥後搐止但心煩啼叫用麥冬導赤散清之若痘已收靨餘熱不退而作搐此大虛之候多不可救但父母不忍坐視強而治之當以寧神湯合抱龍丸倍加人參服之輕者可愈熱時吐瀉相兼作上下毒伸無郁遏三焦火盛熱中求日久須防脾胃弱凡痘瘡發熱有嘔吐者有泄瀉者有吐瀉兼作者不可驟止令毒上下得出但痘瘡現形吐瀉即止者吉兆也如久不止先以理中湯和之如仍不止以豆蔻丸止之服藥後吐瀉既止更服調中湯使脾氣實其痘易壯易靨也狂言躁擾疑逢鬼神識昏迷熱在裡鎮心解毒以平期譫妄不休應不起凡痘瘡發熱妄有所見而譫語者或昏昏好睡夢中囈語喃喃或狂走尋衣摸床皆毒氣內攻神識不清所致也急用鎮心解毒之藥以辰砂導赤散主之服藥神情復舊者吉不止則凶不可治也渾身發熱四肢寒脾胃虛衰陰冷干益氣補中應令暖仍前瘡盛急尋棺凡痘瘡渾身宜熱獨耳尻二處宜涼所以痘疹之證頭宜涼手足宜溫若反冷者此脾胃虛弱也四肢脾胃所司宜補中益氣扶其中氣斯可矣發熱熏蒸血妄行不知何道血如傾但從鼻出方無忌別道來時禍立萌人身之血不可妄動痘疹之火熏爍於內迫血妄行隨火而動或從口出或從大小便出皆死證也但從鼻出者或有可救之機宜玄參解毒湯清之若煩躁悶亂出血不止此陽痘出血之證多不可治晨昏發熱渾無歇口舌生瘡唇破裂咽喉塞痛食難嘗方用黃連及甘桔凡痘未出而熱不止晝夜煩躁口舌生瘡唇裂咽痛此毒火熏蒸其熱甚急治不宜緩急以黃連解毒湯合甘桔湯治之服藥不效者不治微微熱汗吉之機腠理疏通毒發稀但恐汗多陽氣弱調元固胃效無違凡痘疹發熱自汗此不必治蓋腠理疏通毒氣發越無郁遏也所以古人喻如庖人蒸籠之法但欲其松耳如恐汗出太多衛氣反弱痘瘡不能成就用調元湯以止之惡熱憎寒且戰兢表虛邪正兩相凌但將柴葛加官桂升散餘邪吉可稱痘疹所忌者寒戰如發熱之時憎寒振振戰動者其人表氣素虛痘疹欲出不出留連於肌腠之間邪正交爭振戰火之象也宜柴葛桂枝湯升散之發熱綿綿不現形其間凶吉費調停解肌托裡須斟酌施治詳明內外寧凡痘發熱三日便出者常期也如過四五日猶不出熱勢綿綿無休歇者吉凶之兆未可卜也急與解肌托裡分內外治之疏者吉密者凶如勞苦之人皮膚粗厚腠理閉塞及風寒外感瘡為外邪所遏不易出者此外因也宜麻黃解毒湯如因虛吐瀉毒氣內陷而不出及傷飲食陳物菀莝腸胃之間與毒合併鬱而不出者此內因也體虛者以托裡十補湯托之體實者以枳實導滯湯微利之發表之時少定方古人專用葛根湯能通權變知增減何必勞勞問短長時師治痘方其發熱但知用葛根湯一見紅點便禁而不用此乃不知權變者也如痘見熱除表裡無邪所以不可再用葛根湯若痘已見熱甚不退此毒深於內尚恐葛根湯力小不足勝任寧可止而不飲耶解毒升麻湯最良紅斑雖見飲何妨時師膠柱無變通一見紅斑未敢嘗凡痘發熱初用解毒之劑詳見各條之下此不重贅但附葛根湯加減之例於後俾臨證擇用可也入方加味葛根湯治痘初熱毒氣深重大熱眩暈綠升麻粉乾葛京赤芍炙甘草荊芥穗北柴胡牛蒡子白桔梗淨連翹淮木通北防風如大便結加紫草紅花作渴加麥冬花粉腹痛加酒大黃或秘結亦用酒大黃解之水一碗淡竹葉七片為引解毒葛根湯治痘疹初熱口渴不止粉乾葛天花粉綠升麻杭麥冬懷生地酒黃芩粉甘草茅根汁水煎眾藥熟以茅根汁對服人參麥冬散治痘已出或收或靨而渴不止官揀參杭麥冬粉乾葛漂白朮天花粉酒黃芩炙甘草水煎以竹瀝乳汁對服七味白朮散治痘因泄瀉津液不足而作渴者官揀參白雲苓漂白朮南木香藿香葉炙甘草等分粉乾葛君水煎徐徐代茶飲化毒湯治痘初起飲食如常別無他證而腹痛粉乾葛杭白芍杭青皮廣木香陳枳殼京楂肉淨連翹炙甘草水煎熱服三黃解毒湯治痘初起煩躁作渴大便秘結腹痛酒黃芩酒黃連紫草茸鮮紅花小枳實淮木通小檳榔酒大黃水煎滾熱服建中托裡湯治痘初熱因泄瀉而腹痛官揀參炙甘草綠升麻粉乾葛白雲苓陳枳殼芽桔梗小川芎北柴胡川獨活水煎姜引加竹瀝對服或五苓散加獨活亦可導赤散治痘初起發熱作搐大生地淮木通蘇薄荷北防風炙甘草鏡辰砂另研燈芯十莖引水煎以辰砂末調服瀉青導赤散治痘應出不出而作搐當歸尾淮木通黑山梔川羌活北防風小川芎酒黃連生甘草淡竹葉七片燈芯十莖引以竹瀝對服麥冬導赤散治搐搦後心煩啼叫不寧淮木通杭麥冬黑梔仁生甘草燈芯引水煎服寧神湯治痘後作搐至危之候石菖蒲白茯神黑梔仁川雅連淮木通官揀參炙甘草燈芯十莖為引水煎入竹瀝人參湯對服抱龍丸合前寧神湯治痘後搐搦膽南星四錢天竺黃五分真牛黃三分明雄黃五分鏡辰砂二分共為末甘草煎濃湯煮麵糊為丸不用麝香以痘瘡忌麝故也理中湯治痘已現形而吐瀉不止官揀參一錢漂白朮二錢炙甘草一錢綠升麻一錢煨姜三片大棗三枚水煎服豆蔻丸治痘出吐瀉服理中湯不止者南木香三錢西砂仁二錢石龍骨五錢白枯礬七錢肉豆蔻麵包煨五錢赤石脂煅過七錢五分訶子肉淨肉五錢共為末米糊丸如胡椒大三歲兒十丸四歲以下二十丸陳米飲下調中湯治吐瀉既止速調中氣官揀參炙黃耆漂白朮杭白芍南木香廣陳皮炙甘草大棗三枚為引水煎服如三焦火盛者又當甘涼之劑解之不在此例辰砂導赤散治痘毒內攻神識不清或譫妄狂惑官揀參正雅連黑梔仁漂白朮淮木通大麥冬辰硃砂另研燈芯十莖水煎入竹瀝調辰砂末服之補中益氣湯治痘初熱四肢厥冷中氣弱也官揀參炙黃耆漂白朮廣陳皮當歸身青化桂炙甘草煨薑大棗引水煎服服藥後手足暖者生逆冷不回者死玄參解毒湯治痘初熱毒火熏蒸而見鼻血潤玄參枯黃芩炒梔仁芽桔梗懷生地粉乾葛荊芥穗炙甘草水煎入茅根汁加京墨磨濃調服黃連解毒合甘桔湯治痘煩熱不止口舌生瘡咽喉痛酒黃連酒黃芩黑山梔熟石膏芽桔梗淨連翹南薄荷荊芥穗牛蒡子生甘草水煎和竹瀝服調元湯治痘證自汗過多衛氣反傷宜止之大官揀炙黃耆條黃芩漂白朮杭白芍杭麥冬炙甘草水煎服如汗不止加地骨皮麻黃根以豬心肺煮湯對前藥服更妙柴葛桂枝湯治痘將出而憎寒振戰此毒氣留連於腠理間也北柴胡粉乾葛川羌活大揀參北防風嫩桂枝牛蒡子炙甘草淡竹葉十片水煎熱服麻黃解毒湯治痘未形發熱不退腠理閉塞及風寒外遏不出陳麻黃去根節用蜜酒炒黑川羌活綠升麻荊芥穗粉乾葛北防風淨蟬蛻芽桔梗牛蒡子炙甘草水煎入燒過人屎調服托裡十補湯治痘因泄瀉毒氣內陷而不出官揀參炙黃耆當歸身柴川樸芽桔梗青化桂正川芎北防風香白芷炙甘草水煎調牛蒡子末服枳實導滯湯治痘因傷飲食鬱滯而不出小枳實淨連翹法半夏酒黃連山楂肉炙甘草紫草茸酒大黃水煎調檳榔末服升麻葛根湯治痘證初熱將出未出以此助其升生綠升麻粉乾葛白芍藥炙甘草口渴加天花粉杭麥冬絲茅根汁腹痛加小枳實淮木通山楂肉腰腳痛加漂蒼朮川黃柏川羌活淮木通頭痛加小藁本香白芷搐搦加淮木通水竹瀝蘇薄荷淨連翹泄瀉加官揀參漂白朮白雲苓懷山藥譫妄加石菖蒲黑梔仁淮木通辰砂末四肢冷加官揀參炙黃耆黑薑炭青化桂嘔吐加漂白朮白雲苓法半夏廣陳皮衄血加潤玄參黑梔仁枯黃芩茅根汁咽痛加芽桔梗牛蒡子鮮射干咳嗽加廣陳皮家蘇葉陳枳殼信前胡大便秘加懷山藥紫草茸鮮紅花當歸尾多啼哭加淮木通黑梔仁正雅連大麥冬吐舌弄舌證並加正雅連北防風黑梔仁以上皆用淨水煎服隨證加味用之見形證治歌凡一十八首共一十八方發熱三朝痘出稀方為毒淺吉之機先期痘甚渾無制過此多因血氣微凡痘發熱三日而出常期也出而稀者不須服藥如發熱一二日即出者此毒氣太甚衝擊榮衛一齊湧出難以制服大凶之象必欲治之不過消毒救里使無陷伏耳宜消毒快斑湯如過期四五六日始出此血氣本虛不能載毒使出當補中托裡發表宜增損八物湯痘出遲遲有數般皮膚閉塞屬風寒裡虛吐瀉宜分治痘壅三焦治卻難凡痘出有常期若應出不出或外感風寒六腑閉塞不能即出其證頭眩身痛發熱無汗喜蓋覆猥倚懷中此惡風寒之象也當發散之宜加味參蘇飲若曾經吐瀉裡虛不能快出宜加減調中湯如發熱煩躁狂妄大渴唇燥舌裂此毒氣壅並留而不泄毒火鬱於三焦榮衛不行上下不通而死矣應期不出事如何發表諸方切忌訛腹脹便堅煩躁甚消斑承氣理沉疴凡痘疹應出不出或外感風寒內虛吐瀉治各不同如前參蘇飲調中湯敗毒散葛根湯之類皆良法也若熱甚腹脹氣粗煩躁悶亂大便秘結此毒火內蓄急以消斑承氣湯解之痘出身涼吉可期如逢熾熱覆明夷終朝漸密無空隙怪證叢生必定疑痘瘡之熱毒火為之未出之先毒火在內故發熱於外既出之後其毒發外熱當盡退毒本輕而痘亦稀也若痘既出熱仍不退是毒積於中未可為輕急用解肌化斑升托之服藥後熱漸退方可言吉更不退其痘累累而出痘空中始雖稀而終朝漸密最怕生出他證或狂妄或泄瀉或腹痛或搔瘡或失聲或錯喉乾嘔或喘促黑陷皆不可治出現先觀面部中其間凶吉最難通繞唇夾頰方為吉額上眉心未可逢人之面部五臟精華皆見於此故左頰屬肝木右頰屬肺金頦屬腎水鼻屬脾土又正額太陽脈之所會唇頰陽明脈之所經兩耳旁少陽之所過痘為陽毒故隨陽位而見於面但陽明胃與大腸積陳受汙氣血俱多先於其部出現者吉若太陽則水火交戰之位少陽則木火相併之沖若於其位出現者凶不但出形忌於正額眉間耳之前後凡起灌收靨但從此處先者皆逆象也頭為元首稱至尊更有咽喉闔闢門若使痘瘡多出此矇頭鎖項受災連經曰頭者精明之府五臟精華皆現於面至尊至貴不可凌犯者也咽者胃脘水穀之道路主納而不主出喉者肺管呼吸之往來主息之出入人非此則水穀絕呼吸廢而死矣故謂闔闢之門痘瘡最要頭項稀少如頭面多者謂之矇頭咽喉多者謂之鎖項矇頭則視聽昏廢神明失居鎖項則內者不出外者不入正所謂神出則機息氣止則化絕死之兆也頭面胸前痘欲稀四肢雖盛毒猶微渾身碎密多惆悵疏解當知發散機頭面諸陽之會胸前諸陽之聚臟腑受氣之區陳氏曰痘疹輕者作三四次出頭面稀少胸前無以清陽之分不可濁亂也至於四肢雖為陽之本乃身之役使卒伍卑賤之職故不畏其多也若遍身稠密瑣碎急為解毒疏通榮衛令氣得其均血得其活一齊起發庶無干枯黑痿之變用疏毒快斑湯隨證加減而調之痘瘡磊落不須防叢聚相黏定見傷蠶殼蛇皮生不久蚤斑蚊跡禍難量凡痘瘡初出須看相去遠近若相去三五寸一粒者輕證也一二寸者頗密如二三成叢者必密而重其候多變癢塌如蠶之殼蛇之皮者此氣至而血氣不隨也當行氣補血宜祛風勻氣散如蚤之斑蚊之跡者此血至而氣不隨也當涼血補氣宜參耆和氣飲一出形來豔色嬌定知皮嫩氣虛枵溶溶破損生難久個個成漿喜氣饒痘瘡出形如平日正色者吉痘色帶豔而赤其後多皮嫩易破癢不可救但見帶豔即防後日癢塌之變早用疏風固表消毒之藥使血氣充實邪火漸退正氣不虧光壯干收如期不亂可也宜固陽散火湯解毒固表最怕頭焦踓色封踓音陶青黑色也又愁皮嫩水溶溶頭焦變黑多歸腎皮嫩須防癢塌攻痘瘡初出所喜明潤而鮮堅實而厚若頭焦帶黑此毒在血分不急治之則變黑歸腎而難救矣宜涼血解毒湯解散血中之邪若皮嫩囂薄此毒在氣分不急治之則癢塌而死宜加味固陽散火湯痘瘡切要解咽喉喉痹咽瘡毒火浮但恐一朝封管籥鎖喉聲啞枉營謀凡痘瘡未有咽喉不痛者如煙囪之狀火焚於下炎升於上宜乎作痛宜鼠黏子湯外用一聖散吹之惟恐斑瘡入眼中膏煎黃柏妙無窮但觀眼內多紅赤急瀉心肝免損瞳痘瘡之毒第一防眼所以古人用護眼之法其濾深矣宜黃柏膏塗之若眼內有紅筋縈纏或眼腫閉多生眵淚急瀉心肝之火宜蟬花散清解之痘瘡只出一般奇斑疹相參最不宜消疹化疹宜急解倘仍不解勢傾危錢氏曰痘只一樣為善若已現形間有碎密如芥子者此夾斑也皮內鮮紅成塊此夾疹也皆毒火熏爍於內故使斑瘡夾出於外急宜解毒使斑瘡消散痘得獨成宜荊防解毒湯消散之痘標才見兩三窠爬搔渾身瘙癢多此是火邪留腠理急清風火證應瘥凡痘初出之時遍身作癢爬掐不止此火邪留於肌肉皮膚之間不能即出故耳與傷寒不出汗作癢同非癢塌之例也宜瀉心肝火邪其癢自除宜清風去火化毒湯升散之口中腥臭氣沖沖邪毒炎蒸肺作癰瀉火清金須急用淹延七日禍相從凡痘初出若口中之氣腥臭沖人此肺中邪火熬煎炎燥故令腥臭出於口急與清金瀉火湯解之倘淹延不治至七日而死矣經曰肺絕者七日死此證之變或失聲或喘或乾嘔皆其候也皮中簇簇如寒粟肉腫隆隆似熱瘤如此豈能延日月哀哉不久返瀛州凡痘初出欲期顆粒分明皮肉柔潤若簇簇生於皮間似風寒粟子之狀此痘變於反掌不待起發即隱而不見啼叫煩悶而死矣或有正面腰背胸膈手足腫硬成塊似丹瘤之狀此證俟起發之時其處瘡先黑陷破爛不能成漿乾硬而死皆為不治出形未定先涵水起發之時便戴漿膿水未成收靨急休誇妙術有青囊凡痘初出一點血血化為水水化為膿膿成而毒解此自然之序若初出之時半為水泡或將起發便戴白漿或膿水未成忽然收靨此毒火太甚失其自然之序不應至而至謂之太過不久倒陷入里而死無有治矣蓋不應至而至所謂早發還先萎也比之應至不至者因其氣血不充尚有補救所謂人奪天功此則不相侔矣鼻如灶突面烘煙皮似塗朱或橘然唇舌咽喉痘叢聚任教和緩莫迴天凡痘瘡之證始終歸重於太陰陽明手太陰肺手陽明大腸足太陰脾足陽明胃者是也蓋鼻者肺之竅貴於滋潤鼻乾黑燥如灶突之狀火刑金也面者陽明經所聚貴於鮮明面黑而枯精華散矣皮者肺之合欲其色紅白如常色若塗朱火之象也或如橘柚火極如土則黃矣咽喉肺胃之管籥唇吻脾之竅也舌者脾之絡也痘甚於此其毒極矣安可治哉入方消毒快斑湯治痘未期而出毒氣太甚芽桔梗荊芥穗北防風京赤芍炙黃耆牛蒡子當歸尾潤玄參淨連翹信前胡淮木通天花粉炙甘草水煎熱服增損八物湯治痘過期而出氣血虛弱官揀參漂白朮炙黃耆白當歸正川芎牛蒡子荊芥穗京赤芍淨連翹北防風芽桔梗粉乾葛炙甘草水煎不拘時熱服加減參蘇飲治痘應出不出由外感風寒玄府閉塞官揀參家蘇葉粉乾葛廣陳皮信前胡香白芷芽桔梗陳枳殼川羌活北防風炙甘草竹葉十片為引水煎服加減調中湯治因吐瀉內氣痿弱痘出不快官揀參漂白朮炙黃耆南木香上薄桂白雲苓法半夏廣陳皮炙甘草生薑一片為引水煎服消斑承湯治痘因毒火鬱遏應出不出大便秘結宜下之錦莊黃陳枳殼川厚朴片黃芩川黃柏黑梔仁淨連翹淮木通炙甘草熱甚者加芒硝紫草生薑三片引水煎滾熱服解肌化斑湯治痘出熱仍不退由毒氣未盡也綠升麻粉乾葛淮木通牛蒡子芽桔梗天花粉地骨皮荊芥穗片黃芩川黃柏大便結加紫草茸水煎熱服疏毒快斑湯治痘出渾身瑣碎稠密官揀參北防風荊芥穗淨連翹牛蒡子當歸梢芽桔梗赤芍藥炙甘草熱甚加酒黃芩酒黃連地骨皮渴者加粉乾葛天花粉大麥冬氣虛加炙黃耆南木香便堅加紫草茸陳枳殼溺赤加車前子淮木通食少加漂白朮京楂肉廣陳皮癢者加上薄桂南薄荷腹脹加川厚朴大腹皮喘咳加淨知母桑白皮泄瀉加上薄桂訶子肉黑薑炭作痛加白芍藥酒黃芩俱燈芯引水煎熱服祛風勻氣飲治痘出如蠶殼如蛇皮由氣至而血不隨也官揀參正川芎大當歸赤芍藥杭麥冬北防風杭青皮荊芥穗南木香上薄桂炙甘草水煎半飢服參耆和氣飲治痘出如蚤之斑蚊之跡由血至而氣不隨也官揀參炙黃耆淨連翹牛蒡子酒黃芩粉乾葛淨蟬蛻當歸身淮木通芽桔梗炙甘草水煎服服後氣血均隨者吉如舊者凶固陽散火湯治痘出色豔而赤切防癢塌官揀參炙黃耆炙甘草綠升麻當歸尾北防風懷生地淮木通荊芥穗大棗三枚為引水煎服涼血解毒湯治痘出頭焦帶黑血分有毒防變黑陷京赤芍當歸尾懷生地淮木通牛蒡子淨連翹紫草茸芽桔梗鮮紅花山豆根生甘草水煎入燒過人屎一錢調服固陽散火湯方見前此加漂白朮雲茯苓減去生地黃鼠黏子湯治痘出咽喉作痛鮮射干芽桔梗淨連翹牛蒡子生甘草水煎入竹瀝和勻服一聖散苦參不拘多少切片略焙乾研為細末每用一二分吹之甚效若不早治咽瘡煩躁吸門腫塞水入則嗆食入則嘔咽啞失聲救之遲矣黃柏膏治出痘預護其眼免致痘瘡入目厚川柏一兩粉甘草一兩二味研為細末用新綠豆五合新汲水三碗浸豆一晝夜去豆入紅花一兩煮之其水約減二盞又去紅花然後入前二末慢火熬成膏每用敷眼胞上下厚塗之則痘瘡不入眼矣蟬花散治痘出兩目腫閉多生眵淚此非封眼之時急治淨蟬蛻密蒙花酒黃連當歸尾淮木通草龍膽北柴胡正川芎黑梔仁北防風白豆蔻淡竹葉十片為引水煎熱服荊防解毒湯治痘出夾斑夾疹官揀參北防風荊芥穗枯黃芩牛蒡子淨知母川黃柏生甘草潤玄參綠升麻熟石膏淨連翹淡竹葉為引水煎服服此斑疹仍不消者不治清風去火化毒湯治痘初出風熱作癢表未解也非癢塌之謂北防風綠升麻杭白芍柳桂枝荊芥穗粉乾葛牛蒡子淡竹葉為引水煎服清金瀉火湯治痘出口中腥臭之氣衝人謹防肺癰淨知母懷生地枯黃芩熟石膏芽桔梗黑梔仁杭麥冬紫菀茸淮木通天花粉生甘草鮮桑葉七片為引水煎竹瀝對服起發證治歌凡二十六首共五十方起發出來無定期庸常計日強猜疑不知毒氣分深淺妄執方書只補脾時俗醫云三日發熱三日出形三日起發此鄙論也蓋毒氣有深淺元氣有厚薄出之先後壯亦因之大抵不出五六日間彼毒淺氣厚者其起發常易毒深氣薄者至五六日始壯者有之未可以常期准也俗醫見其起發之遲不認毒之淺深概謂正氣不足妄用補脾之劑殊不知曾因吐瀉不能食者補脾以助長可也若無吐瀉能食六根堅固復用補藥不免黨邪為害非徒無益而反害之起發如期貴適從過猶不及類皆凶先期痘出充膚腠過後斑瘡腹裡壅凡痘瘡起發只在六七日謂之得中蓋自發熱算起正當六七日也如未及期而驟發此毒火太甚榮衛氣虛直犯清道而出謂之邪氣太過法當固表解毒以防癢塌之變宜黃耆芍藥湯如過六七日不起發此臟腑虛弱毒留於中壅塞不出謂之正氣不及法當托裡解毒以防倒陷乾黑之變宜內托護心散出形已定視根窠紅活充肥氣象和倘若青干兼紫黑急宜解托勿蹉跎凡痘出現已盡時當起發僅視根窠以決輕重如形充滿色紅潤此氣血和暢毒氣發越大吉之兆不須服藥若形扁而塌色枯而黑此氣血多滯毒氣壅遏不能起急用解毒托裡之藥用十宣散內托之痘出稀疏正得宜如斯平順不須醫若然稠密休輕易解毒常常慮險危凡痘出稀少不須服藥若稠密其毒必盛防氣血不足起發不透漸生變易當服解毒托裡散服藥之後紅活光壯此氣血內實毒不能留即止後服如服後病勢淹延此邪氣盛正氣虛不能成就宜屢服之如服此藥當起不起此必有變不可治之反取怨尤也乳郭充肥完且堅色多蒼蠟或紅鮮如逢破損多囂薄縱有良方恐莫延凡痘乳郭充實皮囊堅厚以指擦之堅實不破其色蒼蠟而紅活皆順證也不喜乾燥淫濕若瘡雖紅鮮反乾燥而不充肥此火甚而血不足宜輕清之劑退火涼血用四物快斑湯如瘡充肥而帶濕淫此濕盛而氣不足宜利濕補氣兼風藥治之蓋風能勝濕故也四物快斑湯如瘡紅活充肥以指擦之隨破此名皮嫩瘡破後必癢塌不合治宜大補快斑湯如當起發如浮囊空殼如蠶之殼麥之麩皮中無水色者此血氣俱虛用大補快斑湯治之用藥後若轉而潤澤中涵水色者可治否則癢塌悶亂叫哭而死矣形色須教著意觀紫紅實熱白虛寒倘然錯認分毫處咫尺雲泥禍害端凡痘瘡起發須諦觀形色以定重輕吉凶如根窠紅潤頂蒼蠟色者上吉根窠紅頂灰白色者次之根窠赤頂亦赤而帶豔者此火勝用解毒瀉火湯清之服藥色退者生不退者凶如純白色者作寒論此血寒氣虛也虛則補之十全大補湯加丁香鹿茸回其陽氣四肢冷者加附子如純紫色者作熱論此血熱氣實也實者瀉之黃連解毒湯加犀角之類以平為期服藥瘡色回者十死一生四圍起發陷居中陽氣虧衰尚未通若是中枯成黑子此名疔痘類非同痘瘡起發其形不一有緊小而充實者俗呼珍珠痘此痘易壯易靨有粗大而飽滿者俗呼天痘此痘早壯遲靨有四圍起中心落陷者俗呼茱萸痘此痘有吉凶有輕重稀者輕而吉密者重而凶蓋因中氣不足時日未到但四圍起發而中心尚是好肉未得起發耳時日既到自然充括而成血漿輕稀者不須治重密者用解毒化斑湯若先有水忽然乾枯黑陷此名疔痘不可與中氣不足同例論中心微起四圍干不久焦枯變一般毒火熏蒸津液竭開關啟龠治應難凡痘有中心微起含水色四畔乾枯者此毒火熏蒸津液枯竭急以疔痘之法治之否則盡枯又復煩躁叫哭喘渴者不治痘疔只為火傷陰濟急無如砭與針解毒透肌兼發散胭脂四聖效應深大抵痘之初出一點血此一點屬正氣覺毒氣衝擊隨腠理而出現其後毒與血化為水水化為膿膿成毒解若毒大甚熬煎陰血其血乾枯而變黑色不得化水反閉塞毒出之路以致毒氣陷伏不得出此名倒陷其人煩躁腹脹喘滿口渴多不可救故古方外以針刺破吮出其血或用燈火淬之無非欲其開關啟龠而使毒氣得出也宜四聖珍珠散治之用藥後其瘡便回者吉如不回反添黑陷死證也不可妄治內服之藥有用穿山甲燒人牙者藥既非解毒發表之藥又無托裡快斑之能愚者執而用之適足誤事又不若四聖快斑散屢多奇效密齋曰錢氏用百祥丸牛李膏必其人大小便秘結煩躁作渴故宜服之若其人大小便自調身無大熱則必不可用今改去百祥丸牛李膏以宣風快斑散代之服此以通為度通後瘡回以四君子湯徐調之若或因泄瀉其瘡由灰白而變黑陷此名倒靨宜木香快斑散治之予按痘中壞證惟黑陷最惡凡見黑陷者大便未必自調身體未必不熱神情未必不擾攘宣風快斑散或可治其輕者若大便秘結煩躁悶亂大熱口渴舌上黃黑者舍百祥無以挽回蓋黑陷凶危之證非峻厲之方不足以制其猖獗今凡如百祥丸及棗姜百祥丸無價散胡荽酒並外治忍冬湯五方宜預製以便臨證酌用萬氏錢氏兩存可也黑陷瘡為壞證先此名惡候古今傳若教出現渾身上盧扁無功莫怨天凡黑陷用以前治法其瘡紅活依期光壯吉兆也倘服藥如故則不可治若痘本稀其中起發者多略有數個黑陷此則可治假如稠密又不起發或灰白或紫赤或青干又加黑陷者治之無功灰白遲延頂復平紫紅焮腫候須明且將氣血分虛實莫棄圓機執一行凡痘瘡喜紅活充實若不紅活充實虛也紅腫太過實也假如灰白色當起不起而頂平陷者此氣虛也必問其人初起證候如初因吐瀉不能飲食其後瀉止而灰白頂平者此正氣虛弱宜大補快斑湯以補之如泄瀉一向不止用異功快斑湯兼豆蔻丸如服以上之藥泄瀉仍甚用附子理中湯以溫其中若其人素日虛怯而吐瀉不止此元氣不足用補元快斑湯如誤服解毒寒涼及誤飲冷水者用調中快斑湯若灰白色又加癢塌頂陷腹脹此不治之證假如紅焮紫腫血熱也宜涼血快斑湯若其人素實初起誤服熱藥以致紅焮紫腫宜三黃解毒湯清解之若紫赤變黑喘渴不寧者不治起發猶如錫餅鋪皮膚光若水精壺其人能食方無慮不食將為鮑肆枯凡痘瘡稠密要依次起發紅活尖者吉一齊起發遍身白色如錫餅形頭目浮腫此惡候也但看其人之食飲何如若能食大便堅小便清無他證往往延至日久渾身皮脫而愈若不能食後加吐瀉熱渴瘙癢必死之證能食者宜服解毒之藥用助脾快斑湯扶其中氣起發之時未試漿口唇瘡色早焦黃如斯惡候無人識慢自矜誇強立方口唇脾之候也脾司運化以養血氣所以痘瘡不宜脾胃受傷如初出起發之時漿水未試口唇瘡色內帶黃漿此惡候也時人不識喜其成漿便呼為吉不知六七日間其瘡先靨剝落一層而死矣瘡頭起發漿先白不問何經皆是賊慢誇妙手有仙方七日應為泉下客凡痘由紅點而水泡由水泡而膿泡而結痂有自然之序初起發時頭帶白漿此疫癘也不可治發時磊落最堪誇相串牽連事可嗟若又四圍添小粟定然瘙癢證來加凡痘起發顆粒分明尖圓磊落者吉若彼此牽連成一片者凶如上分氣血虛實用解毒快斑治之或本痘起發或於根窠四畔又旋出小者攢簇本瘡成叢似粟者不待養漿即加瘙癢而死矣起發時常驗四肢發而不透成凶危此緣脾胃多虛弱發散還須當補脾凡痘瘡宜視手足何如若手足循序起發此脾胃素強毒氣得越不必憂慮若遍身俱起手足起不透此脾胃本弱也蓋脾胃主灌溉四肢今既虛弱不能行其津液使毒得越所以手足起發不齊宜補脾快斑湯助長可也起發之時貴謹扶調和何必問醫巫暑寒食飲須當慎後悔噬臍莫可圖痘瘡有輕變重者犯禁或誤醫藥或犯風寒有重變輕者反是然輕者吉凶之變存乎起發之時調護不可縱弛也或遇暴風驟雨迅雷閃電即當以密布幃幙緊飾房戶以防客風怪氣之侵如失調護為寒涼所郁不能起發宜正氣快斑湯凡痘起發之時遇久陰雨不能起發宜平胃快斑湯以燥其濕凡痘當起發遇天氣暄熱俗人不知謂痘欲溫暖蓋覆太厚以致毒火鬱遏不得發越此壯火食氣反虛其氣宜白虎快斑湯凡痘當起發誤傷生冷以致脾虛不能起發者用理中快斑湯凡痘瘡起發內傷飲食腹中飽悶或痛以致中氣鬱遏不能起透者宜寬中快斑湯自此常宜大便堅如常調理保安然若逢泄瀉無休歇寒熱須教仔細研痘瘡自起發之後大便要堅雖三四日一次亦無事小便常要清利若見小便赤少宜四苓新加湯或有忽然泄瀉宜分寒熱治之視其所泄之物或焦黃酸臭此內熱也或傷飲食宜胃苓和中湯若泄出之物清白澄冷裡寒也用附子理中湯方見前如久泄不止用理中湯吞送豆蔻丸方見前其人能食素脾強大便雖溏也不妨但用補中消導藥六君加味信良方其人能食雖有泄瀉不能為害當用補中之藥宜六君子湯固其中氣起發預防頭面腫大頭時氣可兼醫瘡宜磊落色宜潤反此傾危命必隨凡痘瘡起發有頭面由漸而腫此毒氣發越聚於三陽欲作膿血故皮肉焮腫此雖正病亦當解毒護目救咽喉而兼治之宜清毒化斑湯若頭面不腫必瘡本稀疏磊落痘根輕淺雖作膿血卻不佔處故且不腫不必治之若痘稠密應腫不腫此毒鬱於內不能起發急服托裡快斑湯服藥後瘡起者吉不起者凶至於腫時又要觀其皮色何如磊落紅活者吉模糊黑黯灰色者多不可治亦有痘將起發便頭目先腫此天行疫癘之氣名大頭瘟者是也急解其毒宜苦參散面腫頭浮眼不開如斯惡候實堪哀未應開處偏開早搔癢頻加凶禍來痘瘡起發頭面浮腫有不閉目者但觀其痘之輕重疏密若疏輕者目雖不閉亦不妨重密者其目要閉宜閉不閉者凶蓋眼封鼻塞神氣內固而不外馳吉兆也但遇封眼之時必待其收靨之時而後漸開可也若未及收靨漸生瘙癢而腫消目開者大凶痛癢原來有實虛癢虛痛實載於書都來痛者終為吉諸癢難言吉自如大凡諸痛為實癢為虛謂之實者邪氣實也謂之虛者正氣虛也蓋痘瘡始終氣以載之血以養之氣血充實則禁固其毒不得橫行所以緊實而為痛也痛乃美事不須服藥苟欲治之宜涼血芍藥湯瘡痘作癢邪氣橫行氾濫皮肉不任條約侵螫是為癢也蓋痘瘡惟回頭作癢容或有之此否極泰來之兆若發熱及養漿時作癢皆危證也內宜托裡解毒之藥外用熏洗之法令無致於癢塌破陷可矣仍要分虛實治之若能食而大便秘者此邪氣內實正氣外虛宜加味四聖解毒湯外用洗法若有泄瀉而作癢者乃正氣裡虛邪氣外實宜調元托裡湯外用熏法起發之時渴又臨火邪內迫熱偏深急宜解毒生津液休得俄延向外尋凡痘瘡起發身上作熱不可除其熱若不熱則痘不發如熱太過甚於常時唇焦口燥小便短少不可不治宜導赤解毒湯微解之若痘瘡作渴此是常事蓋由胃中津液不能滋養本元內則熾於毒火外則灌潤於瘡故宜渴耳凡一切瓜果生冷之物不可與食惟炒米湯飲之為宜若渴太甚看其人虛實而治若飲食如常大便堅實而渴者此內熱也宜生津地黃湯潤之若泄瀉而渴此內虛津液不足不能上潮於口宜七味白朮散滋之聲啞無音更咬牙憎寒躁擾亂紛譁錯喉乾嘔多昏悶形氣俱傷最可嗟痘瘡始終要聲音清朗人事安靜五臟堅實飲食如常若起發之時忽然失聲咬牙寒戰煩躁昏迷嗆水錯喉乾嘔痰氣喘急泄瀉不止腹痛悶亂俱皆凶證古人云痘出而聲不變者形病也痘未出而聲變者氣病也痘出而聲不出者形氣俱病將欲治之誠難為力咳嗽而失聲者非此論痘兒嘔噦不堪聞不是寒邪是火焚妄進湯丸如拙匠內傷臟腑非妖氛凡痘瘡乾嘔無物或時常噦逆此臟腑內傷衝任之火上犯清道故為嘔噦之惡聲經曰弦敗者聲必嘶木陳者葉必落臟敗者聲必噦針灸無功湯藥無效此之謂也若飲食而嘔當分寒熱而治如曾傷冷物受寒氣此寒嘔也宜二陳理中湯如未傷冷物及寒氣此熱嘔也宜二陳一連湯和之若飲食哽塞而嘔噦者咽中有瘡必作痛閉塞而嘔宜加味鼠黏子湯外用控涎散吹之渾身痘密精神耗補瀉無功煩複躁狂言啼哭見鬼神臟腑敗傷天命到凡痘稀少自然易壯密者切防氣血虧損起發不透即是病之所在如前法治之虛則補之實則瀉之在氣補氣在血補血隨機應變每中權衡不可執方以誤人命若補瀉無功反增沉重或啼哭不止日夜呻吟煩躁悶亂狂言妄語如見鬼神此臟腑傷敗神魂離散復何為哉入方黃耆芍藥湯治痘起發太快毒火作崇官揀參炙黃耆生白芍酒黃芩淨連翹北防風牛蒡子芽桔梗粉乾葛荊芥穗炙甘草淡竹葉十片為引水煎服內托護心散治痘起發太遲正氣不足官揀參大當歸北防風酒黃連酒黃芩酒黃柏牛蒡子荊芥穗淮木通青化桂淨蟬蛻炙甘草便秘加大黃紫草水煎入燒過人屎調服十宣內托散治痘起發之時形扁塌色枯黑官揀參炙黃耆全當歸正川芎芽桔梗荊芥穗牛蒡子北防風炙甘草大便秘加酒大黃紫草小便澀加木通渴加花粉麥冬葛根水煎入燒過人屎同服燒人屎痘科之聖藥也解毒托裡散治痘出過於稠密防起發不透芽桔梗牛蒡子荊芥穗鮮紅花北防風當歸尾淨蟬蛻綠升麻粉乾葛赤芍藥淨連翹炙甘草水煎入燒過人屎同服令易壯易靨四物快斑湯治痘瘡乾燥形不充肥全當歸正川芎京赤芍懷生地綠升麻粉乾葛淨連翹鮮紫草荊芥穗牛蒡子水煎和燒過人屎服四君快斑湯治痘雖充肥而帶淫濕官揀參炙黃耆白雲苓柳桂枝荊芥穗香白芷北防風廣陳皮杭白芍炙甘草淨水煎熱服大補快斑湯治痘起發皮嫩易破防癢塌官揀參炙黃耆全當歸大川芎赤芍藥懷生地牛蒡子炙甘草北防風連翹殼柳楊桂水煎入燒過人屎同服解毒瀉火湯治痘出根窠紅赤頂赤帶豔酒黃芩牛蒡子當歸梢黑梔仁淨連翹山豆根生甘草芽桔梗綠升麻粉乾葛地骨皮水煎入燒過人屎調服服後色退者生不退者凶十全大補湯治痘出純白色此血寒氣虛也官揀參漂白朮白雲苓懷生地青化桂當歸身大川芎杭白芍炙黃耆公丁香嫩鹿茸炙甘草煨姜三片大棗三枚引水煎服黃連解毒湯治痘出純紫赤色血熱氣實也正雅連川黃柏枯黃芩黑梔仁懷生地牛蒡子燈芯十根為引水煎熱服解毒化斑湯治痘四圍起發中心陷下不起官揀參炙黃耆生甘草當歸梢正川芎牛蒡子北防風淨連翹荊芥穗冬月加上薄桂水煎入燒過人屎服四聖珍珠散治痘疔新豌豆新綠豆各四十九粒燒灰存性油頭髮一握燒灰海蚌珠七粒研末上將四味研為細末用胭脂取汁和上四末調勻以針挑破其疔納藥於中更以胭脂汁塗四圍其瘡色回者吉不回反添黑陷者死四聖快斑散治痘瘡黑陷解毒托裡淮木通淨連翹生黃耆鮮紅花鮮紫草炒麻黃人中黃鏡辰砂另研絲瓜連蒂燒灰燒過人屎各等分共為細末白湯調服二三錢宣風快斑散治黑陷而身無大熱大小便調者淮木通陳枳殼尖檳榔川大黃牽牛末生甘草俱等分水煎服以大小便通利為度木香快斑散治由灰白而變黑陷官揀參南木香炙黃耆青化桂杭青皮訶子肉炙甘草當歸身漂白朮廣陳皮薑棗引水煎服中病即止不可多服恐增熱證百祥丸治痘黑陷大小便秘煩躁悶亂喘急舌黑紅芽大戟不拘多少水煎極軟去骨日中曬乾復內原汁中煮汁盡焙乾為末水丸如粟米大每一二十丸研赤脂麻湯下棗變百祥丸治證如前方稍緩紅芽大戟去骨一兩青州大紅棗三十個去皮核上用水一碗以前二味同煮水乾為度去大戟不用將棗肉搗爛為丸從少至多木香湯下以利為度無價散治黑陷由疫毒而致用人貓豬狗糞等分於臘月內燒灰瓷缸收貯用時以砂糖水調服二三錢胡荽酒即芫荽也治痘疹倒陷不起胡荽四兩切碎以好酒入瓶內先煎一二沸入胡荽在內蓋定勿煎勿令泄氣放冷每吸一口微噴患者從背至足勿噴頭面病人常令聞此胡荽氣外浴忍冬湯治痘疹倒陷黑陷不起皆良忍冬藤俗名金銀花是也春冬用枝夏用枝葉銼碎以長流水一大釜煎七分將三分之一置浴盆內以手試之溫熱得中先宜服用湯藥然後浴洗漸漸添湯以痘起光壯為度不拘次數予按忍冬湯治痘焦枯倒陷不起誠為良法第嚴寒時令深為可慮予嘗見寒月當風浴洗痘未起而作搐死者矣蓋傷於寒也愚意必於帳中捲去被褥用小盆盛湯抱兒入帳中垂帳以洗則暖氣熏蒸斷不致受寒生變此法有益無損不可不知大補快斑湯治痘起發由吐瀉不能飲食而灰白官揀參炙黃耆漂白朮炙甘草杭白芍全當歸正川芎南木香上薄桂廣陳皮藿香葉大棗三枚為引水煎半飢服異功快斑湯治痘證久瀉不止官揀參炙黃耆炙甘草漂白朮南木香全當歸青化桂廣陳皮公丁香白雲苓訶子肉大棗三枚為引水煎半飢服豆蔻丸治證同前服異功不愈者肉豆蔻煨南木香煨西砂仁炒石龍骨煅訶子肉煨赤石脂煅以上各五錢白枯礬七錢五分共為末麵糊為丸胡椒大每服十五丸米飲化下附子理中湯治痘證中寒泄瀉糞色青白官揀參漂白朮黑炮姜熟川附炙甘草量兒大小加減分兩水煎溫涼服補元快斑湯治痘兒脾胃元氣素弱而吐瀉不止官揀參炙黃耆漂白朮全當歸炙甘草當歸土拌炒薑棗引水煎服調中快斑湯治痘疹誤服寒涼及冷水以致泄瀉官揀參漂白朮白雲苓法半夏炙甘草青化桂南木香廣陳皮漂蒼朮川厚朴藿香葉生薑三片引水煎服涼血快斑湯治痘疹紅焮紫腫血熱故也淨連翹當歸尾懷生地鮮紅花綠升麻牛蒡子生甘草大便秘加紫草甚者加大黃小便秘加木通燈芯十莖為引水煎熱服三黃解毒湯治痘初起誤服熱藥以致紅焮紫腫酒黃芩酒黃連酒川柏淮木通生甘草黑梔仁綠升麻淨連翹牛蒡子淡竹葉為引水煎熱服助脾快斑湯治痘稠密一齊起發形如錫餅廣陳皮山楂肉荊芥穗牛蒡子南木香杭青皮陳枳殼淮木通炙甘草水煎服一二劑不宜多補脾快斑湯治痘疹手足起發不齊大官揀炙黃耆北防風漢防己柳楊桂炙甘草水煎服若手足痘見而復隱起而復塌此本根已廢枝葉先萎之象必死不治正氣快斑湯治痘犯暴風疾雨寒涼所郁不能起發川羌活漂蒼朮北防風芽桔梗當歸身粉乾葛香白芷正川芎炙甘草冬月加上薄桂生薑為引水煎服平胃快斑湯治痘值天時久雨濕滯不能起發漂蒼朮廣陳皮川厚朴川羌活北防風上薄桂結豬苓白雲苓炙甘草淨水煎半飢熱服白虎快斑湯治痘值炎天暑月誤用蓋覆以致毒火鬱遏閉其腠理不能起發官揀參熟石膏大麥冬粉乾葛綠升麻淡竹葉生甘草昏迷者加辰砂末小便赤者加木通大便堅者加生石膏粳米一撮為引以米熟為度熱服理中快斑湯治痘誤傷生冷寒凝不能起發官揀參漂白朮白雲苓青化桂黑薑炭南木香炙甘草嘔加半夏泄瀉加懷山生薑三片大棗三枚引水煎服寬中快斑湯治痘誤傷飲食中氣抑遏不能起發廣陳皮法半夏漂白朮陳枳殼六神麯山楂肉西砂仁正雅連南木香川紫樸杭青皮淨連翹炙甘草生薑一片為引水煎熱服四苓新加湯治痘已起發小便赤少結豬苓宣澤瀉赤茯苓淮木通白滑石淨連翹甘草梢燈芯淡竹葉為引水煎服胃苓和中湯治痘已起發忽然泄瀉或傷飲食結豬苓宣澤瀉漂白朮白雲苓廣陳皮訶子肉炙甘草川黃連南木香綠升麻藿香葉粳米一撮為引水煎服六君子湯治痘起發能食而泄瀉雖無害亦宜調其中氣官揀參漂白朮白雲苓廣陳皮法半夏炙甘草炙黃耆六神麯南木香綠升麻西砂仁生薑大棗為引水煎服消毒化斑湯治痘瘡起發頭面作腫芽桔梗牛蒡子淨連翹北防風紫草茸綠升麻淨蟬蛻密蒙花草龍膽人中黃水煎食後服托裡快斑湯治痘稠密頭面應腫不腫川羌活北防風牛蒡子芽桔梗綠升麻荊芥穗淨連翹粉乾葛當歸梢上薄桂炙甘草竹葉十片為引水煎服苦參散治痘瘡初壯頭面未應腫而腫天行瘟疫也川羌活北防風牛蒡子芽桔梗淨連翹酒黃芩荊芥穗人中黃嫩苦參水煎入竹瀝薑汁調勻徐徐服四聖解毒湯治痘瘡作癢能食而大便秘紫草茸淮木通陳枳殼炙黃耆柳桂枝錦大黃酒炒水煎空心熱服洗法治痘瘡作癢綠升麻漂蒼朮全麻黃槐樹枝柳樹枝煎濃湯乘熱拭之調元托裡湯治痘瘡作癢而兼泄瀉官揀參炙黃耆炙甘草南木香廣陳皮訶子肉嫩柳桂北防風川羌活赤芍藥荊芥穗生薑為引水煎服熏法治痘瘡作癢泄瀉內虛者茵陳蒿蘄艾葉二味燒煙燻之如用上二法而癢止者吉反甚者凶不治導赤解毒湯治痘起發時身熱太甚唇焦口渴淮木通北防風大麥冬淨連翹地骨皮綠升麻白芍藥粉乾葛懷生地天花粉炙甘草燈芯十根為引水煎服生津地黃湯治痘起發大便堅實而渴懷生地大麥冬淨知母天花粉炙甘草竹葉十片為引水煎熱服七葉白朮散治痘起發泄瀉而渴官揀參漂白朮南木香藿香葉白雲苓粉乾葛炙甘草生薑大棗為引水煎服二陳理中湯治痘曾傷冷物受寒氣而嘔者官揀參漂白朮廣陳皮法半夏炙甘草生薑三片為引水煎服二陳一連湯治未傷冷物寒氣而嘔者熱也廣陳皮法半夏白雲苓酒川連炙甘草竹茹生薑為引水煎熱服加味鼠黏子湯治咽喉中生瘡閉塞而嘔者芽桔梗牛蒡子新射干北防風山豆根廣陳皮荊芥穗淨連翹炙甘草水煎熱服控涎丹吹咽中生瘡辰砂五分明雄黃三分兒茶五分川柏五分共為末吹喉中
